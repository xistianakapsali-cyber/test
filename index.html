<title>YIOIO Ultimate Database 2026</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --primary: #e50914;
    --bg: #0a0a0a;
    --card: #141414;
    --text: #ffffff;
    --border: #222;
    --gold: #ffc107;
    --input-bg: #1a1a1a;
    --modal-overlay: rgba(0, 0, 0, 0.95);
}

[data-theme="light"] {
    --bg: #f5f5f5;
    --card: #ffffff;
    --text: #1a1a1a;
    --border: #ddd;
    --input-bg: #eeeeee;
    --modal-overlay: rgba(255, 255, 255, 0.95);
}

body {
    margin: 0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: background 0.3s, color 0.3s;
}

header {
    padding: 15px 5%;
    background: var(--card);
    position: sticky;
    top: 0;
    z-index: 1000;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
}

.logo {
    color: var(--primary);
    font-weight: 800;
    font-size: 24px;
}

.header-controls {
    display: flex;
    align-items: center;
    gap: 20px;
}

.theme-btn {
    background: var(--primary);
    color: white;
    border: none;
    padding: 6px 15px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 11px;
    font-weight: bold;
    transition: opacity 0.2s;
}

.theme-btn:hover {
    opacity: 0.8;
}

#movieCount {
    font-size: 12px;
    background: var(--input-bg);
    padding: 5px 12px;
    border-radius: 15px;
    border: 1px solid var(--border);
    color: var(--text);
}

.search-section {
    padding: 30px 5% 10px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}

#movieSearch {
    width: 100%;
    max-width: 600px;
    padding: 15px 25px;
    border-radius: 30px;
    border: 2px solid var(--border);
    background: var(--input-bg);
    color: var(--text);
    outline: none;
    font-size: 16px;
    transition: border-color 0.2s;
}

#movieSearch:focus {
    border-color: var(--primary);
}

.filter-group {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    justify-content: center;
    margin: 20px 0;
}

.filter-group select {
    padding: 10px 20px;
    border-radius: 25px;
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    cursor: pointer;
    font-size: 14px;
    min-width: 150px;
    outline: none;
    transition: border-color 0.2s;
}

.filter-group select:focus {
    border-color: var(--primary);
}

.movie-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 25px;
    padding: 20px 5%;
    width: 100%;
    box-sizing: border-box;
}

.movie-card {
    background: var(--card);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: transform 0.3s ease, border-color 0.3s ease;
    cursor: pointer;
}

.movie-card:hover {
    transform: translateY(-8px);
    border-color: var(--primary);
}

.img-container {
    position: relative;
    overflow: hidden;
    aspect-ratio: 2 / 3;
    background: #1a1a1a;
}

.movie-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.quality-tag {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #2ecc71;
    color: white;
    font-size: 9px;
    font-weight: bold;
    padding: 3px 6px;
    border-radius: 4px;
    z-index: 1;
}

.quality-tag.sd-blue {
    background: #007bff;
}

.info {
    padding: 15px;
    text-align: center;
}

.info h3 {
    font-size: 14px;
    margin: 0 0 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
    font-weight: 700;
}

.stars {
    color: var(--gold);
    font-size: 16px;
    margin-bottom: 10px;
}

.rating-number {
    font-size: 12px;
    color: var(--text);
    margin-left: 8px;
    opacity: 0.8;
}

.play-btn {
    background: var(--primary);
    color: white;
    text-decoration: none;
    padding: 8px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: bold;
    display: block;
    text-align: center;
    transition: opacity 0.2s;
}

.play-btn:hover {
    opacity: 0.8;
}

#loadMoreBtn {
    display: block;
    margin: 20px auto 50px;
    padding: 12px 30px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-weight: bold;
    transition: opacity 0.2s;
}

#loadMoreBtn:hover {
    opacity: 0.9;
}

#detailModal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--modal-overlay);
    z-index: 4000;
    align-items: center;
    justify-content: center;
}

.modal-box {
    background: var(--card);
    width: 90%;
    max-width: 900px;
    display: flex;
    position: relative;
    border-radius: 15px;
    overflow: hidden;
    animation: slideUp 0.4s ease;
}

.modal-poster {
    width: 35%;
    object-fit: cover;
    background: #000;
}

.modal-info {
    width: 65%;
    padding: 20px 25px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 80vh;
    overflow-y: auto;
    text-align: left;
}

.modal-info h2 {
    margin: 0 0 5px 0;
    color: var(--primary);
    font-size: 24px;
}

.info-label {
    color: var(--primary);
    font-weight: 800;
    font-size: 10px;
    text-transform: uppercase;
    margin-right: 5px;
    display: inline-block;
    min-width: 70px;
}

.info-row {
    margin-bottom: 5px;
    line-height: 1.4;
    font-size: 15px;
}

.modal-desc {
    font-size: 15px;
    line-height: 1.5;
    opacity: 0.8;
    border-top: 1px solid var(--border);
    padding-top: 8px;
    margin-top: 5px;
}

.modal-buttons {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 8px;
}

@keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

@media (max-width: 750px) {
    .modal-box {
        flex-direction: column;
        height: 100vh;
        border-radius: 0;
        width: 100%;
    }
    .modal-poster {
        width: 100%;
        height: 35%;
        object-fit: contain;
        background: #000;
    }
    .modal-info {
        width: 100%;
        padding: 15px;
    }
    .movie-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 15px;
        padding: 15px;
    }
}

#backToTop {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 50px;
    height: 50px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    display: none;
    z-index: 3000;
    transition: opacity 0.2s;
}

#backToTop:hover {
    opacity: 0.9;
}

.close-modal {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(229, 9, 20, 0.8);
    color: white;
    border: none;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    cursor: pointer;
    z-index: 10;
    font-weight: bold;
    font-size: 16px;
    transition: background 0.2s;
}

.close-modal:hover {
    background: rgb(229, 9, 20, 1);
}

.imdb-link, .tmdb-link, .download-link {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 15px;
    text-decoration: none;
    font-size: 10px;
    font-weight: bold;
    transition: opacity 0.2s;
}

.imdb-link {
    background: #f5c518;
    color: #000;
}

.tmdb-link {
    background: #01b4e4;
    color: white;
}

.download-link {
    background: #2ecc71;
    color: white;
}

.download-link:hover {
    background: #27ae60;
}

.new-badge {
    background: #e50914;
    color: white;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 10px;
    margin-left: 8px;
    display: inline-block;
    vertical-align: middle;
}

.loading-spinner {
    text-align: center;
    padding: 50px;
    font-size: 18px;
    color: var(--primary);
}
</style>
</head>

  { id: 19, title: "His Dark Materials", year: 2019, country: "United Kingdom", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.8, actors: "Dafne Keen, Ruth Wilson, Kit Connor (φωνή), Will Keen, Amir Wilson", director: "Jamie Childs, William McGregor, Amit Gupta, Leanne Welham, Otto Bathurst", writer: "Philip Pullman, Jack Thorne, Francesca Gardiner, Amelia Spencer, Namsi Khan", link: "https://terabox.com/s/1VOvhPHWupGLB7VUf6lqdyQ", imdb: "https://www.imdb.com/title/tt5607976/", tmdb: "https://www.themoviedb.org/tv/68507", tagline: "Ένα κορίτσι θα αλλάξει τους κόσμους.", desc: "Η σειρά ακολουθεί την Lyra, μια φαινομενικά συνηθισμένη, αλλά πολύ γενναία νεαρή γυναίκα από έναν άλλο κόσμο. Η αναζήτηση της Lyra για έναν απαχθέντα φίλο, αποκαλύπτει μια σατανική πλοκή, που περιλαμβάνει κλεμμένα παιδιά, και εξελίσσεται σε μια αποστολή κατανόησης του μυστηριώδους φαινομένου που αποκαλείται Dust. Καθώς ταξιδεύει ανάμεσα στους κόσμους, η Lyra συναντά ένα αποφασισμένο και πολύ γενναίο αγόρι με το όνομα Bill. Οι δυο τους, θα βρεθούν αντιμέτωποι με απίστευτα πλάσματα και επικίνδυνα μυστικά, με την μοίρα τόσο των ζωντανών όσο και των πεθαμένων να βρίσκεται στα χέρια τους." },
  { id: 20, title: "House of the Dragon", year: 2022, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.4, actors: "Emma D'Arcy, Matt Smith, Fabien Frankel, Steve Toussaint, Olivia Cooke", director: "Clare Kilner, Geeta Patel, Greg Yaitanes, Miguel Sapochnik, Alan Taylor", writer: "Ryan Condal, Sara Hess, David Hancock, Eileen Shim, Kevin Lau", link: "https://terabox.com/s/1QZkpIeib_47OSGQCMfQUvA", imdb: "https://www.imdb.com/title/tt11198330/", tmdb: "https://www.themoviedb.org/tv/94997", tagline: "Φωτιά και αίμα.", desc: "Βασισμένο στη νουβέλα ‘Fire & Blood’ του George R.R. Martin, το ‘House of the Dragon’ εξελίσσεται 200 χρόνια πριν τα γεγονότα του ‘Game of Thrones’ και ακολουθεί τον Οίκο των Targaryen, με τους πολλούς συμμάχους και εχθρούς και ειδικότερα τον Βασιλιά Viserys και την νεαρή Πριγκίπισσα Rhaenyra, που ο Viserys έχει χρίσει ως διάδοχο, παρά την δυσαρέσκεια της οικογένειας του και των συμμάχων του, ειδικά του Πρίγκηπα Daemon, που μοιάζει σαν να φορά υποδήματα γεμάτα με σπασμένα γυαλιά." },
  { id: 21, title: "Εξ Αίματος", year: 2022, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.4, actors: "Mallori Johnson, Micah Stock, Ryan Kwanten, Gayle Rankin, Austin Smith", director: "", writer: "Octavia E. Butler, Branden Jacobs-Jenkins", link: "https://terabox.com/s/12h9aC0f973LL2ZDBHaif0Q", imdb: "https://www.imdb.com/title/tt14452776/", tmdb: "https://www.themoviedb.org/tv/138561", tagline: "Question the ties that bind through time.", desc: "Καθώς η Ντάνα, μια νεαρή μαύρη γυναίκα και επίδοξη συγγραφέας, αρχίζει να τακτοποιείται στο νέο της σπίτι, συνειδητοποιεί ότι μπορεί να πηγαινοέρχεται μπροστά-πίσω στον χρόνο. Εμφανίζεται σε μια φυτεία του 19ου αιώνα και αντιμετωπίζει μυστικά που δεν ήξερε ότι διέπουν το ίδιο της το αίμα." },
  { id: 22, title: "Ο Ιππότης της Ασφάλτου", year: 1982, country: "United States", genre: "Δράμα, Εγκλήματος", type: "Series", quality: "HD", rating: 6.9, actors: "David Hasselhoff, Edward Mulhare, William Daniels (φωνή), Patricia McPherson, Rebecca Holden", director: "Georg Fenady, Winrich Kolbe, Sidney Hayers, Bernard L. Kowalski, Harvey S. Laidman", writer: "Robert Foster, Janis Hendler, Gregory S. Dinallo, Richard C. Okie, Burton Armus", link: "https://terabox.com/s/1Vw-B_ugSEnl1OzfwFj4Q1A", imdb: "https://www.imdb.com/title/tt0083437/", tmdb: "https://www.themoviedb.org/tv/2384", tagline: "Michael Knight is today's hero! Driving the car of tomorrow! Together, they're the ultimate crimecrashers!", desc: "Ο Μάικλ Λονγκ, ένας μυστικός αστυνομικός, πυροβολείται ενώ ερευνά μια υπόθεση και θεωρείται από τους δράστες νεκρός. Διασώζεται από τον Γουίλτον Νάιτ, έναν πλούσιο εκατομμυριούχο εφευρέτη, ο οποίος οργανώνει μια σωτήρια χειρουργική επέμβαση, που περιλαμβάνει ένα νέο πρόσωπο και μια νέα ταυτότητα - αυτή του Μάικλ Νάιτ. Στη συνέχεια, του δίνεται ένα ειδικό ηλεκτρονικό σπορ αυτοκίνητο με ενσωματωμένο επεξεργαστή που σκέφτεται και δρα, ο KIT και μια αποστολή: να συλλάβει εγκληματίες, ενόχους για διάφορα παραπτώματα ή εγκλήματα." },

  { id: 24, title: "Loki", year: 2021, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.2, actors: "Tom Hiddleston, Sophia Di Martino, Wunmi Mosaku, Owen Wilson, Gugu Mbatha-Raw", director: "Kate Herron, Justin Benson, Aaron Moorhead, Dan DeLeeuw, Kasra Farahani", writer: "Katharyn Blair, Michael Waldron, Tom Kauffman", link: "https://terabox.com/s/1-geMDMYee6BEe_iYEG7ORA", imdb: "https://www.imdb.com/title/tt9140554/", tmdb: "https://www.themoviedb.org/tv/84958", tagline: "Ήρθε η ώρα του Λόκι.", desc: "Ο ευμετάβλητος κακός Λόκι συνεχίζει τον ρόλο του ως ο Θεός της Κατεργαριάς σε μια νέα σειρά που διαδραματίζεται μετά τα γεγονότα της ταινίας «Εκδικητές: Η Τελευταία Πράξη»." },
  { id: 25, title: "Madoff", year: 2016, country: "United States", genre: "Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 7.4, actors: "Richard Dreyfuss, Blythe Danner, Peter Scolari, Frank Whaley, Erin Cummings", director: "Raymond De Felitta", writer: "Ben Robbins", link: "https://terabox.com/s/10f_VaRhHr62azm4tkD6h3g", imdb: "https://www.imdb.com/title/tt4803046/", tmdb: "https://www.themoviedb.org/tv/67307", tagline: "", desc: "Εξαιρετική Βιογραφική Μίνι Σειρά, με εξαιρετική ερμηνεία από τον κορυφαίο Richard Dreyfuss. Το 1960, ο Bernard Madoff ίδρυσε την επενδυτική εταιρεία Bernard L. Madoff Investment Securities. Η επιχείρηση ήταν αρχικά ένας trader εταιρειών πολύ μικρής κεφαλαιοποίησης (penny stocks). Χάρη στις καινοτόμες τεχνολογίες που πρόσφερε η χρήση των υπολογιστών, η εταιρεία γρήγορα μεγάλωσε. Έγινε ένας από τους market makers των ΗΠΑ, με αποκορύφωμα το 2008 που είχε αναρριχηθεί ως η έκτη μεγαλύτερη στη Wall Street. Bernie Madoff Κανένα όνομα δεν έχει γίνει περισσότερο συνώνυμο με την απάτη και τα οικονομικά τεχνάσματα από τον Bernie Madoff. Η μεγαλύτερη οικονομική απάτη στην ιστορία των ΗΠΑ ανήλθε σε 65 δισεκατομμύρια δολάρια και αποκαλύφθηκε σχετικά πρόσφατα, στα τέλη του 2008." },
  { id: 26, title: "Κυρίαρχοι των Αιθέρων", year: 2024, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.8, actors: "Austin Butler, Callum Turner, Anthony Boyle, Nate Mann, Stephen Campbell Moore", director: "Cary Joji Fukunaga, Dee Rees, Ryan Fleck, Anna Boden, Tim Van Patten", writer: "John Orloff", link: "https://terabox.com/s/1WoSJL_TMvyKTpOPDUUwVIQ", imdb: "https://www.imdb.com/title/tt10757536/", tmdb: "https://www.themoviedb.org/tv/46518", tagline: "", desc: "Κατά τον Β' Παγκόσμιο Πόλεμο, αεροπόροι ρισκάρουν τη ζωή τους με την 100ή Ομάδα Βομβαρδισμού, μια αδελφότητα που σφυρηλατήθηκε μέσα από το θάρρος, την απώλεια και τον θρίαμβο." },
  { id: 27, title: "Μεσσίας", year: 2020, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.6, actors: "Mehdi Dehbi, Michelle Monaghan, John Ortiz, Tomer Sisley, Stefania LaVie Owen", director: "James McTeigue", writer: "Michael Petroni", link: "https://terabox.com/s/176hpXd8GY05fM9eIaO1EXA", imdb: "https://www.imdb.com/title/tt8690982/", tmdb: "https://www.themoviedb.org/tv/81292", tagline: "Θα σας προσηλυτίσει;", desc: "Μια πράκτορας της CIA ερευνά μια χαρισματική προσωπικότητα του οποίου οι ακόλουθοι πιστεύουν ότι κάνει θαύματα. Είναι όντως θεόσταλτος ή ένας επικίνδυνος απατεώνας;" },
  { id: 28, title: "Miss Scarlet and the Duke", year: 2020, country: "United Kingdom", genre: "Δράμα, Μυστηρίου, Εγκλήματος", type: "Series", quality: "HD", rating: 7.7, actors: "Kate Phillips, Stuart Martin, Cathy Belton, Ansu Kabia, Matthew Malone", director: "Steve Hughes", writer: "Rachael New, Ben Edwards", link: "https://terabox.com/s/1uPg3nBMbUVl3mfc8I03dRw", imdb: "https://www.imdb.com/title/tt10355524/", tmdb: "https://www.themoviedb.org/tv/96450", tagline: "London's greatest investigator has arrived.", desc: "Όταν ο πατέρας της Ελίζα Σκάρλετ πεθαίνει, εκείνος την αφήνει πάμπτωχη, αλλά εκείνη αποφασίζει να συνεχίσει το ντετέκτιβ του. Για να λειτουργήσει σε έναν ανδροκρατούμενο κόσμο, όμως, χρειάζεται έναν σύντροφο... βήμα μπροστά, έναν ντετέκτιβ γνωστό ως Δούκας. Η Ελίζα και ο Δούκας δημιουργούν μια αταίριαστη, φλογερή σχέση καθώς συνεργάζονται για να λύσουν το έγκλημα στα πιο σκοτεινά βάθη του Λονδίνου του 1880." },
  { id: 29, title: "Η Τέλεια Ληστεία", year: 2017, country: "Spain", genre: "Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 8.2, actors: "Álvaro Morte, Pedro Alonso, Úrsula Corberó, Itziar Ituño, Jaime Lorente", director: "Jesús Colmenar, Alex Rodrigo, Koldo Serra, Alejandro Bazzano, Javier Quintas", writer: "Juan Salvador López, Esther Martínez Lobato, David Barrocal, Luis Moya, Fernando Sancristóbal", link: "https://terabox.com/s/1kYwbB2d5--hEKOjph4IWoA", imdb: "https://www.imdb.com/title/tt6468322/", tmdb: "https://www.themoviedb.org/tv/71446", tagline: "The perfect robbery.", desc: "Οκτώ ληστές παίρνουν ομήρους και κλείνονται στο Βασιλικό Νομισματοκοπείο της Ισπανίας, καθώς ένας αρχιτεκτονικός παρασύρει την αστυνομία να εκτελέσει το σχέδιό του. Είναι η τέλεια ληστεία, το τέλειο σχέδιο." },
  { id: 30, title: "Star Wars: Obi-Wan Kenobi", year: 2022, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.0, actors: "Ewan McGregor, Vivien Lyra Blair, Moses Ingram, Hayden Christensen, Dmitrious Bistrevsky", director: "Deborah Chow", writer: "Joby Harold, Hannah Friedman", link: "https://terabox.com/s/1VPAaVCl19BwKqB6e0JHjBQ", imdb: "https://www.imdb.com/title/tt8466564/", tmdb: "https://www.themoviedb.org/tv/92830", tagline: "Between darkness and defeat, hope survives.", desc: "Καθ' ό,τι οι Τζεντάι διώκονται από την Αυτοκρατορία, ο Όμπι-Ουάν Κενόμπι κρύβεται στον Τατουίν. Όμως, κάποια σοβαρά γεγονότα τον αναγκάζουν να επανεμφανιστεί." },
  { id: 31, title: "Painkiller", year: 2023, country: "United States", genre: "Δράμα, Εγκλήματος", type: "Series", quality: "HD", rating: 7.4, actors: "Uzo Aduba, Matthew Broderick, Taylor Kitsch, Dina Shihabi, West Duchovny", director: "Peter Berg", writer: "", link: "https://terabox.com/s/1LL9ZSrrzYoFrGFC2HN6RmQ", imdb: "https://www.imdb.com/title/tt15491846/", tmdb: "https://www.themoviedb.org/tv/158083", tagline: "*Do not use as directed", desc: "Το δράμα αυτό ξεσκεπάζει τα αίτια της επιδημίας των οπιοειδών στην Αμερική, ακολουθώντας τους δράστες, τα θύματα και μια ερευνήτρια που ψάχνει την αλήθεια." },
  { id: 32, title: "Παράλληλα", year: 2022, country: "France", genre: "", type: "Series", quality: "HD", rating: 7.0, actors: "Timoté Rigault, Thomas Chomel, Omar Mebrouk, Jules Houplain, Jade Pedri", director: "Jean-Baptiste Saurel", writer: "Quoc Dang Tran, Anastasia Heinzl", link: "https://terabox.com/s/1U58O2rfU4qJdZdCBuMxPTQ", imdb: "https://www.imdb.com/title/tt14015266/", tmdb: "https://www.themoviedb.org/tv/118906", tagline: "To find themselves, they'll have to get lost.", desc: "Ένα μυστηριώδες γεγονός φέρνει τα πάνω κάτω στη ζωή του Μπιλάλ, της Ρομάν, του Σαμ και του Βικτόρ, οι οποίοι χωρίζονται και μεταφέρονται σε παράλληλες διαστάσεις. Οι τέσσερις παιδικοί φίλοι προσπαθούν να καταλάβουν τι συνέβη και να γυρίσουν πίσω τον χρόνο, προκειμένου να επιστρέψουν στον αρχικό τους κόσμο." },
  { id: 33, title: "Prison Break", year: 2005, country: "United States", genre: "Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 8.3, actors: "Wentworth Miller, Dominic Purcell, Robert Knepper, Amaury Nolasco, Wade Williams", director: "Kevin Hooks, Bobby Roth, Dwight H. Little, Karen Gaviola, Michael Switzer", writer: "Nick Santora, Zack Estrin, Karyn Usher, Matt Olmstead, Paul T. Scheuring", link: "https://terabox.com/s/1-_taXNQxUGCJZUqynbKwhQ", imdb: "https://www.imdb.com/title/tt0455275/", tmdb: "https://www.themoviedb.org/tv/2288", tagline: "Μπαίνει. Απόδραση. Σώζει τη ζωή του αδελφού του.", desc: "Όταν ο αδελφός του καταδικάζεται άδικα για φόνο, ένας μηχανικός κάνει τα πάντα για να τον βγάλει από το περιβόητο σωφρονιστικό ίδρυμα Φοξ Ρίβερ." },
  { id: 34, title: "Roots", year: 2016, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.9, actors: "Malachi Kirby, Matthew Goode, James Purefoy, Forest Whitaker, Emayatzy Corinealdi", director: "Mario Van Peebles, Phillip Noyce, Bruce Beresford, Thomas Carter", writer: "Alex Haley", link: "https://terabox.com/s/1QYzbw2WPH0mgdfh8hu35VA", imdb: "https://www.imdb.com/title/tt3315386/", tmdb: "https://www.themoviedb.org/tv/66606", tagline: "", desc: "Η ιστορία ακολουθεί τον Kunta Kinte, ο οποίος απάγεται από το σπίτι του στην Αφρική και μεταφέρεται στην Αμερική, εκεί όπου αυτός και η οικογένεια του πασχίζουν να επιβιώσουν στη φρικιαστική εποχή της δουλείας." },
  { id: 35, title: "See", year: 2019, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.6, actors: "Jason Momoa, Sylvia Hoeks, Hera Hilmar, Christian Camargo, Archie Madekwe", director: "Anders Engström, Fred Toye, Francis Lawrence, Salli Richardson-Whitfield, Simon Cellan Jones", writer: "Kirsa Rein, Jonathan Tropper, Jennifer Yale, Hadi Nicholas Deeb, Nelson Greaves", link: "https://terabox.com/s/1D95AGvZ3Afkh6KYkAWqE7w", imdb: "https://www.imdb.com/title/tt7949218/", tmdb: "https://www.themoviedb.org/tv/80752", tagline: "A new vision of the future.", desc: "Στο μακρινό μέλλον, έπειτα από την εξάπλωση ενός θανατηφόρου ιού, το ανθρώπινο γένος έφτασε πολύ κοντά στο ενδεχόμενο της εξάλειψης. Όσοι κατάφεραν να επιζήσουν, έχασαν την όρασή τους. Ο Baba Voss, αρχηγός μιας φυλής, γίνεται πατέρας δύο δίδυμων, τα οποία είναι τα μόνα άτομα στον κόσμο που μπορούν να δουν. Πλέον, ο ήρωας καλείται να κρατήσει ασφαλή την οικογένειά του από μια πανίσχυρη εχθρό, μια ανελέητη βασίλισσα που θα θελήσει να εξολοθρεύσει τα δύο παιδιά και όποιον σταθεί εμπόδιο στα σχέδιά της." },
  { id: 36, title: "Star Trek: Picard", year: 2020, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.5, actors: "Patrick Stewart, Michelle Hurd, Jeri Ryan, Alison Pill, Evan Evagora", director: "Jonathan Frakes, Douglas Aarniokoski, Hanelle M. Culpepper, Lea Thompson, Joe Menendez", writer: "Michael Chabon, Akiva Goldsman, Christopher Monfette, Terry Matalas, Cindy Appel", link: "https://terabox.com/s/1s9hXHz6NW4jVu4aU1tnPwg", imdb: "https://www.imdb.com/title/tt8806524/", tmdb: "https://www.themoviedb.org/tv/85949", tagline: "Το τέλος είναι μόνο η αρχή.", desc: "Ο Πάτρικ Στιούαρτ επιστρέφει στον εμβληματικό ρόλο του Ζαν-Λουκ Πικάρντ, τον χαρακτήρα που υποδύθηκε για επτά σεζόν στο 'Σταρ Τρεκ: Η Επόμενη Γενιά'. Η σειρά ακολουθεί αυτόν τον εμβληματικό χαρακτήρα στο επόμενο κεφάλαιο της ζωής του." },
  { id: 37, title: "Stranger Things", year: 2016, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 8.7, actors: "Millie Bobby Brown, Finn Wolfhard, Gaten Matarazzo, Caleb McLaughlin, Joe Keery", director: "Ross Duffer, Matt Duffer, Shawn Levy, Nimród Antal, Uta Briesewitz", writer: "Paul Dichter, Kate Trefry, Justin Doble, Curtis Gwinn, William Bridges", link: "https://terabox.com/s/17mrCWrcbiS2zqG3MM2y_AA", imdb: "https://www.imdb.com/title/tt4574334/", tmdb: "https://www.themoviedb.org/tv/66732", tagline: "Γίνεται όλο και πιο παράξενο...", desc: "Όταν ένα μικρό αγόρι εξαφανίζεται, μια μικρή πόλη αποκαλύπτει ένα μυστήριο που εμπλέκει μυστικά πειράματα, τρομακτικές υπερφυσικές δυνάμεις και ένα παράξενο κορίτσι." },
  { id: 38, title: "Το Στέμμα", year: 2016, country: "United Kingdom", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.6, actors: "Claire Foy, Olivia Colman, Vanessa Kirby, Imelda Staunton, Jonathan Pryce", director: "Benjamin Caron, Christian Schwochow, Jessica Hobbs, Philip Martin, Stephen Daldry", writer: "Peter Morgan, Jonathan Wilson, Tom Edge, David Hancock, Amy Jenkins", link: "https://terabox.com/s/11k3zCzxN0yc5tJmlbEDH0g", imdb: "https://www.imdb.com/title/tt4786824/", tmdb: "https://www.themoviedb.org/tv/65494", tagline: "Duty lasts a lifetime.", desc: "Εμπνευσμένο από αληθινά γεγονότα, αυτό το δράμα αφηγείται την ιστορία της Βασίλισσας Ελισάβετ Β' και τα πολιτικά και προσωπικά γεγονότα που καθόρισαν τη βασιλεία της." },
  { id: 39, title: "Ο Αθώος", year: 2021, country: "Spain", genre: "Εγκλήματος, Μυστηρίου, Δράμα", type: "Series", quality: "HD", rating: 7.8, actors: "Mario Casas, Alexandra Jiménez, Aura Garrido, Jose Coronado, Martina Gusmán", director: "", writer: "Guillem Clua, Harlan Coben, Oriol Paulo, Jordi Vallejo", link: "https://terabox.com/s/1ZQ33bYZoxc1Aznhm--o00Q", imdb: "https://www.imdb.com/title/tt10147644/", tmdb: "https://www.themoviedb.org/tv/119988", tagline: "Κανείς δεν ξεφεύγει από το παρελθόν.", desc: "Ένας ακούσιος φόνος οδηγεί έναν άντρα σε έναν σκοτεινό ιστό ίντριγκας και φόνων. Μόλις βρίσκει την αγάπη και την ελευθερία, ένα τηλεφώνημα επαναφέρει τον εφιάλτη." },
  { id: 40, title: "Ο Άρχοντας των Δαχτυλιδιών: Τα Δαχτυλίδια της Δύναμης", year: 2022, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 6.9, actors: "Benjamin Walker, Charlie Vickers, Morfydd Clark, Robert Aramayo, Charles Edwards", director: "Charlotte Brändström, Louise Hooper, Wayne Che Yip, Sanaa Hamri, J. A. Bayona", writer: "J.R.R. Tolkien, John D. Payne, Patrick McKay, Justin Doble, Jason Cahill", link: "https://terabox.com/s/16CB7wdgIbsfH36cJOscVsA", imdb: "https://www.imdb.com/title/tt7631058/", tmdb: "https://www.themoviedb.org/tv/84773", tagline: "Ταξιδέψτε στη Μέση Γη", desc: "Ένα σύνολο χαρακτήρων, γνωστών αλλά και νέων, πρέπει να αντιμετωπίσει την επανεμφάνιση του κακού στη Μέση Γη. Από τα πιο σκοτεινά βάθη των Ομιχλιωμένων Βουνών μέχρι τα μαγευτικά δάση του Λίντον, από το νησιωτικό βασίλειο του Νούμενορ, μέχρι τις πιο απομακρυσμένες περιοχές του χάρτη, αυτά τα βασίλεια και οι χαρακτήρες θα σφυρηλατήσουν κληρονομιές που θα συνεχίσουν να ζουν και αφού έχουν χαθεί." },
    { id: 41, title: "The Mandalorian", year: 2019, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.6, actors: "Pedro Pascal, Katee Sackhoff, Chris Bartlett, Carl Weathers, Misty Rosas", director: "Rick Famuyiwa, Bryce Dallas Howard, Dave Filoni, Deborah Chow, Peyton Reed", writer: "Jon Favreau, Dave Filoni, Noah Kloor", link: "https://terabox.com/s/1Z1ewnpr5b0vp_Nl_EK994Q", imdb: "https://www.imdb.com/title/tt8111088/", tmdb: "https://www.themoviedb.org/tv/82856", tagline: "Το κυνήγι επικηρυγμένων είναι ένα περίπλοκο επάγγελμα.", desc: "Μετά τις ιστορίες του Τζάνγκο και Μπόμπα Φετ, ένας άλλος πολεμιστής αναδύεται στο σύμπαν του Star Wars. Το “Mandalorian” τοποθετείται μετά την πτώση της Αυτοκρατορίας, και πριν την εμφάνιση του Πρώτου Τάγματος. Παρακολουθούμε τις περιπέτειες ενός μοναχικού πολεμιστή στις απότερες περιοχές του γαλαξία, μακριά από την εξουσία της Καινούργιας Δημοκρατίας." },
  { id: 42, title: "Το Περιφερειακό", year: 2022, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.6, actors: "Chloë Grace Moretz, Gary Carr, Jack Reynor, T'Nia Miller, Katie Leung", director: "Alrick Riley, Vincenzo Natali", writer: "William Gibson, Scott B. Smith, Jamie Chan", link: "https://terabox.com/s/1rxsCWgo1VsrO7Ri7NncQFA", imdb: "https://www.imdb.com/title/tt12577058/", tmdb: "https://www.themoviedb.org/tv/95403", tagline: "", desc: "Σε μια πόλη των Απαλαχίων μια νεαρή κοπέλα βρίσκει διέξοδο σε προηγμένα βιντεοπαιχνίδια. Είναι τόσο καλή που μια εταιρεία της στέλνει ένα νέο σύστημα βιντεοπαιχνιδιών για δοκιμή, αλλά την περιμένει μια έκπληξη. Ξεκλειδώνει όλα τα όνειρά της του να βρει έναν σκοπό, ρομαντισμό και αίγλη σε κάτι που μοιάζει με παιχνίδι, αλλά τελικά θέτει την ίδια και την οικογένειά της σε κίνδυνο." },
  { id: 43, title: "Το Γκαμπί της Βασίλισσας", year: 2020, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.5, actors: "Anya Taylor-Joy, Chloe Pirrie, Marcin Dorociński, Matthew Dennis Lewis, Russell Dennis Lewis", director: "Scott Frank", writer: "Walter Tevis", link: "https://terabox.com/s/1UDocmveoHikuCBWLhSgGcQ", imdb: "https://www.imdb.com/title/tt10048342/", tmdb: "https://www.themoviedb.org/tv/87739", tagline: "", desc: "Σε ένα ορφανοτροφείο του Κεντάκι τη δεκαετία του 1950, ένα νεαρό κορίτσι ανακαλύπτει το σπάνιο ταλέντο της στο σκάκι, ενώ παλεύει με τον εθισμό της." },
  { id: 44, title: "The Rig", year: 2023, country: "United Kingdom", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 5.8, actors: "Emily Hampshire, Iain Glen, Martin Compston, Molly Vevers, Stuart McQuarrie", director: "John Strickland", writer: "David Macpherson", link: "https://terabox.com/s/1PaZ-u3kX2RSLtkfbgQr0Tw", imdb: "https://www.imdb.com/title/tt15444058/", tmdb: "https://www.themoviedb.org/tv/112581", tagline: "", desc: "Η σειρά εξελίσσεται πάνω στην πλατφόρμα εξόρυξης πετρελαίου Kishorn Bravo, που είναι εγκατεστημένη στα ανοιχτά της Σκωτίας. Όταν το πλήρωμα ετοιμάζεται για την προγραμματισμένη επιστροφή στη στεριά, μια μυστηριώδης και απρόσμενη ομίχλη αρχίζει να καλύπτει τα πάντα και σύντομα ανακαλύπτουν πως όλες οι επικοινωνίες με την ακτή και τον έξω κόσμο είναι εκτός λειτουργίας. Καθώς προσπαθούν να ανακαλύψουν τι βρίσκεται πίσω από αυτή την περίεργη δύναμη, οι δεσμοί σπάνε και νέες συμμαχίες δημιουργούνται." },
  { id: 45, title: "The Sandman", year: 2022, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.7, actors: "Tom Sturridge, Boyd Holbrook, Vivienne Acheampong, Patton Oswalt (φωνή), Vanesu Samunyai", director: "Jamie Childs, Andrés Baiz, Louise Hooper, Mairzee Almas, Hisko Hulsing", writer: "", link: "https://terabox.com/s/1OH-qkO362CaDJh-O500jTA", imdb: "https://www.imdb.com/title/tt1751634/", tmdb: "https://www.themoviedb.org/tv/90802", tagline: "Dream the world anew.", desc: "Μετά από πολυετή φυλάκιση, ο Μορφέας, ο Βασιλιάς των Ονείρων, ξεκινά ένα ταξίδι σε διάφορους κόσμους για να βρει ό,τι του έχουν κλέψει και να ανακτήσει τη δύναμή του." },
  { id: 46, title: "Αμάρτημα", year: 2017, country: "United States", genre: "Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 7.9, actors: "Bill Pullman, Jessica Hecht, Dohn Norwood, Matt Bomer, Jessica Biel", director: "Cherien Dabis, Antonio Campos, Jody Lee Lipes, Brad Anderson, Tucker Gates", writer: "Ahmadu Garba, Jesse McKeown, Liz W. Garcia, Jonathan Caren, Piero S. Iberti", link: "https://terabox.com/s/1-W0afI5K87N-IJdb1Rhkaw", imdb: "https://www.imdb.com/title/tt6048596/", tmdb: "https://www.themoviedb.org/tv/39852", tagline: "Οι αμαρτίες της θα τους πνίξουν όλους.", desc: "Μια νεαρή μητέρα, η Κόρα Τανέτι, προσπαθεί να καταλάβει γιατί έχει ανεξέλεγκτες βίαιες αντιδράσεις. Ο ντετέκτιβ Χάρι Αμπρόζ αναλαμβάνει να τη βοηθήσει να ανασύρει από το παρελθόν της βίαια μυστικά." },
  { id: 47, title: "Λίστα Εξόντωσης", year: 2022, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.9, actors: "Chris Pratt, Constance Wu, Taylor Kitsch, Riley Keough, Arlo Mertz", director: "Fred Toye, Sylvain White, Ellen Kuras, Antoine Fuqua, M.J. Bassett", writer: "", link: "https://terabox.com/s/14wcInPYzDQ0_ZnwgAnV4UQ", imdb: "https://www.imdb.com/title/tt11743610/", tmdb: "https://www.themoviedb.org/tv/120911", tagline: "Your memory makes you question the truth.", desc: "Ο Αντιπλοίαρχος Τζέιμς Ρις διψάει για εκδίκηση, καθώς ερευνά τις μυστηριώδεις δυνάμεις που κρύβονται πίσω από τη δολοφονία ολόκληρης της διμοιρίας του. Απαλλαγμένος από τις στρατιωτικές του υποχρεώσεις, ο Ρις εφαρμόζει όλα όσα έμαθε στην σχεδόν εικοσαετή υπηρεσία του στο πεδίο της μάχης για να κυνηγήσει τους υπεύθυνους για την τραγωδία." },
  { id: 48, title: "Τα Πουλιά Πεθαίνουν Τραγουδώντας", year: 1983, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.9, actors: "Jean Simmons, Richard Chamberlain, Rachel Ward, Christopher Plummer, Bryan Brown", director: "Daryl Duke", writer: "Lee Stanley, Carmen Culver, Colleen McCullough", link: "https://terabox.com/s/1RVqAcataj-9K3barZTDF6Q", imdb: "https://www.imdb.com/title/tt0085433/", tmdb: "https://www.themoviedb.org/tv/13780", tagline: "", desc: "Ο Πάντι Κλέρι μεταναστεύει μαζί με τη γυναίκα του Φιόνα και τα επτά παιδιά τους από τη Νέα Ζηλανδία στην Αυστραλία, στη Ντρόγκεντα, το απέραντο αγρόκτημα της δεσποτικής και άκληρης αδελφής του. Μισό αιώνα αργότερα η μοναδική εκπρόσωπος της τρίτης γενιάς της οικογένειας, Τζουστίν Ο' Νηλ, μια πετυχημένη ηθοποιός, αποφασίζει να χαράξει το δρόμο της μακριά από τις ρίζες της. Οι κεντρικοί χαρακτήρες αυτής της συναρπαστικής ιστορίας είναι η αδάμαστη Μέγκυ, η μοναδική θυγατέρα των Κλέρι και ο μόνος άντρας που θ' αγαπήσει αληθινά στη ζωή της, ο εκθαμβωτικά όμορφος και φιλόδοξος ιερέας Ραλφ ντε Μπρικασάρ." },
  { id: 49, title: "The Time Traveler's Wife", year: 2022, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.7, actors: "Rose Leslie, Theo James, Natasha Lopez, Desmin Borges, Caitlin Shorey", director: "David Nutter", writer: "Steven Moffat", link: "https://terabox.com/s/1FnwUfWQmdRUzUuAhh9-ecQ", imdb: "https://www.imdb.com/title/tt10790238/", tmdb: "https://www.themoviedb.org/tv/81322", tagline: "Every moment matters.", desc: "Στο ξέφωτο πίσω από το σπίτι της, η εξάχρονη Clare Abshire συναντά για πρώτη φορά τον 36χρονο ταξιδιώτη του χρόνου Henry DeTamble. Δεκατέσσερα χρόνια αργότερα, μια απροσδόκητη επανένωση στη βιβλιοθήκη δίνει στον Χένρι την ευκαιρία να γνωρίσει την Κλερ." },

  { id: 52, title: "Tokyo Vice", year: 2022, country: "United States", genre: "Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 8.1, actors: "Ansel Elgort, Ken Watanabe, Rachel Keller, Show Kasamatsu, Rinko Kikuchi", director: "Josef Kubota Wladyka, Hikari, Alan Poul, Michael Mann", writer: "J.T. Rogers, Jessica Brickman, Arthur Phillips, Adam Stein, Brad Kane", link: "https://terabox.com/s/1omXNQJyHGoXP43-AskL7Ew", imdb: "https://www.imdb.com/title/tt12565094/", tmdb: "https://www.themoviedb.org/tv/90296", tagline: "Find the truth, no matter the cost.", desc: "Το Tokyo Vice βασίζεται στα απομνημονεύματα του Αμερικανού δημοσιογράφου Jake Adelstein, ο οποίος κάλυπτε το ρεπορτάζ της Μητροπολιτικής Αστυνομίας του Τόκιο. Το σκληρό αστυνομικό δράμα που γυρίστηκε στην Ιαπωνία, καταγράφει την καθημερινή ενασχόληση του Adelstein με τον υπόκοσμο του Τόκιο στα τέλη της δεκαετίας του '90." },
  { id: 53, title: "True Detective", year: 2014, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 8.9, actors: "Matthew McConaughey, Colin Farrell, Mahershala Ali, Woody Harrelson, Vince Vaughn", director: "Cary Joji Fukunaga, Issa López, Daniel Sackheim, Jeremy Saulnier, Nic Pizzolatto", writer: "Nic Pizzolatto, Scott Lasser, Chris Mundy, Namsi Khan, David Milch", link: "https://terabox.com/s/1IGuG9uaPCzX0ikDpQYhvzA", imdb: "https://www.imdb.com/title/tt2356777/", tmdb: "https://www.themoviedb.org/tv/46648", tagline: "Αγγίξτε το σκοτάδι και το σκοτάδι θα σας αγγίξει και εσάς.", desc: "Όταν μια φορά δύο ντετέκτιβ απ' το Τέξας, ο Μάθιου και ο Γούντι, που κυνηγούν έναν σήριαλ κίλερ επί 17 χρόνια και βλέπουμε πως οι ζωές τους αλληλεπιδρούν. Η σειρά θα διαδραματίζεται σε δύο διαφορετικές χρονικές περιόδους, στο 2012 και το 1995. Το παρόν και το παρελθόν περιπλέκονται επικίνδυνα και οι δύο πρώην συνεργάτες αναγκάζονται να επιστρέψουν σε έναν κόσμο που μέχρι πρότινος πίστευαν πως είχαν αφήσει μια για πάντα πίσω τους!" },
  { id: 54, title: "Tulsa King", year: 2022, country: "United States", genre: "Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 8.0, actors: "Sylvester Stallone, Martin Starr, Jay Will, Max Casella, Vincent Piazza", director: "Joshua Marston, Benjamin Semanoff, David Semel, Lodge Kerrigan, Allen Coulter", writer: "Joseph Riccobene, David Flebotte, Sylvester Stallone, William Schmidt, Terence White", link: "https://terabox.com/s/16QN89C1ee81WWkeYtP3FVA", imdb: "https://www.imdb.com/title/tt16358384/", tmdb: "https://www.themoviedb.org/tv/153312", tagline: "Αυθεντικός γκάνγκστερ. Νέα πόλη.", desc: "Αμέσως μετά την αποφυλάκισή του και ύστερα από κάθειρξη 25 χρόνων ο μαφιόζος Ντουάιτ “Ο Στρατηγός” Μανφρέντι (Stallone), πάει στην οικογένεια για την οποία μπήκε φυλακή. Σχεδόν άμεσα, το αφεντικό του τον στέλνει στην Τάλσα της Οκλαχόμα, εκεί όπου θα πρέπει να φτιάξει νέα συμμορία με σκοπό τη δημιουργία μιας νέας εγκληματικής αυτοκρατορίας. Αν και ο έμπειρος Μανφρέντι γνωρίζει πως η μαφιόζικη οικογένεια του δε σκέφτεται μόνο το δικό του καλό, κι έτσι σιγά-σιγά αλλά σταθερά φτιάχνει μια νέα συμμορία που αποτελείται από αταίριαστους χαρακτήρες, που θα τον βοηθήσουν να εκπληρώσει την επιθυμία του αφεντικού του, σε ένα μέρος που για τον ίδιο μοιάζει να είναι σε έναν διαφορετικό πλανήτη." },
  { id: 55, title: "Twin Peaks", year: 1990, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 8.8, actors: "Kyle MacLachlan, Michael Horse, Harry Goaz, Kimmy Robertson, Dana Ashbrook", director: "David Lynch, Lesli Link Glatter, Caleb Deschanel, Tim Hunter, Duwayne Dunham", writer: "David Lynch, Harley Peyton, Robert Engels, Barry Pullman, Tricia Brock", link: "https://terabox.com/s/120XXr7pgWpMAzSK6sxvx8g", imdb: "https://www.imdb.com/title/tt0098936/", tmdb: "https://www.themoviedb.org/tv/1920", tagline: "A town where everyone knows everyone and nothing is what it seems.", desc: "To Twin Peaks είναι μια ειδυλλιακή μικρή πόλη στην Αμερική κοντά στα σύνορα με τον Καναδά. Η ζωές των κατοίκων περνούν φαινομενικά ήρεμα μέχρι τη στιγμή που μια νεαρή κοπέλα, η Laura Palmer βρίσκεται δολοφονημένη. Την υπόθεση καλείται να διαλευκάνει ο ειδικός πράκτορας του FBI Dale Cooper, ένας πανέξυπνος αλλά ιδιόρρυθμος τύπος. Κατά τη διάρκεια των ερευνών θα ανακαλύψει ότι κανείς δεν είναι αυτό που φαίνεται και ότι όλοι στο Twin Peaks έχουν κρυμμένα βρώμικα μυστικά." },

  { id: 70, title: "Catch-22", year: 2019, country: "United States", genre: "Κωμωδία, Δράμα", type: "Series", quality: "HD", rating: 7.7, actors: "Christopher Abbott, Kyle Chandler, Daniel David Stewart, Tessa Ferrer, Lewis Pullman", director: "Grant Hesloff", writer: "Joseph Heller, Luke Davies, David Michôd", link: "https://terabox.com/s/1Ojj7rj0oTssIN6WGRfa5JA", imdb: "https://www.imdb.com/title/tt10594736/", tmdb: "https://www.themoviedb.org/tv/82744", tagline: "There's only no way out.", desc: "Βασισμένη στην ομώνυμη, εμβληματική νουβέλα του Joseph Heller, το Catch-22 αποτελεί την ιστορία του απαράμιλλου και επιδέξιου Yossarian, έναν Αμερικανό πιλότο βομβαρδιστικού στον Δεύτερο Παγκόσμιο Πόλεμο, ο οποίος είναι έξαλλος επειδή χιλιάδες άνθρωποι που δεν έχει γνωρίσει ποτέ, προσπαθούν να τον σκοτώσουν. Όμως το πραγματικό του πρόβλημα δεν είναι ο εχθρός, αλλά ο δικός του στρατός που συνεχώς αυξάνει τον αριθμό των αποστολών που πρέπει οι πιλότοι να ολοκληρώσουν προτού αποστρατευτούν." },
  { id: 71, title: "Chapelwaite", year: 2021, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 7.2, actors: "Adrien Brody, Emily Hampshire, Jennifer Ens, Sirena Gulamgaus, Ian Ho", director: "Burr Steers, Jeff Renfroe, Rachel Leiterman", writer: "", link: "https://terabox.com/s/1IgLR8gheINetS_U5viUznw", imdb: "https://www.imdb.com/title/tt10399938/", tmdb: "https://www.themoviedb.org/tv/126118", tagline: "", desc: "H σειρά εξελίσσεται στο 1850 με κεντρικό ήρωα τον Captain Charles Boone, ο οποίος μεταφέρει τα τρία του παιδιά στην πατρίδα των προγόνων του, μια μικρή πόλη στο Maine, μετά τον τραγικό θάνατο της γυναίκας του στη θάλασσα. Αφού μετακομίσει, ο Boone αναπτύσσει σχέσεις με μια νέα, φιλόδοξη γυναίκα, την Rebecca Morgan,η οποία επίσης έχει μετακομίσει στην πόλη για να γράψει μια ιστορία για το το περιοδικό Atlantic Magazine.Οι ζωές του μπλέκουν, καθώς η μαυρίλα που πέφτει σαν πληγή στις οικογένειες τους και στην ίδια την πόλη, τους ενώνει. Βασισμένο στο διήγημα του Stephen King, \"Jerusalem's Lot\", prequel του Salem's Lot." },
  { id: 72, title: "Τσέρνομπιλ", year: 2019, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 9.3, actors: "Jared Harris, Stellan Skarsgård, Emily Watson, Paul Ritter, Jessie Buckley", director: "Johan Renck", writer: "Craig Mazin", link: "https://terabox.com/s/1uJRcr6wZSAKtGhGGwE8i4w", imdb: "https://www.imdb.com/title/tt7366338/", tmdb: "https://www.themoviedb.org/tv/87108", tagline: "Ποιο είναι το κόστος των ψεμάτων;", desc: "Η σειρά Chernobyl δραματοποιεί την ιστορία του πυρηνικού ατυχήματος του 1986 - μιας από τις χειρότερες ανθρωπογενείς καταστροφές στην ιστορία - και τις θυσίες που έγιναν για να σώσουν την Ευρώπη από την αδιανόητη καταστροφή." },
  { id: 73, title: "Αστερισμός", year: 2024, country: "Germany", genre: "Μυστηρίου, Δράμα", type: "Series", quality: "HD", rating: 6.7, actors: "Noomi Rapace, Jonathan Banks, James D'Arcy, Rosie Coleman, Davina Coleman", director: "Oliver Hirschbiegel, Joseph Cedar, Michelle MacLaren", writer: "Peter Harness", link: "https://terabox.com/s/1WN8iqtVTuV7xxKOgb-sJUQ", imdb: "https://www.imdb.com/title/tt19343884/", tmdb: "https://www.themoviedb.org/tv/197125", tagline: "Η πραγματικότητα είναι μια μεγάλη συνωμοσία.", desc: "Μετά από ένα θανατηφόρο ατύχημα στον Διεθνή Διαστημικό Σταθμό, μια αστροναύτισσα κάνει μόνη το ηρωικό ταξίδι πίσω στη Γη, για να ανακαλύψει ότι βασικά κομμάτια της ζωής της, ακόμα κι η μικρή της κόρη, έχουν αλλάξει." },
  { id: 74, title: "Ποινικό Μητρώο", year: 2024, country: "United Kingdom", genre: "Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 7.1, actors: "Peter Capaldi, Cush Jumbo, Shaun Dooley, Zoë Wanamaker, Charlie Creed-Miles", director: "Jim Loach", writer: "Paul Rutman, Thomas Eccleshare, Ameir Brown", link: "https://terabox.com/s/1slGd3w5mSgFnONmmXi7PPg", imdb: "https://www.imdb.com/title/tt19453406/", tmdb: "https://www.themoviedb.org/tv/204490", tagline: "Δεν μπορείς να κρυφτείς από τον εαυτό σου.", desc: "Στην καρδιά του Λονδίνου, ένα ανώνυμο τηλεφώνημα φέρνει αντιμέτωπους δύο λαμπρούς ντετέκτιβ, μια γυναίκα στο ξεκίνημα της καριέρας της κι έναν δικτυωμένο άντρα αποφασισμένο να προστατέψει την παρακαταθήκη του, σε μια μάχη για να διορθωθεί μια παλιά δικαστική πλάνη." },
  { id: 75, title: "Dopesick", year: 2021, country: "United States", genre: "Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 8.6, actors: "Michael Keaton, Peter Sarsgaard, Michael Stuhlbarg, Kaitlyn Dever, Will Poulter", director: "Barry Levinson, Patricia Riggen, Danny Strong, Michael Cuesta", writer: "Beth Macy, Danny Strong, Jessica Mecklenburg, Benjamin Rubin, Eoghan O'Donnell", link: "https://terabox.com/s/1I5jvlRelY93UULh9_FqsIw", imdb: "https://www.imdb.com/title/tt11051878/", tmdb: "https://www.themoviedb.org/tv/110695", tagline: "The true story of how America got hooked on a lie.", desc: "Το 'Dopesick' εξετάζει το πώς μια εταιρεία πυροδότησε τη χειρότερη επιδημία ναρκωτικών στην ιστορία της Αμερικής. Η σειρά ταξιδεύει τους θεατές στο επίκεντρο της μάχης της Αμερικής με την εξάρτηση στα οπιοειδή φάρμακα, από τα γραφεία των μεγάλων φαρμακευτικών, την αναστατωμένη μεταλλευτική κοινότητα της Virginia, μέχρι και τους διαδρόμους της Δίωξης Ναρκωτικών. Αψηφώντας τις πιθανότητες, ήρωες θα αναδυθούν σε μια πολύ έντονη και συναρπαστική προσπάθεια να πολεμήσουν τις άνανδρες εταιρικές δυνάμεις που βρίσκονται πίσω από αυτήν την εθνική κρίση, αλλά και τους συμμάχους τους.\n\nLimited σειρά που είναι βασισμένη στο bestselling βιβλίο της Beth Macy, που εστιάζει σε αληθινά γεγονότα." },
  { id: 76, title: "Θεϊκές Σταγόνες", year: 2023, country: "France", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 8.0, actors: "Fleur Geffrier, Tomohisa Yamashita, Tom Wozniczka, Stanley Weber, Luca Terracciano", director: "Oded Ruskin", writer: "Quoc Dang Tran, Alice Vial, Clémence Madeleine-Perdrillat", link: "https://1024terabox.com/s/1PsjBxZW3B_I50X1Z3tYzvQ", imdb: "https://www.imdb.com/title/tt15844050/", tmdb: "https://www.themoviedb.org/tv/218961", tagline: "Ας αρχίσει η διεκδίκηση.", desc: "Ενώ ο κόσμος του κρασιού θρηνεί τον θάνατο του Αλεξάντρ Λεζέ, η αποξενωμένη κόρη του Καμίγ μαθαίνει ότι η εξαίσια συλλογή του είναι πλέον δική της. Μα για να την κληρονομήσει, πρέπει να νικήσει τον Ισέι, προστατευόμενο του Αλεξάντρ, σε μια δοκιμασία των αισθήσεών τους." },
  { id: 77, title: "Θεμέλιο", year: 2021, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.6, actors: "Jared Harris, Lee Pace, Lou Llobell, Leah Harvey, Laura Birn", director: "Alex Graves, Roxann Dawson, David S. Goyer, Mark Tonderai, Jennifer Phang", writer: "Isaac Asimov, Jane Espenson, Josh Friedman, Leigh Dana Jackson, Liz Phang", link: "https://1024terabox.com/s/1WCI7DvFfOFzbg9Pm1I62Fw", imdb: "https://www.imdb.com/title/tt0804484/", tmdb: "https://www.themoviedb.org/tv/93740", tagline: "Όλες οι αυτοκρατορίες πέφτουν.", desc: "Βασισμένο στα βραβευμένα βιβλία του Isaac Asimov, το Θεμέλιο καταγράφει τα χρονικά μιας ομάδας εξόριστων στο μνημειώδες ταξίδι τους να σώσουν την ανθρωπότητα και να ανοικοδομήσουν τον πολιτισμό εν μέσω της πτώσης της Γαλαξιακής Αυτοκρατορίας." },
