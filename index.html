<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YIOIO Ultimate Database 2026</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --primary: #e50914;
  --bg: #0a0a0a;
  --card: #141414;
  --text: #ffffff;
  --border: #222;
  --gold: #ffc107;
  --input-bg: #1a1a1a;
  --modal-overlay: rgba(0, 0, 0, 0.95);
}

[data-theme="light"] {
  --bg: #f5f5f5;
  --card: #ffffff;
  --text: #1a1a1a;
  --border: #ddd;
  --input-bg: #eeeeee;
  --modal-overlay: rgba(255, 255, 255, 0.95);
}

body {
  margin: 0;
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
  overflow-x: hidden;
}

header {
  padding: 15px 5%;
  background: var(--card);
  position: sticky;
  top: 0;
  z-index: 1000;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(10px);
}

.logo {
  color: var(--primary);
  font-weight: 800;
  font-size: 24px;
  letter-spacing: 1px;
}

.theme-btn {
  background: var(--primary);
  color: white;
  border: none;
  padding: 6px 15px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 11px;
  font-weight: bold;
}

#movieCount {
  font-size: 11px;
  background: var(--input-bg);
  padding: 5px 12px;
  border-radius: 15px;
  border: 1px solid var(--border);
  color: var(--text);
}

.header-controls {
  display: flex;
  align-items: center;
  gap: 20px;
}

.search-section {
  padding: 30px 5% 10px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
}

#movieSearch {
  width: 100%;
  max-width: 600px;
  padding: 15px 25px;
  border-radius: 30px;
  border: 2px solid var(--border);
  background: var(--input-bg);
  color: var(--text);
  outline: none;
  font-size: 16px;
  transition: 0.3s;
}

#movieSearch:focus {
  border-color: var(--primary);
  box-shadow: 0 0 15px rgba(229, 9, 20, 0.3);
}

.filter-group {
  display: flex;
  flex-direction: row;
  gap: 15px;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  margin: 20px 0;
}

.filter-group select {
  padding: 10px 20px;
  border-radius: 25px;
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--border);
  cursor: pointer;
  font-size: 14px;
  min-width: 150px;
  outline: none;
}

.filter-group select:focus {
  border-color: var(--primary);
}

.movie-grid {
  display: grid !important;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)) !important;
  gap: 25px;
  padding: 20px 5%;
  width: 100%;
  box-sizing: border-box;
}

.movie-card {
  background: var(--card);
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
  transition: 0.3s ease;
  cursor: pointer;
  width: 100%;
}

.movie-card:hover {
  transform: translateY(-8px);
  border-color: var(--primary);
}

.img-container {
  position: relative;
  overflow: hidden;
  aspect-ratio: 2/3;
  background: #1a1a1a;
}

.movie-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.quality-tag {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-size: 9px;
  font-weight: bold;
  padding: 3px 6px;
  border-radius: 4px;
  z-index: 11;
  background: #2ecc71;
}

.quality-tag.sd-blue {
  background: #007bff;
  color: white;
}

.info {
  padding: 15px;
  text-align: center;
  flex-grow: 1;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.info h3 {
  font-size: 14px;
  margin: 0 0 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
  font-weight: 700;
}

.stars {
  color: var(--gold);
  font-size: 16px;
  margin-bottom: 10px;
}

.rating-number {
  font-size: 12px;
  color: var(--text);
  margin-left: 8px;
  font-weight: normal;
  opacity: 0.8;
}

.play-btn {
  background: var(--primary);
  color: white;
  text-decoration: none;
  padding: 8px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: bold;
  display: block;
  text-align: center;
}

#loadMoreBtn {
  display: block;
  margin: 20px auto 50px;
  padding: 12px 30px;
  font-size: 14px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  font-weight: bold;
}

#detailModal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: var(--modal-overlay);
  z-index: 4000;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(10px);
}

.modal-box {
  background: var(--card);
  width: 90%;
  max-width: 900px;
  display: flex;
  position: relative;
  border-radius: 15px;
  overflow: hidden;
  animation: slideUp 0.4s ease;
}

.modal-poster {
  width: 40%;
  object-fit: cover;
  background: #000;
}

.modal-info {
  padding: 35px;
  width: 60%;
  display: flex;
  flex-direction: column;
  gap: 12px;
  overflow-y: auto;
  text-align: left;
  max-height: 80vh;
}

.modal-info h2 {
  margin: 0;
  color: var(--primary);
  font-size: 28px;
}

.info-label {
  color: var(--primary);
  font-weight: 800;
  font-size: 11px;
  text-transform: uppercase;
  margin-right: 5px;
}

.modal-desc {
  font-size: 14px;
  line-height: 1.6;
  opacity: 0.8;
  border-top: 1px solid var(--border);
  padding-top: 10px;
}

@keyframes slideUp {
  from {
    transform: translateY(30px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

@media (max-width: 750px) {
  .modal-box {
    flex-direction: column;
    height: 100vh;
    max-height: 100vh;
    border-radius: 0;
    width: 100%;
  }
  .modal-poster {
    width: 100%;
    height: 40%;
  }
  .modal-info {
    width: 100%;
    padding: 20px;
    flex-grow: 1;
  }
  .movie-grid {
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)) !important;
    gap: 15px;
    padding: 15px;
  }
}

#backToTop {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 50px;
  height: 50px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 50%;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
  display: none;
  z-index: 3000;
  transition: 0.3s;
}

#backToTop:hover {
  transform: scale(1.1);
}

.close-modal {
  position: absolute;
  top: 15px;
  right: 15px;
  background: rgba(229, 9, 20, 0.8);
  color: white;
  border: none;
  border-radius: 50%;
  width: 35px;
  height: 35px;
  cursor: pointer;
  z-index: 10;
  font-weight: bold;
  font-size: 18px;
}

.imdb-link {
  display: inline-block;
  background: #f5c518;
  color: #000;
  padding: 5px 12px;
  border-radius: 20px;
  text-decoration: none;
  font-size: 12px;
  font-weight: bold;
  margin-left: 10px;
}

.tmdb-link {
  display: inline-block;
  background: #01b4e4;
  color: white;
  padding: 5px 12px;
  border-radius: 20px;
  text-decoration: none;
  font-size: 12px;
  font-weight: bold;
  margin-left: 5px;
}

.download-link {
  display: inline-block;
  background: #2ecc71;
  color: white;
  padding: 5px 12px;
  border-radius: 20px;
  text-decoration: none;
  font-size: 12px;
  font-weight: bold;
  margin-left: 5px;
}

.download-link:hover {
  background: #27ae60;
}

.new-badge {
  background: #e50914;
  color: white;
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 10px;
  margin-left: 8px;
  display: inline-block;
  vertical-align: middle;
}
</style>
</head>

  { id: 19, title: "His Dark Materials", year: 2019, country: "United Kingdom", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.8, actors: "Dafne Keen, Ruth Wilson, Kit Connor (φωνή), Will Keen, Amir Wilson", director: "Jamie Childs, William McGregor, Amit Gupta, Leanne Welham, Otto Bathurst", poster: "000019.jpg", link: "https://terabox.com/s/1VOvhPHWupGLB7VUf6lqdyQ", imdb: "https://www.imdb.com/title/tt5607976/", tmdb: "https://www.themoviedb.org/tv/68507", tagline: "Ένα κορίτσι θα αλλάξει τους κόσμους.", desc: "Η σειρά ακολουθεί τη Lyra, μια φαινομενικά συνηθισμένη, αλλά πολύ γενναία νεαρή γυναίκα από έναν άλλο κόσμο. Η αναζήτηση της Lyra για έναν απαχθέντα φίλο, αποκαλύπτει μια σατανική πλοκή, που περιλαμβάνει κλεμμένα παιδιά, και εξελίσσεται σε μια αποστολή κατανόησης του μυστηριώδους φαινομένου που αποκαλείται Dust." },
  { id: 20, title: "House of the Dragon", year: 2022, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.4, actors: "Emma D'Arcy, Matt Smith, Fabien Frankel, Steve Toussaint, Olivia Cooke", director: "Clare Kilner, Geeta Patel, Greg Yaitanes, Miguel Sapochnik, Alan Taylor", poster: "000020.jpg", link: "https://terabox.com/s/1QZkpIeib_47OSGQCMfQUvA", imdb: "https://www.imdb.com/title/tt11198330/", tmdb: "https://www.themoviedb.org/tv/94997", tagline: "Φωτιά και αίμα.", desc: "Βασισμένο στη νουβέλα 'Fire & Blood' του George R.R. Martin, το 'House of the Dragon' εξελίσσεται 200 χρόνια πριν τα γεγονότα του 'Game of Thrones' και ακολουθεί τον Οίκο των Targaryen, με τους πολλούς συμμάχους και εχθρούς και ειδικότερα τον Βασιλιά Viserys και τη νεαρή Πριγκίπισσα Rhaenyra, που ο Viserys έχει χρίσει ως διάδοχο, παρά τη δυσαρέσκεια της οικογένειας του και των συμμάχων του, ειδικά του Πρίγκηπα Daemon, που μοιάζει σαν να φορά υποδήματα γεμάτα με σπασμένα γυαλιά." },
  { id: 21, title: "Kindred", year: 2022, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 7.4, actors: "Mallori Johnson, Micah Stock, Ryan Kwanten, Gayle Rankin, Austin Smith", director: "", poster: "000021.jpg", link: "https://terabox.com/s/12h9aC0f973LL2ZDBHaif0Q", imdb: "https://www.imdb.com/title/tt14857506/", tmdb: "https://www.themoviedb.org/tv/138561", tagline: "Question the ties that bind through time.", desc: "Καθώς η Ντάνα, μια νεαρή μαύρη γυναίκα και επίδοξη συγγραφέας, αρχίζει να τακτοποιείται στο νέο της σπίτι, συνειδητοποιεί ότι μπορεί να πηγαινοέρχεται μπρος-πίσω στον χρόνο. Εμφανίζεται σε μια φυτεία του 19ου αιώνα και αντιμετωπίζει μυστικά που δεν ήξερε ότι διέπουν το ίδιο της το αίμα." },
  { id: 22, title: "Knight Rider", year: 1982, country: "United States", genre: "Δράμα, Εγκλήματος", type: "Series", quality: "HD", rating: 6.9, actors: "David Hasselhoff, Edward Mulhare, William Daniels (φωνή), Patricia McPherson, Rebecca Holden", director: "Georg Fenady, Winrich Kolbe, Sidney Hayers, Bernard L. Kowalski, Harvey S. Laidman", poster: "000022.jpg", link: "https://terabox.com/s/1Vw-B_ugSEnl1OzfwFj4Q1A", imdb: "https://www.imdb.com/title/tt0083437/", tmdb: "https://www.themoviedb.org/tv/2384", tagline: "Michael Knight is today's hero! Driving the car of tomorrow!", desc: "Ο Μάικλ Λονγκ, ένας μυστικός αστυνομικός, πυροβολείται ενώ ερευνά μια υπόθεση και θεωρείται από τους δράστες νεκρός. Διασώζεται από τον Γουίλτον Νάιτ, έναν πλούσιο εκατομμυριούχο εφευρέτη, ο οποίος οργανώνει μια σωτήρια χειρουργική επέμβαση, που περιλαμβάνει ένα νέο πρόσωπο και μια νέα ταυτότητα - αυτή του Μάικλ Νάιτ. Του δίνεται ένα ειδικό ηλεκτρονικό σπορ αυτοκίνητο με ενσωματωμένο επεξεργαστή που σκέφτεται και δρα, το KITT, και μια αποστολή: να συλλάβει εγκληματίες." },
  { id: 23, title: "Law & Order: Organized Crime", year: 2021, country: "United States", genre: "Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 7.7, actors: "Christopher Meloni, Danielle Moné Truitt, Ainsley Seiger, Rick Gonzalez, Nicky Torchia", director: "John Polson, Jean de Segonzac, Fred Berner, Jon Cassar, Stephen Surjik", poster: "000023.jpg", link: "https://1024terabox.com/s/1CV31EchwkLElsyFR0-0H3A", imdb: "https://www.imdb.com/title/tt12661054/", tmdb: "https://www.themoviedb.org/tv/106158", tagline: "Find strength in justice.", desc: "Έπειτα από μια τραυματική προσωπική απώλεια, ο Έλιοτ Στάμπλερ επιστρέφει στην ενεργό δράση, ως μέλος μιας νέας ειδικής ομάδας επιφορτισμένης με τη διάλυση των πιο ισχυρών και επικίνδυνων εγκληματικών συνδικάτων της Νέας Υόρκης." },

  { id: 25, title: "Madoff", year: 2016, country: "United States", genre: "Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 7.4, actors: "Richard Dreyfuss, Blythe Danner, Peter Scolari, Frank Whaley, Erin Cummings", director: "Raymond De Felitta", poster: "000025.jpg", link: "https://terabox.com/s/10f_VaRhHr62azm4tkD6h3g", imdb: "https://www.imdb.com/title/tt4901806/", tmdb: "https://www.themoviedb.org/tv/67307", tagline: "", desc: "Εξαιρετική Βιογραφική Μίνι Σειρά, με εξαιρετική ερμηνεία από τον κορυφαίο Richard Dreyfuss. Το 1960, ο Bernard Madoff ίδρυσε την επενδυτική εταιρεία Bernard L. Madoff Investment Securities. Η επιχείρηση ήταν αρχικά ένας trader εταιρειών πολύ μικρής κεφαλαιοποίησης. Χάρη στις καινοτόμες τεχνολογίες που πρόσφερε η χρήση των υπολογιστών, η εταιρεία γρήγορα μεγάλωσε. Έγινε ένας από τους market makers των ΗΠΑ, με αποκορύφωμα το 2008 που είχε αναρριχηθεί ως η έκτη μεγαλύτερη στη Wall Street. Κανένα όνομα δεν έχει γίνει περισσότερο συνώνυμο με την απάτη και τα οικονομικά τεχνάσματα από τον Bernie Madoff." },

  { id: 28, title: "Miss Scarlet and the Duke", year: 2020, country: "United Kingdom", genre: "Δράμα, Μυστηρίου, Εγκλήματος", type: "Series", quality: "HD", rating: 7.7, actors: "Kate Phillips, Stuart Martin, Cathy Belton, Ansu Kabia, Matthew Malone", director: "Steve Hughes", poster: "000028.jpg", link: "https://terabox.com/s/1uPg3nBMbUVl3mfc8I03dRw", imdb: "https://www.imdb.com/title/tt10293980/", tmdb: "https://www.themoviedb.org/tv/96450", tagline: "London's greatest investigator has arrived.", desc: "Όταν ο πατέρας της Eliza Scarlet πεθαίνει, εκείνος την αφήνει πάμπτωχη, αλλά εκείνη αποφασίζει να συνεχίσει το ντετέκτιβ του. Για να λειτουργήσει σε έναν ανδροκρατούμενο κόσμο, χρειάζεται έναν σύντροφο... βήμα μπροστά, έναν ντετέκτιβ γνωστό ως Δούκας." },

  { id: 32, title: "Parallèles", year: 2022, country: "France", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 7.0, actors: "Timoté Rigault, Thomas Chomel, Omar Mebrouk, Jules Houplain, Jade Pedri", director: "Jean-Baptiste Saurel", poster: "000032.jpg", link: "https://terabox.com/s/1U58O2rfU4qJdZdCBuMxPTQ", imdb: "https://www.imdb.com/title/tt15528054/", tmdb: "https://www.themoviedb.org/tv/118906", tagline: "To find themselves, they'll have to get lost.", desc: "Ένα μυστηριώδες γεγονός φέρνει τα πάνω κάτω στη ζωή του Μπιλάλ, της Ρομάιν, του Σαμ και του Βικτόρ, οι οποίοι χωρίζονται και μεταφέρονται σε παράλληλες διαστάσεις. Οι τέσσερις παιδικοί φίλοι προσπαθούν να καταλάβουν τι συνέβη και να γυρίσουν πίσω τον χρόνο, προκειμένου να επιστρέψουν στον αρχικό τους κόσμο." },
  { id: 33, title: "Prison Break", year: 2005, country: "United States", genre: "Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 8.3, actors: "Wentworth Miller, Dominic Purcell, Robert Knepper, Amaury Nolasco, Wade Williams", director: "Kevin Hooks, Bobby Roth, Dwight H. Little, Karen Gaviola, Michael Switzer", poster: "000033.jpg", link: "https://terabox.com/s/1-_taXNQxUGCJZUqynbKwhQ", imdb: "https://www.imdb.com/title/tt0455275/", tmdb: "https://www.themoviedb.org/tv/2288", tagline: "Μπαίνει. Απόδραση. Σώζει τη ζωή του αδελφού του.", desc: "Όταν ο αδελφός του καταδικάζεται άδικα για φόνο, ένας μηχανικός κάνει τα πάντα για να τον βγάλει από το περιβόητο σωφρονιστικό ίδρυμα Φοξ Ρίβερ." },
  { id: 34, title: "Roots", year: 2016, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.9, actors: "Malachi Kirby, Matthew Goode, James Purefoy, Forest Whitaker, Emayatzy Corinealdi", director: "Mario Van Peebles, Phillip Noyce, Bruce Beresford, Thomas Carter", poster: "000034.jpg", link: "https://terabox.com/s/1QYzbw2WPH0mgdfh8hu35VA", imdb: "https://www.imdb.com/title/tt3315386/", tmdb: "https://www.themoviedb.org/tv/66606", tagline: "", desc: "Η ιστορία ακολουθεί τον Kunta Kinte, ο οποίος απάγεται από το σπίτι του στην Αφρική και μεταφέρεται στην Αμερική, εκεί όπου αυτός και η οικογένεια του πασχίζουν να επιβιώσουν στη φρικιαστική εποχή της δουλείας." },
  { id: 35, title: "See", year: 2019, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.6, actors: "Jason Momoa, Sylvia Hoeks, Hera Hilmar, Christian Camargo, Archie Madekwe", director: "Anders Engström, Fred Toye, Francis Lawrence, Salli Richardson-Whitfield, Simon Cellan Jones", poster: "000035.jpg", link: "https://terabox.com/s/1D95AGvZ3Afkh6KYkAWqE7w", imdb: "https://www.imdb.com/title/tt7949218/", tmdb: "https://www.themoviedb.org/tv/80752", tagline: "A new vision of the future.", desc: "Στο μακρινό μέλλον, μετά από έναν θανατηφόρο ιό, το ανθρώπινο γένος έχει χάσει την όρασή του. Ο Baba Voss, αρχηγός μιας φυλής, γίνεται πατέρας δύο δίδυμων, τα οποία είναι τα μόνα άτομα στον κόσμο που μπορούν να δουν. Πλέον, καλείται να κρατήσει ασφαλή την οικογένειά του από μια πανίσχυρη εχθρό, μια ανελέητη βασίλισσα που θα θελήσει να εξολοθρεύσει τα δύο παιδιά και όποιον σταθεί εμπόδιο στα σχέδιά της." },
  { id: 36, title: "Star Trek: Picard", year: 2020, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.5, actors: "Patrick Stewart, Michelle Hurd, Jeri Ryan, Alison Pill, Evan Evagora", director: "Jonathan Frakes, Douglas Aarniokoski, Hanelle M. Culpepper, Lea Thompson, Joe Menendez", poster: "000036.jpg", link: "https://terabox.com/s/1s9hXHz6NW4jVu4aU1tnPwg", imdb: "https://www.imdb.com/title/tt8086524/", tmdb: "https://www.themoviedb.org/tv/85949", tagline: "Το τέλος είναι μόνο η αρχή.", desc: "Ο Πάτρικ Στιούαρτ επιστρέφει στον εμβληματικό ρόλο του Ζαν-Λουκ Πικάρντ, τον χαρακτήρα που υποδύθηκε για επτά σεζόν στο 'Σταρ Τρεκ: Η Επόμενη Γενιά'. Η σειρά ακολουθεί αυτόν τον εμβληματικό χαρακτήρα στο επόμενο κεφάλαιο της ζωής του." },
  { id: 37, title: "Stranger Things", year: 2016, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 8.7, actors: "Millie Bobby Brown, Finn Wolfhard, Gaten Matarazzo, Caleb McLaughlin, Joe Keery", director: "Ross Duffer, Matt Duffer, Shawn Levy, Nimród Antal, Uta Briesewitz", poster: "000037.jpg", link: "https://terabox.com/s/17mrCWrcbiS2zqG3MM2y_AA", imdb: "https://www.imdb.com/title/tt4574334/", tmdb: "https://www.themoviedb.org/tv/66732", tagline: "Γίνεται όλο και πιο παράξενο...", desc: "Όταν ένα μικρό αγόρι εξαφανίζεται, μια μικρή πόλη αποκαλύπτει ένα μυστήριο που εμπλέκει μυστικά πειράματα, τρομακτικές υπερφυσικές δυνάμεις και ένα παράξενο κορίτσι." },

  { id: 39, title: "The Innocent", year: 2021, country: "Spain", genre: "Εγκλήματος, Μυστηρίου, Δράμα", type: "Series", quality: "HD", rating: 7.8, actors: "Mario Casas, Alexandra Jiménez, Aura Garrido, Jose Coronado, Martina Gusmán", director: "", poster: "000039.jpg", link: "https://terabox.com/s/1ZQ33bYZoxc1Aznhm--o00Q", imdb: "https://www.imdb.com/title/tt10147644/", tmdb: "https://www.themoviedb.org/tv/119988", tagline: "Κανείς δεν ξεφεύγει από το παρελθόν.", desc: "Ένας ακούσιος φόνος οδηγεί έναν άντρα σε έναν σκοτεινό ιστό ίντριγκας και φόνων. Μόλις βρίσκει την αγάπη και την ελευθερία, ένα τηλεφώνημα επαναφέρει τον εφιάλτη." },
  { id: 40, title: "The Lord of the Rings: The Rings of Power", year: 2022, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 6.9, actors: "Benjamin Walker, Charlie Vickers, Morfydd Clark, Robert Aramayo, Charles Edwards", director: "Charlotte Brändström, Louise Hooper, Wayne Che Yip, Sanaa Hamri, J. A. Bayona", poster: "000040.jpg", link: "https://terabox.com/s/16CB7wdgIbsfH36JOscVsA", imdb: "https://www.imdb.com/title/tt7631058/", tmdb: "https://www.themoviedb.org/tv/84773", tagline: "Ταξιδέψτε στη Μέση Γη", desc: "Ένα σύνολο χαρακτήρων, γνωστών αλλά και νέων, πρέπει να αντιμετωπίσει την επανεμφάνιση του κακού στη Μέση Γη. Από τα πιο σκοτεινά βάθη των Ομιχλωδών Βουνών μέχρι τα μαγευτικά δάση του Λίντον, από το νησιωτικό βασίλειο του Νούμενορ, μέχρι τις πιο απομακρυσμένες περιοχές του χάρτη, αυτά τα βασίλεια και οι χαρακτήρες θα σφυρηλατήσουν κληρονομιές που θα συνεχίσουν να ζουν και αφού έχουν χαθεί." },
  { id: 41, title: "The Mandalorian", year: 2019, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.6, actors: "Pedro Pascal, Katee Sackhoff, Chris Bartlett, Carl Weathers, Misty Rosas", director: "Rick Famuyiwa, Bryce Dallas Howard, Dave Filoni, Deborah Chow, Peyton Reed", poster: "000041.jpg", link: "https://terabox.com/s/1Z1ewnpr5b0vp_Nl_EK994Q", imdb: "https://www.imdb.com/title/tt8111088/", tmdb: "https://www.themoviedb.org/tv/82856", tagline: "Το κυνήγι επικηρυγμένων είναι ένα περίπλοκο επάγγελμα.", desc: "Μετά τις ιστορίες του Τζάνγκο και Μπόμπα Φετ, ένας άλλος πολεμιστής αναδύεται στο σύμπαν του Star Wars. Το 'Mandalorian' τοποθετείται μετά την πτώση της Αυτοκρατορίας, και πριν την εμφάνιση του Πρώτου Τάγματος. Παρακολουθούμε τις περιπέτειες ενός μοναχικού πολεμιστή στις απώτερες περιοχές του γαλαξία, μακριά από την εξουσία της Καινούργιας Δημοκρατίας." },
  { id: 42, title: "The Peripheral", year: 2022, country: "United States", genre: "Δράμα, Επιστημονικής Φαντασίας", type: "Series", quality: "HD", rating: 7.6, actors: "Chloë Grace Moretz, Gary Carr, Jack Reynor, T'Nia Miller, Katie Leung", director: "Alrick Riley, Vincenzo Natali", poster: "000042.jpg", link: "https://terabox.com/s/1rxsCWgo1VsrO7Ri7NncQFA", imdb: "https://www.imdb.com/title/tt12380978/", tmdb: "https://www.themoviedb.org/tv/95403", tagline: "", desc: "Σε μια πόλη των Απαλαχίων μια νεαρή κοπέλα βρίσκει διέξοδο σε προηγμένα βιντεοπαιχνίδια. Είναι τόσο καλή που μια εταιρεία της στέλνει ένα νέο σύστημα βιντεοπαιχνιδιών για δοκιμή, αλλά την περιμένει μια έκπληξη. Ξεκλειδώνει όλα τα όνειρά της του να βρει έναν σκοπό, ρομαντισμό και αίγλη σε κάτι που μοιάζει με παιχνίδι, αλλά τελικά θέτει την ίδια και την οικογένειά της σε κίνδυνο." },
  { id: 43, title: "The Queen's Gambit", year: 2020, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.5, actors: "Anya Taylor-Joy, Chloe Pirrie, Marcin Dorociński, Matthew Dennis Lewis, Russell Dennis Lewis", director: "Scott Frank", poster: "000043.jpg", link: "https://terabox.com/s/1UDocmveoHikuCBWLhSgGcQ", imdb: "https://www.imdb.com/title/tt10048342/", tmdb: "https://www.themoviedb.org/tv/87739", tagline: "", desc: "Σε ένα ορφανοτροφείο του Κεντάκι τη δεκαετία του 1950, ένα νεαρό κορίτσι ανακαλύπτει το σπάνιο ταλέντο της στο σκάκι, ενώ παλεύει με τον εθισμό της." },
  { id: 44, title: "The Rig", year: 2023, country: "United Kingdom", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 5.8, actors: "Emily Hampshire, Iain Glen, Martin Compston, Molly Vevers, Stuart McQuarrie", director: "John Strickland", poster: "000044.jpg", link: "https://terabox.com/s/1PaZ-u3kX2RSLtkfbgQr0Tw", imdb: "https://www.imdb.com/title/tt17464512/", tmdb: "https://www.themoviedb.org/tv/112581", tagline: "", desc: "Η σειρά εξελίσσεται πάνω στην πλατφόρμα εξόρυξης πετρελαίου Kishorn Bravo, που είναι εγκατεστημένη στα ανοιχτά της Σκωτίας. Όταν το πλήρωμα ετοιμάζεται για την προγραμματισμένη επιστροφή στην στεριά, μια μυστηριώδης και απρόσμενη ομίχλη αρχίζει να καλύπτει τα πάντα και σύντομα ανακαλύπτουν πως όλες οι επικοινωνίες με την ακτή και τον έξω κόσμο είναι εκτός λειτουργίας." },
  { id: 45, title: "The Sandman", year: 2022, country: "United States", genre: "Δράμα, Φαντασίας", type: "Series", quality: "HD", rating: 7.7, actors: "Tom Sturridge, Boyd Holbrook, Vivienne Acheampong, Patton Oswalt (φωνή), Vanesu Samunyai", director: "Jamie Childs, Andrés Baiz, Louise Hooper, Mairzee Almas, Hisko Hulsing", poster: "000045.jpg", link: "https://terabox.com/s/1OH-qkO362CaDJh-O500jTA", imdb: "https://www.imdb.com/title/tt1751634/", tmdb: "https://www.themoviedb.org/tv/90802", tagline: "Dream the world anew.", desc: "Μετά από πολυετή φυλάκιση, ο Μορφέας, ο Βασιλιάς των Ονείρων, ξεκινά ένα ταξίδι σε διάφορους κόσμους για να βρει ό,τι του έχουν κλέψει και να ανακτήσει τη δύναμή του." },
  { id: 46, title: "The Sinner", year: 2017, country: "United States", genre: "Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 7.9, actors: "Bill Pullman, Jessica Hecht, Dohn Norwood, Matt Bomer, Jessica Biel", director: "Cherien Dabis, Antonio Campos, Jody Lee Lipes, Brad Anderson, Tucker Gates", poster: "000046.jpg", link: "https://terabox.com/s/1-W0afI5K87N-IJdb1Rhkaw", imdb: "https://www.imdb.com/title/tt16408596/", tmdb: "https://www.themoviedb.org/tv/39852", tagline: "Οι αμαρτίες της θα τους πνίξουν όλους.", desc: "Μια νεαρή μητέρα, η Κόρα Τανέτι, προσπαθεί να καταλάβει γιατί έχει ανεξέλεγκτες βίαιες αντιδράσεις. Ο ντετέκτιβ Χάρι Αμπρόζ αναλαμβάνει να τη βοηθήσει να ανασύρει από το παρελθόν της βίαια μυστικά." },
  { id: 47, title: "The Terminal List", year: 2022, country: "United States", genre: "Δράμα, Εγκλήματος", type: "Series", quality: "HD", rating: 7.9, actors: "Chris Pratt, Constance Wu, Taylor Kitsch, Riley Keough, Arlo Mertz", director: "Fred Toye, Sylvain White, Ellen Kuras, Antoine Fuqua, M.J. Bassett", poster: "000047.jpg", link: "https://terabox.com/s/14wcInPYzDQ0_ZnwgAnV4UQ", imdb: "https://www.imdb.com/title/tt11743610/", tmdb: "https://www.themoviedb.org/tv/120911", tagline: "Your memory makes you question the truth.", desc: "Ο Αντιπλοίαρχος Τζέιμς Ριζ διψάει για εκδίκηση, καθώς ερευνά τις μυστηριώδεις δυνάμεις που κρύβονται πίσω από τη δολοφονία ολόκληρης της διμοιρίας του. Απαλλαγμένος από τις στρατιωτικές του υποχρεώσεις, εφαρμόζει όσα έμαθε στη σχεδόν εικοσαετή υπηρεσία του στο πεδίο της μάχης για να κυνηγήσει τους υπεύθυνους για την τραγωδία." },
  { id: 48, title: "The Thorn Birds", year: 1983, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.9, actors: "Jean Simmons, Richard Chamberlain, Rachel Ward, Christopher Plummer, Bryan Brown", director: "Daryl Duke", poster: "000048.jpg", link: "https://terabox.com/s/1RVqAcataj-9K3barZTDF6Q", imdb: "https://www.imdb.com/title/tt0086815/", tmdb: "https://www.themoviedb.org/tv/13780", tagline: "", desc: "Ο Πάντι Κλέρι μεταναστεύει μαζί με τη γυναίκα του Φιόνα και τα επτά παιδιά τους από τη Νέα Ζηλανδία στην Αυστραλία, στη Ντρόγκεντα, το απέραντο αγρόκτημα της δεσποτικής και άκληνης αδελφής του. Μισό αιώνα αργότερα η μοναδική εκπρόσωπος της τρίτης γενιάς της οικογένειας, Τζάστιν Ο' Νηλ, μια πετυχημένη ηθοποιός, αποφασίζει να χαράξει το δρόμο της μακριά από τις ρίζες της." },
  { id: 49, title: "The Time Traveler's Wife", year: 2022, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.7, actors: "Rose Leslie, Theo James, Natasha Lopez, Desmin Borges, Caitlin Shorey", director: "David Nutter", poster: "000049.jpg", link: "https://terabox.com/s/1FnwUfWQmdRUzUuAhh9-ecQ", imdb: "https://www.imdb.com/title/tt14674012/", tmdb: "https://www.themoviedb.org/tv/81322", tagline: "Every moment matters.", desc: "Στο ξέφωτο πίσω από το σπίτι της, η εξάχρονη Clare Abshire συναντά για πρώτη φορά τον 36χρονο ταξιδιώτη του χρόνου Henry DeTamble. Δεκατέσσερα χρόνια αργότερα, μια απροσδόκητη επανένωση στη βιβλιοθήκη δίνει στον Χένρι την ευκαιρία να γνωρίσει την Κλερ." },
  { id: 50, title: "The Winchesters", year: 2022, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 6.2, actors: "Meg Donnelly, Drake Rodger, Nida Khurshid, Jojo Fleites, Demetria McKinney", director: "John F. Showalter, Lisa Soper, John T. Kretchmer, Glen Winter, Geary McLeod", poster: "000050.jpg", link: "https://terabox.com/s/1_5v3qsu029sU88rJAHdwvA", imdb: "https://www.imdb.com/title/tt15324728/", tmdb: "https://www.themoviedb.org/tv/128113", tagline: "A supernatural love story.", desc: "Πριν από τους Sam & Dean, υπήρξε η Mary & ο John. Ο αφηγητής Dean Winchester θα μας μιλήσει για μια επική ιστορία που δεν έχει ξαναειπωθεί, το The Winchesters, και πώς γνωρίστηκαν οι γονείς του και πώς άφησαν τα πάντα στην άκρη όχι μόνο για να σώσουν την αγάπη τους, αλλά και ολόκληρο τον κόσμο." },
  { id: 51, title: "The Witcher", year: 2019, country: "United States", genre: "Δράμα, Φαντασίας", type: "Series", quality: "HD", rating: 8.0, actors: "Henry Cavill, Anya Chalotra, Freya Allan, Eamon Farren, Mimî M. Khayisa", director: "Stephen Surjik, Alik Sakharov, Loni Peristere, Bola Ogun, Alex Garcia Lopez", poster: "000051.jpg", link: "https://terabox.com/s/16czcw5754eMIfw6qfKceXg", imdb: "https://www.imdb.com/title/tt5180504/", tmdb: "https://www.themoviedb.org/tv/71912", tagline: "Τα χειρότερα τέρατα είναι αυτά που δημιουργούμε.", desc: "Ο Γκέραλτ από τη Ρίβια, ένας μεταλλαγμένος επαγγελματίας κυνηγός τεράτων, ψάχνει τη μοίρα του σε έναν άγριο κόσμο όπου συχνά οι άνθρωποι είναι πιο κακοί από τα θηρία." },
  { id: 52, title: "Tokyo Vice", year: 2022, country: "United States", genre: "Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 8.1, actors: "Ansel Elgort, Ken Watanabe, Rachel Keller, Show Kasamatsu, Rinko Kikuchi", director: "Josef Kubota Wladyka, Hikari, Alan Poul, Michael Mann", poster: "000052.jpg", link: "https://terabox.com/s/1omXNQJyHGoXP43-AskL7Ew", imdb: "https://www.imdb.com/title/tt12834470/", tmdb: "https://www.themoviedb.org/tv/90296", tagline: "Find the truth, no matter the cost.", desc: "Το Tokyo Vice βασίζεται στα απομνημονεύματα του Αμερικανού δημοσιογράφου Jake Adelstein, ο οποίος κάλυπτε το ρεπορτάζ της Μητροπολιτικής Αστυνομίας του Τόκιο. Το σκληρό αστυνομικό δράμα που γυρίστηκε στην Ιαπωνία, καταγράφει την καθημερινή ενασχόληση του Adelstein με τον υπόκοσμο του Τόκιο στα τέλη της δεκαετίας του '90." },
  { id: 53, title: "True Detective", year: 2014, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 8.9, actors: "Matthew McConaughey, Colin Farrell, Mahershala Ali, Woody Harrelson, Vince Vaughn", director: "Cary Joji Fukunaga, Issa López, Daniel Sackheim, Jeremy Saulnier, Nic Pizzolatto", poster: "000053.jpg", link: "https://terabox.com/s/1IGuG9uaPCzX0ikDpQYhvzA", imdb: "https://www.imdb.com/title/tt2356777/", tmdb: "https://www.themoviedb.org/tv/46648", tagline: "Αγγίξτε το σκοτάδι και το σκοτάδι θα σας αγγίξει και εσάς.", desc: "Όταν μια φορά δύο ντετέκτιβ απ' το Τέξας, ο Μάθιου και ο Γούντι, που κυνηγούν έναν σήριαλ κίλερ επί 17 χρόνια και βλέπουμε πώς οι ζωές τους αλληλεπιδρούν. Η σειρά θα διαδραματίζεται σε δύο διαφορετικές χρονικές περιόδους, στο 2012 και το 1995. Το παρόν και το παρελθόν περιπλέκονται επικίνδυνα και οι δύο πρώην συνεργάτες αναγκάζονται να επιστρέψουν σε έναν κόσμο που μέχρι πρότινος πίστευαν πως είχαν αφήσει μια για πάντα πίσω τους!" },
  { id: 54, title: "Tulsa King", year: 2022, country: "United States", genre: "Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 8.0, actors: "Sylvester Stallone, Martin Starr, Jay Will, Max Casella, Vincent Piazza", director: "Joshua Marston, Benjamin Semanoff, David Semel, Lodge Kerrigan, Allen Coulter", poster: "000054.jpg", link: "https://terabox.com/s/16QN89C1ee81WWkeYtP3FVA", imdb: "https://www.imdb.com/title/tt16358384/", tmdb: "https://www.themoviedb.org/tv/153312", tagline: "Αυθεντικός γκάνγκστερ. Νέα πόλη.", desc: "Αμέσως μετά την αποφυλάκισή του και ύστερα από κάθειρξη 25 χρόνων ο μαφιόζος Ντουάιτ 'Ο Στρατηγός' Μανφρέντι (Stallone), πάει στην οικογένεια για την οποία μπήκε φυλακή. Σχεδόν άμεσα, το αφεντικό του τον στέλνει στην Τάλσα της Οκλαχόμα, εκεί όπου θα πρέπει να φτιάξει νέα συμμορία με σκοπό τη δημιουργία μιας νέας εγκληματικής αυτοκρατορίας." },
  { id: 55, title: "Twin Peaks", year: 1990, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 8.8, actors: "Kyle MacLachlan, Michael Horse, Harry Goaz, Kimmy Robertson, Dana Ashbrook", director: "David Lynch, Lesli Linka Glatter, Caleb Deschanel, Tim Hunter, Duwayne Dunham", poster: "000055.jpg", link: "https://terabox.com/s/120XXr7pgWpMAzSK6sxvx8g", imdb: "https://www.imdb.com/title/tt0098936/", tmdb: "https://www.themoviedb.org/tv/1920", tagline: "A town where everyone knows everyone and nothing is what it seems.", desc: "Το Twin Peaks είναι μια ειδυλλιακή μικρή πόλη στην Αμερική κοντά στα σύνορα με τον Καναδά. Οι ζωές των κατοίκων περνούν φαινομενικά ήρεμα μέχρι τη στιγμή που μια νεαρή κοπέλα, η Laura Palmer βρίσκεται δολοφονημένη. Την υπόθεση καλείται να διαλευκάνει ο ειδικός πράκτορας του FBI Dale Cooper, ένας πανέξυπνος αλλά ιδιόρρυθμος τύπος. Κατά τη διάρκεια των ερευνών θα ανακαλύψει ότι κανείς δεν είναι αυτό που φαίνεται και ότι όλοι στο Twin Peaks έχουν κρυμμένα βρώμικα μυστικά." },

  { id: 65, title: "Billy the Kid", year: 2022, country: "United States", genre: "Γουέστερν, Δράμα", type: "Series", quality: "HD", rating: 7.3, actors: "Tom Blyth, Daniel Webber, Sean Owen Roberts, Dakota Daulby, Brendan Fletcher", director: "Michael Nankin, David Frazee, Otto Bathurst, Rachel Leiterman", poster: "000065.jpg", link: "https://terabox.com/s/1Y-7FFVWizTD7Tfm22uOT2Q", imdb: "https://www.imdb.com/title/tt14869858/", tmdb: "https://www.themoviedb.org/tv/138971", tagline: "", desc: "Μια επική ρομαντική περιπέτεια, βασισμένη στη ζωή του διάσημου παράνομου Μπίλι Κιντ - από τις ταπεινές ιρλανδικές ρίζες του, τις πρώτες μέρες του ως καουμπόη στα αμερικανικά σύνορα, μέχρι τον κεντρικό ρόλο του στον πόλεμο της κομητείας Λίνκολν." },

  { id: 67, title: "Blindspot", year: 2015, country: "United States", genre: "Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 7.3, actors: "Jaimie Alexander, Sullivan Stapleton, Audrey Esparza, Ashley Johnson, Rob Brown", director: "David McWhirter, Joy T. Lane, Rob Seidenglanz, David S. Tuttman, Jeff King", poster: "000067.jpg", link: "https://terabox.com/s/1wev0Mmy_y8wV8dC-X9Bqlg", imdb: "https://www.imdb.com/title/tt4744344/", tmdb: "https://www.themoviedb.org/tv/62710", tagline: "Piecing together her past. One tattoo at a time.", desc: "Στη μέση της Times Square εντοπίζεται ένας σάκος όπου μέσα βρίσκεται μια νεαρή γυναίκα με το σώμα της γεμάτο τατουάζ και η ίδια χωρίς μνήμη. Εξετάζοντάς την, ανακαλύπτουν ότι κάθε τατουάζ αντιστοιχεί σε κάποια εγκληματική ενέργεια. Έτσι το FBI ξεκινά αγώνα δρόμου ώστε να δώσει λύση στο μυστήριο." },

  { id: 69, title: "Bridgerton", year: 2020, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.4, actors: "Luke Thompson, Bessie Carter, Ruth Gemmell, Florence Hunt, Claudia Jessie", director: "Tom Verica, Tricia Brock, Julie Anne Robinson, Alrick Riley, Bille Woodruff", poster: "000069.jpg", link: "https://terabox.com/s/18f6iWUY4EAPjj94gsOvnqg", imdb: "https://www.imdb.com/title/tt8740790/", tmdb: "https://www.themoviedb.org/tv/91239", tagline: "Η αγάπη δεν παίζει ποτέ με τους κανόνες.", desc: "Τα οκτώ αδέρφια της οικογένειας Μπρίτζερτον αναζητούν την αγάπη και την ευτυχία στην υψηλή κοινωνία του Λονδίνου." },
  { id: 70, title: "Catch-22", year: 2019, country: "United States", genre: "Κωμωδία, Δράμα", type: "Series", quality: "HD", rating: 7.7, actors: "Christopher Abbott, Kyle Chandler, Daniel David Stewart, Tessa Ferrer, Lewis Pullman", director: "Grant Hesloff", poster: "000070.jpg", link: "https://terabox.com/s/1Ojj7rj0oTssIN6WGRfa5JA", imdb: "https://www.imdb.com/title/tt5056196/", tmdb: "https://www.themoviedb.org/tv/82744", tagline: "There's only no way out.", desc: "Βασισμένη στην ομώνυμη, ειρωνική νουβέλα του Joseph Heller, το Catch-22 αποτελεί την ιστορία του απαράμιλλου και επιδέξιου Yossarian, ενός Αμερικανού πιλότου βομβαρδιστικού στον Δεύτερο Παγκόσμιο Πόλεμο, ο οποίος είναι έξαλλος επειδή χιλιάδες άνθρωποι που δεν έχει γνωρίσει ποτέ, προσπαθούν να τον σκοτώσουν." },
  { id: 71, title: "Chapelwaite", year: 2021, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 7.2, actors: "Adrien Brody, Emily Hampshire, Jennifer Ens, Sirena Gulamgaus, Ian Ho", director: "Burr Steers, Jeff Renfroe, Rachel Leiterman", poster: "000071.jpg", link: "https://terabox.com/s/1IgLR8gheINetS_U5viUznw", imdb: "https://www.imdb.com/title/tt10384546/", tmdb: "https://www.themoviedb.org/tv/126118", tagline: "", desc: "Η σειρά εξελίσσεται στο 1850 με κεντρικό ήρωα τον Captain Charles Boone, ο οποίος μεταφέρει τα τρία του παιδιά στην πατρίδα των προγόνων του, μια μικρή πόλη στο Maine, μετά τον τραγικό θάνατο της γυναίκας του στη θάλασσα. Βασισμένο στο διήγημα του Stephen King, 'Jerusalem's Lot', prequel του Salem's Lot." },
  { id: 72, title: "Chernobyl", year: 2019, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 9.3, actors: "Jared Harris, Stellan Skarsgård, Emily Watson, Paul Ritter, Jessie Buckley", director: "Johan Renck", poster: "000072.jpg", link: "https://terabox.com/s/1uJRcr6wZSAKtGhGGwE8i4w", imdb: "https://www.imdb.com/title/tt7366338/", tmdb: "https://www.themoviedb.org/tv/87108", tagline: "Ποιο είναι το κόστος των ψεμάτων;", desc: "Η σειρά Chernobyl δραματοποιεί την ιστορία του πυρηνικού ατυχήματος του 1986 - μιας από τις χειρότερες ανθρωπογενείς καταστροφές στην ιστορία - και τις θυσίες που έγιναν για να σώσουν την Ευρώπη από την αδιανόητη καταστροφή." },
  { id: 73, title: "Constellation", year: 2024, country: "Germany", genre: "Μυστηρίου, Δράμα", type: "Series", quality: "HD", rating: 6.7, actors: "Noomi Rapace, Jonathan Banks, James D'Arcy, Rosie Coleman, Davina Coleman", director: "Oliver Hirschbiegel, Joseph Cedar, Michelle MacLaren", poster: "000073.jpg", link: "https://terabox.com/s/1WN8iqtVTuV7xxKOgb-sJUQ", imdb: "https://www.imdb.com/title/tt19345606/", tmdb: "https://www.themoviedb.org/tv/197125", tagline: "Η πραγματικότητα είναι μια μεγάλη συνωνυμία.", desc: "Μετά από ένα θανατηφόρο ατύχημα στον Διεθνή Διαστημικό Σταθμό, μια αστροναύτισσα κάνει μόνη το ηρωικό ταξίδι πίσω στη Γη, για να ανακαλύψει ότι βασικά κομμάτια της ζωής της, ακόμα και η μικρή της κόρη, έχουν αλλάξει." },
  { id: 74, title: "Criminal Record", year: 2024, country: "United Kingdom", genre: "Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 7.1, actors: "Peter Capaldi, Cush Jumbo, Shaun Dooley, Zoë Wanamaker, Charlie Creed-Miles", director: "Jim Loach", poster: "000074.jpg", link: "https://terabox.com/s/1slGd3w5mSgFnONmmXi7PPg", imdb: "https://www.imdb.com/title/tt21094628/", tmdb: "https://www.themoviedb.org/tv/204490", tagline: "Δεν μπορείς να κρυφτείς από τον εαυτό σου.", desc: "Στην καρδιά του Λονδίνου, ένα ανώνυμο τηλεφώνημα φέρνει αντιμέτωπους δύο λαμπρούς ντετέκτιβ, μια γυναίκα στο ξεκίνημα της καριέρας της κι έναν δικτυωμένο άντρα αποφασισμένο να προστατέψει την παρακαταθήκη του, σε μια μάχη για να διορθωθεί μια παλιά δικαστική πλάνη." },
  { id: 75, title: "Dopesick", year: 2021, country: "United States", genre: "Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 8.6, actors: "Michael Keaton, Peter Sarsgaard, Michael Stuhlbarg, Kaitlyn Dever, Will Poulter", director: "Barry Levinson, Patricia Riggen, Danny Strong, Michael Cuesta", poster: "000075.jpg", link: "https://terabox.com/s/1I5jvlRelY93UULh9_FqsIw", imdb: "https://www.imdb.com/title/tt11051804/", tmdb: "https://www.themoviedb.org/tv/110695", tagline: "The true story of how America got hooked on a lie.", desc: "Το 'Dopesick' εξετάζει το πώς μια εταιρεία πυροδότησε τη χειρότερη επιδημία ναρκωτικών στην ιστορία της Αμερικής. Η σειρά ταξιδεύει τους θεατές στο επίκεντρο της μάχης της Αμερικής με την εξάρτηση στα οπιοειδή φάρμακα, από τα γραφεία των μεγάλων φαρμακευτικών, την αναστατωμένη μεταλλευτική κοινότητα της Virginia, μέχρι και τους διαδρόμους της Δίωξης Ναρκωτικών." },
  { id: 76, title: "Drops of God", year: 2023, country: "France", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 8.0, actors: "Fleur Geffrier, Tomohisa Yamashita, Tom Wozniczka, Stanley Weber, Luca Terracciano", director: "Oded Ruskin", poster: "000076.jpg", link: "https://1024terabox.com/s/1PsjBxZW3B_I50X1Z3tYzvQ", imdb: "https://www.imdb.com/title/tt26917300/", tmdb: "https://www.themoviedb.org/tv/218961", tagline: "Ας αρχίσει η διεκδίκηση.", desc: "Ενώ ο κόσμος του κρασιού θρηνεί τον θάνατο του Αλεξάντρ Λεζέ, η αποξενωμένη κόρη του Καμίγ μαθαίνει ότι η εξαίσια συλλογή του είναι πλέον δική της. Μα για να την κληρονομήσει, πρέπει να νικήσει τον Ισέι, προστατευόμενο του Αλεξάντρ, σε μια δοκιμασία των αισθήσεών τους." },
  { id: 77, title: "Foundation", year: 2021, country: "United States", genre: "Δράμα, Επιστημονικής Φαντασίας", type: "Series", quality: "HD", rating: 7.6, actors: "Jared Harris, Lee Pace, Lou Llobell, Leah Harvey, Laura Birn", director: "Alex Graves, Roxann Dawson, David S. Goyer, Mark Tonderai, Jennifer Phang", poster: "000077.jpg", link: "https://1024terabox.com/s/1WCI7DvFfOFzbg9Pm1I62Fw", imdb: "https://www.imdb.com/title/tt0804484/", tmdb: "https://www.themoviedb.org/tv/93740", tagline: "Όλες οι αυτοκρατορίες πέφτουν.", desc: "Βασισμένο στα βραβευμένα βιβλία του Isaac Asimov, το Θεμέλιο καταγράφει τα χρονικά μιας ομάδας εξόριστων στο μνημειώδες ταξίδι τους να σώσουν την ανθρωπότητα και να ανοικοδομήσουν τον πολιτισμό εν μέσω της πτώσης της Γαλαξιακής Αυτοκρατορίας." },
  { id: 78, title: "Friends", year: 1994, country: "United States", genre: "Κωμωδία", type: "Series", quality: "HD", rating: 8.9, actors: "Jennifer Aniston, Courteney Cox, Lisa Kudrow, Matt LeBlanc, Matthew Perry", director: "Kevin S. Bright, Gary Halvorson, Michael Lembeck, James Burrows, Gail Mancuso", poster: "000078.jpg", link: "https://1024terabox.com/s/1hUfXckMAS8apdbdy64Lz5A", imdb: "https://www.imdb.com/title/tt0108778/", tmdb: "https://www.themoviedb.org/tv/1668", tagline: "Θα είμαι εκεί για σένα.", desc: "Η επιτυχημένη σειρά ακολουθεί τις περιπέτειες έξι 20άρηδων φίλων, καθώς αντιμετωπίζουν καθημερινά προβλήματα στη δουλειά, τη ζωή και τον έρωτα στο Μανχάταν του '90." },
  { id: 79, title: "From", year: 2022, country: "United States", genre: "Μυστηρίου, Δράμα, Τρόμου", type: "Series", quality: "HD", rating: 7.8, actors: "Harold Perrineau, Catalina Sandino Moreno, Eion Bailey, David Alpay, Elizabeth Saunders", director: "Jack Bender, Alexandra La Roche, Brad Turner, Jeff Renfroe, Jennifer Liao", poster: "000079.jpg", link: "https://terabox.com/s/101yydsBWdrK45BxmTdStiA", imdb: "https://www.imdb.com/title/tt18222636/", tmdb: "https://www.themoviedb.org/tv/124364", tagline: "", desc: "Η ιστορία εστιάζει σε μια εφιαλτική πόλη της κεντρικής Αμερικής, που παγιδεύει όποιον εισέρχεται σε αυτήν. Καθώς οι απρόθυμοι κάτοικοι παλεύουν να διατηρήσουν μια αίσθηση κανονικότητας και να βρουν ένα τρόπο διαφυγής, την ίδια ώρα θα πρέπει να επιβιώσουν από τις απειλές που κρύβονται στο δάσος που περιβάλλει την πόλη." },
  { id: 80, title: "Hanna", year: 2019, country: "United States", genre: "Δράμα, Δράσης", type: "Series", quality: "HD", rating: 7.6, actors: "Esme Creed-Miles, Mireille Enos, Dermot Mulroney, Joel Kinnaman, Noah Taylor", director: "Ugla Hauksdóttir, Eva Husson, Amy Neil, David Farr, Anders Engström", poster: "000080.jpg", link: "https://terabox.com/s/18BPYo2Bs33nZTcPdsRGIJg", imdb: "https://www.imdb.com/title/tt6932244/", tmdb: "https://www.themoviedb.org/tv/54155", tagline: "Είναι πιο γρήγορη, πιο δυνατή, πιο επικίνδυνη.", desc: "Η Hanna δεν είναι ένα συνηθισμένο κορίτσι. Μεγαλωμένη από τον πατέρα της, πρώην ύπαλλο της CIA, στην άγρια φύση, έχει το σθένος, την αντοχή και τα οξυμένα ένστικτα ενός στρατιώτη. Η ανατροφή της και η εκπαίδευσή της είχαν ένα και μόνο σκοπό: να γίνει η καλύτερη δολοφόνος." },
  { id: 81, title: "Hawkeye", year: 2021, country: "United States", genre: "Δράμα, Κωμωδία", type: "Series", quality: "HD", rating: 7.5, actors: "Jeremy Renner, Hailee Steinfeld, Tony Dalton, Alaqua Cox, Fra Fee", director: "Rhys Thomas, Bert, Bertie", poster: "000081.jpg", link: "https://terabox.com/s/1PdqJL8U7tZYRm54QKEaqQw", imdb: "https://www.imdb.com/title/tt10160804/", tmdb: "https://www.themoviedb.org/tv/88329", tagline: "Αυτές τις γιορτές, τα καλύτερα δώρα έρχονται με φιόγκο.", desc: "Το Disney+ κύκλωσε το πρώτο trailer από το 'Hawkeye', την limited σειρά comic που εξελίσσεται μετά τα γεγονότα του 'Avengers: Endgame'. Ο πρώην Avenger Clint Barton, έχει μια φαινομενικά εύκολη αποστολή, να επιστρέψει στην οικογένεια του για τον εορτασμό των Χριστουγέννων. Εύκολο; Ίσως με τη βοήθεια της Kate Bishop, μιας 22χρονης τοξοβόλου που ονειρεύεται να γίνει σούπερ ήρωας." },
  { id: 82, title: "Homeland", year: 2011, country: "United States", genre: "Δράμα, Εγκλήματος", type: "Series", quality: "HD", rating: 8.3, actors: "Claire Danes, Mandy Patinkin, Rupert Friend, Damian Lewis, F. Murray Abraham", director: "Lesli Linka Glatter, Michael Cuesta, Daniel Attias, Alex Graves, Keith Gordon", poster: "000082.jpg", link: "https://terabox.com/s/1pmExIdl4x87z2MqUPqD5AQ", imdb: "https://www.imdb.com/title/tt1796960/", tmdb: "https://www.themoviedb.org/tv/1407", tagline: "The nation sees a hero. She sees a threat.", desc: "Ένας Αμερικανός στρατιώτης που θεωρείται ότι σκοτώθηκε στο Ιράκ, επιστρέφει 8 χρόνια μετά την εξαφάνισή του. Αλλά, όταν η χαρά της επιστροφής στην πατρίδα κοπάζει, προκύπτουν υποψίες για το αν ήταν πραγματικά ένας Αμερικανός ήρωας ή μέλος ενός πυρήνα, που σχεδίαζε τρομοκρατική επίθεση." },
  { id: 83, title: "House of Cards", year: 2013, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.6, actors: "Robin Wright, Michael Kelly, Kevin Spacey, Jayne Atkinson, Derek Cecil", director: "James Foley, Robin Wright, John David Coles, Carl Franklin, Tucker Gates", poster: "000083.jpg", link: "https://terabox.com/s/1WnRxRdXrJKTwpUxo6kCvtw", imdb: "https://www.imdb.com/title/tt1856010/", tmdb: "https://www.themoviedb.org/tv/1425", tagline: "Υπάρχουν δύο είδη πόνου.", desc: "Με επίκεντρο την Washington, D.C, το House of Cards είναι η ιστορία του Φράνσις Άντεργουντ, βουλευτή των Δημοκρατικών στην 5η Περιφέρεια της Νότιας Καρολίνας. Μετά την αθέτηση της συμφωνίας από τον Πρόεδρο για τον διορισμό του ως Υπουργός Εξωτερικών, θέτει σε εφαρμογή ένα περίπλοκο σχέδιο για την απόκτηση δύναμης και εξουσίας, με τη βοήθεια της συζύγου του, Κλερ." },
  { id: 84, title: "Tom Clancy's Jack Ryan", year: 2018, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.0, actors: "John Krasinski, Wendell Pierce, Michael Kelly, Abbie Cornish, Betty Gabriel", director: "Jann Turner, Daniel Sackheim, Patricia Riggen, Andrew Bernstein, Lukas Ettlin", poster: "000084.jpg", link: "https://terabox.com/s/1YeXoaSTPQxTrlCtf7pocCw", imdb: "https://www.imdb.com/title/tt5057054/", tmdb: "https://www.themoviedb.org/tv/73375", tagline: "", desc: "Η σειρά ακολουθεί τον Ράιαν καθώς αποκαλύπτει ένα πρότυπο στην τρομοκρατική επικοινωνία που τον εκτοξεύει στο κέντρο ενός επικίνδυνου παιχνιδιού με μια νέα φυλή τρομοκρατίας που απειλεί την καταστροφή σε παγκόσμια κλίμακα." },
  { id: 85, title: "Lonesome Dove", year: 1989, country: "United States", genre: "Δράμα, Γουέστερν", type: "Series", quality: "HD", rating: 8.7, actors: "Robert Duvall, Tommy Lee Jones, Diane Lane, Robert Urich, D.B. Sweeney", director: "Simon Wincer", poster: "000085.jpg", link: "https://terabox.com/s/1RCJp0U2SUN60YK1xDy51hw", imdb: "https://www.imdb.com/title/tt0096639/", tmdb: "https://www.themoviedb.org/tv/41692", tagline: "The epic film as big as the west.", desc: "Δύο μεσήλικες ραντζέρηδες, ο Γκας και ο Γκούντροου, κουρασμένοι από μια ζωή σκληρής δουλειάς, έχουν αράξει μόνιμα στο ήσυχο χωριουδάκι Lonesome Dove. Τώρα δεν έχουν άλλες φιλοδοξίες, παρά μόνο ίσως μια ακόμα μεγάλη τελευταία περιπέτεια, για να ξανανιώσουν. Και η ευκαιρία δίνεται, όταν ένας παλιός συνεργάτης τους τους προτείνει να μεταφέρουν τα ζώα τους 2.500 μίλια μακριά, στην παρθένα γη της Μοντάνα και να στήσουν ένα ράντζο εκεί." },
  { id: 86, title: "Lupin", year: 2021, country: "France", genre: "Εγκλήματος, Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 7.5, actors: "Omar Sy, Ludivine Sagnier, Soufiane Guerrab, Shirine Boutella, Etan Simon", director: "Ludovic Bernard, Louis Leterrier, Xavier Gens, Hugo Gélin, Daniel Grou", poster: "000086.jpg", link: "https://terabox.com/s/13OTbgSqP9RWAJDJ0E-Zj6g", imdb: "https://www.imdb.com/title/tt13448810/", tmdb: "https://www.themoviedb.org/tv/96677", tagline: "", desc: "Από τις περιπέτειες του Αρσέν Λουπέν, ο ευγενής λωποδύτης Ασάν Ντιόπ θέλει να πάρει εκδίκηση για τον πατέρα του για μια αδικία που προκάλεσε μια πλούσια οικογένεια." },
  { id: 87, title: "Monsieur Spade", year: 2024, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 6.9, actors: "Clive Owen, Cara Bossom, Denis Ménochet, Louise Bourgoin, Chiara Mastroianni", director: "Scott Frank", poster: "000087.jpg", link: "https://terabox.com/s/1mznQSAy6WsVVIoFm0ZvpXg", imdb: "https://www.imdb.com/title/tt15391076/", tmdb: "https://www.themoviedb.org/tv/209479", tagline: "", desc: "Detective Sam Spade is pulled out of his tranquil retirement in France to investigate a series of brutal murders." },
  { id: 88, title: "Outer Banks", year: 2020, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 7.5, actors: "Chase Stokes, Madelyn Cline, Madison Bailey, Jonathan Daviss, Rudy Pankow", director: "Jonas Pate", poster: "000088.jpg", link: "https://terabox.com/s/1XrJ-slZZnw7cR9iTtzv5EA", imdb: "https://www.imdb.com/title/tt10293980/", tmdb: "https://www.themoviedb.org/tv/100757", tagline: "Bring it on home.", desc: "Το 'Outer Banks' είναι μια ιστορία ενηλικίωσης για μια δεμένη παρέα ντόπιων εφήβων (τα 'Ψάρια') στο παραθαλάσσιο θέρετρο Άουτερ Μπανκς της Βόρειας Καρολίνας. Με το πέρασμα ενός τυφώνα που διακόπτει την ηλεκτροδότηση για όλο το καλοκαίρι, οι επακόλουθες παράνομες ενέργειες αναγκάζουν τους φίλους να πάρουν αποφάσεις που θα αλλάξουν τη ζωή τους." },
  { id: 89, title: "Outlander", year: 2014, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.4, actors: "Caitríona Balfe, Sam Heughan, Sophie Skelton, Richard Rankin, John Bell", director: "John Dahl, Metin Hüseyin, Jamie Payne, Stephen Woolfenden, Anna Foerster", poster: "000089.jpg", link: "https://1024terabox.com/s/1eaYHI64bYNKKzBTImqlKGg", imdb: "https://www.imdb.com/title/tt3006802/", tmdb: "https://www.themoviedb.org/tv/56570", tagline: "Τι θα γινόταν αν το μέλλον σας ήταν το παρελθόν;", desc: "Η σειρά διηγείται την ιστορία της Claire, μιας παντρεμένης νοσοκόμας από το 1945 που μυστηριωδώς στέλνεται στο 1743, όπου κατευθείαν καταλαβαίνει ότι βρίσκεται σε έναν επικίνδυνο άγνωστο κόσμο όπου η ζωή της απειλείται. Όταν αναγκάζεται να παντρευτεί τον Jamie Fraser, έναν θαρραλέο και ρομαντικό νεαρό πολεμιστή, μια παθιασμένη σχέση ξεκινάει που χωρίζει την καρδιά της Claire σε 2 τελείως διαφορετικούς άντρες, και σε 2 διαφορετικές ζωές." },
  { id: 90, title: "Resident Alien", year: 2021, country: "United States", genre: "Κωμωδία, Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 8.1, actors: "Alice Wetterlund, Alan Tudyk, Sara Tomko, Corey Reynolds, Levi Fiehler", director: "Robert Duncan McNeill, Shannon Kohli, Brennan Shroff, Lea Thompson, Kabir Akhtar", poster: "000090.jpg", link: "https://terabox.com/s/1iS5VZoQF-CxXNENeOELOiw", imdb: "https://www.imdb.com/title/tt10391600/", tmdb: "https://www.themoviedb.org/tv/96580", tagline: "Beam this up.", desc: "Η σειρά ακολουθεί την ιστορία του Harry, ενός εξωγήινου που καταφθάνει στον πλανήτη μας με τη μυστική αποστολή του να είναι η εξολόθρευση του ανθρώπινου είδους. Τα πράγματα όμως αλλάζουν όταν εμπλέκεται στην επίλυση ενός φόνου στην τοπική κοινωνία και συνειδητοποιεί ότι πρέπει να προσαρμοστεί σε αυτόν τον νέο κόσμο." },
  { id: 91, title: "Ripley", year: 2024, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.1, actors: "Andrew Scott, Dakota Fanning, Johnny Flynn, Francesca Romana Bergamo, Vittorio Viviani", director: "Steven Zaillian", poster: "000091.jpg", link: "https://terabox.com/s/1re1SBksV1BZlbrHxW9hFLQ", imdb: "https://www.imdb.com/title/tt11053470/", tmdb: "https://www.themoviedb.org/tv/94028", tagline: "Who is Tom Ripley?", desc: "Ένας απατεώνας παρασύρεται σ' έναν κόσμο πλούτου και προνομίων όταν αναλαμβάνει μια αποστολή στην Ιταλία. Για ν' αποκτήσει τη ζωή που θέλει, δημιουργεί έναν ιστό ψεμάτων." },
  { id: 92, title: "Silo", year: 2023, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.1, actors: "Rebecca Ferguson, Common, Harriet Walter, Chinaza Uche, Avi Nash", director: "Morten Tyldum, Adam Bernstein, Bert, David Semel, Bertie", poster: "000092.jpg", link: "https://1024terabox.com/s/1LH5pyhaZnHXDHY9f6DvXBQ", imdb: "https://www.imdb.com/title/tt14688458/", tmdb: "https://www.themoviedb.org/tv/125988", tagline: "Η αλήθεια θα βγει στην επιφάνεια.", desc: "Σε ένα ερειπωμένο και τοξικό μέλλον, χιλιάδες άνθρωποι ζουν σε ένα γιγάντιο σιλό βαθιά κάτω από τη γη. Αφού ο σερίφης του παραβιάζει έναν θεμελιώδη κανόνα και οι κάτοικοι πεθαίνουν μυστηριωδώς, η μηχανικός Τζούλιετ αρχίζει να ανακαλύπτει συγκλονιστικά μυστικά και την αλήθεια για το σιλό." },
  { id: 93, title: "Star Trek: Discovery", year: 2017, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.0, actors: "Sonequa Martin-Green, Doug Jones, Mary Wiseman, Anthony Rapp, Wilson Cruz", director: "Olatunde Osunsanmi, Jonathan Frakes, Lee Rose, Douglas Aarniokoski, Christopher J. Byrne", poster: "000093.jpg", link: "https://terabox.com/s/1iO8WUIE6984ZDg2VbzFusg", imdb: "https://www.imdb.com/title/tt5171438/", tmdb: "https://www.themoviedb.org/tv/67198", tagline: "Στην άκρη του σύμπαντος αρχίζει η ανακάλυψη.", desc: "Μετά από έναν αιώνα ειρήνης ξεσπά πόλεμος μεταξύ της Ομοσπονδίας και της Αυτοκρατορίας Κλίνγκον. Κεντρικό πρόσωπο στη διαμάχη ένας ξεπεσμένος αξιωματικός του Αστροστόλου." },
  { id: 94, title: "Star Trek: Strange New Worlds", year: 2022, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.3, actors: "Anson Mount, Ethan Peck, Jess Bush, Christina Chong, Celia Rose Gooding", director: "Dan Liu, Amanda Row, Chris Fisher, Maja Vrvilo, Eduardo Sánchez", poster: "000094.jpg", link: "https://terabox.com/s/1BmTeDBhXwYUydep-mj288Q", imdb: "https://www.imdb.com/title/tt12327578/", tmdb: "https://www.themoviedb.org/tv/103516", tagline: "The frontier awaits.", desc: "Η σειρά ακολουθεί το πλήρωμα του USS Enterprise και επικεντρώνεται στον καπετάνιο Christopher Pike, Spock και Number One, καθώς εξερευνούν νέους κόσμους σε όλο τον γαλαξία. Το Strange New Worlds είναι τεχνικά και spinoff και prequel, και δείχνει το πλήρωμα του USS Enterprise μετά την εμφάνισή τους στη δεύτερη σεζόν του Star Trek: Discovery." },

  { id: 96, title: "The Boys", year: 2019, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.7, actors: "Karl Urban, Jack Quaid, Antony Starr, Erin Moriarty, Jessie T. Usher", director: "Philip Sgriccia, Fred Toye, Karen Gaviola, Nelson Cragg, Sarah Boyd", poster: "000096.jpg", link: "https://terabox.com/s/10fDH7_r5OBS6G7P5_FUwrw", imdb: "https://www.imdb.com/title/tt1190634/", tmdb: "https://www.themoviedb.org/tv/76479", tagline: "Μην συναντήσεις ποτέ τους ήρωές σου.", desc: "Σε έναν κόσμο όπου οι υπερήρωες εκμεταλλεύονται τη σκοτεινή πλευρά της τεράστιας δημοτικότητας και φήμης τους, το ΣΩΜΑ ΔΙΩΞΗΣ ΥΠΕΡΗΡΩΩΝ επικεντρώνεται σε μια σειρά από εκδικητές, γνωστούς ανεπίσημα ως 'Τα παιδιά', οι οποίοι αποφασίζουν να αντιμετωπίσουν τους διεφθαρμένους υπερήρωες με τίποτα άλλο παρά την αποφασιστικότητά τους και τη διάθεσή τους να πολεμήσουν βρώμικα." },
  { id: 97, title: "The Devil's Hour", year: 2022, country: "United Kingdom", genre: "Μυστηρίου, Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 7.6, actors: "Jessica Raine, Peter Capaldi, Nikesh Patel, Phil Dunster, Benjamin Chivers", director: "Johnny Allan, Shaun James Grant, Isabelle Sieb", poster: "000097.jpg", link: "https://1024terabox.com/s/121geqIsk63lQw8gHBWAFSg", imdb: "https://www.imdb.com/title/tt15428778/", tmdb: "https://www.themoviedb.org/tv/157061", tagline: "Time to face your fears.", desc: "Η Λούσι ξυπνάει κάθε βράδυ στις 3:33π.μ. γνωστή και ως 'η ώρα του διαβόλου' και της συμβαίνουν διάφορα ανεξήγητα πράγματα. Τίποτα στη ζωή της δεν βγάζει νόημα για πολύ καιρό. Ωστόσο, οι απαντήσεις βρίσκονται εκεί έξω, κάπου, στο τέλος μιας σειράς άγριων φόνων." },
  { id: 98, title: "The Expanse", year: 2015, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 8.5, actors: "Steven Strait, Dominique Tipper, Wes Chatham, Shohreh Aghdashloo, Cas Anvar", director: "Breck Eisner, Jeff Woolnough, Kenneth Fink, Rob Lieberman, David Grossman", poster: "000098.jpg", link: "https://terabox.com/s/1R-roLqGkA2yI1DTq18qeFw", imdb: "https://www.imdb.com/title/tt3230854/", tmdb: "https://www.themoviedb.org/tv/63639", tagline: "Τα αστέρια είναι καλύτερα χωρίς εμάς.", desc: "Στον 23ο αιώνα σε ένα μέλλον όπου η ανθρωπότητα έχει αποικίσει ολόκληρο το Ηλιακό Σύστημα, ο Μίλερ, ένας ντετέκτιβ από τον αστεροειδή Μπελτ, και ο ιπτάμενος αξιωματικός Τζιμ Χόλντεν με το πλήρωμά του, βρίσκονται να ξετυλίγουν μια συνωμοσία που απειλεί την ειρήνη σε όλο το σύστημα καθώς και την επιβίωση ολόκληρης της ανθρωπότητας." },
  { id: 99, title: "The Falcon and the Winter Soldier", year: 2021, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.1, actors: "Anthony Mackie, Sebastian Stan, Wyatt Russell, Erin Kellyman, Daniel Brühl", director: "Kari Skogland", poster: "000099.jpg", link: "https://terabox.com/s/1pIZQmJ-OxYvDilY3Tp7Xew", imdb: "https://www.imdb.com/title/tt9208876/", tmdb: "https://www.themoviedb.org/tv/88396", tagline: "Τιμήστε την ασπίδα.", desc: "Μετά τα γεγονότα του 'Avengers: Endgame', οι Falcon, Sam Wilson και ο Winter Soldier, ο Bucky Barnes συνεργάζονται σε μια παγκόσμια περιπέτεια που δοκιμάζει τις ικανότητές τους και την υπομονή τους." },
  { id: 100, title: "The Responder", year: 2022, country: "United Kingdom", genre: "Δράμα, Εγκλήματος", type: "Series", quality: "HD", rating: 7.4, actors: "Martin Freeman, Adelayo Adedayo, Emily Fairn, Romi Hyland-Rylands, Josh Finan", director: "Mounia Akl, Tim Mielants, Jeanette Nordahl, Tony Schumacher, Philip Barantini", poster: "000100.jpg", link: "https://terabox.com/s/1sxASzp6GLdFOpASdxB6oEg", imdb: "https://www.imdb.com/title/tt17464980/", tmdb: "https://www.themoviedb.org/tv/155346", tagline: "", desc: "Μετά τον θάνατο της μητέρας του, ο Κρις συντετριμμένος ζει μόνος στο βρώμικο διαμέρισμά του. Είναι αποφασισμένος να μην επιστρέψει στις παλιές του συνήθειες και να μην παίρνει, πλέον, το νόμο στα χέρια του. Ακολουθεί το γράμμα του νόμου. Όταν ξεσπά πόλεμος συμμοριών ανάμεσα σε δύο από τους μεγαλύτερους εμπόρους ναρκωτικών του Λίβερπουλ, ο Κρις κινδυνεύει να αποκαλυφθούν οι προηγούμενες ατασθαλίες του." },
  { id: 101, title: "Westworld", year: 2016, country: "United States", genre: "Γουέστερν", type: "Series", quality: "HD", rating: 8.5, actors: "Evan Rachel Wood, Thandiwe Newton, Jeffrey Wright, Tessa Thompson, Ed Harris", director: "Richard J. Lewis, Fred Toye, Vincenzo Natali, Jennifer Getzinger, Craig William Macneill", poster: "000101.jpg", link: "https://terabox.com/s/1ERU_pCqd4c1nSCFYBxIteQ", imdb: "https://www.imdb.com/title/tt0475784/", tmdb: "https://www.themoviedb.org/tv/63247", tagline: "These violent delights have violent ends.", desc: "Το Westworld, είναι ένα θεματικό πάρκο για πλούσιους επισκέπτες. Το πάρκο παρέχει στους πελάτες του τη δυνατότητα να ζήσουν τις φαντασιώσεις τους μέσα από τη χρήση ρομπότ που παρέχουν ό,τι χρειαστούν. Δύο από τους επισκέπτες επιλέγουν μια περιπέτεια στην Άγρια Δύση. Ωστόσο, ύστερα από μια βλάβη στους υπολογιστές, ανακαλύπτουν ότι καταδιώκονται από ένα – εκτός ελέγχου – ρομπότ που οπλοφορεί..." },
  { id: 102, title: "Yellowjackets", year: 2021, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 7.8, actors: "Melanie Lynskey, Tawny Cypress, Sophie Nélisse, Jasmin Savoy Brown, Sophie Thatcher", director: "Daisy von Scherler Mayer, Benjamin Semanoff, Scott Winant, Eduardo Sánchez, Eva Sørhaug", poster: "000102.jpg", link: "https://terabox.com/s/1lmPLqD-KZB6Ch7XnbELOHw", imdb: "https://www.imdb.com/title/tt11041332/", tmdb: "https://www.themoviedb.org/tv/117488", tagline: "Ακούμε την έρημο και μας ακούει.", desc: "Με ισόποσες δόσεις από έπος επιβίωσης, ιστορία ψυχολογικού τρόμου και δράμα ενηλικίωσης, το 'Yellowjackets' αποτελεί την επική ιστορία των μελών μιας ιδιαίτερα ταλαντούχας ομάδας ποδοσφαίρου του λυκείου, που ατυχώς έγιναν οι επιζώντες ενός αεροπορικού δυστυχήματος, στην απομακρυσμένη άγρια φύση του βορρά." },
  { id: 103, title: "Luther", year: 2010, country: "United Kingdom", genre: "Εγκλήματος, Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 8.4, actors: "Idris Elba, Michael Smiley, Dermot Crowley, Warren Brown, Ruth Wilson", director: "Sam Miller, Farren Blackburn, Brian Kirk, Stefan Schwartz", poster: "000103.jpg", link: "https://terabox.com/s/1x7KUmWb49ysXDCVDoGF-Sg", imdb: "https://www.imdb.com/title/tt1474684/", tmdb: "https://www.themoviedb.org/tv/1426", tagline: "What if your worst enemy was your own conscience?", desc: "Ο John Luther είναι ένας ντετέκτιβ στο Λονδίνο, αφοσιωμένος στη δουλειά του και παράλληλα με τα σκληρά εγκλήματα που έχει να αντιμετωπίσει, προσπαθεί να φέρει μια κατάσταση εσωτερικής ισορροπίας μεταξύ της κοινής ηθικής και των 'δαιμόνων' που τον κυριεύουν. Παρασυρμένος από τα συναισθήματά του δεν θα διστάσει να πάρει το νόμο στα χέρια του και να τον λυγίσει όταν αφορά ζητήματα ζωής και θανάτου ή και ακόμη όταν οι πράξεις του θα τον βοηθήσουν λύσει τις υποθέσεις του." },
  { id: 104, title: "Prime Target", year: 2025, country: "United Kingdom", genre: "Δράμα", type: "Series", quality: "HD", rating: 6.3, actors: "Leo Woodall, Quintessa Swindell, Sidse Babett Knudsen, Stephen Rea, Fra Fee", director: "Brady Hood", poster: "000104.jpg", link: "https://1024terabox.com/s/1Ec6-5ZPYZIxBVoKVqoWXaA", imdb: "https://www.imdb.com/title/tt26743728/", tmdb: "https://www.themoviedb.org/tv/246381", tagline: "A brilliant mind is a dangerous weapon.", desc: "Ένας λαμπρός φοιτητής μαθηματικών είναι στα πρόθυρα μιας μεγάλης ανακάλυψης, όταν ένας σκοτεινός εχθρός προσπαθεί να τον σταματήσει. Παλεύοντας για απαντήσεις και για τη ζωή του, συμμαχεί με μια κυβερνητική πράκτορα για να ξετυλίξει μια επικίνδυνη συνωμοσία." },
  { id: 105, title: "Peaky Blinders", year: 2013, country: "United Kingdom", genre: "Δράμα, Εγκλήματος", type: "Series", quality: "HD", rating: 8.7, actors: "Cillian Murphy, Paul Anderson, Sophie Rundle, Helen McCrory, Finn Cole", director: "Anthony Byrne, Colm McCarthy, David Caffrey, Tim Mielants, Otto Bathurst", poster: "000105.jpg", link: "https://terabox.com/s/1CMu2fEzYDCVOTHox_bozWA", imdb: "https://www.imdb.com/title/tt2442560/", tmdb: "https://www.themoviedb.org/tv/60574", tagline: "London's for the taking.", desc: "Μια διαβόητη συμμορία στο Μπέρμιγχαμ της Αγγλίας του 1919 έχει για αρχηγό τον άγριο Τόμι Σέλμπι που προχωρά ακάθεκτος χωρίς να υπολογίζει το κόστος." },
  { id: 106, title: "Agatha Christie's Poirot", year: 1989, country: "United Kingdom", genre: "Εγκλήματος, Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 8.6, actors: "David Suchet, Hugh Fraser, Philip Jackson, Pauline Moran, David Yelland", director: "Andrew Grieve, Edward Bennett, Renny Rye, Brian Farnham, Richard Spence", poster: "000106.jpg", link: "https://terabox.com/s/1eVVHhmmVXl9FE3rU_HThtw", imdb: "https://www.imdb.com/title/tt0094525/", tmdb: "https://www.themoviedb.org/tv/790", tagline: "", desc: "Ο Ηρακλής Πουαρό είναι διάσημος Βέλγος συνταξιούχος αστυνομικός, ο οποίος εγκαταστάθηκε μετά τον Α' Παγκόσμιο Πόλεμο στο Λονδίνο και εμπλέκεται σε υποθέσεις δολοφονίας και μυστηρίου. Συνήθως συνοδεύεται από τον φίλο του Κάπτεν Χέιστινγκς, και συνεργάζεται με τον φιλικό του αντίπαλο και επιθεωρητή της Σκότλαντ Γιαρντ, Τζέιμς Τζαπ. Λάτρης της τάξης και της συμμετρίας, εχθρός της σκόνης και των εξωτερικών χώρων, του αρέσει να χρησιμοποιεί τα 'μικρά γκρι κύτταρα' του εγκεφάλου του για να λύνει περίπλοκα εγκλήματα." },
  { id: 107, title: "Poker Face", year: 2023, country: "United States", genre: "Μυστηρίου, Εγκλήματος", type: "Series", quality: "HD", rating: 7.8, actors: "Natasha Lyonne, Benjamin Bratt, Pedro Hollywood, Simon Helberg, Ron Perlman", director: "Lucky McKee, Natasha Lyonne, Ben Sinclair, Janicza Bravo", poster: "000107.jpg", link: "https://terabox.com/s/1TmphRz6x0yaQFt5cyZDe5g", imdb: "https://www.imdb.com/title/tt14269590/", tmdb: "https://www.themoviedb.org/tv/120998", tagline: "Murder mysteries can take detours.", desc: "Το Poker Face είναι μια σειρά 'μυστηρίου της εβδομάδας' που ακολουθεί την Charlie, που διαθέτει μια εξωπραγματική ικανότητα που της επιτρέπει να διακρίνει όταν κάποιος λέει ψέματα. Η Charlie κυκλοφορεί στο δρόμο με το αυτοκίνητό της, μια Plymouth Barracuda και σε κάθε στάση συναντά μια νέα ομάδα χαρακτήρων και παράξενα εγκλήματα που θέλει να διαλευκάνει." },
  { id: 108, title: "Pride and Prejudice", year: 1995, country: "United Kingdom", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.8, actors: "Colin Firth, Jennifer Ehle, Susannah Harker, Crispin Bonham-Carter, Benjamin Whitrow", director: "Simon Langton", poster: "000108.jpg", link: "https://terabox.com/s/1OlQMVYXZY6AIFxhtYnecYQ", imdb: "https://www.imdb.com/title/tt0112130/", tmdb: "https://www.themoviedb.org/tv/1457", tagline: "The celebrated BBC dramatisation of a classic romance", desc: "H σειρά βασίζεται πάνω στην ομώνυμη νουβέλα της εξαίρετης συγγραφέως Jane Austen. Η Ελίζαμπεθ είναι μια αποφασιστική αλλά και ευαίσθητη νεαρή κοπέλα η οποία έχει άλλες 4 αδελφές, όλες ανύπαντρες. Με μια μητέρα που η μόνη της σκέψη είναι πως θα τις αποκαταστήσει και έναν πατέρα που την λατρεύει αλλά παράλο αυτά δεν είναι ικανός να φροντίσει για το μέλλον τους μετά τον θάνατό του, οπότε και αναγκαστικά ανέχεται την γκρίνια της γυναίκας του. Στον τοπικό χορό η αδελφή της Ελίζαμπεθ γνωρίζεται με τον πλούσιο αλλά και ευπαρουσίαστο συμπαθητικό κύριο Μπίγκλεϊ και η μητέρα τους ελπίζει ότι ένας τέτοιος γάμος θα έλυνε όλα τους τα προβλήματα. Η ίδια η Ελίζαμπεθ μέσω του κυρίου Μπίγκλεϊ γνωρίζει τον φίλο του κύριο Ντάρσυ που δείχνει κρύος - αγενής και εγωιστής στα μάτια της. Η φράση της : Θα μπορούσα να συγχωρήσω την ματαιοδοξία του αν δεν είχε πληγώσει την δική μου δείχνει την αρχή ενός έρωτα γεμάτου 'Περηφάνια και Προκατάληψη'." },
  { id: 109, title: "SAS Rogue Heroes", year: 2022, country: "United Kingdom", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.1, actors: "Alfie Allen, Connor Swindells, Jack O'Connell, Sofia Boutella, Dominic West", director: "Tom Shankland", poster: "000109.jpg", link: "https://terabox.com/s/1W-_KOOUvPxaBfPARCorLHQ", imdb: "https://www.imdb.com/title/tt13672172/", tmdb: "https://www.themoviedb.org/tv/93870", tagline: "Who dares wins.", desc: "Η δραματοποιημένη αφήγηση του σχηματισμού της μεγαλύτερης μονάδας Ειδικών Δυνάμεων στον κόσμο, της SAS, κάτω από εξαιρετικά ιδιαίτερες συνθήκες, στις πιο σκοτεινές μέρες του Β' Παγκοσμίου Πολέμου." },
  { id: 110, title: "The Passage", year: 2019, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.2, actors: "Mark-Paul Gosselaar, Saniyya Sidney, Caroline Chikezie, Vincent Piazza, Jamie McShane", director: "Jason Ensler, Jeffrey Nachmanoff, Eduardo Sanchez-Ubanell, Mark Tonderai, Ti West", poster: "000110.jpg", link: "https://terabox.com/s/1ETVRfa80LB6Joxrbx6SKfQ", imdb: "https://www.imdb.com/title/tt6912406/", tmdb: "https://www.themoviedb.org/tv/77459", tagline: "Can one girl save humanity?", desc: "Η Σειρά THE PASSAGE επικεντρώνεται στο Project NOAH, ένα μυστικό ερευνητικό κέντρο όπου επιστήμονες πειραματίζονται με έναν επικίνδυνο ιό που θα μπορούσε να οδηγήσει στη θεραπεία όλων των ειδών ασθένειας. Ταυτόχρονα όμως, ο ίδιος ιός θα μπορούσε να αφανίσει το ανθρώπινο είδος. Όταν ένα νεαρό κορίτσι, η Amy Bellafonte επιλέγεται ως το ιδανικό αντικείμενο του πειράματος, για να δοκιμαστεί απέναντι στον ιό, ο ομοσπονδιακός πράκτορας Brad Wolgast είναι εκείνος που καλείται να την παραδώσει στο Project NOAH." },

  { id: 112, title: "Sunny", year: 2024, country: "United States", genre: "Μυστηρίου, Δράμα, Κωμωδία", type: "Series", quality: "HD", rating: 6.5, actors: "Rashida Jones, Hidetoshi Nishijima, Joanna Sotomura (φωνή), Judy Ongg, YOU", director: "Lucy Tcherniak, Dearbhla Walsh, Colin Bucksey, Makoto Nagahisa", poster: "000112.jpg", link: "https://terabox.com/s/1o6iMgrrDMjZvUNNF3-1TUg", imdb: "https://www.imdb.com/title/tt15573420/", tmdb: "https://www.themoviedb.org/tv/157226", tagline: "Εσύ είσαι η πρώτη της ανάμνηση.", desc: "Η ζωή μιας Αμερικανίδας που ζει στο Κιότο της Ιαπωνίας ανατρέπεται όταν ο σύζυγος κι ο γιος της εξαφανίζονται σε ένα μυστηριώδες αεροπορικό ατύχημα. Για παρηγοριά, της δίνουν τη Σάνι, ένα από τα οικιακά ρομπότ που φτιάχνει η εταιρεία ηλεκτρονικών του συζύγου της." },
  { id: 113, title: "House", year: 2004, country: "United States", genre: "Δράμα, Μυστηρίου, Κωμωδία", type: "Series", quality: "HD", rating: 8.7, actors: "Hugh Laurie, Robert Sean Leonard, Omar Epps, Jesse Spencer, Lisa Edelstein", director: "Greg Yaitanes, Deran Sarafian, David Straiton, Daniel Attias, Daniel Sackheim", poster: "000113.jpg", link: "https://terabox.com/s/1UMOrjOoC4QIp5TYVZ9n5tA", imdb: "https://www.imdb.com/title/tt0412142/", tmdb: "https://www.themoviedb.org/tv/1408", tagline: "Η ιδιοφυΐα έχει παρενέργειες.", desc: "Η σειρά εξελίσσεται γύρω από ένα νοσοκομείο και τις καθημερινές ιατρικές περιπέτειες ενός γιατρού – διαγνωστολόγου διάνοια, και του ιατρικού του team. Ο τύπος είναι πανέξυπνος, οξυδερκής, ευρηματικότατος, ετοιμόλογος αλλά και κυνικός, αδίστακτος, τελείως έξω από τα συμβατικά όρια. Ο τρόπος που είναι αφοσιωμένος στη δουλειά του και η μοναδική του ικανότητα είναι τα μοναδικά πράγματα τα οποία τον κάνουν να ξεχωρίζει. Ικανότητες συνύπαρξης μηδέν. Παράλο αυτά δύσκολα κάποιος του κρατάει κακία." },
  { id: 114, title: "Shōgun", year: 2024, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.6, actors: "Hiroyuki Sanada, Cosmo Jarvis, Anna Sawai, Tadanobu Asano, Takehiro Hira", director: "Fred Toye, Jonathan van Tulleken, Hiromi Kamata, Takeshi Fukunaga, Charlotte Brändström", poster: "000114.jpg", link: "https://terabox.com/s/1Ie4rZU9QIqyXFua54G1tkw", imdb: "https://www.imdb.com/title/tt2788316/", tmdb: "https://www.themoviedb.org/tv/126308", tagline: "An epic saga of war, passion, and power set in Feudal Japan.", desc: "Στην Ιαπωνία του 1600, ο λόρδος Γιόσι Τoranάγκα παλεύει για τη ζωή του καθώς οι εχθροί του στο Συμβούλιο των Αντιβασιλέων συσπειρώνονται εναντίον του, όταν ένα μυστηριώδες ευρωπαϊκό πλοίο εντοπίζεται εγκαταλελειμμένο σε ένα διπλανό ψαροχώρι." },
  { id: 115, title: "The Day of the Jackal", year: 2024, country: "United Kingdom", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 8.1, actors: "Eddie Redmayne, Lashana Lynch, Eleanor Matsuura, Chukwudi Iwuji, Úrsula Corberó", director: "Brian Kirk, Paul Wilmshurst, Anthony Philipson, Anu Menon", poster: "000115.jpg", link: "https://1024terabox.com/s/1i3userBBYaj5UonSjJwETQ", imdb: "https://www.imdb.com/title/tt24053860/", tmdb: "https://www.themoviedb.org/tv/222766", tagline: "The hunter. Hunted.", desc: "Ένας επίλεκτος ελεύθερος σκοπευτής, άριστος στις μεταμφιέσεις και άρτια εκπαιδευμένος δολοφόνος, το Τσακάλι, είναι ένας εκτελεστής, που εκτελεί ψυχρά χτυπήματα έναντι αμοιβής. Μετά από μια επίθεση σε έναν υψηλόβαθμο και διαβόητο πολιτικό, στο Τσακάλι προσφέρεται η πιο ριψοκίνδυνη δουλειά του, μια δουλειά που θα μπορούσε να τον πληρώσει αρκετά ώστε να αφήσει οριστικά αυτή τη ζωή. Ωστόσο η δουλειά του έχει τραβήξει την προσοχή της Μπιάγκα, μιας επίμονης Βρετανίδας αξιωματικού των μυστικών υπηρεσιών ΜΙ6, της οποίας η παγκόσμιας κλάσης πείρα στα πυροβόλα όπλα την καθιστά ιδανική υποψήφια για να τον κυνηγήσει." },

  { id: 120, title: "Project Blue Book", year: 2019, country: "United States", genre: "Μυστηρίου, Δράμα", type: "Series", quality: "HD", rating: 7.6, actors: "Aidan Gillen, Michael Malarkey, Laura Mennell, Ksenia Solo, Neal McDonough", director: "Norma Bailey, John Scott, Loni Peristere, Pete Travis, Alex Graves", poster: "000120.jpg", link: "https://terabox.com/s/1iYAFavbox7DfC1_QsDLIZQ", imdb: "https://www.imdb.com/title/tt6647888/", tmdb: "https://www.themoviedb.org/tv/79649", tagline: "Where the conspiracy began.", desc: "Η σειρά Πρόγραμμα Blue Book βασίζεται στις πραγματικές, άκρως απόρρητες έρευνες σχετικά με τα μη αναγνωρισμένα πτητικά αντικείμενα (UFOs) και συναφή φαινόμενα που διεξήγαγε η Πολεμική Αεροπορία των Ηνωμένων Πολιτειών από το 1952 έως το 1969. Συνδυάζει θεωρίες UFO με αυθεντικά ιστορικά γεγονότα από μια από τις πιο μυστηριώδεις εποχές στην ιστορία των Ηνωμένων Πολιτειών." },
  { id: 121, title: "Rabbit Hole", year: 2023, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 7.4, actors: "Kiefer Sutherland, Meta Golding, Enid Graham, Rob Yang, Walt Klink", director: "John Requa, Glenn Ficarra, Batan Silva, Jon Cassar, Gwyneth Horder-Payton", poster: "000121.jpg", link: "https://terabox.com/s/1N0gFJ5eUMGSHRg_kks2JtA", imdb: "https://www.imdb.com/title/tt16418642/", tmdb: "https://www.themoviedb.org/tv/156819", tagline: "Deception is reality.", desc: "Η σειρά ακολουθεί τον John Weir (Sutherland), έναν μέτρο της εξαπάτησης στον κόσμο της εταιρικής κατασκοπείας. Ωστόσο ο Weir θα παγιδευτεί για έναν φόνο που δε διέπραξε, από ισχυρές δυνάμεις, με την ικανότητα να επηρεάζουν και να ελέγχουν πληθυσμούς, τώρα θα πρέπει να χρησιμοποιήσει όλα τα μέσα που έχει στη διάθεσή του..." },
