        [data-theme="light"] {

        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }
        header { padding: 15px 5%; background: var(--card); position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); }
        .logo { color: var(--primary); font-weight: 800; font-size: 24px; letter-spacing: 1px; }
        .theme-btn { background: var(--primary); color: white; border: none; padding: 6px 15px; border-radius: 20px; cursor: pointer; font-size: 11px; font-weight: bold; }
        #movieCount { font-size: 11px; background: var(--input-bg); padding: 5px 12px; border-radius: 15px; border: 1px solid var(--border); color: #888; }
        .header-controls {
    display: flex;
    align-items: center;
    gap: 20px; /* Δίνει αέρα ανάμεσα στα στοιχεία */
}


        .search-section { padding: 30px 5% 10px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        #movieSearch { width: 100%; max-width: 600px; padding: 15px 25px; border-radius: 30px; border: 2px solid var(--border); background: var(--input-bg); color: var(--text); outline: none; font-size: 16px; transition: 0.3s; }
        #movieSearch:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(229, 9, 20, 0.3); }

        .filter-group { 
    display: flex; 
    gap: 10px; 
    flex-wrap: wrap; 
    justify-content: center; /* Κεντράρει τα κουμπιά και τα dropdowns */
    align-items: center;
}

		
        select { padding: 8px 15px; border-radius: 20px; background: var(--card); color: var(--text); border: 1px solid var(--border); cursor: pointer; font-size: 12px; outline: none; }
		/* Κρύβουμε το hamburger στο desktop */
.hamburger {
    display: none;
    font-size: 28px;
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
}

/* Ρυθμίσεις για κινητά */
@media (max-width: 768px) {
    .hamburger { display: block; }

    .search-section {
        display: none; /* Αρχικά κρυφό στο κινητό */
        flex-direction: column;
        width: 100%;
    }

    /* Όταν είναι ενεργό, το εμφανίζουμε */
    .search-section.active {
        display: flex;
    }
}

     @media (max-width: 600px) {
    .filter-group select { flex: 1; min-width: 120px; }
}

        .categories { display: flex; justify-content: center; gap: 10px; padding: 10px 5% 30px; flex-wrap: wrap; align-items: center; }
        .cat-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 18px; border-radius: 20px; cursor: pointer; font-size: 12px; transition: 0.3s; outline: none; }
        .cat-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .movie-grid { 
    display: grid !important; 
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)) !important; 
    gap: 20px; 
    padding: 20px; 
    width: 100%;
    box-sizing: border-box; /* Πολύ σημαντικό για να μην ξεχειλίζει */
}







        .movie-card { 
    background: var(--card); 
    border-radius: 12px; 
    overflow: hidden; 
    border: 1px solid var(--border); 
    transition: 0.3s ease; 
    cursor: pointer; 
    width: 100%; /* Πιάνει όσο χώρο του δίνει το grid */
    margin: 0 auto; /* Κεντράρει την κάρτα στη στήλη της */
}


}

        .movie-card:hover { transform: translateY(-8px); border-color: var(--primary); }
        
        .img-container { position: relative; overflow: hidden; aspect-ratio: 2/3; background: #1a1a1a; }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; }
        .quality-tag { position: absolute; top: 10px; left: 10px; color: white; font-size: 9px; font-weight: bold; padding: 3px 6px; border-radius: 4px; z-index: 11; background: #2ecc71; }

        .info { padding: 15px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .info h3 { font-size: 13px; margin: 0 0 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); font-weight: 700; }
        .stars { color: var(--gold); font-size: 10px; margin-bottom: 10px; }
        .play-btn { background: var(--primary); color: white; text-decoration: none; padding: 8px; border-radius: 8px; font-size: 11px; font-weight: bold; display: block; text-align: center; }

    .modal-info { width: 100%; padding: 20px; flex-grow: 1; }

.modal-box { 
    background: var(--card); 
    width: 90%; 
    max-width: 900px; 
    display: flex; 
    position: relative; 
    border-radius: 15px; 
    overflow: hidden;

    // --- ΛΟΓΙΚΗ ΕΦΑΡΜΟΓΗΣ ---
    let currentCat = "All";
    let currentType = "All";
    let filteredMovies = [];
    let currentPage = 1;
    const itemsPerPage = 40;

    function toggleMenu() {
    const searchSection = document.querySelector('.search-section');
    searchSection.classList.toggle('active');
}


    function setupFilters() {
        const yearSelect = document.getElementById('yearFilter');
        const countrySelect = document.getElementById('countryFilter');
        const years = [...new Set(moviesData.map(m => m.year))].sort((a, b) => b - a);
        const countries = [...new Set(moviesData.map(m => m.country))].sort();
        years.forEach(y => yearSelect.add(new Option(y, y)));
        countries.forEach(c => countrySelect.add(new Option(c, c)));
    }

    function renderMovies(append = false) {
        const grid = document.getElementById('movieGrid');
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageItems = filteredMovies.slice(start, end);

                        const html = pageItems.map(m => `
<div class="movie-card" onclick="openDetails('${m.title.replace(/'/g, "\\'")}')">
    <div class="img-container">
        <div class="quality-tag">HD</div>
        <img src="posters/${m.poster}" loading="lazy" onerror="this.src='https://placehold.co{encodeURIComponent(m.title)}'">
    </div>
    <div class="info">
        <div class="stars">${'★'.repeat(m.rating || 5)}${'☆'.repeat(5 - (m.rating || 5))}</div>


        <span class="play-btn">ΠΛΗΡΟΦΟΡΙΕΣ</span>
    </div>
</div>`).join('');



        if (append) grid.innerHTML += html;
        else grid.innerHTML = html;

        document.getElementById('loadMoreBtn').style.display = end < filteredMovies.length ? 'block' : 'none';
        document.getElementById('movieCount').innerText = `Σύνολο: ${filteredMovies.length}`;
    }

    function applyFilters() {
        const text = document.getElementById('movieSearch').value.toLowerCase();
        const sortBy = document.getElementById('sortSelect').value;
        const yearVal = document.getElementById('yearFilter').value;
        const countryVal = document.getElementById('countryFilter').value;

        filteredMovies = moviesData.filter(m => {
            const matchText = m.title.toLowerCase().includes(text) || (m.actors && m.actors.toLowerCase().includes(text));
            const matchCat = currentCat === "All" || (m.genre && m.genre.includes(currentCat));
            const matchType = currentType === "All" || m.type === currentType;
            const matchYear = yearVal === "All" || m.year.toString() === yearVal;
            const matchCountry = countryVal === "All" || m.country === countryVal;
            return matchText && matchCat && matchType && matchYear && matchCountry;
        });

        if (sortBy === "title") filteredMovies.sort((a, b) => a.title.localeCompare(b.title, 'el'));
        else if (sortBy === "yearDesc") filteredMovies.sort((a, b) => b.year - a.year);
        else if (sortBy === "rating") filteredMovies.sort((a, b) => (b.rating || 0) - (a.rating || 0));

        currentPage = 1;
        renderMovies();
    }

    function loadNextPage() { currentPage++; renderMovies(true); }

    function handleType(type, btn) {
        currentType = type;
        btn.parentNode.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilters();
    }

    function handleCategory(cat, btn) {
        currentCat = cat;
        btn.parentNode.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilters();
    }

        function openDetails(title) {
        const m = moviesData.find(movie => movie.title === title);
        if(!m) return;

        // Βασικά στοιχεία
        document.getElementById('modalTitle').innerText = m.title;
        document.getElementById('modalImg').src = "posters/" + m.poster;
        document.getElementById('modalMeta').innerText = `${m.year} • ${m.country} • ${m.genre}`;
        document.getElementById('modalStars').innerText = '★'.repeat(m.rating || 5) + '☆'.repeat(5 - (m.rating || 5));





        document.getElementById('modalActors').innerText = m.actors || "";

        // ΟΙ 3 ΝΕΕΣ ΓΡΑΜΜΕΣ ΠΟΥ ΖΗΤΗΣΕΣ:
        document.getElementById('modalDirector').innerText = m.director || "Δεν αναφέρεται";
		document.getElementById('modalWriter').innerText = m.writer || "Δεν αναφέρεται";
        document.getElementById('modalStudio').innerText = m.studio || "Δεν αναφέρεται";
        document.getElementById('modalLink').href = m.link && m.link !== "ΕΔΩ_ΤΟ_LINK" ? m.link : "#";

        // Περιγραφή
        document.getElementById('modalDesc').innerText = m.desc || "Δεν υπάρχει διαθέσιμη περιγραφή.";
        
        // Εμφάνιση Modal
        document.getElementById('detailModal').style.display = "flex";
    }

    function closeDetails() {
        document.getElementById('detailModal').style.display = "none";
    }

    // Κλείσιμο modal με κλικ έξω από αυτό
    window.onclick = function(event) {
        const modal = document.getElementById('detailModal');
        if (event.target == modal) {
            closeDetails();
        }
    }

    // Αρχικοποίηση φίλτρων και εμφάνιση ταινιών
	    function generateCategoryButtons() {
        const container = document.getElementById('dynamicCategories');
        if (!container) return;
        
        let categories = new Set();
        moviesData.forEach(m => {
            if (m.genre) {
                // Χωρίζουμε τις κατηγορίες αν είναι πολλές (π.χ. Δράμα, Western)
                m.genre.split(',').forEach(g => categories.add(g.trim()));
            }
        });

        const sortedCats = Array.from(categories).sort();
        let html = `<button class="cat-btn active" onclick="handleCategory('All', this)">Όλα</button>`;

        sortedCats.forEach(cat => {
            html += `<button class="cat-btn" onclick="handleCategory('${cat}', this)">${cat}</button>`;
        });

        container.innerHTML = html;
    }

    setupFilters();
	generateCategoryButtons();
    applyFilters();
	
</script>
