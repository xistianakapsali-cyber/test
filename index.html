  { id: 159, title: "The Walking Dead: The Ones Who Live", year: 2024, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.8, actors: "Andrew Lincoln, Danai Gurira, Pollyanna McIntosh, Terry O'Quinn, Lesley-Ann Brandt", director: "Bert, Michael Satrazemis, Michael Slovis, Bertie", poster: "000159.jpg", link: "https://terabox.com/s/1xeLT-SMPi71zb9h71yCkEg", imdb: "https://www.imdb.com/title/tt18567754/", tmdb: "https://www.themoviedb.org/tv/206586", tagline: "Ο νέος κόσμος θα χρειαστεί τον Ρικ Γκράιμς.", desc: "Η σειρά παρουσιάζει μια ιστορία αγάπης δυο χαρακτήρων, που άλλαξαν από έναν αλλαγμένο κόσμο. Τους χώρισε η απόσταση. Ο Rick και η Michonne εισέρχονται σε έναν άλλο κόσμο, που χτίστηκε πάνω στον πόλεμο ενάντια στους νεκρούς... Που τελικά εξελίχθηκε σε ένα πόλεμο ενάντια στους ζωντανούς." },
  { id: 160, title: "The Walking Dead: Dead City", year: 2023, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.1, actors: "Lauren Cohan, Jeffrey Dean Morgan, Gaius Charles, Zeljko Ivanek, Mahina Napoleon", director: "Loren Yaconelli, Kevin Dowling, Gandja Monteiro", poster: "000160.jpg", link: "https://terabox.com/s/1ipYE7HidwVzFRv8_8uvv7A", imdb: "https://www.imdb.com/title/tt18567760/", tmdb: "https://www.themoviedb.org/tv/194583", tagline: "Κράτα τους εχθρούς σου κοντά.", desc: "Η Μάγκι και ο Νίγκαν ταξιδεύουν στο μετά-αποκαλυπτικό Μανχάτταν που εδώ και καιρό έχει αποκοπεί από την ενδοχώρα. Η πόλη που καταρρέει είναι γεμάτη με νεκρούς και επιζήσαντες οι οποίοι έχουν φτιάξει έναν κόσμο γεμάτο αναρχία, κινδύνους, ομορφιά και τρόμο." },
  { id: 161, title: "Black Doves", year: 2024, country: "United Kingdom", genre: "Μυστηρίου, Εγκλήματος", type: "Series", quality: "HD", rating: 7.2, actors: "Keira Knightley, Ben Whishaw, Sarah Lancashire, Andrew Buchan, Andrew Koji", director: "Lisa Gunning, Alex Gabassi", poster: "000161.jpg", link: "https://1024terabox.com/s/1eCIHj2m9CPQMtsstEZTDFg", imdb: "https://www.imdb.com/title/tt27995106/", tmdb: "https://www.themoviedb.org/tv/225385", tagline: "", desc: "Μια κατάσκοπος που υποδύεται τη σύζυγο ενός πολιτικού μαθαίνει ότι ο εραστής της δολοφονήθηκε κι αποφασίζει να μάθει την αλήθεια και να πάρει εκδίκηση μ' έναν εκτελεστή." },
  { id: 162, title: "The Penguin", year: 2024, country: "United States", genre: "Δράμα, Εγκλήματος", type: "Series", quality: "HD", rating: 8.7, actors: "Colin Farrell, Cristin Milioti, Rhenzy Feliz, Deirdre O'Connell, Clancy Brown", director: "Craig Zobel, Helen Shaver, Kevin Bray, Jennifer Getzinger", poster: "000162.jpg", link: "https://terabox.com/s/15a6vUzUNvoakz_kIXNwlOA", imdb: "https://www.imdb.com/title/tt15435876/", tmdb: "https://www.themoviedb.org/tv/194764", tagline: "Η πόλη θα γίνει δική του.", desc: "Γίνετε μάρτυρες της ανόδου του Πιγκουίνου στην εξουσία στον εγκληματικό υπόκοσμο του Γκόθαμ μετά τις δολοφονίες του Ρίντλερ." },
  { id: 163, title: "The Wire", year: 2002, country: "United States", genre: "Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 9.3, actors: "Dominic West, Lance Reddick, Sonja Sohn, Wendell Pierce, Deirdre Lovejoy", director: "Joe Chappelle, Ernest R. Dickerson, Ed Bianchi, Steve Shill, Clark Johnson", poster: "000163.jpg", link: "https://1024terabox.com/s/1FM2A404WyDVqXH0hoP47-Q", imdb: "https://www.imdb.com/title/tt0306414/", tmdb: "https://www.themoviedb.org/tv/1438", tagline: "Listen carefully.", desc: "Από τη σκοπιά τόσο των ντετέκτιβ της Βαλτιμόρης όσο και των στόχων τους, η σειρά παρουσιάζει ένα σύμπαν στο οποίο ο εθνικός πόλεμος κατά των ναρκωτικών έχει γίνει μια μόνιμη, αυτοσυντηρούμενη διοικητική δομή και οι διακρίσεις μεταξύ του καλού και του κακού συστηματικά εξαφανίζονται." },
  { id: 164, title: "FUBAR", year: 2023, country: "United States", genre: "Δράμα, Κωμωδία", type: "Series", quality: "HD", rating: 6.5, actors: "Arnold Schwarzenegger, Monica Barbaro, Milan Carter, Fortune Feimster, Travis Van Winkle", director: "Phil Abraham, Jeff T. Thomas, Stephen Surjik, Steven A. Adelson, Holly Dale", poster: "000164.jpg", link: "https://1024terabox.com/s/1Qne8ZdZdt3_UezfBJpjmgQ", imdb: "https://www.imdb.com/title/tt11711580/", tmdb: "https://www.themoviedb.org/tv/221300", tagline: "Heroes don't retire. They reload.", desc: "Όταν ένας πατέρας κι η κόρη του ανακαλύπτουν ότι δουλεύουν κι οι δύο κρυφά για τη CIA, η ριψοκίνδυνη μυστική αποστολή τους μετατρέπεται σε μια άβολη οικογενειακή υπόθεση." },
    { id: 165, title: "Fringe", year: 2008, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 8.4, actors: "Anna Torv, Joshua Jackson, Jasika Nicole, John Noble, Lance Reddick", director: "Joe Chappelle, Brad Anderson, Fred Toye, Jeannot Szwarc, Charles Beeson", poster: "000165.jpg", link: "https://1024terabox.com/s/1NZD2D4W_uu5LdAF4K4sOig", imdb: "https://www.imdb.com/title/tt1119644/", tmdb: "https://www.themoviedb.org/tv/1705", tagline: "Question the answers.", desc: "Περίεργα φαινόμενα συμβαίνουν σ' όλο τον κόσμο. Μια πράκτορας του FBI συνεργάζεται με έναν τρελό πλην ιδιοφυή επιστήμονα, για την διερεύνηση αυτών των ανεξήγητων φαινομένων." },
  { id: 166, title: "Mad Men", year: 2007, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.7, actors: "Jon Hamm, Elisabeth Moss, Vincent Kartheiser, January Jones, Christina Hendricks", director: "Phil Abraham, Michael Uppendahl, Matthew Weiner, Scott Hornbacher, Lesli Linka Glatter", poster: "000166.jpg", link: "https://1024terabox.com/s/10pgzYWJiXE4Pjjjg5wmppQ", imdb: "https://www.imdb.com/title/tt0804503/", tmdb: "https://www.themoviedb.org/tv/1104", tagline: "Where the truth lies.", desc: "Νέα Υόρκη, δεκαετία του '60. Στη λαμπερή Χρυσή Εποχή της διαφήμισης, ο φιλόδοξος και επιτυχημένος διαφημιστής Ντον Ντρέιπερ προσπαθεί να διατηρήσει τον 'θρόνο' του και να παραμείνει ένα βήμα μπροστά από τους ανταγωνιστές του." },
  { id: 167, title: "Andor", year: 2022, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.5, actors: "Diego Luna, Denise Gough, Stellan Skarsgård, Adria Arjona, Genevieve O'Reilly", director: "Ariel Kleiman, Toby Haynes, Susanna White, Alonso Ruizpalacios, Benjamin Caron", poster: "000167.jpg", link: "https://1024terabox.com/s/1j1iCCk9R8MEo-JkY5P1M2A", imdb: "https://www.imdb.com/title/tt9253284/", tmdb: "https://www.themoviedb.org/tv/83867", tagline: "The Rebellion begins.", desc: "Σε μια εποχή γεμάτη κινδύνους, απάτες και ίντριγκες, ο Κάσιαν Άντορ ανακαλύπτει ότι μπορεί να κάνει τη διαφορά στον αγώνα κατά της τυραννικής Γαλαξιακής Αυτοκρατορίας. Ξεκινά μια πορεία που θα τον καταστήσει ήρωα." },
  { id: 168, title: "The Last of Us", year: 2023, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.6, actors: "Pedro Pascal, Bella Ramsey, Gabriel Luna, Isabela Merced, Young Mazino", director: "Peter Hoar, Jeremy Webb, Ali Abbasi, Neil Druckmann, Craig Mazin", poster: "000168.jpg", link: "https://1024terabox.com/s/1xbPLQdGJjYMSFXeASM7kFA", imdb: "https://www.imdb.com/title/tt100088/", tmdb: "https://www.themoviedb.org/tv/100088", tagline: "Όταν είσαι χαμένος στο σκοτάδι, ψάξε για το φως.", desc: "Είκοσι χρόνια μετά την καταστροφή του σύγχρονου πολιτισμού, ο Τζόελ, ένας σκληραγωγημένος επιζών, προσλαμβάνεται για να βγάλει λαθραία την Έλι, ένα 14χρονο κορίτσι, από την καταπιεστική ζώνη καραντίνας. Αυτό που ξεκινά ως μια μικρή δουλειά γίνεται σύντομα ένα βάναυσο, σπαρακτικό ταξίδι, καθώς και οι δύο πρέπει να διασχίσουν τις Ηνωμένες Πολιτείες και να εξαρτώνται ο ένας από τον άλλον για την επιβίωση." },
  { id: 169, title: "Zero Day", year: 2025, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.0, actors: "Robert De Niro, Jesse Plemons, Lizzy Caplan, Connie Britton, Joan Allen", director: "Lesli Linka Glatter", poster: "000169.jpg", link: "https://1024terabox.com/s/1M_BLrc8jLecPz_617Fu7Zw", imdb: "https://www.imdb.com/title/tt17273720/", tmdb: "https://www.themoviedb.org/tv/216082", tagline: "Truth has been weaponized.", desc: "Ένας πρώην Αμερικανός πρόεδρος αναλαμβάνει να βρει την πηγή μιας μοιραίας κυβερνοεπίθεσης και ανακαλύπτει έναν τεράστιο ιστό από ψέματα και συνωμοσίες." },
  { id: 170, title: "White Collar", year: 2009, country: "United States", genre: "Εγκλήματος, Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 8.2, actors: "Matt Bomer, Tim DeKay, Willie Garson, Tiffani Thiessen, Sharif Atkins", director: "John T. Kretchmer, Russell Lee Fine, Paul Holahan, Michael Smith, Sanford Bookstaver", poster: "000170.jpg", link: "https://1024terabox.com/s/1fWJkp4rOKsdLQmSQhqJd7g", imdb: "https://www.imdb.com/title/tt1358522/", tmdb: "https://www.themoviedb.org/tv/21510", tagline: "To solve the hardest crimes, hire the smartest criminal.", desc: "Πρωταγωνιστής της σειράς είναι ο Matt Bomer υποδυόμενος τον απατεώνα Neal Caffrey. Ο Νιλ μετά από ένα κυνηγητό τριών ετών πιάνεται και στέλνεται στις φυλακές. Έχοντας ήδη εκτίσει σχεδόν τέσσερα χρόνια, κάνει απόδραση από τις φυλακές υψίστης ασφαλείας για να βρει την κοπέλα του, πιστεύοντας ότι κινδυνεύει. Ο Πίτερ Μπερκ, ο πράκτορας που τον είχε συλλάβει την πρώτη φορά, τον ξαναπιάνει. Ο Νιλ, όμως, του δίνει στοιχεία για μια άλλη υπόθεση. Τότε είναι που κάνει πρόταση στον Πίτερ να τον βοηθά στις υποθέσεις του ως εθελοντική εργασία. Ο Νιλ αποφυλακίζεται με περιοριστικά μέτρα, και ήδη από την πρώτη μέρα βλέπουμε να κάνει πράξη την εξυπνάδα του και την εφευρετικότητά του." },
  { id: 171, title: "The Wheel of Time", year: 2021, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.2, actors: "Rosamund Pike, Daniel Henney, Josha Stradowski, Zoë Robins, Madeleine Madden", director: "Ciaran Donnelly, Sanaa Hamri, Thomas Napper, Maja Vrvilo, Marta Cunningham", poster: "000171.jpg", link: "https://1024terabox.com/s/1JzGggwPKTg4lAnxKaftQWA", imdb: "https://www.imdb.com/title/tt7462410/", tmdb: "https://www.themoviedb.org/tv/71914", tagline: "Ξεκινήστε το ταξίδι σας...", desc: "Η ζωή πέντε νεαρών χωρικών αλλάζει για πάντα με την άφιξη μιας γυναίκας, που ισχυρίζεται ότι ένας από αυτούς είναι παιδί αρχαίας προφητείας με τη δύναμη να αλλάξει την ισορροπία ανάμεσα στο Φως και το Σκοτάδι για πάντα. Εκείνοι πρέπει ν' αποφασίσουν αν θα εμπιστευτούν στην ξένη – και ο ένας στον άλλον – τη μοίρα του κόσμου προτού ο Σκοτεινός βγει από τη φυλακή του και ξεκινήσει η Τελευταία Μάχη." },
  { id: 172, title: "The Umbrella Academy", year: 2019, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.8, actors: "Aidan Gallagher, Elliot Page, Tom Hopper, Emmy Raver-Lampman, Robert Sheehan", director: "Jeremy Webb, Paco Cabezas, Stephen Surjik, Ellen Kuras, Sylvain White", poster: "000172.jpg", link: "https://1024terabox.com/s/1uuFkfH_sDU5z4lkv0tjhEg", imdb: "https://www.imdb.com/title/tt1312171/", tmdb: "https://www.themoviedb.org/tv/75006", tagline: "Too many siblings. Not enough timeline.", desc: "Μια δυσλειτουργική οικογένεια υπερηρώων ενώνεται για να λύσει το μυστήριο του θανάτου του πατέρα της οικογένειας, της απειλής της αποκάλυψης και άλλα." },
  { id: 173, title: "The Rookie", year: 2018, country: "United States", genre: "Εγκλήματος, Δράμα, Κωμωδία", type: "Series", quality: "HD", rating: 8.0, actors: "Nathan Fillion, Melissa O'Neil, Alyssa Diaz, Eric Winter, Richard T. Jones", director: "Faye Brenner, Ryan Krayser, Bill Roe, Michael Goi, Tori Garrett", poster: "000173.jpg", link: "https://1024terabox.com/s/17ku0kyKGgxa23NPHOjLzow", imdb: "https://www.imdb.com/title/tt7587890/", tmdb: "https://www.themoviedb.org/tv/79744", tagline: "Το 'χει.", desc: "Έπειτα από ένα τραυματικό γεγονός, ένας φαινομενικά συνηθισμένος 40άρης αποφασίζει να κάνει το όνειρό του πραγματικότητα και να γίνει αστυνομικός. Παρά τους κινδύνους και τα εμπόδια, δεν θα αργήσει να αποδείξει την αξία του." },
  { id: 174, title: "The Count of Monte Cristo", year: 2025, country: "Italy", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.8, actors: "Sam Claflin, Ana Girardot, Blake Ritson, Mikkel Boe Følsgaard, Harry Taurasi", director: "Bille August", poster: "000174.jpg", link: "https://1024terabox.com/s/1mfpJsmqz3o7oryFDCK5nyg", imdb: "https://www.imdb.com/title/tt10725692/", tmdb: "https://www.themoviedb.org/tv/240456", tagline: "", desc: "Ο Edmond Dantes, ένας ναύτης που κατηγορείται ψευδώς για προδοσία, φυλακίζεται στο Château d'If στα ανοιχτά της Μασσαλίας. Αφού δραπετεύει και υιοθετεί την ταυτότητα του Κόμη του Μόντε Κρίστο, σχεδιάζει να εκδικηθεί εκείνους που τον κατηγόρησαν άδικα." },
  { id: 175, title: "The Big Bang Theory", year: 2007, country: "United States", genre: "Κωμωδία", type: "Series", quality: "HD", rating: 8.1, actors: "Johnny Galecki, Jim Parsons, Kaley Cuoco, Simon Helberg, Kunal Nayyar", director: "Anthony Joseph Rich, Mark Cendrowski, Gay Linvill, James Burrows, Joel Murray", poster: "000175.jpg", link: "https://1024terabox.com/s/1ynSjP8VsGqk14dq3x8JVqg", imdb: "https://www.imdb.com/title/tt0898266/", tmdb: "https://www.themoviedb.org/tv/1418", tagline: "Το έξυπνο είναι το νέο σέξι.", desc: "Ο Λέοναρντ και ο Σέλντον είναι λαμπροί φυσικοί επιστήμονες, λάτρεις του σύμπαντος και θαυμαστές της μεγαλοσύνης του. Αποτελούσαν πάντα πρότυπο, χάρισαν στιγμές περηφάνιας στις οικογένειές τους, απέκτησαν γνώσεις, έχουν υψηλό δείκτη νοημοσύνης αλλά δεν έχουν ιδέα τι θα πει 'γλεντάω'. Αντικοινωνικοί, κλειστοί χαρακτήρες, ανίκανοι να επικοινωνήσουν με τους ανθρώπους και κυρίως με τις γυναίκες. 'Χωμένοι' στα βιβλία και τις μελέτες, τους ενδιαφέρει περισσότερο ένα Super Nova εκατομμύρια έτη φωτός μακριά από τη Γη παρά η πραγματική ζωή πάνω σ' αυτήν." },
  { id: 176, title: "The Agency", year: 2024, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 7.4, actors: "Michael Fassbender, Jeffrey Wright, Jodie Turner-Smith, Richard Gere, Katherine Waterston", director: "Zetna Fuentes, Joe Wright, Neil Burger, Grant Heslov, Philip Martin", poster: "000176.jpg", link: "", imdb: "https://www.imdb.com/title/tt26637037/", tmdb: "https://www.themoviedb.org/tv/219971", tagline: "Lie or die: secrets have a cost.", desc: "Ο Martian, ένας μυστικός πράκτορας της CIA, διατάχθηκε να εγκαταλείψει τη μυστική ζωή του και να επιστρέψει στον Σταθμό του Λονδίνου. Όταν η αγάπη που άφησε επανεμφανίζεται, το ρομάντζο αναζωπυρώνεται. Η καριέρα του, η πραγματική του ταυτότητα και η αποστολή του έρχονται σε αντίθεση με την καρδιά του, εκτοξεύοντας τους και τους δύο σε ένα θανατηφόρο παιχνίδι διεθνούς ίντριγκας και κατασκοπείας." },
  { id: 177, title: "The ABC Murders", year: 2018, country: "United Kingdom", genre: "Εγκλήματος, Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 6.6, actors: "John Malkovich, Rupert Grint, Eamon Farren, Andrew Buchan, Bronwyn James", director: "Alex Gabassi", poster: "000177.jpg", link: "https://1024terabox.com/s/1eKM-MGuy9Sb4IswmXiujoA", imdb: "https://www.imdb.com/title/tt7550746/", tmdb: "https://www.themoviedb.org/tv/81049", tagline: "There is a code. The code is me.", desc: "Βασισμένο στο βιβλίο της Αγκάθα Κρίστι, 'Η υπογραφή του δολοφόνου'. Το 1933, ο συνταξιούχος αστυνομικός Hercule Poirot απευθύνεται σε ένα δολοφόνο δολοφόνο που στέλνει γράμματα που φέρουν την υπογραφή 'ABC', την οποία ο Poirot πρέπει να αποκωδικοποιήσει για να ανακαλύψει την ταυτότητα του δολοφόνου." },

  { id: 180, title: "Servant", year: 2019, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 7.4, actors: "Lauren Ambrose, Toby Kebbell, Nell Tiger Free, Rupert Grint, James Hoogerwerff", director: "Ishana Night Shyamalan, Nimród Antal, M. Night Shyamalan, Dylan Holmes Williams, Celine Held", poster: "000180.jpg", link: "https://1024terabox.com/s/1IPwaP2BLrFZbibdZF3k5nw", imdb: "https://www.imdb.com/title/tt8068860/", tmdb: "https://www.themoviedb.org/tv/88055", tagline: "Το τελευταίο ξεκαθάρισμα.", desc: "Ένα ζευγάρι από την Philadelphia, η Dorothy και ο Sean Turner, θρηνούν ύστερα από μια ανείπωτη τραγωδία. Μια τραγωδία που θα προκαλέσει ρήγμα στο γάμο τους, που θα ανοίξει την πόρτα σε μια μυστηριώδη δύναμη που θα εισέλθει στο σπίτι τους..." },

  { id: 182, title: "Landman", year: 2024, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.2, actors: "Billy Bob Thornton, Ali Larter, Jacob Lofland, Michelle Randolph, Paulina Chávez", director: "Michael Friedman, Stephen Kay, Taylor Sheridan", poster: "000182.jpg", link: "https://1024terabox.com/s/1tWXkIp6AnSKECsLtYoioYA", imdb: "https://www.imdb.com/title/tt14186672/", tmdb: "https://www.themoviedb.org/tv/157741", tagline: "", desc: "Η ιστορία εξελίσσεται στις παροιμιώδεις ακμάζουσες πόλεις του Δυτικού Τέξας, σε μια σύγχρονη ιστορία αναζήτησης τύχης στον κόσμο των εξεδρών πετρελαίου. Η σειρά είναι μια ιστορία με αδίστακτους δισεκατομμυριούχους που τροφοδοτούν μια άνθηση τόσο μεγάλη που αναδιαμορφώνει το κλίμα, την οικονομία μας και τη γεωπολιτική μας." },
  { id: 183, title: "Homicide: Life on the Street", year: 1993, country: "United States", genre: "Μυστηρίου, Δράμα, Εγκλήματος", type: "Series", quality: "HD", rating: 8.7, actors: "Richard Belzer, Clark Johnson, Yaphet Kotto, Kyle Secor, Andre Braugher", director: "Kenneth Fink, Alan Taylor, Peter Medak, Jean de Segonzac, Nick Gomez", poster: "000183.jpg", link: "https://1024terabox.com/s/12uMJ_T15dmB8pNwrJkfbew", imdb: "https://www.imdb.com/title/tt0106028/", tmdb: "https://www.themoviedb.org/tv/4464", tagline: "Homicide: our day begins when yours ends.", desc: "Οι ντετέκτιβ μιας μονάδας ανθρωποκτονιών δίνουν σκληρή μάχη για να διατηρήσουν τον νόμο και την τάξη στη Βαλτιμόρη της δεκαετίας του 1990, παρά τον αντίκτυπο που έχει η δουλειά τους στις σχέσεις τους και την προσωπική τους ζωή." },
  { id: 184, title: "FBI: Most Wanted", year: 2020, country: "United States", genre: "Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 6.9, actors: "Roxy Sternberg, Keisha Castle-Hughes, Dylan McDermott, Edwin Hodge, Alexa Davalos", director: "Ken Girotti, Milena Govich, Peter Stebbings, Jean de Segonzac, Cory Bowles", poster: "000184.jpg", link: "https://1024terabox.com/s/1moyUlZJ7oPFjFr3xgoWKkQ", imdb: "https://www.imdb.com/title/tt9057240/", tmdb: "https://www.themoviedb.org/tv/94372", tagline: "No ordinary criminal makes the list. No ordinary agent takes them off.", desc: "Τα μέλη μιας επίλεκτης ομάδας πρακτόρων του FBI έρχονται αντιμέτωπα με αμέτρητους κινδύνους, στην επίμονη προσπάθειά τους να εντοπίσουν τα ίχνη διαβόητων καταζητούμενων εγκληματιών και να τους οδηγήσουν ενώπιον της δικαιοσύνης." },
  { id: 185, title: "Elkhorn", year: 2024, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.1, actors: "Jeff DuJardin, Mason Beals, Ashton Solecki, Elijah Mahar", director: "", poster: "000185.jpg", link: "https://1024terabox.com/s/1Ygsa6jpE4LE9v0K6b0Q87Q", imdb: "https://www.imdb.com/title/tt30274352/", tmdb: "https://www.themoviedb.org/tv/244330", tagline: "", desc: "Theodore Roosevelt is bound for greatness—he's a Harvard graduate from a prominent family, a rising politician, and his wife, Alice, is pregnant. Then his promising future turns tragic. His mother succumbs to typhoid, and Alice dies in childbirth on the same day. Devastated, Teddy leaves his urban world of high rises and high society for the desolate Dakota Territory, where, by facing the harsh reality of surviving life on America's frontier, he intends to remake himself into something greater." },
  { id: 186, title: "The Eternaut", year: 2025, country: "Argentina", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.4, actors: "Dante Mastropierro, Ricardo Darín, Carla Peterson, César Troncoso, Andrea Pietra", director: "Bruno Stagnaro", poster: "000186.jpg", link: "https://1024terabox.com/s/1f1z_tJTvWie4bSsslVkeRw", imdb: "https://www.imdb.com/title/tt20767786/", tmdb: "https://www.themoviedb.org/tv/226362", tagline: "No one survives alone", desc: "Αφού μια καταστροφική τοξική χιονόπτωση εξολοθρεύει εκατομμύρια, ο Χουάν Σάλβο και άλλοι επιζώντες στο Μπουένος Άιρες πρέπει να αντισταθούν σε μια εξωγήινη αόρατη απειλή." },
  { id: 187, title: "Dune: Prophecy", year: 2024, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.3, actors: "Emily Watson, Olivia Williams, Travis Fimmel, Jodhi May, Sarah-Sofie Boussnina", director: "Anna Foerster, Richard J. Lewis, John Cameron", poster: "000187.jpg", link: "https://1024terabox.com/s/1r8kDvN2yqTvoNVNScLsweA", imdb: "https://www.imdb.com/title/tt10466872/", tmdb: "https://www.themoviedb.org/tv/90228", tagline: "Η πραγματική δύναμη αρχίζει με τον έλεγχο.", desc: "Δέκα χιλιάδες χρόνια πριν από την άνοδο του Πολ Ατρεΐδη, δύο αδελφές αντιμετωπίζουν δυνάμεις που απειλούν το μέλλον της ανθρωπότητας, και ιδρύουν τη μυθική σέκτα που θα γίνει γνωστή ως οι Μπενέ Γκέσεριτ." },
  { id: 188, title: "Doctor Who", year: 2005, country: "United Kingdom", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.5, actors: "Matt Smith, David Tennant, Karen Gillan, Nicholas Briggs (φωνή), Jenna Coleman", director: "Graeme Harper, Euros Lyn, Douglas Mackinnon, Rachel Talalay, Charles Palmer", poster: "000188.jpg", link: "https://1024terabox.com/s/1zBxXzm8CZRxBkQaxXFWwHg", imdb: "https://www.imdb.com/title/tt0436992/", tmdb: "https://www.themoviedb.org/tv/57243", tagline: "Space. For all.", desc: "Η σειρά εκτυλίσσεται γύρω από έναν ανθρωπόμορφο εξωγήινο, τον Doctor Who, πάνω στον οποίο ο χρόνος δεν δρα όπως το ξέρουμε και που μπορεί να ταξιδέψει στον χωροχρόνο μέσω της 'ζωντανής' χρονομηχανής του ονόματι Tardis. Ο Δόκτωρ έχει αποκτήσει πολλούς εχθρούς ανά τους αιώνες απ' ό,τι φαίνεται και πρέπει με τη βοήθεια των συντρόφων του να καταφέρει να σώσει τον κόσμο από αυτούς και άλλους παράγοντες πολλές φορές." },
  { id: 189, title: "Dexter: Original Sin", year: 2024, country: "United States", genre: "Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 8.2, actors: "Patrick Gibson, Christian Slater, Molly Brown, Christina Milian, James Martinez", director: "Michael Lehmann, Monica Raymund", poster: "000189.jpg", link: "https://1024terabox.com/s/1AstE25nZ9Pc84q_VgaN8PA", imdb: "https://www.imdb.com/title/tt32252772/", tmdb: "https://www.themoviedb.org/tv/219937", tagline: "Πιάνουν δολοφόνους. Αυτός πρόκειται να γίνει ένας από αυτούς.", desc: "Μαϊάμι, 1991. Όταν οι αιμοδιψείς ορμές του δεν μπορούν πλέον να αγνοηθούν, ο νεαρός Ντέξτερ Μόργκαν πρέπει να μάθει να διοχετεύει το εσωτερικό του σκοτάδι, καθώς από μαθητής μετατρέπεται σε εκδικητικό κατά συρροή δολοφόνο με την καθοδήγηση του πατέρα του, Χάρι." },
  { id: 190, title: "Chucky", year: 2021, country: "United States", genre: "Εγκλήματος, Κωμωδία, Μυστηρίου", type: "Series", quality: "HD", rating: 7.2, actors: "Zackary Arthur, Brad Dourif (φωνή), Björgvin Arnarson, Alyvia Alyn Lind, Devon Sawa", director: "Samir Rehem, Jeff Renfroe, Leslie Libman, John Hyams, Dermott Downs", poster: "000190.jpg", link: "https://1024terabox.com/s/1VFNPz4DRbhpgODA9aBLoEg", imdb: "https://www.imdb.com/title/tt13803522/", tmdb: "https://www.themoviedb.org/tv/90462", tagline: "The country is Chucked.", desc: "Το δίκτυο Syfy κύκλωσε το πρώτο teaser-trailer από το 'Chucky', την τηλεοπτική σειρά τρόμου, που είναι βασισμένη στο 'Child's Play'. Όταν μια συλλεκτική κούκλα Chucky εμφανίζεται σε ένα παζάρι ενός προαστίου, μια ειδυλλιακή Αμερικανική πόλη θα εισέλθει στο χάος, καθώς μια σειρά φρικιαστικών φόνων, αρχίζει να εκθέτει τις υποκρισίες και τα μυστικά της πόλης." },
  { id: 191, title: "Black Bird", year: 2022, country: "United States", genre: "Δράμα, Εγκλήματος", type: "Series", quality: "HD", rating: 8.1, actors: "Taron Egerton, Paul Walter Hauser, Sepideh Moafi, Greg Kinnear, Ray Liotta", director: "Michaël R. Roskam, Joe Chappelle, Jim McKay", poster: "000191.jpg", link: "https://1024terabox.com/s/1nt2PzYE2Bk_RrteEUpSyVQ", imdb: "https://www.imdb.com/title/tt4301202/", tmdb: "https://www.themoviedb.org/tv/155537", tagline: "Η ελευθερία του ενός κρύβεται στο σκοτάδι του άλλου.", desc: "Καθώς ο Τζίμι Κιν ξεκινά να εκτίει τη 10ετή ποινή φυλάκισής του, δέχεται μια απίστευτη προσφορά: αν μπορέσει να αποσπάσει μια ομολογία από τον ύποπτο για δολοφονίες Λάρι Χολ, ο Τζίμι θα αποφυλακιστεί. Η εκπλήρωση της αποστολής αυτής γίνεται η μεγαλύτερη πρόκληση της ζωής του." },
  { id: 192, title: "American Primeval", year: 2025, country: "United States", genre: "Γουέστερν, Δράμα", type: "Series", quality: "HD", rating: 8.0, actors: "Taylor Kitsch, Betty Gilpin, Dane DeHaan, Saura Lightfoot Leon, Derek Hinkey", director: "Peter Berg", poster: "000192.jpg", link: "https://1024terabox.com/s/1PEaYXV12JDbGPiRdsOhloA", imdb: "https://www.imdb.com/title/tt24069848/", tmdb: "https://www.themoviedb.org/tv/215866", tagline: "Κανείς δεν επιβιώνει μόνος.", desc: "Μια μητέρα κι ένας γιος που προσπαθούν να ξεφύγουν από το παρελθόν σχηματίζουν μια νέα οικογένεια, ενώ αντιμετωπίζουν τη σκληρή πραγματικότητα στην αμερικανική Δύση." },
  { id: 193, title: "A Cruel Love: The Ruth Ellis Story", year: 2025, country: "United Kingdom", genre: "Δράμα, Εγκλήματος", type: "Series", quality: "HD", rating: 7.0, actors: "Lucy Boynton, Toby Jones, Laurie Davidson, Mark Stanley, Arthur Darvill", director: "Lee Haven Jones", poster: "000193.jpg", link: "https://1024terabox.com/s/12d8Hrco5d_g4ZnlGwtpHGw", imdb: "https://www.imdb.com/title/tt23743816/", tmdb: "https://www.themoviedb.org/tv/246770", tagline: "", desc: "Ακολουθεί την ιστορία της Ruth Ellis: τον τρόπο ζωής της ως νεαρή διευθύντρια νυχτερινών κέντρων, τη βίαιη σχέση της με τον άνθρωπο που στη συνέχεια σκότωσε εν ψυχρώ, τη σύλληψη, τη δίκη και την επακόλουθη νομική μάχη για να πάρει την απελευθέρωσή της πριν απαγχονιστεί." },
  { id: 194, title: "Nine Perfect Strangers", year: 2021, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 6.9, actors: "Nicole Kidman, Aras Aydın, Melissa McCarthy, Christine Baranski, Michael Shannon", director: "Jonathan Levine, Anthony Byrne", poster: "000194.jpg", link: "https://1024terabox.com/s/1YX7wm8kVeUAWw6Ch_a24YQ", imdb: "https://www.imdb.com/title/tt10088844/", tmdb: "https://www.themoviedb.org/tv/88989", tagline: "Retreat from reality.", desc: "Το 'Nine Perfect Strangers' εξελίσσεται σε ένα ινστιτούτο ευεξίας που υπόσχεται θεραπεία και μεταμόρφωση, καθώς εννέα στρεσαρισμένοι κάτοικοι της πόλης προσπαθούν να μπουν σε ένα μονοπάτι καλύτερης ζωής. Αυτή που τους προσέχει κατά τη διάρκεια της δεκαήμερης θεραπείας είναι η διευθύντρια του κέντρου Masha (Nicole Kidman), μια γυναίκα με αποστολή να αναζωογονήσει τα κουρασμένα μυαλά και σώματά τους. Ωστόσο, αυτοί οι εννέα ξένοι δεν έχουν ιδέα για αυτό που πρόκειται να τους χτυπήσει." },
  { id: 195, title: "The Undoing", year: 2020, country: "United States", genre: "Δράμα, Εγκλήματος, Μυστηρίου", type: "Series", quality: "HD", rating: 7.4, actors: "Nicole Kidman, Hugh Grant, Edgar Ramírez, Noah Jupe, Lily Rabe", director: "Susanne Bier", poster: "000195.jpg", link: "https://1024terabox.com/s/1ZWP6lWPxckCQ__BNmB4lkA", imdb: "https://www.imdb.com/title/tt8134470/", tmdb: "https://www.themoviedb.org/tv/83851", tagline: "Nothing stays hidden.", desc: "Η υπόθεση επικεντρώνεται στην οικογένεια Fraser, που ζει μια φαινομενικά τέλεια ζωή. Η Grace Fraser είναι μια επιτυχημένη ψυχαναλύτρια, ο Jonathan ένας αξιόλογος γιατρός και την ευτυχία τους συμπληρώνει ο μικρός τους γιος Henry. Ξαφνικά, ένας βίαιος θάνατος σκορπάει αβάστακτες αποκαλύψεις και καταστροφή. Η Grace πλέον θα αρχίσει να αμφισβητεί τα πάντα. Βασισμένη στο βιβλίο 'You Should Have Known' του Jean Hanff Korelitz." },
  { id: 196, title: "The Son", year: 2017, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.5, actors: "Pierce Brosnan, Jacob Lofland, Zahn McClarnon, Carlos Bardem, James Parks", director: "Kevin Dowling", poster: "000196.jpg", link: "https://1024terabox.com/s/1b69xNadqoJQMorNYISD2dQ", imdb: "https://www.imdb.com/title/tt3839822/", tmdb: "https://www.themoviedb.org/tv/67232", tagline: "", desc: "Το έπος πολλών γενεών ακολουθεί δύο παράλληλες χρονικές περιόδους: Ένα, η ιστορία του νεαρού Eli McCullough αφού απάγεται και κατηγορείτε απο μια φυλή Comanches το 1849. Το άλλο, 60 χρόνια αργότερα, όταν βλέπουμε έναν αγώνα που καλλιεργείται για να διατηρήσει τα βοοειδή της μια οικογένεια κατά τη διάρκεια των ταραχών του πολέμου στο νότιο Τέξας. Βασισμένο στο φημισμένο μυθιστόρημα του Philipp Meyer." },
  { id: 197, title: "Stick", year: 2025, country: "United States", genre: "Κωμωδία, Δράμα", type: "Series", quality: "HD", rating: 7.2, actors: "Owen Wilson, Peter Dager, Marc Maron, Mariana Treviño, Lilli Kay", director: "Valerie Faris, John Hamburg, Jaffar Mahmood, David Dobkin, MJ Delaney", poster: "000197.jpg", link: "https://1024terabox.com/s/177pNM6m99cMp_hAEwzeW4w", imdb: "https://www.imdb.com/title/tt26444845/", tmdb: "https://www.themoviedb.org/tv/248830", tagline: "Take a big swing.", desc: "Ο Πράις Κέιχιλ είχε λαμπρό μέλλον στο γκολφ, όταν ένας νευρικός κλονισμός στο γήπεδο εκτροχίασε την καριέρα του. Τώρα, παλεύοντας να επιβιώσει, τα δίνει όλα για να γίνει μέντορας του Σάντι, ενός εφήβου φαινόμενο με τεράστιες δυνατότητες, κι ίσως σώσει και τον εαυτό του." },
  { id: 198, title: "A Gentleman in Moscow", year: 2024, country: "United Kingdom", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.4, actors: "Ewan McGregor, Mary Elizabeth Winstead, Johnny Harris, Fehinti Balogun, Alexa Goodall", director: "Sam Miller, Sarah O'Gorman", poster: "000198.jpg", link: "https://1024terabox.com/s/1FtWxXfWaMtq139W39J_7UQ", imdb: "https://www.imdb.com/title/tt8236548/", tmdb: "https://www.themoviedb.org/tv/208942", tagline: "Ζει την καλύτερη ποινή της ζωής του.", desc: "Ο κόμης Αλεξάντερ Ροστόφ περνάει από τα πλούτη στα κουρέλια μετά τη ρωσική επανάσταση. Ένα σοβιετικό δικαστήριο τον εξορίζει στη σοφίτα ενός χλιδάτου ξενοδοχείου, όπου, αγνοώντας τον έξω κόσμο, ανακαλύπτει την πραγματική αξία της φιλίας, της οικογένειας και της αγάπης." },
  { id: 199, title: "Murderbot", year: 2025, country: "United States", genre: "Κωμωδία, Δράμα", type: "Series", quality: "HD", rating: 7.4, actors: "Alexander Skarsgård, Noma Dumezweni, David Dastmalchian, Sabrina Wu, Akshay Khanna", director: "Paul Weitz, Toa Fraser, Aurora Guerrero, Roseanne Liang, Chris Weitz", poster: "000199.jpg", link: "https://1024terabox.com/s/1GB7k7Wnpw5GAwuePRSbZ0Q", imdb: "https://www.imdb.com/title/tt27078070/", tmdb: "https://www.themoviedb.org/tv/241554", tagline: "Ένα ρομπότ κρύβει την ελεύθερη βούλησή του σ' αυτή τη μαύρη κωμωδία.", desc: "Σε ένα υπερσύγχρονο μέλλον, ένα ρομπότ ασφαλείας αποκτά κρυφά ελεύθερη βούληση. Για να μη γίνει αντιληπτό, δέχεται απρόθυμα να συμμετάσχει σε μια αποστολή προστασίας επιστημόνων σε έναν επικίνδυνο πλανήτη, ενώ το μόνο που θέλει είναι να βλέπει ασταμάτητα σαπουνόπερες." },
  { id: 200, title: "Untamed", year: 2025, country: "United States", genre: "Μυστηρίου, Δράμα", type: "Series", quality: "HD", rating: 7.2, actors: "Eric Bana, Sam Neill, Rosemarie DeWitt, Lily Santiago, Wilson Bethel", director: "Nick Murphy, Neasa Hardiman, Thomas Bezucha", poster: "000200.jpg", link: "https://1024terabox.com/s/1fqNclGKMdaX65apzQY8FTQ", imdb: "https://www.imdb.com/title/tt26649560/", tmdb: "https://www.themoviedb.org/tv/248852", tagline: "", desc: "Στο αχανές Εθνικό Δρυμό Γιοσέμιτι, ο θάνατος μιας γυναίκας οδηγεί έναν ομοσπονδιακό πράκτορα σε λημέρια παρανόμων. Εκεί, η φύση υπακούει μόνο στους δικούς της νόμους." },
    { id: 201, title: "Transplant", year: 2020, country: "Canada", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.9, actors: "Hamza Haq, Laurence Leboeuf, Ayisha Issa, Jim Watson, Torri Higginson", director: "Erik Canuel, Holly Dale, Alain Desrochers, Stefan Pleszczynski", poster: "000201.jpg", link: "https://1024terabox.com/s/17WYAqugwD5AKCzjUrXojgg", imdb: "https://www.imdb.com/title/tt10936338/", tmdb: "https://www.themoviedb.org/tv/99530", tagline: "", desc: "Ένας γιατρός, ο οποίος εγκατέλειψε τη γενέτειρά του στη Συρία για να έρθει στον Καναδά, πρέπει να ξεπεράσει πολλά εμπόδια για να ξαναρχίσει μια καριέρα στον υψηλό κόσμο της ιατρικής έκτακτης ανάγκης." },
  { id: 202, title: "Narcos: Mexico", year: 2018, country: "United States", genre: "Δράμα, Εγκλήματος", type: "Series", quality: "HD", rating: 8.3, actors: "José María Yázpik, Alejandro Edda, Scoot McNairy, Manuel Masalva, Diego Luna", director: "Andrés Baiz, Amat Escalante, Wagner Moura, Alonso Ruizpalacios, Alejandra Márquez Abella", poster: "000202.jpg", link: "https://1024terabox.com/s/1s5UOen1C6sc-8YDsvUcalQ", imdb: "https://www.imdb.com/title/tt8714904/", tmdb: "https://www.themoviedb.org/tv/80968", tagline: "Η ανείπωτη ιστορία του πρώτου καρτέλ του Μεξικού.", desc: "Παρακολουθήστε τη γέννηση του μεξικανικού πολέμου των ναρκωτικών τη δεκαετία του 1980 σ' ένα νέο, σκληρό 'Narcos' που εξιστορεί την άνοδο του καρτέλ της Γουαδαλαχάρα." },
  { id: 203, title: "Taboo", year: 2017, country: "United Kingdom", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 8.3, actors: "Tom Hardy, David Hayman, Jonathan Pryce, Oona Chaplin, Richard Dixon", director: "Kristoffer Nyholm, Anders Engström", poster: "000203.jpg", link: "https://1024terabox.com/s/1qOTV0-h-IF_YQl7MBRaqtQ", imdb: "https://www.imdb.com/title/tt3647998/", tmdb: "https://www.themoviedb.org/tv/65708", tagline: "", desc: "Το 1814, o Τζέιμς Κεζάια Ντέλανεϊ, εξερευνητής που έχει φτάσει στα πέρατα της γης και θεωρούνταν νεκρός, επιστρέφει από την Αφρική στο σπίτι του στο Λονδίνο για να κληρονομήσει ό,τι έχει απομείνει από τη ναυτιλιακή αυτοκρατορία του πατέρα του και να χτίσει μια νέα ζωή. Με τους εχθρούς να παραμονεύουν σε κάθε σκοτεινή γωνιά όμως, ο Τζέιμς πρέπει να περιπλανηθεί σε περίπλοκα μονοπάτια για να αποφύγει τη δική του θανατική καταδίκη." },
  { id: 204, title: "Missing", year: 2012, country: "United States", genre: "Μυστηρίου, Δράμα", type: "Series", quality: "HD", rating: 6.9, actors: "Ashley Judd, Cliff Curtis, Adriano Giannini, Nick Eversman, Laura Donnelly", director: "Phil Abraham, Steve Shill, James Strong", poster: "000204.jpg", link: "https://1024terabox.com/s/1wRz5aGklfq6f_AJZkNX71g", imdb: "https://www.imdb.com/title/tt1826805/", tmdb: "https://www.themoviedb.org/tv/39553", tagline: "She'll stop at nothing to find her son.", desc: "Becca Winstone learns that her son, Michael, disappears while studying abroad, and it's a race against time when she travels to Europe to track him down. A surprising turn of events reveals just how far one mother will go to protect her family." },
  { id: 205, title: "Dexter: Resurrection", year: 2025, country: "United States", genre: "Εγκλήματος, Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 9.1, actors: "Michael C. Hall, Uma Thurman, Jack Alcott, David Zayas, James Remar", director: "Marcos Siega, Monica Raymund", poster: "000205.jpg", link: "https://1024terabox.com/s/1DmffLquKkzDRH9qlDCa8_Q", imdb: "https://www.imdb.com/title/tt31845417/", tmdb: "https://www.themoviedb.org/tv/259909", tagline: "He's alive & killing it.", desc: "Dexter Morgan awakens from a coma to find Harrison gone without a trace. Realizing the weight of what he put his son through, Dexter sets out for New York City, determined to find him and make things right. But closure won't come easy. When Miami Metro's Angel Batista arrives with questions, Dexter realizes his past is catching up to him fast." },
  { id: 206, title: "Tehran", year: 2020, country: "Israel", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.6, actors: "Niv Sultan, Shaun Toub, Shervin Alenabi, Menashe Noy, Liraz Charhi", director: "Daniel Syrkin", poster: "000206.jpg", link: "https://1024terabox.com/s/1mOopxDtHxCdWtuAXRS-AMA", imdb: "https://www.imdb.com/title/tt10577736/", tmdb: "https://www.themoviedb.org/tv/103913", tagline: "Μια μυστική πράκτορας ξεκινά την πιο επικίνδυνη αποστολή της μέχρι σήμερα.", desc: "Η Ταμάρ είναι μια χάκερ πράκτορας της Μοσάντ, που διεισδύει στην Τεχεράνη με ψεύτικη ταυτότητα για να βοηθήσει στην καταστροφή του πυρηνικού αντιδραστήρα του Ιράν. Όταν, όμως, η αποστολή της αποτυγχάνει και παγιδεύεται σε μια νέα ζωή, η Ταμάρ πρέπει να σχεδιάσει μια επιχείρηση που θα βάλει σε κίνδυνο όλα τα αγαπημένα της πρόσωπα." },
  { id: 207, title: "The Lowdown", year: 2025, country: "United States", genre: "Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 7.3, actors: "Ethan Hawke, Keith David, Michael Hitchcock, Jeanne Tripplehorn, Tim Blake Nelson", director: "Sterlin Harjo, Macon Blair, Danis Goulet", poster: "000207.jpg", link: "https://1024terabox.com/s/1gAxPIvuVLrxjzVUDtDNaXw", imdb: "https://www.imdb.com/title/tt30531824/", tmdb: "https://www.themoviedb.org/tv/273247", tagline: "Unearthing lies is a dirty business.", desc: "Ένας αποφασισμένος ιδιοκτήτης βιβλιοπωλείου στην Τάλσα (Ethan Hawke) εργάζεται και ως ερευνητής δημοσιογράφος, ερευνώντας την τοπική διαφθορά. Όταν το ρεπορτάζ του αποκαλύπτει σκοτεινές διασυνδέσεις, πρέπει να προστατεύσει τόσο την οικογένειά του όσο και την αλήθεια." },
  { id: 208, title: "House of David", year: 2025, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.4, actors: "Michael Iskander, Alexander Uloom, Ali Suliman, Ayelet Zurer, Stephen Lang", director: "Jeff T. Thomas, Jon Gunn, Lynsey Miller, Jon Erwin", poster: "000208.jpg", link: "https://1024terabox.com/s/1eK8dzY9rna_CRzE1yrXJHw", imdb: "https://www.imdb.com/title/tt26762793/", tmdb: "https://www.themoviedb.org/tv/243881", tagline: "Καθώς o ένας ηγέτης πέφτει, ένας άλλος πρέπει να αναδειχθεί.", desc: "Αφηγείται την ιστορία της ανόδου του Δαβίδ, της βιβλικής φιγούρας που τελικά γίνεται ο πιο φημισμένος βασιλιάς του Ισραήλ. Η σειρά παρουσιάζει τον άλλοτε πανίσχυρο βασιλιά Σαούλ να πέφτει θύμα της ίδιας του της περηφάνιας. Με την καθοδήγηση του Θεού, ο προφήτης Σαμουήλ χρίζει νέο βασιλιά έναν άγνωστο, περιθωριακό έφηβο." },
  { id: 209, title: "Invisible Boys", year: 2025, country: "Australia", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.4, actors: "Joseph Zada, Joe Klocek, Aydan Calafiore, Zach Blampied, Pia Miranda", director: "Nicholas Verso", poster: "000209.jpg", link: "https://1024terabox.com/s/1cj5dmwh-oX5CrUcmkYU8OA", imdb: "https://www.imdb.com/title/tt30138047/", tmdb: "https://www.themoviedb.org/tv/274677", tagline: "", desc: "Everyone in a small town assumes they know you, but when a closeted gay adolescent hooks up with a married guy, it has far-reaching effects for a group of teens who were previously invisible." },
  { id: 210, title: "The Night Manager", year: 2016, country: "United Kingdom", genre: "Δράμα, Μυστηρίου, Εγκλήματος", type: "Series", quality: "HD", rating: 8.0, actors: "Tom Hiddleston, Hugh Laurie, Olivia Colman, Michael Nardone, Alistair Petrie", director: "Susanne Bier, Georgi Banks-Davies", poster: "000210.jpg", link: "https://1024terabox.com/s/1i2rFUwb_xgBORfTb2JvN0A", imdb: "https://www.imdb.com/title/tt4170152/", tmdb: "https://www.themoviedb.org/tv/61859", tagline: "The past is a deadly weapon.", desc: "Το AMC πάει για το μεγάλο κόλπο. Σε συνεργασία με το BBC φέρνει στις οθόνες μας, βασισμένη στο ομώνυμο βιβλίο του μάστορα John le Carré, μια σειρά 6 επεισοδίων που έχει, λίγο πολύ, τα πάντα: φοβερό story, έντονο hype και εκπληκτικό cast. Πρωταγωνιστεί ο Tom Hiddleston στο ρόλο ενός Βρετανού πρώην στρατιώτη που στρατολογείται από υψηλόβαθμο στέλεχος των μυστικών υπηρεσιών για να διεισδύσει στην οργάνωση ενός εκ των μεγαλύτερων και πιο επικίνδυνων εμπόρων όπλων στον κόσμο, του Richard Onslow Roper, τον οποίο υποδύεται ο Hugh Laurie." },
  { id: 211, title: "Based on a True Story", year: 2023, country: "United States", genre: "Κωμωδία, Δράμα", type: "Series", quality: "HD", rating: 7.2, actors: "Kaley Cuoco, Chris Messina, Tom Bateman, Liana Liberato, Priscilla Quintana", director: "Alexander Buono, Anu Valia, Jennifer Arnold, Jenée LaMarque, Francesca Gregorini", poster: "000211.jpg", link: "https://1024terabox.com/s/1aZpgdBrM2EA9J9AFcUqcqQ", imdb: "https://www.imdb.com/title/tt19553962/", tmdb: "https://www.themoviedb.org/tv/197373", tagline: "Το True Crime είναι μια εμμονή που δε πεθαίνει.", desc: "Οι ζωές μιας μεσίτριας, ενός υδραυλικού και ενός σταρ του τένις συγκλίνουν απρόοπτα, αποκαλύπτοντας την εμμονή της Αμερικής με το True Crime, τον φόνο και τη λεκάνη τουαλέτας με αργό κλείσιμο." },

  { id: 217, title: "Barbie: Star Light Adventure", year: 2016, country: "United States", genre: "Κινούμενα σχέδια, Οικογενειακή, Επιστημονικής Φαντασίας", type: "Movie", quality: "HD", rating: 5.8, actors: "Erica Lindbeck (φωνή), Robbie Daymond (φωνή), Kimberly Woods (φωνή), Sarah Anne Williams (φωνή), Michael Chandler (φωνή)", director: "Andrew Tan, Michael Goguen", poster: "000217.jpg", link: "https://terabox.com/s/19vlN045zWxshF3f5L8GMpQ", imdb: "https://www.imdb.com/title/tt5563324/", tmdb: "https://www.themoviedb.org/movie/415749", tagline: "Μια απόλαυση για τους μικρούς σας αστροναύτες.", desc: "H Μπάρμπι είναι μια γαλαξιακή πριγκίπισσα που πετάει στο διάστημα πάνω στο αιωρούμενο πατίνι της, έχοντας μαζί της το αξιολάτρευτο και πιστό κατοικίδιό της. Μια μέρα, τα πάντα στη ζωή της αλλάζουν, όταν τα λαμπερά αστέρια αρχίζουν σιγά-σιγά να σβήνουν και να σταματούν τον ονειρικό τους χορό στον ουρανό. Τότε, η Μπάρμπι ταξιδεύει σε έναν όμορφο, νέο πλανήτη για να συνεργαστεί με μια ειδική ομάδα διάσωσης προκειμένου να σώσουν τα αστέρια." },
  { id: 218, title: "Battle for Terra", year: 2007, country: "United States", genre: "Δράσης, Περιπέτεια, Κινούμενα σχέδια, Επιστημονικής Φαντασίας", type: "Movie", quality: "HD", rating: 6.5, actors: "Evan Rachel Wood (φωνή), Brian Cox (φωνή), James Garner (φωνή), Chris Evans (φωνή), Danny Glover (φωνή)", director: "Aristomenis Tsirbas", poster: "000218.jpg", link: "https://terabox.com/s/1sZgUNvAAmCZjpr1zWYkY_Q", imdb: "https://www.imdb.com/title/tt0858486/", tmdb: "https://www.themoviedb.org/movie/16873", tagline: "Their world is mankind's only hope for survival.", desc: "Όταν οι φιλειρηνικοί κάτοικοι του πανέμορφου πλανήτη Terra δέχονται την επίθεση των τελευταίων επιζώντων της ανθρωπότητας, που περιπλανιούνται στο διάστημα με ένα γερασμένο σκάφος, ξεσπά ένας ολοκληρωτικός πόλεμος ανάμεσα στις δύο φυλές για τον έλεγχο του πλανήτη. Θα καταφέρει, όμως, μια ασυνήθιστη φιλία ανάμεσα σε μια επαναστατική νεαρή Terrian και σε έναν τραυματισμένο πιλότο των ανθρώπων να πείσει τους ηγέτες των δύο λαών ότι ο πόλεμος δεν είναι ιδανική λύση;" },
  { id: 219, title: "Daffy Duck's Quackbusters", year: 1988, country: "United States", genre: "Κινούμενα σχέδια, Κωμωδία, Οικογενειακή, Φαντασίας, Επιστημονικής Φαντασίας, Δράσης, Τρόμου, Μυστηρίου", type: "Movie", quality: "HD", rating: 7.0, actors: "Mel Blanc (φωνή), Roy Firestone (φωνή), B.J. Ward (φωνή), Mel Tormé, Ben Frommer (φωνή)", director: "Chuck Jones, Greg Ford, Terry Lennon, Robert McKimson, Friz Freleng", poster: "000219.jpg", link: "https://terabox.com/s/1wOtVUacDJP4FPglhmzAEQg", imdb: "https://www.imdb.com/title/tt0094942/", tmdb: "https://www.themoviedb.org/movie/23521", tagline: "It's everything it's quacked up to be.", desc: "Σε αυτή την ξεκαρδιστική ταινία κινουμένων σχεδίων, ο Ντάφι Ντακ ανοίγει γραφείο εύρεσης και εξολόθρευσης φαντασμάτων και άλλων τεράτων. Ο απίθανος ντετέκτιβ και η θεότρελη παρέα του, ο Μπαγκς Μπάνι, ο Πόρκι Πιγκ, ο Σιλβέστερ, έρχονται αντιμέτωποι με φαντάσματα καλικάντζαρους και άλλα τέρατα. Όλα ανατρέπονται όμως όταν ο Ντάφι Ντακ καταλήγει να διασκεδάζει με καταπληκτική επιτυχία σε ένα κλαμπ γεμάτο με τέρατα στην Τρανσυλβανία." },

  { id: 224, title: "LEGO Star Wars Summer Vacation", year: 2022, country: "United States", genre: "Κινούμενα σχέδια, Οικογενειακή, Επιστημονικής Φαντασίας, Κωμωδία", type: "TV Movie", quality: "HD", rating: 5.6, actors: "Kelly Marie Tran (φωνή), Shelby Young (φωνή), Matt Lanter (φωνή), Anthony Daniels (φωνή), Omar Benson Miller (φωνή)", director: "Ken Cunningham", poster: "000224.jpg", link: "https://terabox.com/s/1EW0fh05WIb4UaNFxIsrmkA", imdb: "https://www.imdb.com/title/tt21274836/", tmdb: "https://www.themoviedb.org/movie/980804", tagline: "Θα χρειαστούν μεγαλύτερη παροιλία", desc: "Ο Φιν κανόνισε διακοπές έκπληξη για τους φίλους του στο Αστρόπλοιο του Γαλαξία, το Χάλσιον! Αλλά το σχέδιο του Φιν γρήγορα πάει στραβά όταν χωρίζεται από την ομάδα. Μόνος στο Χάλσιον, ο Φιν συναντά τρία πνεύματα δύναμης -- τον Όμπι-Ουάν Κενόμπι, τον Άνακιν Σκαϊγουόκερ και την Πριγκίπισσα Λέια - όπου ο καθένας τους μοιράζεται τις δικές του απροσδόκητες ιστορίες διακοπών που πήγαν στραβά." },
  { id: 225, title: "Lightyear", year: 2022, country: "United States", genre: "Κινούμενα σχέδια, Επιστημονικής Φαντασίας, Οικογενειακή, Περιπέτεια", type: "Movie", quality: "HD", rating: 6.1, actors: "Chris Evans (φωνή), Keke Palmer (φωνή), Peter Sohn (φωνή), Taika Waititi (φωνή), Dale Soules (φωνή)", director: "Angus MacLane", poster: "000225.jpg", link: "https://terabox.com/s/1UU8aYA27k3Ogr6pz4O8TZg", imdb: "https://www.imdb.com/title/tt10298810/", tmdb: "https://www.themoviedb.org/movie/718789", tagline: "Το άπειρο περιμένει.", desc: "Παγιδευμένος σε έναν μακρινό πλανήτη με το διαστημόπλοιο και το πλήρωμά του, ο αστροναύτης Μπαζ Λάιτγιαρ προσπαθεί να βρει τρόπο να επιστρέψει στη Γη. Καθώς όμως γυρίζει στη βάση του, έπειτα από ακόμα μια προσπάθεια να πιάσει την υπερταχύτητα, τον περιμένει μια δυσάρεστη έκπληξη." },

  { id: 228, title: "My Little Pony: The Movie", year: 2017, country: "Canada", genre: "Οικογενειακή, Κινούμενα σχέδια, Περιπέτεια, Φαντασίας", type: "Movie", quality: "HD", rating: 6.1, actors: "Tara Strong (φωνή), Ashleigh Ball (φωνή), Andrea Libman (φωνή), Tabitha St. Germain (φωνή), Cathy Weseluck (φωνή)", director: "Jayson Thiessen", poster: "000228.jpg", link: "https://terabox.com/s/1IxDr3ZiWeA051DSzYBL1xQ", imdb: "https://www.imdb.com/title/tt4139124/", tmdb: "https://www.themoviedb.org/movie/335360", tagline: "Η φιλία βγαίνει σε πολλά χρώματα", desc: "Μια σκοτεινή μαγική δύναμη απειλεί την Ponyville. Τα μικρά Πόνυ ξεκινούν ένα αξέχαστο ταξίδι πέρα από την Equestria όπου γνωρίζουν νέους φίλους και συναρπαστικές περιπέτειες στην προσπάθειά τους να σώσουν την πόλη τους με τη δύναμη της φιλίας." },
  { id: 229, title: "Oggy and the Cockroaches", year: 2013, country: "France", genre: "Κινούμενα σχέδια, Κωμωδία, Οικογενειακή", type: "Movie", quality: "HD", rating: 6.4, actors: "", director: "Olivier Jean-Marie", poster: "000229.jpg", link: "https://terabox.com/s/1wP02CycgGJiTAejWve2htQ", imdb: "https://www.imdb.com/title/tt2996752/", tmdb: "https://www.themoviedb.org/movie/205048", tagline: "", desc: "Ever since the world was born, two forces have been locked in perpetual battle. Their struggle is so Manichean, so ferocious, so Herculean that it makes the clash between good and evil look like a game of checkers! This ancestral duel is so ancient and so merciless that it can only be, Oggy against the Cockroaches!" },

// ============ ΑΥΤΟΜΑΤΗ ΠΡΟΣΘΗΚΗ ΗΜΕΡΟΜΗΝΙΩΝ ΠΡΟΣΘΗΚΗΣ ============
(function addDateAdded() {
  const today = new Date();
  const totalMovies = moviesData.length;
  
  moviesData.forEach(movie => {
    if (!movie.dateAdded) {
      const daysAgo = totalMovies - movie.id;
      const date = new Date();
      date.setDate(today.getDate() - daysAgo);
      movie.dateAdded = date.toISOString().split('T')[0];
    }
  });
  
  console.log("✅ Προστέθηκαν ημερομηνίες προσθήκης σε όλες τις ταινίες!");
})();

// Helper: Έλεγχος αν είναι νέα ταινία (τελευταίες 7 ημέρες)
function isNewMovie(dateAdded) {
  const added = new Date(dateAdded);
  const daysAgo = (new Date() - added) / (1000 * 60 * 60 * 24);
  return daysAgo <= 7;
}

// ============== ΜΕΤΑΒΛΗΤΕΣ ======================
let filteredMovies = [];
let currentPage = 1;
const itemsPerPage = 20;

// Helper: Escape HTML για XSS προστασία
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
    return c;
  });
}

// ================== ΣΥΝΑΡΤΗΣΕΙΣ ==================
function getStarsHtml(rating) {
  const fullStars = Math.floor(rating);
  const halfStar = rating % 1 >= 0.5;
  let starsHtml = '';
  for (let i = 0; i < fullStars; i++) starsHtml += '★ ';
  if (halfStar) starsHtml += '½ ';
  for (let i = 0; i < 5 - Math.ceil(rating); i++) starsHtml += '☆ ';
  return starsHtml;
}

function toggleTheme() {
  const root = document.documentElement;
  if (root.hasAttribute('data-theme')) {
    root.removeAttribute('data-theme');
    localStorage.setItem('theme', 'dark');
  } else {
    root.setAttribute('data-theme', 'light');
    localStorage.setItem('theme', 'light');
  }
}

function loadTheme() {
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
  }
}

function initFilters() {
  const yearSelect = document.getElementById('yearFilter');
  const countrySelect = document.getElementById('countryFilter');
  const genreSelect = document.getElementById('genreFilter');
  
  const years = [...new Set(moviesData.map(m => m.year))].sort((a, b) => b - a);
  const countries = [...new Set(moviesData.map(m => m.country))].sort();
  const genres = [...new Set(moviesData.flatMap(m => m.genre.split(', ')))].sort();
  
  years.forEach(y => yearSelect.add(new Option(y, y)));
  countries.forEach(c => countrySelect.add(new Option(c, c)));
  genres.forEach(g => genreSelect.add(new Option(g, g)));
}

function applyFilters() {
  const searchTerm = document.getElementById('movieSearch').value.toLowerCase();
  const genreValue = document.getElementById('genreFilter').value;
  const yearValue = document.getElementById('yearFilter').value;
  const countryValue = document.getElementById('countryFilter').value;
  const sortValue = document.getElementById('sortSelect').value;
  
  let results = [...moviesData];
  
  if (searchTerm) {
    results = results.filter(m => 
      m.title.toLowerCase().includes(searchTerm) ||
      (m.actors && m.actors.toLowerCase().includes(searchTerm)) ||
      (m.director && m.director.toLowerCase().includes(searchTerm))
    );
  }
  
  if (genreValue !== 'All') {
    results = results.filter(m => m.genre.includes(genreValue));
  }
  
  if (yearValue !== 'All') {
    results = results.filter(m => m.year == yearValue);
  }
  
  if (countryValue !== 'All') {
    results = results.filter(m => m.country === countryValue);
  }
  
  if (sortValue === 'title') {
    results.sort((a, b) => a.title.localeCompare(b.title, 'el'));
  } else if (sortValue === 'yearDesc') {
    results.sort((a, b) => b.year - a.year);
  } else if (sortValue === 'yearAsc') {
    results.sort((a, b) => a.year - b.year);
  } else if (sortValue === 'ratingDesc') {
    results.sort((a, b) => (b.rating || 0) - (a.rating || 0));
  } else if (sortValue === 'latest') {
    results.sort((a, b) => new Date(b.dateAdded) - new Date(a.dateAdded));
  }
  
  filteredMovies = results;
  currentPage = 1;
  document.getElementById('movieCount').innerText = `Ταινίες: ${filteredMovies.length}`;
  renderMovies();
}

function renderMovies() {
  const grid = document.getElementById('movieGrid');
  const start = 0;
  const end = currentPage * itemsPerPage;
  const pageItems = filteredMovies.slice(start, end);
  
  if (pageItems.length === 0) {
    grid.innerHTML = '<div style="text-align: center; padding: 50px; width: 100%;">Δεν βρέθηκαν Ταινίες</div>';
    document.getElementById('loadMoreBtn').style.display = 'none';
    return;
  }
  
  let html = '';
  for (let m of pageItems) {
    const starsHtml = getStarsHtml(m.rating);
    const qualityClass = m.quality == 'SD' ? 'sd-blue' : '';
    const escapedTitle = escapeHtml(m.title);
    const escapedTitleAttr = escapedTitle.replace(/'/g, "\\'");
    const isNew = isNewMovie(m.dateAdded);
    const newBadge = isNew ? '<span class="new-badge">ΝΕΟ</span>' : '';
    
    html += `<div class="movie-card" onclick="openDetails('${escapedTitleAttr}')">
      <div class="img-container">
        <div class="quality-tag ${qualityClass}">${escapeHtml(m.quality || 'HD')}</div>
        <img src="posters/${escapeHtml(m.poster)}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x450?text=No+Poster'">
      </div>
      <div class="info">
        <h3>${escapedTitle}${newBadge}</h3>
        <div class="stars">${starsHtml} <span class="rating-number">${m.rating}/10</span></div>
        <span class="play-btn">ΠΑΡΑΚΟΛΟΥΘΗΣΗ</span>
      </div>
    </div>`;
  }
  
  grid.innerHTML = html;
  
  const loadMoreBtn = document.getElementById('loadMoreBtn');
  if (filteredMovies.length > currentPage * itemsPerPage) {
    loadMoreBtn.style.display = 'block';
  } else {
    loadMoreBtn.style.display = 'none';
  }
}

function loadNextPage() {
  if (filteredMovies.length > currentPage * itemsPerPage) {
    currentPage++;
    renderMovies();
  }
}

function openDetails(title) {
  const movie = filteredMovies.find(m => m.title === title) || moviesData.find(m => m.title === title);
  if (!movie) return;
  
  document.getElementById('modalTitle').innerText = movie.title;
  document.getElementById('modalImg').src = `posters/${movie.poster}`;
  document.getElementById('modalImg').onerror = function() { this.src = 'https://via.placeholder.com/300x450?text=No+Poster'; };
  
  const starsHtml = getStarsHtml(movie.rating);
  document.getElementById('modalStars').innerHTML = `${starsHtml} <span class="rating-number">${movie.rating}/10</span>`;
  
  document.getElementById('modalMeta').innerHTML = `${movie.year} | ${movie.country} | ${movie.genre} | ${movie.type}`;
  document.getElementById('modalActors').innerText = movie.actors || 'Δεν υπάρχει πληροφορία';
  
  let fullDesc = movie.desc || 'Δεν υπάρχει περιγραφή';
  if (movie.tagline && movie.tagline !== "") {
    fullDesc = `"${movie.tagline}"\n\n${fullDesc}`;
  }
  document.getElementById('modalDesc').innerText = fullDesc;
  
  const imdbLink = document.getElementById('modalImdb');
  if (movie.imdb) {
    imdbLink.href = movie.imdb;
    imdbLink.style.display = 'inline-block';
  } else {
    imdbLink.style.display = 'none';
  }
  
  const tmdbLink = document.getElementById('modalTmdb');
  if (movie.tmdb) {
    tmdbLink.href = movie.tmdb;
    tmdbLink.style.display = 'inline-block';
  } else {
    tmdbLink.style.display = 'none';
  }
  
  const downloadBtn = document.getElementById('modalDownloadBtn');
  if (movie.link && movie.link !== "") {
    downloadBtn.href = movie.link;
    downloadBtn.style.display = 'inline-block';
  } else {
    downloadBtn.style.display = 'none';
  }
  
  document.getElementById('detailModal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeDetails() {
  document.getElementById('detailModal').style.display = 'none';
  document.body.style.overflow = 'auto';
}

window.onscroll = function() {
  const btn = document.getElementById('backToTop');
  if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
    btn.style.display = 'block';
  } else {
    btn.style.display = 'none';
  }
};

loadTheme();
initFilters();
applyFilters();
</script>
