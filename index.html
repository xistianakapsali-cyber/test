  { id: 188, title: "Doctor Who", year: 2005, country: "United Kingdom", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.5, actors: "Matt Smith, David Tennant, Karen Gillan, Nicholas Briggs (φωνή), Jenna Coleman", director: "Graeme Harper, Euros Lyn, Douglas Mackinnon, Rachel Talalay, Charles Palmer", writer: "Steven Moffat, Russell T Davies, Chris Chibnall, Mark Gatiss, Toby Whithouse", link: "https://1024terabox.com/s/1zBxXzm8CZRxBkQaxXFWwHg", imdb: "https://www.imdb.com/title/tt0436992/", tmdb: "https://www.themoviedb.org/tv/57243", tagline: "Space. For all.", desc: "Η σειρά εκτυλίσσεται γύρω από έναν ανθρωπόμορφο εξωγήινο, τον Doctor Who, πάνω στον οποίο ο χρόνος δεν δρα όπως το ξέρουμε και που μπορεί να ταξιδέψει στο χωροχρόνο μέσω της «ζωντανής» χρονομηχανής του ονόματι Tardis. Ο Δόκτωρ έχει αποκτήσει πολλούς εχθρούς ανά τους αιώνες απ' ό,τι φαίνεται και πρέπει με τη βοήθεια των συντρόφων του να καταφέρει να σώσει τον κόσμο από αυτούς και άλλους παράγοντες πολλές φορές. Η σειρά αποτελεί συνέχεια εκείνης που ξεκίνησε το 1963 στο BBC και θεωρείται η μακροβιότερη όλων των εποχών." },
  { id: 189, title: "Dexter: Original Sin", year: 2024, country: "United States", genre: "Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 8.2, actors: "Patrick Gibson, Christian Slater, Molly Brown, Christina Milian, James Martinez", director: "Michael Lehmann, Monica Raymund", writer: "Jeff Lindsay, Alexandra Franklin, Tanner Bean, Terry Huang, Johanna Ramm", link: "https://1024terabox.com/s/1AstE25nZ9Pc84q_VgaN8PA", imdb: "https://www.imdb.com/title/tt32288236/", tmdb: "https://www.themoviedb.org/tv/219937", tagline: "Πιάνουν δολοφόνους. Αυτός πρόκειται να γίνει ένας από αυτούς.", desc: "Μαϊάμι, 1991. Όταν οι αιμοδιψείς ορμές του δεν μπορούν πλέον να αγνοηθούν, ο νεαρός Ντέξτερ Μόργκαν πρέπει να μάθει να διοχετεύει το εσωτερικό του σκοτάδι, καθώς από μαθητής μετατρέπεται σε εκδικητικό κατά συρροή δολοφόνο με την καθοδήγηση του πατέρα του, Χάρι." },
  { id: 190, title: "Chucky", year: 2021, country: "United States", genre: "Εγκλήματος, Κωμωδία, Μυστηρίου", type: "Series", quality: "HD", rating: 7.2, actors: "Zackary Arthur, Brad Dourif (φωνή), Björgvin Arnarson, Alyvia Alyn Lind, Devon Sawa", director: "Samir Rehem, Jeff Renfroe, Leslie Libman, John Hyams, Dermott Downs", writer: "Nick Zigler, Kim Garland, Don Mancini, Alex Delyle, Rachael Paradis", link: "https://1024terabox.com/s/1VFNPz4DRbhpgODA9aBLoEg", imdb: "https://www.imdb.com/title/tt8388390/", tmdb: "https://www.themoviedb.org/tv/90462", tagline: "The country is Chucked.", desc: "Το δίκτυο Syfy κυκλοφόρησε το πρώτο teaser-trailer απο το \"Chucky\", την τηλεοπτική σειρά τρόμου, που είναι βασισμένη στο \"Child's Play\", Όταν μια συλλεκτική κούκλα Chucky εμφανίζεται σε ένα παζάρι ενός προαστίου, μια ειδυλλιακή Αμερικανική πόλη θα εισέλθει στο χάος, καθώς μια σειρά φρικιαστικών φόνων, αρχίζει να εκθέτει τις υποκρισίες και τα μυστικά της πόλης. Την ίδια ώρα, η άφιξη εχθρών και συμμάχων από το παρελθόν του Chucky, απειλεί να ξεσκεπάσει την αλήθεια πίσω απο τους φόνους, καθώς και την ανείπωτη προέλευση της δαιμονικής κούκλας, που από ένα συνηθισμένο παιδί μετατράπηκε σε αυτό το διαβόητο τέρας." },
  { id: 191, title: "Black Bird", year: 2022, country: "United States", genre: "Δράμα, Εγκλήματος", type: "Series", quality: "HD", rating: 8.1, actors: "Taron Egerton, Paul Walter Hauser, Sepideh Moafi, Greg Kinnear, Ray Liotta", director: "Michaël R. Roskam, Joe Chappelle, Jim McKay", writer: "", link: "https://1024terabox.com/s/1nt2PzYE2Bk_RrteEUpSyVQ", imdb: "https://www.imdb.com/title/tt4301160/", tmdb: "https://www.themoviedb.org/tv/155537", tagline: "Η ελευθερία του ενός κρύβεται στο σκοτάδι του άλλου.", desc: "Καθώς ο Τζίμι Κιν ξεκινά να εκτίει τη 10ετή ποινή φυλάκισής του, δέχεται μια απίστευτη προσφορά: αν μπορέσει να αποσπάσει μια ομολογία από τον ύποπτο για δολοφονίες Λάρι Χολ, ο Τζίμι θα αποφυλακιστεί. Η εκπλήρωση της αποστολής αυτής γίνεται η μεγαλύτερη πρόκληση της ζωής του." },
  { id: 192, title: "American Primeval", year: 2025, country: "United States", genre: "Γουέστερν, Δράμα", type: "Series", quality: "HD", rating: 8.0, actors: "Taylor Kitsch, Betty Gilpin, Dane DeHaan, Saura Lightfoot Leon, Derek Hinkey", director: "Peter Berg", writer: "Mark L. Smith", link: "https://1024terabox.com/s/1PEaYXV12JDbGPiRdsOhloA", imdb: "https://www.imdb.com/title/tt24069848/", tmdb: "https://www.themoviedb.org/tv/215866", tagline: "Κανείς δεν επιβιώνει μόνος.", desc: "Μια μητέρα κι ένας γιος που προσπαθούν να ξεφύγουν από το παρελθόν σχηματίζουν μια νέα οικογένεια, ενώ αντιμετωπίζουν τη σκληρή πραγματικότητα στην αμερικανική Δύση." },
  { id: 193, title: "A Cruel Love: The Ruth Ellis Story", year: 2025, country: "United Kingdom", genre: "Δράμα, Εγκλήματος", type: "Series", quality: "HD", rating: 7.0, actors: "Lucy Boynton, Toby Jones, Laurie Davidson, Mark Stanley, Arthur Darvill", director: "Lee Haven Jones", writer: "Kelly Jones", link: "https://1024terabox.com/s/12d8Hrco5d_g4ZnlGwtpHGw", imdb: "https://www.imdb.com/title/tt32024154/", tmdb: "https://www.themoviedb.org/tv/246770", tagline: "", desc: "Ακολουθεί την ιστορία της Ruth Ellis: τον τρόπο ζωής της ως νεαρή διευθύντρια νυχτερινών κέντρων, τη βίαιη σχέση της με τον άνθρωπο που στη συνέχεια σκότωσε εν ψυχρώ, τη σύλληψη, τη δίκη και την επακόλουθη νομική μάχη για να πάρει την απελευθέρωσή της πριν απαγχονιστεί." },
  { id: 194, title: "Εννέα Άγνωστοι", year: 2021, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 6.9, actors: "Nicole Kidman, Aras Aydın, Melissa McCarthy, Christine Baranski, Michael Shannon", director: "Jonathan Levine, Anthony Byrne", writer: "T. Rafael Cimino, David E. Kelley, John-Henry Butterworth, Jaclyn Moore, Jonathan Levine", link: "https://1024terabox.com/s/1YX7wm8kVeUAWw6Ch_a24YQ", imdb: "https://www.imdb.com/title/tt8762900/", tmdb: "https://www.themoviedb.org/tv/88989", tagline: "Retreat from reality.", desc: "Το 'Nine Perfect Strangers' εξελίσσεται σε ένα ινστιτούτο ευεξίας που υπόσχεται θεραπεία και μεταμόρφωση, καθώς εννέα στρεσαρισμένοι κάτοικοι της πόλης προσπαθούν να μπουν σε ένα μονοπάτι καλύτερης ζωής. Αυτή που τους προσέχει κατά τη διάρκεια της δεκαήμερης θεραπείας είναι η διευθύντρια του κέντρου Masha (Nicole Kidman), μια γυναίκα με αποστολή να αναζωογονήσει τα κουρασμένα μυαλά και σώματά τους. Όμως, αυτοί οι εννέα ξένοι δεν έχουν ιδέα για αυτό που πρόκειται να τους χτυπήσει." },
  { id: 195, title: "The Undoing", year: 2020, country: "United States", genre: "Δράμα, Εγκλήματος, Μυστηρίου", type: "Series", quality: "HD", rating: 7.4, actors: "Nicole Kidman, Hugh Grant, Edgar Ramírez, Noah Jupe, Lily Rabe", director: "Susanne Bier", writer: "Jean Hanff Korelitz, David E. Kelley", link: "https://1024terabox.com/s/1ZWP6lWPxckCQ__BNmB4lkA", imdb: "https://www.imdb.com/title/tt8134470/", tmdb: "https://www.themoviedb.org/tv/83851", tagline: "Nothing stays hidden.", desc: "Η υπόθεση επικεντρώνεται στην οικογένεια Fraser, που ζει μια φαινομενικά τέλεια ζωή. Η Grace Fraser είναι μια επιτυχημένη ψυχαναλύτρια, ο Jonathan ένας αξιόλογος γιατρός και την ευτυχία τους συμπληρώνει ο μικρός τους γιος Henry. Ξαφνικά, ένας βίαιος θάνατος σκορπάει αβάστακτες αποκαλύψεις και καταστροφή. Η Grace πλέον θα αρχίζει να αμφισβητεί τα πάντα.\n\nΒασισμένη στο βιβλίο \"You Should Have Known\" του Jean Hanff Korelitz." },
  { id: 196, title: "The Son", year: 2017, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.5, actors: "Pierce Brosnan, Jacob Lofland, Zahn McClarnon, Carlos Bardem, James Parks", director: "Kevin Dowling", writer: "Philipp Meyer, Wes Brown", link: "https://1024terabox.com/s/1b69xNadqoJQMorNYISD2dQ", imdb: "https://www.imdb.com/title/tt3839822/", tmdb: "https://www.themoviedb.org/tv/67232", tagline: "", desc: "Το έπος πολλών γενεών ακολουθεί δύο παράλληλες χρονικές περιόδους: Ένα, η ιστορία του νεαρού Eli McCullough αφού απάγεται και κατηγορείτε απο μια φυλή Comanches το 1849. Το άλλο, 60 χρόνια αργότερα, όταν βλέπουμε έναν αγώνα που καλλιεργείται για να διατηρήσει τα βοοειδή της μια οικογένεια κατά τη διάρκεια των ταραχών του πολέμου στο νότιο Τέξας. Βασισμένο στο φημισμένο μυθιστόρημα του Philipp Meyer." },
  { id: 197, title: "Πετάει η Ομάδα", year: 2025, country: "United States", genre: "Κωμωδία, Δράμα", type: "Series", quality: "HD", rating: 7.2, actors: "Owen Wilson, Peter Dager, Marc Maron, Mariana Treviño, Lilli Kay", director: "Valerie Faris, John Hamburg, Jaffar Mahmood, David Dobkin, MJ Delaney", writer: "Ryan Hooper, Jimy Shah, Jason Keller, Christopher Moynihan, Bill Callahan", link: "https://1024terabox.com/s/177pNM6m99cMp_hAEwzeW4w", imdb: "https://www.imdb.com/title/tt35057938/", tmdb: "https://www.themoviedb.org/tv/248830", tagline: "Take a big swing.", desc: "Ο Πράις Κέιχιλ είχε λαμπρό μέλλον στο γκολφ, όταν ένας νευρικός κλονισμός στο γήπεδο εκτροχίασε την καριέρα του. Τώρα, παλεύοντας να επιβιώσει, τα δίνει όλα για να γίνει μέντορας του Σάντι, ενός εφήβου φαινόμενο με τεράστιες δυνατότητες, κι ίσως σώσει και τον εαυτό του." },
  { id: 198, title: "Ένας τζέντλεμαν στη Μόσχα", year: 2024, country: "United Kingdom", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.4, actors: "Ewan McGregor, Mary Elizabeth Winstead, Johnny Harris, Fehinti Balogun, Alexa Goodall", director: "Sam Miller, Sarah O'Gorman", writer: "Ben Vanstone, Nessah Muthy", link: "https://1024terabox.com/s/1FtWxXfWaMtq139W39J_7UQ", imdb: "https://www.imdb.com/title/tt8230822/", tmdb: "https://www.themoviedb.org/tv/208942", tagline: "Ζει την καλύτερη ποινή της ζωής του.", desc: "Ο κόμης Αλεξάντερ Ροστόφ περνάει από τα πλούτη στα κουρέλια μετά τη ρωσική επανάσταση. Ένα σοβιετικό δικαστήριο τον εξορίζει στη σοφίτα ενός χλιδάτου ξενοδοχείου, όπου, αγνοώντας τον έξω κόσμο, ανακαλύπτει την πραγματική αξία της φιλίας, της οικογένειας και της αγάπης." },

  { id: 200, title: "Αδάμαστος", year: 2025, country: "United States", genre: "Μυστηρίου, Δράμα", type: "Series", quality: "HD", rating: 7.2, actors: "Eric Bana, Sam Neill, Rosemarie DeWitt, Lily Santiago, Wilson Bethel", director: "Nick Murphy, Neasa Hardiman, Thomas Bezucha", writer: "Mark L. Smith, Elle Smith", link: "https://1024terabox.com/s/1fqNclGKMdaX65apzQY8FTQ", imdb: "https://www.imdb.com/title/tt29307518/", tmdb: "https://www.themoviedb.org/tv/248852", tagline: "", desc: "Στο αχανές Εθνικό Δρυμό Γιοσέμιτι, ο θάνατος μιας γυναίκας οδηγεί έναν ομοσπονδιακό πράκτορα σε λημέρια παρανόμων. Εκεί, η φύση υπακούει μόνο στους δικούς της νόμους." },
  { id: 201, title: "Transplant", year: 2020, country: "Canada", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.9, actors: "Hamza Haq, Laurence Leboeuf, Ayisha Issa, Jim Watson, Torri Higginson", director: "Erik Canuel, Holly Dale, Alain Desrochers, Stefan Pleszczynski", writer: "Sami Khan, Anar Ali, Joseph Kay, Nikolijne Troubetzkoy, Rachel Langer", link: "https://1024terabox.com/s/17WYAqugwD5AKCzjUrXojgg", imdb: "https://www.imdb.com/title/tt11053446/", tmdb: "https://www.themoviedb.org/tv/99530", tagline: "", desc: "Ένας γιατρός , ο οποίος εγκατέλειψε τη γενέτειρά του στη Συρία για να έρθει στον Καναδά, πρέπει να ξεπεράσει πολλά εμπόδια για να ξανθαρχίσει μια καριέρα στον υψηλό κόσμο της ιατρικής έκτακτης ανάγκης." },
  { id: 202, title: "Narcos: Μεξικό", year: 2018, country: "United States", genre: "Δράμα, Εγκλήματος", type: "Series", quality: "HD", rating: 8.3, actors: "José María Yázpik, Alejandro Edda, Scoot McNairy, Manuel Masalva, Diego Luna", director: "Andrés Baiz, Amat Escalante, Wagner Moura, Alonso Ruizpalacios, Alejandra Márquez Abella", writer: "Carlo Bernard, Doug Miro, Maggie Cohn, Eric Newman, Andrew Black", link: "https://1024terabox.com/s/1s5UOen1C6sc-8YDsvUcalQ", imdb: "https://www.imdb.com/title/tt8714904/", tmdb: "https://www.themoviedb.org/tv/80968", tagline: "Η ανείπωτη ιστορία του πρώτου καρτέλ του Μεξικού.", desc: "Παρακολουθήστε τη γέννηση του μεξικανικού πολέμου των ναρκωτικών τη δεκαετία του 1980 σ' ένα νέο, σκληρό \"Narcos\" που εξιστορεί την άνοδο του καρτέλ της Γουαδαλαχάρα." },
  { id: 203, title: "Taboo", year: 2017, country: "United Kingdom", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 8.3, actors: "Tom Hardy, David Hayman, Jonathan Pryce, Oona Chaplin, Richard Dixon", director: "Kristoffer Nyholm, Anders Engström", writer: "Steven Knight, Chips Hardy, Ben Hervey", link: "https://1024terabox.com/s/1qOTV0-h-IF_YQl7MBRaqtQ", imdb: "https://www.imdb.com/title/tt3647998/", tmdb: "https://www.themoviedb.org/tv/65708", tagline: "", desc: "Το 1814, o Τζέιμς Κεζάια Ντέλανεϊ, εξερευνητής που έχει φτάσει στα πέρατα της γης και θεωρούνταν νεκρός, επιστρέφει από την Αφρική στο σπίτι του στο Λονδίνο για να κληρονομήσει ό,τι έχει απομείνει από τη ναυτιλιακή αυτοκρατορία του πατέρα του και να χτίσει μια νέα ζωή. Με τους εχθρούς να παραμονεύουν σε κάθε σκοτεινή γωνιά όμως, ο Τζέιμς πρέπει να περιπλανηθεί σε περίπλοκα μονοπάτια για να αποφύγει τη δική του θανατική καταδίκη. Περικυκλωμένος από συνωμοσίες, δολοφονίες και προδοσίες, έρχεται αντιμέτωπος με ένα σκοτεινό οικογενειακό μυστήριο και μια ιστορία αγάπης." },
  { id: 204, title: "Missing", year: 2012, country: "United States", genre: "Μυστηρίου, Δράμα", type: "Series", quality: "HD", rating: 6.9, actors: "Ashley Judd, Cliff Curtis, Adriano Giannini, Nick Eversman, Laura Donnelly", director: "Phil Abraham, Steve Shill, James Strong", writer: "Gregory Poirier", link: "https://1024terabox.com/s/1wRz5aGklfq6f_AJZkNX71g", imdb: "https://www.imdb.com/title/tt1827327/", tmdb: "https://www.themoviedb.org/tv/39553", tagline: "She'll stop at nothing to find her son.", desc: "Becca Winstone learns that her son, Michael, disappears while studying abroad, and it's a race against time when she travels to Europe to track him down. A surprising turn of events reveals just how far one mother will go to protect her family. Exotic locations and thrilling twists will keep you riveted in \"Missing.\"" },
  { id: 205, title: "Dexter: Resurrection", year: 2025, country: "United States", genre: "Εγκλήματος, Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 9.1, actors: "Michael C. Hall, Uma Thurman, Jack Alcott, David Zayas, James Remar", director: "Marcos Siega, Monica Raymund", writer: "Marc Muszynski, Alexandra Franklin, Tony Saltzman, Scott Buck, Nick Zayas", link: "https://1024terabox.com/s/1DmffLquKkzDRH9qlDCa8_Q", imdb: "https://www.imdb.com/title/tt35471139/", tmdb: "https://www.themoviedb.org/tv/259909", tagline: "He's alive & killing it.", desc: "Dexter Morgan awakens from a coma to find Harrison gone without a trace. Realizing the weight of what he put his son through, Dexter sets out for New York City, determined to find him and make things right. But closure won't come easy. When Miami Metro's Angel Batista arrives with questions, Dexter realizes his past is catching up to him fast. As father and son navigate their own darkness in the city that never sleeps, they soon find themselves deeper than they ever imagined - and that the only way out is together." },
  { id: 206, title: "Τεχεράνη", year: 2020, country: "Israel", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.6, actors: "Niv Sultan, Shaun Toub, Shervin Alenabi, Menashe Noy, Liraz Charhi", director: "Daniel Syrkin", writer: "Moshe Zonder, Omri Shenhar, Tony Saint, Simon Allen", link: "https://1024terabox.com/s/1mOopxDtHxCdWtuAXRS-AMA", imdb: "", tmdb: "https://www.themoviedb.org/tv/103913", tagline: "Μια μυστική πράκτορας ξεκινά την πιο επικίνδυνη αποστολή της μέχρι σήμερα.", desc: "Η Ταμάρ είναι μια χάκερ πράκτορας της Μοσάντ, που διεισδύει στην Τεχεράνη με ψεύτικη ταυτότητα για να βοηθήσει στην καταστροφή του πυρηνικού αντιδραστήρα του Ιράν. Όταν, όμως, η αποστολή της αποτυγχάνει και παγιδεύεται σε μια νέα ζωή, η Ταμάρ πρέπει να σχεδιάσει μια επιχείρηση που θα βάλει σε κίνδυνο όλα τα αγαπημένα της πρόσωπα." },

{ id: 207, title: "The Lowdown", year: 2025, country: "United States", genre: "Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 7.3, actors: "Ethan Hawke, Keith David, Michael Hitchcock, Jeanne Tripplehorn, Tim Blake Nelson", director: "Sterlin Harjo, Macon Blair, Danis Goulet", writer: "Liz Blood, Scott Teems, Olivia Purnell, Sterlin Harjo, Duffy Boudreau", link: "https://1024terabox.com/s/1gAxPIvuVLrxjzVUDtDNaXw", imdb: "", tmdb: "https://www.themoviedb.org/tv/273247", tagline: "Unearthing lies is a dirty business.", desc: "Ένας αποφασισμένος ιδιοκτήτης βιβλιοπωλείου στην Τάλσα (Ethan Hawke) εργάζεται και ως ερευνητής δημοσιογράφος, ερευνώντας την τοπική διαφθορά. Όταν το ρεπορτάζ του αποκαλύπτει σκοτεινές διασυνδέσεις, πρέπει να προστατεύσει τόσο την οικογένειά του όσο και την αλήθεια." },

{ id: 208, title: "Ο Οίκος του Δαβίδ", year: 2025, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.4, actors: "Michael Iskander, Alexander Uloom, Ali Suliman, Ayelet Zurer, Stephen Lang", director: "Jeff T. Thomas, Jon Gunn, Lynsey Miller, Jon Erwin", writer: "N.D. Wilson, Jonathan Walker, Jon Gunn, Bekah Hubbell, Laura Kenar", link: "https://1024terabox.com/s/1eK8dzY9rna_CRzE1yrXJHw", imdb: "", tmdb: "https://www.themoviedb.org/tv/243881", tagline: "Καθώς o ένας ηγέτης πέφτει, ένας άλλος πρέπει να αναδειχθεί.", desc: "Αφηγείται την ιστορία της ανόδου του Δαβίδ, της βιβλικής φιγούρας που τελικά γίνεται ο πιο φημισμένος βασιλιάς του Ισραήλ. Η σειρά παρουσιάζει τον άλλοτε πανίσχυρο βασιλιά Σαούλ να πέφτει θύμα της ίδιας του της περιφάνιας. Με την καθοδήγηση του Θεού, ο προφήτης Σαμουήλ χρίζει νέο βασιλιά έναν άγνωστο, περιθωριακό έφηβο." },

{ id: 258, title: "Εγώ, ο Απαισιότατος 3", year: 2017, country: "United States", genre: "Δράσης, Κινούμενα Σχέδια, Κωμωδία, Οικογενειακή, Περιπέτεια", type: "Movie", quality: "HD", rating: 6.3, actors: "Steve Carell (φωνή), Kristen Wiig (φωνή), Trey Parker (φωνή), Miranda Cosgrove (φωνή), Dana Gaier (φωνή)", director: "Kyle Balda, Pierre Coffin", writer: "Ken Daurio, Cinco Paul", link: "https://terabox.com/s/11KRqVAKW8xW2sEqTlKaoyg", imdb: "", tmdb: "https://www.themoviedb.org/movie/324852", tagline: "Ωχ αδελφέ.", desc: "Ο αγαπημένος μας Γκρου, λοιπόν, επανέρχεται σε άλλη μια ξεκαρδιστική περιπέτεια για μικρούς και μεγάλους. Βλέπετε, εκεί που σχεδίαζε να κλέψει το φεγγάρι και να γίνει επιτέλους ένας πρωτοκλασάτος 'κακός', υιοθέτησε τρία μικρά κοριτσάκια, παντρεύτηκε την πράκτορα της Αντιτρομοκρατικής Λούσι και έπιασε κι εκείνος δουλειά στην Αντιτρομοκρατική. Τώρα, όμως, που έχει να αντιμετωπίσει τον Μπαλτάζαρ Μπρατ, ένα εμμονικό πρώην παιδί θαύμα της δεκαετίας του '80! που έχει εξελιχθεί σε παρανοϊκό κακοποιό, ο Γκρου τα βρίσκει σκούρα. Και σαν να μην έφτανε αυτό, ξαφνικά μαθαίνει πως έχει ένα δίδυμο αδελφό, τον Ντρου, που είναι όλα όσα ο Γκρου δεν είναι: όμορφος, πλούσιος, με μακριά, ξανθά μαλλιά και 'επαγγελματίας' κακοποιός!" },

{ id: 259, title: "Ενκάντο: Ένας Κόσμος Μαγικός", year: 2021, country: "United States", genre: "Κινούμενα Σχέδια, Κωμωδία, Οικογενειακή, Φαντασίας", type: "Movie", quality: "HD", rating: 7.2, actors: "Stephanie Beatriz (φωνή), María Cecilia Botero (φωνή), John Leguizamo (φωνή), Diane Guerrero (φωνή), Jessica Darrow (φωνή)", director: "Byron Howard, Jared Bush", writer: "Charise Castro Smith, Jared Bush", link: "https://terabox.com/s/1mw3aZPfK6ciub_zm8OjtFw", imdb: "", tmdb: "https://www.themoviedb.org/movie/568124", tagline: "Υπάρχει λίγη μαγεία σε όλους μας ...σχεδόν σε όλους μας.", desc: "Η ιστορία μιας παράδοξης οικογένειας, των Μαδριγάλ, που ζουν κρυμμένοι μέσα στα βουνά της Κολομβίας, σε ένα μαγικό σπίτι μιας πολύβουης πόλης, σε ένα υπέροχο, μαγεμένο μέρος ονόματι Ενκάντο. Η μαγεία του Ενκάντο έχει δωρίσει σε όλα τα παιδιά της οικογένειας ένα μοναδικό χάρισμα, από υπερδύναμη μέχρι και το χάρισμα της ίασης, σε όλα τα παιδιά, εκτός από ένα, τη Μιραμπέλ. Αλλά όταν ανακαλύπτει ότι η μαγεία, που περιβάλλει το Ενκάντο, βρίσκεται σε κίνδυνο, η Μιραμπέλ αποφασίζει ότι εκείνη, η μόνη συνηθισμένη Μαδριγάλ, ίσως είναι η τελευταία ελπίδα της μοναδικής οικογένειάς της." },

{ id: 261, title: "Ζουμπαίος και Ιουλιέτα 2: Σέρλοκ Ζουμπόμος", year: 2018, country: "United States", genre: "Κινούμενα Σχέδια, Οικογενειακή, Φαντασίας, Κωμωδία, Περιπέτεια, Μυστηρίου", type: "Movie", quality: "HD", rating: 5.3, actors: "Johnny Depp (φωνή), Emily Blunt (φωνή), James McAvoy (φωνή), Chiwetel Ejiofor, Mary J. Blige (φωνή)", director: "John Stevenson", writer: "Ben Zazove", link: "https://terabox.com/s/10Be-tvoIh9LrqaRNJZlJ3Q", imdb: "", tmdb: "https://www.themoviedb.org/movie/370567", tagline: "Μικρός Ντετέκτιβ. Μεγάλη Περιπέτεια.", desc: "Οι πολυαγαπημένοι μας νάνοι των κήπων βιώνουν μια θεότρελη περιπέτεια στο Λονδίνο. Όταν ο Ζουμπαίος και η Ιουλιέτα φτάνουν στην πόλη παρέα με τους φίλους και την οικογένειά τους, η μεγαλύτερή τους ανησυχία είναι να προλάβουν να προετοιμάσουν το νέο τους κήπο για την άνοιξη. Γρήγορα, όμως συνειδητοποιούν ότι κάποιος απαγάγει νάνους του κήπου και η μόνη λύση ακούει στο όνομα Σέρλοκ Ζουμπόμος. Ο διάσημος ντετέκτιβ και ορκισμένος προστάτης των νάνων που ζουν στους κήπους του Λονδίνου, παρέα με τον πιστό του συνεργάτη Γουάτσον αναλαμβάνουν να λύσουν το μυστήριο και τίποτα στο Λονδίνο δεν πρόκειται να μείνει στη θέση του." },

{ id: 262, title: "Η Barbie Και Οι Αδελφούλες Της Σε Ενα Απίθανο Κουταβο-Κυνήγητό", year: 2016, country: "United States", genre: "Οικογενειακή, Κινούμενα Σχέδια", type: "Movie", quality: "HD", rating: 4.8, actors: "Erica Lindbeck (φωνή), Kazumi Evans (φωνή), Claire Margaret Corlett (φωνή), Alyssya Swales (φωνή), Mark Oliver (φωνή)", director: "Ken Cunningham, Conrad Helten, Michael Goguen", writer: "Kacey Arnold, Amy Wolfram", link: "https://terabox.com/s/1Rw0MRxbRc6RkumUe7acT9g", imdb: "", tmdb: "https://www.themoviedb.org/movie/417047", tagline: "", desc: "Η Μπάρμπι και οι αδελφούλες της ανακαλύπτουν πως όλα γίνονται καλύτερα αν τα κάνεις με παρέα σε αυτή την ηλιόλουστη περιπέτεια. Όταν τα κορίτσια και τα κατοικίδιά τους φτάνουν σε ένα τροπικό νησί για τον διαγωνισμό χορού της Chelsea, αποφασίζουν να κάνουν ένα ταξίδι για να παρακολουθήσουν το τοπικό Φεστιβάλ Αλόγων. Όταν όμως χάνουν τα κατοικίδιά τους εκεί, η περιπέτεια να τα βρουν ξεκινά." },

{ id: 264, title: "Η Αλίκη στη Χώρα των Θαυμάτων", year: 1951, country: "United States", genre: "Κινούμενα Σχέδια, Οικογενειακή, Φαντασίας, Περιπέτεια", type: "Movie", quality: "HD", rating: 7.3, actors: "Kathryn Beaumont (φωνή), Ed Wynn (φωνή), Richard Haydn (φωνή), Sterling Holloway (φωνή), Jerry Colonna (φωνή)", director: "Clyde Geronimi, Wilfred Jackson, Hamilton Luske", writer: "Lewis Carroll", link: "https://terabox.com/s/15gBROus-UgR05aHEtQo6Ow", imdb: "", tmdb: "https://www.themoviedb.org/movie/12092", tagline: "Η χώρα των θαυμάτων μέσα σε μια εικόνα!", desc: "Ένα ηλιόλουστο απόγευμα, η μικρή Αλίκη ακολουθεί ένα άσπρο κουνέλι που χώνεται σε μια τρύπα. Το ακολουθεί γρήγορα, πέφτει μέσα στο λαγούμι και μπαίνει στη χαρούμενη και τρελή χώρα των θαυμάτων. Όμορφα τραγούδια τη συντροφεύουν στο ταξίδι της, το οποίο κορυφώνεται όταν αντιμετωπίζει τη Βασίλισσα και το στρατό της από τραπουλόχαρτα!" },

{ id: 265, title: "Η Επόμενη Γενιά", year: 2015, country: "United States", genre: "Οικογενειακή, Περιπέτεια, Φαντασίας, Μουσική", type: "TV Movie", quality: "HD", rating: 6.3, actors: "Dove Cameron, Sofia Carson, Cameron Boyce, Booboo Stewart, Mitchell Hope", director: "Kenny Ortega", writer: "Josann McGibbon, Sara Parriott", link: "https://terabox.com/s/1BT2s6X61LMUE_gEO2Jp5zA", imdb: "", tmdb: "https://www.themoviedb.org/movie/277217", tagline: "Δεν είναι κακοί. Απλά γεννήθηκαν έτσι.", desc: "Έχουν περάσει 20 χρόνια από τότε που η Πεντάμορφη (Μπελ) και το Τέρας παντρεύτηκαν. Το Τέρας (που ξαναπήρε την όψη του όμορφου πρίγκιπα) ένωσε όλα τα γύρω βασίλεια σε ένα και εκλέχτηκε βασιλιάς του Όρεντον. Όλοι οι διάσημοι κακοί και οι συνεργάτες τους έχουν εξοριστεί στο Νησί των Χαμένων και ένα μαγικό φράγμα τους κρατά απομονωμένους εκεί. Ο πρίγκιπας Μπεν όμως, ο γιος του Τέρατος και της Μπελ, λίγο πριν τη στέψη του αποφασίζει να επιτρέψει στα παιδιά 4 κακών από το Νησί των Χαμένων να ζήσουν στο Όρεντον. Αυτά είναι ο γιος της Κρούελα ντε Βιλ, ο γιος του Τζαφάρ, η κόρη της Κακιάς Βασίλισσας και η κόρη της πιο κακιάς μάγισσας, της Μαλέφισεντ. Θα μπορέσουν οι 4 απόγονοι να εξιλεωθούν για τα 'αμαρτήματα' των γονέων τους ή θα βρουν την ευκαιρία να εκδικηθούν γι' αυτούς;" },

{ id: 266, title: "Η Εποχή των Παγετώνων 4: Ο Χορός των Ηπείρων", year: 2012, country: "United States", genre: "Κινούμενα Σχέδια, Κωμωδία, Περιπέτεια, Οικογενειακή", type: "Movie", quality: "HD", rating: 6.5, actors: "Ray Romano (φωνή), John Leguizamo (φωνή), Denis Leary (φωνή), Seann William Scott (φωνή), Josh Peck (φωνή)", director: "Mike Thurmeier, Steve Martino", writer: "Michael Berg, Jason Fuchs", link: "https://terabox.com/s/1p6S2apNT2srGm4WQBp1WMQ", imdb: "", tmdb: "https://www.themoviedb.org/movie/57800", tagline: "Το τέλος του κόσμου είναι απλά η κορυφή του παγόβουνου", desc: "Κατακλυσμική σεισμική δραστηριότητα παρασύρει τους Μάνι, Σιντ και Ντιέγκο στα ανοιχτά του ωκεανού. Κι ενώ οι τρεις φίλοι πασχίζουν να γυρίσουν πίσω, έρχονται αντιμέτωποι με άγνωστα θαλάσσια πλάσματα κι άδικτους πειρατές." },

{ id: 267, title: "Η Εποχή των Παγετώνων: Σε Τροχιά Σύγκρουσης", year: 2016, country: "United States", genre: "Περιπέτεια, Κινούμενα Σχέδια, Οικογενειακή, Κωμωδία, Επιστ. Φαντασίας", type: "Movie", quality: "HD", rating: 5.7, actors: "Ray Romano (φωνή), John Leguizamo (φωνή), Denis Leary (φωνή), Queen Latifah (φωνή), Seann William Scott (φωνή)", director: "Mike Thurmeier", writer: "Michael J. Wilson, Michael Berg, Yoni Brenner", link: "https://terabox.com/s/1OZKY6_by3untwmgiXrtUaQ", imdb: "", tmdb: "https://www.themoviedb.org/movie/278154", tagline: "Ένα μικρό βήμα. Ένας τεράστιος μπελάς.", desc: "Το αέναο κυνήγι του Σκρατ για το βελανίδι του τον εκτοξεύει στο διάστημα, όπου κατά λάθος ξεκινά μια σειρά γεγονότων που αλλάζουν και απειλούν τον κόσμο της Εποχής των Παγετώνων. Στην προσπάθειά τους να σωθούν, ο Σιντ, ο Μάνι, ο Ντιέγκο και οι υπόλοιποι της αγέλης θα αφήσουν το σπίτι τους για μια αποστολή γεμάτη χιούμορ και περιπέτεια, ταξιδεύοντας σε εξωτικά νέα μέρη και συναντώντας διάφορους εκκεντρικούς χαρακτήρες." },

{ id: 271, title: "Η Οικογένεια Άνταμς", year: 2019, country: "Canada", genre: "Οικογενειακή, Κινούμενα Σχέδια, Κωμωδία, Φαντασίας", type: "Movie", quality: "HD", rating: 5.8, actors: "Oscar Isaac (φωνή), Charlize Theron (φωνή), Chloë Grace Moretz (φωνή), Finn Wolfhard (φωνή), Nick Kroll (φωνή)", director: "Conrad Vernon, Greg Tiernan", writer: "Matt Lieberman, Pamela Pettler", link: "https://terabox.com/s/1ydmjO6ryGhhjRJ37wfLPjg", imdb: "", tmdb: "https://www.themoviedb.org/movie/481084", tagline: "Πιστεύεις ότι η οικογένεια σου είναι παράξενη;", desc: "Ετοιμαστείτε να χτυπήσετε τα δάχτυλά σας! Η Οικογένεια Άνταμς επιστρέφει στη μεγάλη οθόνη στην πρώτη κωμωδία κινουμένων σχεδίων για αυτήν την παράξενη, ανατριχιαστική οικογένεια. Μπορεί να νομίζεις πως η οικογένειά σου είναι περίεργη, όμως αυτή η απόμακρη, εκκεντρική και τελείως αλλόκοτη Οικογένεια, θα σε κάνει να το ξανασκεφτείς!" },

{ id: 272, title: "Η Ράγια και ο Τελευταίος Δράκος", year: 2021, country: "United States", genre: "Κινούμενα Σχέδια, Οικογενειακή, Φαντασίας, Δράσης, Περιπέτεια", type: "Movie", quality: "HD", rating: 7.3, actors: "Kelly Marie Tran (φωνή), Awkwafina (φωνή), Gemma Chan (φωνή), Alan Tudyk (φωνή), Izaac Wang (φωνή)", director: "Don Hall, Carlos López Estrada", writer: "Qui Nguyen, Adele Lim", link: "https://terabox.com/s/1q2fWUjLOapGJYapqAX4Vqw", imdb: "", tmdb: "https://www.themoviedb.org/movie/527774", tagline: "Αποστολή της να σώσει τον κόσμο.", desc: "Πριν πολλά πολλά χρόνια, στο φανταστικό βασίλειο της Κουμάνδρα, δράκοι και άνθρωποι ζούσαν αρμονικά. Με την απειλή των μοχθηρών δαιμόνων Drunn, οι δράκοι θυσιάστηκαν για να σώσουν την ανθρωπότητα. Πεντακόσια χρόνια μετά, οι δαίμονες επανεμφανίστηκαν και η Ράια, μια νέα και γενναία πολεμίστρα, είναι αποφασισμένη να βρει τον τελευταίο δράκο που θα τους σώσει μια και καλή. Στο ταξίδι της αυτό, θα συνειδητοποιήσει ότι πέρα από τη μαγεία των δράκων, χρειάζεται και πίστη για να σωθεί η ανθρωπότητα." },

{ id: 273, title: "Η Τίνκερμπελ και η Μεγάλη Νεραϊδοδιάσωση", year: 2010, country: "United States", genre: "Κινούμενα Σχέδια, Περιπέτεια, Οικογενειακή, Φαντασίας", type: "Movie", quality: "HD", rating: 6.8, actors: "Mae Whitman (φωνή), Lauren Mote (φωνή), Michael Sheen (φωνή), Pamela Adlon (φωνή), Lucy Liu (φωνή)", director: "Bradley Raymond", writer: "Paul Germain, Rob Muir, Joe Ansolabehere, Bob Hilgenberg", link: "https://terabox.com/s/1__kJ7_T4p6jNoCqPh_JAcg", imdb: "", tmdb: "https://www.themoviedb.org/movie/44683", tagline: "", desc: "Η Τίνκερμπελ παγιδεύεται στο σπίτι της εννιάχρονης Λίζι, ενός μοναχικού κοριτσιού που μεγαλώνει με τον επιστήμονα πατέρα της. Έτσι, οι υπόλοιπες νεράιδες θα οργανώσουν μια επιχείρηση διάσωσης, για να μην αποκαλυφθεί το μυστικό της ύπαρξής τους στους ανθρώπους." },

{ id: 274, title: "Η Τίνκερμπελ και το Μυστικό των Νεραϊδοφτερών", year: 2012, country: "United States", genre: "Κινούμενα Σχέδια, Οικογενειακή, Φαντασίας, Περιπέτεια", type: "Movie", quality: "HD", rating: 7.0, actors: "Mae Whitman (φωνή), Lucy Hale (φωνή), Timothy Dalton (φωνή), Jeff Bennett (φωνή), Lucy Liu (φωνή)", director: "Peggy Holmes", writer: "Ryan Rowe, Peggy Holmes, Bobs Gannaway, Tom Rogers", link: "https://terabox.com/s/1puUJR3WV3oib9C-7zhJmuQ", imdb: "", tmdb: "https://www.themoviedb.org/movie/75258", tagline: "Δύο κόσμοι. Ένα μαγικό μυστικό.", desc: "Η Τίνκερμπελ ξέρει ότι το Δάσος του Χειμώνα είναι μια απαγορευμένη περιοχή, αφού αν βρεθεί εκεί, κινδυνεύει να καταστρέψει τα φτερά της. Ωστόσο η περιέργειά της την οδηγεί στον μυστηριώδη αυτόν τόπο, όπου θα της συμβούν καταπληκτικά πράγματα. Τα φτερά της όχι μόνο δεν καταστρέφονται, αλλά αρχίζουν να λαμπυρίζουν. Κι όχι μόνο αυτό. Η Τίνκερμπελ θα συναντήσει την Κυάνεια της οποίας τα φτερά θα λαμπυρίσουν κι αυτά, μόλις οι δυο τους έρθουν κοντά. Πολύ σύντομα θα ανακαλύψουν ότι είναι αδελφές και μια υπέροχη φιλία θα ανθίσει παρά όλα τα εμπόδια. Θα καταφέρουν να παραμείνουν κοντά χωρίς να θέσουν σε κίνδυνο το Καταφύγιο των Νεραϊδών;" },

{ id: 275, title: "Η Ταινία Lego 2", year: 2019, country: "Australia", genre: "Δράσης, Περιπέτεια, Κινούμενα Σχέδια, Κωμωδία, Οικογενειακή", type: "Movie", quality: "HD", rating: 6.5, actors: "Chris Pratt (φωνή), Elizabeth Banks (φωνή), Will Arnett (φωνή), Tiffany Haddish (φωνή), Stephanie Beatriz (φωνή)", director: "Mike Mitchell", writer: "Christopher Miller, Phil Lord", link: "https://terabox.com/s/18iAtwa1XHmEYg62o1G8Aqw", imdb: "", tmdb: "https://www.themoviedb.org/movie/280217", tagline: "Έρχονται ειρηνικά", desc: "Έχουν περάσει πέντε χρόνια από τότε που όλα κυλούσαν ήρεμα. Όμως τώρα οι πολίτες αντιμετωπίζουν μια τεράστια νέα απειλή: οι εισβολείς LEGO DUPLO από το διάστημα, καταστρέφουν τα πάντα στο πέρασμά τους με αστραπιαία ταχύτητα. Ο αγώνας για να τους νικήσουν και να αποκαταστήσουν το σύμπαν της LEGO, θα μεταφέρει τους Έμετ, Λούσι και Μπάτμαν, και τους φίλους τους σε απομακρυσμένους, ανεξερεύνητους κόσμους, συμπεριλαμβανομένου ενός παράξενου γαλαξία όπου όλα είναι μουσικά. Θα δοκιμάσει το θάρρος τους, τη δημιουργικότητά τους και τις δεξιότητές τους στο κτίσιμο, αλλά ταυτόχρονα θα τους κάνει να συνειδητοποιήσουν πόσο σημαντικοί είναι." },

{ id: 277, title: "Η Χαμένη Ατλαντίδα: Η Επιστροφή του Μάιλο", year: 2003, country: "United States", genre: "Φαντασίας, Κινούμενα Σχέδια, Επιστ. Φαντασίας, Οικογενειακή, Δράσης", type: "Movie", quality: "HD", rating: 5.0, actors: "James Arnold Taylor (φωνή), Cree Summer (φωνή), John Mahoney (φωνή), Jacqueline Obradors (φωνή), Don Novello (φωνή)", director: "Victor Cook, Tad Stones, Toby Shelton", writer: "Steve Englehart, Henry Gilroy, Tad Stones, Thomas Hart, Kevin Hopps", link: "https://terabox.com/s/1j4lxxtVBGMhDGm81o5X48g", imdb: "", tmdb: "https://www.themoviedb.org/movie/8965", tagline: "Νέες περιπέτειες.", desc: "Κατά τη διάρκεια της πρώτης τους αποστολής, ο Μάιλο Θατς και η παρέα του ανακάλυψαν τη θρυλική βυθισμένη πόλη της Ατλαντίδας και έσωσαν το βασίλειο και τους κατοίκους του. Τώρα, ο Μάιλο, η Κίντα και η παρέα τους ενώνουν και πάλι τις δυνάμεις τους και βγαίνουν στην επιφάνεια. Εκεί ψηλά στις παγωμένες κορυφές των Νορβηγικών βουνών, η ομάδα θα βρεθεί αντιμέτωπη με γιγαντιαία θαλάσσια τέρατα, δυνατούς θρύλους και μυστηριώδη πνεύματα. Στη μέση της αποστολής τους, η Κίντα ανακαλύπτει τις αληθινές δυνάμεις της μαγικής κρυστάλλου της πατρίδας της. Καλείται τώρα να αποφασίσει αν πρέπει να κρατήσει κορυφή την ύπαρξη της Καρδιάς Της Ατλαντίδας ή να κάνει γνωστή τη λάμψη της σοφίας της και στον υπόλοιπο κόσμο Κρατήστε την αναπνοή σας και ετοιμαστείτε να βυθιστείτε στην απόλυτη περιπέτεια! Ο Μάιλο και η παρέα του σας περιμένουν!" },

{ id: 278, title: "Καλώς ήρθατε στο Monster High", year: 2016, country: "United States", genre: "Κινούμενα Σχέδια, Οικογενειακή", type: "Movie", quality: "HD", rating: 5.5, actors: "Debi Derryberry (φωνή), Cassandra Lee Morris (φωνή), Salli Saffioti (φωνή), Larissa Gallagher (φωνή), Cristina Milizia (φωνή)", director: "Olly Reid, Stephen Donnelly, Jun Falkenstein", writer: "Dana Starfield, Stephen Donnelly, Shane Amsterdam", link: "https://terabox.com/s/1wsldAlCo0So80ozbPhA8eg", imdb: "", tmdb: "https://www.themoviedb.org/movie/413736", tagline: "Welcome to the most clever, quirky and exciting monster-filled school imaginable!", desc: "Αναρωτιέσαι Πώς Ξεκίνησαν Όλα; Ακολούθησε με... το μάθημα σε λίγο ξεκινάει. Τα monsters παλιά κρύβονταν γιατί φοβόντουσαν πως θα κινδύνευαν αν οι άνθρωποι μάθαιναν την ύπαρξή τους. Ωστόσο η Ντακουλόρα, κόρη του Δράκουλα, μαζί με τις φίλες της ονειρεύτηκαν ένα σχολείο που όλοι θα είναι ευπρόσδεκτοι και αποδεκτοί για αυτό που είναι. Αποφασισμένες να τα καταφέρουν, οι φίλες γυρίζουν τον κόσμο για να σώσουν monsters που κρύβονται, ζουν συναρπαστικές περιπέτειες και αναζητούν νέους μαθητές για το σχολείο τους! Αλλά ακόμα και στα πιο απίθανα μέρη, κρύβονται κίνδυνοι. Ένα κακό ζόμπι βάζει σε κίνδυνο τη φιλία τους και όλοι οι μαθητές ζουν με το φόβο πως το μυστικό τους θα αποκαλυφθεί. Τα κορίτσια λοιπόν αποφασίζουν να σώσουν το σχολείο τους ώστε όλα τα monsters να έχουν ένα μέρος που θα αποδέχεται τη διαφορετικότητά τους!" },

{ id: 279, title: "Καρό Νίντζα", year: 2018, country: "Denmark", genre: "Κινούμενα Σχέδια, Κωμωδία, Περιπέτεια, Φαντασίας", type: "Movie", quality: "HD", rating: 7.1, actors: "Anders Matthesen, Herman Flesvig (φωνή), Emma Sehested Høeg (φωνή), Alfred Bjerre Larsen (φωνή), Ava Connolly", director: "Anders Matthesen, Thorbjørn Christoffersen", writer: "Anders Matthesen", link: "https://terabox.com/s/1uzS7__rRTNVNoYRyvzWNkw", imdb: "", tmdb: "https://www.themoviedb.org/movie/523536", tagline: "Ο καινούργιος καλύτερός σου φίλος!", desc: "Ο Άλεξ παίρνει μια κούκλα Νίντζα ως δώρο από τον θείο του, που επέστρεψε από ένα ταξίδι στην Ταϊλάνδη. Προς έκπληξή του διαπιστώνει ότι αυτή η κούκλα με την καρό στολή είναι ζωντανή κι έχει τη δύναμη να τον βοηθήσει να με τα προβλήματα που αντιμετωπίζει στο σχολείο. Ο Άλεξ θέλει να ανταποδώσει τη χάρη στον Καρό Νίντζα, αλλά σύντομα μαθαίνει ότι εκείνος βρίσκεται σε μια αποστολή εκδίκησης." },

{ id: 281, title: "Κοκκινοσκουφίτσα 1", year: 2005, country: "United States", genre: "Κινούμενα Σχέδια, Κωμωδία, Οικογενειακή, Εγκλήματος, Μουσική", type: "Movie", quality: "HD", rating: 6.5, actors: "Anne Hathaway (φωνή), Glenn Close (φωνή), Patrick Warburton (φωνή), Jim Belushi (φωνή), David Ogden Stiers (φωνή)", director: "Cory Edwards", writer: "Cory Edwards, Todd Edwards, Tony Leech", link: "https://terabox.com/s/1WxtuMa5NbQQ3_lPlJ4U9WQ", imdb: "", tmdb: "https://www.themoviedb.org/movie/10982", tagline: "Η Κοκκινοσκουφίτσα. Ο ξυλοκόπος. Η γιαγιάκα. Ο λύκος. Όχι ένα σύνηθες έγκλημα. Όχι οι συνηθισμένοι βασικοί ύποπτοι.", desc: "Η Κοκκινοσκουφίτσα επισκέπτεται τη γιαγιά της. Στο κρεβάτι περιμένει ο κακός λύκος. Τη στιγμή που ετοιμάζεται να τη φάει η γιαγιά βγαίνει από την ντουλάπα, δεμένη, ενώ ένας ξυλοκόπος εισβάλει στην καλύβα, κραδαίνοντας τσεκούρι. Επεμβαίνει η αστυνομία. Ένας βάτραχος-επιθεωρητής ζητάει από τους εμπλεκόμενους να του δώσουν καθένας τη δική του εκδοχή για το τι συνέβη." },

{ id: 282, title: "Κυνηγοί Τρολ: Το Ξύπνημα των Τιτάνων", year: 2021, country: "United States", genre: "Κινούμενα Σχέδια, Φαντασίας, Οικογενειακή, Δράσης, Περιπέτεια", type: "Movie", quality: "HD", rating: 6.6, actors: "Emile Hirsch (φωνή), Lexi Medrano (φωνή), Charlie Saxton (φωνή), Kelsey Grammer (φωνή), Alfred Molina (φωνή)", director: "Johane Matte, Francisco Ruiz Velasco, Andrew L. Schmidt", writer: "Guillermo del Toro, Dan Hageman, Kevin Hageman, Marc Guggenheim", link: "https://terabox.com/s/1AZI2fZsVngtXa32fX0XMTQ", imdb: "", tmdb: "https://www.themoviedb.org/movie/730840", tagline: "They will rise.", desc: "Η Αρκάντια μπορεί να μοιάζει με μια συνηθισμένη πόλη, αλλά βρίσκεται στη μέση μαγικών και μυστικιστικών γραμμών που την καθιστούν το επίκεντρο για πολλές μάχες ανάμεσα σε απόκοσμα πλάσματα, όπως τρολ, εξωγήινους και μάγους. Μετά τα γεγονότα της τριλογίας 'Tales of Arcadia', οι ήρωες των σειρών 'Trollhunters', '3Below' και 'Wizards', πρέπει να ενώσουν τις δυνάμεις τους για να προστατεύσουν την ανθρωπότητα από το μοχθηρό Απόκρυφο Τάγμα, το οποίο χρησιμοποιεί τη σκοτεινή και ανεξέλεγκτη μαγεία του για να καλέι αρχαίους τιτάνες που απειλούν να καταστρέψουν τον κόσμο." },

{ id: 287, title: "Μετα-Μορφωμένοι Πράκτορες", year: 2019, country: "United States", genre: "Κινούμενα Σχέδια, Δράσης, Περιπέτεια, Κωμωδία, Οικογενειακή", type: "Movie", quality: "HD", rating: 6.8, actors: "Will Smith (φωνή), Tom Holland (φωνή), Ben Mendelsohn (φωνή), Rashida Jones (φωνή), Karen Gillan (φωνή)", director: "Nick Bruno, Troy Quane", writer: "Brad Copeland, Lloyd Taylor", link: "https://terabox.com/s/1sszlOgs1bXdHy1fCmUBH2g", imdb: "", tmdb: "https://www.themoviedb.org/movie/431693", tagline: "Σούπερ κατάσκοπος. Σούπερ Φυγάς.", desc: "Ο υπερκατάσκοπος Λανς Στέρλινγκ και ο επιστήμονας Γουόλτερ Μπέκετ είναι σχεδόν αντίθετοι χαρακτήρες. Ο Λανς είναι χαρακτήρας ήπιων τόνων, γλυκός και ευγενής. Ο Γουόλτερ… δεν είναι. Αλλά αυτό που λείπει από τον Γουόλτερ στις κοινωνικές δεξιότητες το κερδίζει χάρη στην ευφυΐα και την εφευρετικότητά του, κατασκευάζοντας μοναδικά gadgets τα οποία χρησιμοποιεί ο Λανς στις επικές του αποστολές. Όταν όμως, τα γεγονότα παίρνουν μια αναπάντεχη τροπή, ο Γουόλτερ και ο Λανς ξαφνικά πρέπει να στηριχτούν μεταξύ τους για μια ακόμα φορά. Και αν αυτό το παράξενο ζευγάρι αδυνατεί να μάθει να δουλεύει σαν ομάδα, θα κινδυνέψει ολόκληρος ο κόσμος." },

{ id: 288, title: "Μια Πάπια, Μα Ποια Πάπια", year: 2018, country: "United States", genre: "Κινούμενα Σχέδια, Οικογενειακή, Περιπέτεια, Κωμωδία", type: "Movie", quality: "HD", rating: 5.8, actors: "Jim Gaffigan (φωνή), Zendaya (φωνή), Lance Lim (φωνή), Greg Proops (φωνή), Natasha Leggero (φωνή)", director: "Christopher Jenkins", writer: "Rob Muir, Christopher Jenkins, Scott Atkinson, Tegan West", link: "https://terabox.com/s/1_yPG9NaDNWXwTySVWZLQwA", imdb: "", tmdb: "https://www.themoviedb.org/movie/375107", tagline: "Η οικογένεια είναι μεγάλος μπελάς!", desc: "Δύο ορφανά παπάκια, η δυναμική, μόλις 16 ημερών Τσι και ο μικρότερος αδελφός της Τσάο, αποχωρίζονται από το σμήνος τους κατά λάθος εξαιτίας του φιγουρατζή ιπτάμενου Πενγκ, μιας αρσενικής χήνας που είναι ελεύθερο πνεύμα, ένας εργένης που προτιμά χίλιες φορές τα παράτολμα εναέρια ακροβατικά, αντί να συμμετέχει στις προετοιμασίες των υπολοίπων για την ετήσια μετανάστευση. Τα φοβισμένα παπάκια ζητάνε τη βοήθεια του Πενγκ για να επιστρέψουν στο σμήνος τους. Εκείνος αρνείται, αλλά ένας τραυματισμός στη φτερούγα του τον αναγκάζει να αλλάξει γνώμη. Οι τρεις τους θα ζήσουν μια μοναδική περιπέτεια, με εμπόδια και δυσκολίες που θα τους φέρει όμως πραγματικά κοντά. Ο Πενγκ αποδεικνύεται τελικά η καλύτερη πατρική φιγούρα που θα μπορούσαν να έχουν αυτά τα δύο ορφανά παπάκια!" },

{ id: 310, title: "Ο Κούμπο και οι Δύο Χορδές", year: 2016, country: "United States", genre: "Κινούμενα Σχέδια, Περιπέτεια, Οικογενειακή", type: "Movie", quality: "HD", rating: 7.7, actors: "Art Parkinson (φωνή), Charlize Theron (φωνή), Brenda Vaccaro (φωνή), Cary-Hiroyuki Tagawa (φωνή), Meyrick Murphy (φωνή)", director: "Travis Knight", writer: "Marc Haimes, Chris Butler", link: "https://terabox.com/s/1A2N6Q-hqVFausuJ_CSbZWA", imdb: "", tmdb: "https://www.themoviedb.org/movie/313297", tagline: "Να είσαι τολμηρός. Να είσαι γενναίος. Να είσαι επικός.", desc: "Στην αρχαία Ιαπωνία, ένα μικρό αγόρι, ο Κούμπο, ζει σε χωριό και φροντίζει τη μητέρα του. Όμως, ένα πνεύμα από το παρελθόν αναστατώνει τη ζωή του αναφλέγοντας μια παλιά βεντέτα. Αυτό θα προκαλέσει αναστάτωση στον κόσμο των θεών και των τεράτων, που όλα πλέον κυνηγούν τον Κούμπο. Για να επιβιώσει, πρέπει να εντοπίσει μια μαγική πανοπλία, την οποία κάποτε φορούσε ο πατέρας του, θρυλικός πολεμιστής σαμουράι." },

{ id: 318, title: "Ο Τζάστιν και οι Γενναίοι Ιππότες", year: 2013, country: "Spain", genre: "Κινούμενα Σχέδια, Περιπέτεια", type: "Movie", quality: "HD", rating: 6.0, actors: "Saoirse Ronan (φωνή), Freddie Highmore (φωνή), Antonio Banderas (φωνή), Mark Strong (φωνή), Julie Walters (φωνή)", director: "Manuel Sicilia", writer: "Matthew Jacobs, Manuel Sicilia", link: "https://terabox.com/s/1Fgum2nAzmSwGD82Jv11p5Q", imdb: "", tmdb: "https://www.themoviedb.org/movie/146381", tagline: "Κάθε βασίλειο χρειάζεται έναν ήρωα", desc: "Ένα παραμύθι για τη φιλία, την τιμή και το κουράγιο, Ο Τζάστιν ζει σε ένα βασίλειο όπου οι γραφειοκράτες εξουσιάζουν και οι ιππότες έχουν παραγκωνιστεί. Το όνειρό του είναι να γίνει ιππότης όπως ο παππούς του, αλλά ο πατέρας του, αρχισύμβουλος της βασίλισσας, θέλει να τον κάνει δικηγόρο. Όμως, ο Τζάστιν φεύγει από το βασίλειο αποζητώντας τη μοίρα που αυτός ζητάει. Μετά από πολλές περιπέτειες, θα βρεθεί να είναι αυτός που θα υπερασπιστεί το βασίλειο από τον εξορισμένο ιππότη Σερ Χεράκλειο." },

{ id: 322, title: "Οι Ευχούληδες 2: Παγκόσμια Περιοδεία", year: 2020, country: "United States", genre: "Οικογενειακή, Κινούμενα Σχέδια, Κωμωδία, Φαντασίας, Περιπέτεια, Μουσική", type: "Movie", quality: "HD", rating: 6.1, actors: "Anna Kendrick (φωνή), Justin Timberlake (φωνή), Ron Funches (φωνή), Rachel Bloom (φωνή), James Corden (φωνή)", director: "Walt Dohrn", writer: "Glenn Berger, Jonathan Aibel, Maya Forbes, Elizabeth Tippet, Wallace Wolodarsky", link: "https://terabox.com/s/1vx1QLg4RV1TNwaht-T8UIQ", imdb: "", tmdb: "https://www.themoviedb.org/movie/446893", tagline: "Η πιο χαρούμενη ταινία που έγινε ποτέ", desc: "Αυτή η φανταστική ιστορία, θα ταξιδέψει την Πόπη και τον Μπραντς σε μέρη που δεν έχουν καν φανταστεί, και θα ανακαλύψουν ότι η φυλή τους είναι μόλις μία από τις έξι φυλές των Ευχούληδων, οι οποίες είναι διασκορπισμένες σε έξι διαφορετικές τοποθεσίες και που η καθεμιά τους είναι αφιερωμένη σε ένα συγκεκριμένο είδος μουσικής: Φανκ, Κάντρι, Τέκνο, Κλασική, Ποπ και Ροκ. Ο κόσμος των Ευχούληδων με αυτό το ταξίδι, όχι μόνο θα μεγαλώσει, αλλά θα αποκτήσει νέο ρυθμό και πολλή ένταση. Ένα μέλος της αριστοκρατίας του σκληρού ροκ, η βασίλισσα Μπαρμπ με τη βοήθεια του πατέρα της, του βασιλιά, θέλουν να καταστρέψουν όλα τα υπόλοιπα είδη μουσικής και να επιβάλουν την κυριαρχία του ροκ. Η μοίρα του κόσμου τους βρίσκεται σε κίνδυνο, όμως η Πόπη και ο Μπραντς, μαζί με τους φίλους τους – θα επισκεφτούν μακρινούς τόπους για να ενώσουν όλους τους Ευχούληδες ενάντια στην Μπαρμπ." },

{ id: 339, title: "Πλανήτης Χαλκ", year: 2010, country: "United States", genre: "Επιστ. Φαντασίας, Κινούμενα Σχέδια, Δράσης, Φαντασίας", type: "Movie", quality: "HD", rating: 6.7, actors: "Rick D. Wasserman (φωνή), Lisa Ann Beley (φωνή), Mark Hildreth (φωνή), Liam O'Brien (φωνή), Kevin Michael Richardson (φωνή)", director: "Sam Liu", writer: "Greg Johnson", link: "https://terabox.com/s/14efFITPqgnFf2N3XVOwtBQ", imdb: "", tmdb: "https://www.themoviedb.org/movie/30675", tagline: "Θα σώσει η θα καταστρέψει τον κόσμο;", desc: "Όταν ένα τέρας, αδύνατο να το ελέγξεις, πολύ επικίνδυνο για να το αγνοήσεις. Έτσι, οι φοβερότεροι υπερήρωες της Γης το εξόρισαν στο διάστημα. Όμως τώρα, ο Απίθανος Hulk προσεγγίζεται στον απομακρυσμένο πλανήτη ΣΑΚΑΑΡ, τον οποίο κυβερνά ο τυραννικός Κόκκινος Βασιλιάς. Ο Hulk, πωλείται ως σκλάβος και γίνεται ο πιο επιτυχημένος μονομάχος του πλανήτη, όμως οι 'ιδιοκτήτες' του πρόκειται να λάβουν περισσότερα απ' ότι περίμεναν όταν εκείνος συμμαχεί με τους συμπολεμιστές του." },

{ id: 350, title: "Τα Μυαλά που Κουβαλάς", year: 2015, country: "United States", genre: "Κινούμενα Σχέδια, Οικογενειακή, Περιπέτεια, Δράμα, Κωμωδία", type: "Movie", quality: "HD", rating: 8.1, actors: "Amy Poehler (φωνή), Phyllis Smith (φωνή), Richard Kind (φωνή), Bill Hader (φωνή), Lewis Black (φωνή)", director: "Pete Docter", writer: "Meg LeFauve, Josh Cooley, Pete Docter", link: "https://terabox.com/s/1JRwk5jFmf_VQU4dQQEAy_w", imdb: "", tmdb: "https://www.themoviedb.org/movie/150540", tagline: "Γνώρισε τις φωνούλες μέσα στο κεφάλι σου", desc: "Το να μεγαλώνεις είναι ένας ανώμαλος δρόμος, και η Ράιλι δεν αποτελεί εξαίρεση στον κανόνα. Θα αναγκαστεί να ξεριζωθεί από τη ζωή της σε κεντρο-δυτική πολιτεία, όταν ο πατέρας της βρίσκει νέα δουλειά στο Σαν Φρανσίσκο. Όπως όλοι, η Ράιλι οδηγείται από τα συναισθήματά της: χαρά, φόβο, θυμό, αηδία και λύπη. Αυτά τα συναισθήματα ζουν στα Κεντρικά, το κέντρο ελέγχου στο μυαλό της μικρής και τη συμβουλεύουν σε κάθε της βήμα. Καθώς η Ράιλι και τα Συναισθήματά της προσπαθούν να προσαρμοστούν στη ζωή του Σαν Φρανσίσκο, στα Κεντρικά γίνεται ένας σάλος. Παρότι η Χαρά, το κύριο συναίσθημα της κοπέλας, προσπαθεί να κρατήσει μια αισιόδοξία, τα υπόλοιπα συναισθήματα παλεύουν να τα φέρουν βόλτα στη νέα πόλη, το νέο σπίτι και το νέο σχολείο." },

{ id: 381, title: "Έλιο", year: 2025, country: "United States", genre: "Οικογενειακή, Κωμωδία, Περιπέτεια, Κινούμενα Σχέδια, Επιστ. Φαντασίας", type: "Movie", quality: "HD", rating: 6.7, actors: "Yonas Kibreab (φωνή), Remy Edgerly (φωνή), Zoe Saldaña (φωνή), Brad Garrett (φωνή), Brandon Moon (φωνή)", director: "Domee Shi, Madeline Sharafian, Adrian Molina", writer: "Julia Cho, Mark Hammer, Mike Jones", link: "https://1024terabox.com/s/1oi55MX1V4JUygGq22rF3dg", imdb: "", tmdb: "https://www.themoviedb.org/movie/1022787", tagline: "Το σύμπαν πήρε... τον λάθος αριθμό", desc: "Ο 11χρονος Έλιο είναι ένας λάτρης του διαστήματος με ζωηρή φαντασία και ανυποχώρητη εμμονή με τους εξωγήινους, σε σημείο που εύχεται να πέσει θύμα διαστημικής απαγωγής! Μια σειρά από συμπτώσεις θα εκπληρώσουν την ευχή του και ο Έλιο θα διακτινιστεί βαθιά στο σύμπαν και συγκεκριμένα στο Communiverse, έναν διαπλανητικό οργανισμό με εκπροσώπους από κάθε λογής μακρινούς γαλαξίες. Εκεί, θα τον θεωρήσουν -λανθασμένα- αρχηγό της Γης και ο Έλιο θα πρέπει να συνεννοηθεί με εκκεντρικές εξωγήινες προσωπικότητες και να ανακαλύψει ποιος είναι ο προορισμός του." },

{ id: 382, title: "K-Pop: Κυνηγοί Δαιμόνων", year: 2025, country: "United States", genre: "Φαντασίας, Μουσική, Κωμωδία, Κινούμενα Σχέδια", type: "Movie", quality: "HD", rating: 7.5, actors: "Arden Cho (φωνή), May Hong (φωνή), Ji-young Yoo (φωνή), Ahn Hyo-seop (φωνή), Yunjin Kim (φωνή)", director: "Maggie Kang, Chris Appelhans", writer: "Maggie Kang, Danya Jimenez, Hannah McMechan, Chris Appelhans", link: "https://1024terabox.com/s/19ktj6TwnFO8Q3R6Bx-acRQ", imdb: "", tmdb: "https://www.themoviedb.org/movie/803796", tagline: "They sing. They dance. They battle demons.", desc: "Όταν οι σταρ της κορεατικής ποπ Ρούμι, Μίρα και Ζόι δεν γεμίζουν στάδια, χρησιμοποιούν τις μυστικές τους δυνάμεις για να προστατέψουν τους φαν από υπερφυσικές απειλές." },
{ id: 383, title: "Ζωούπολη", year: 2016, country: "United States", genre: "Κινούμενα Σχέδια, Περιπέτεια, Οικογενειακή, Κωμωδία", type: "Movie", quality: "HD", rating: 8.0, actors: "Ginnifer Goodwin (φωνή), Jason Bateman (φωνή), Idris Elba (φωνή), Jenny Slate (φωνή), Nate Torrence (φωνή)", director: "Byron Howard, Rich Moore", writer: "Jared Bush, Phil Johnston", link: "https://1024terabox.com/s/15OujkDsnZE2ciza3Uc5tJA", imdb: "https://www.imdb.com/title/tt2948356/", tmdb: "https://www.themoviedb.org/movie/269149", tagline: "Καλωσήρθατε στην αστική ζούγκλα", desc: "Στη Ζωούπολη, μια πόλη αποκλειστικά με ζώα, η αστυνομικός Τζούντι Χοπς, το πρώτο κουνέλι στην αστυνομία, είναι αποφασισμένη να αποδείξει την αξία της. Για αυτόν τον λόγο θέλει να κάνει άλμα στην καριέρα της λύνοντας μια υπόθεση, ακόμα κι αν σημαίνει ότι θα συνεργαστεί με τον Νικ Γουάιλντ, μια απατεώνισσα αλεπού, για να λύσει το μυστήριο." },
{ id: 384, title: "Ζωούπολη 2", year: 2025, country: "United States", genre: "Κινούμενα Σχέδια, Κωμωδία, Περιπέτεια, Οικογενειακή, Μυστηρίου", type: "Movie", quality: "HD", rating: 7.5, actors: "Ginnifer Goodwin (φωνή), Jason Bateman (φωνή), Ke Huy Quan (φωνή), Fortune Feimster (φωνή), Andy Samberg (φωνή)", director: "Jared Bush, Byron Howard", writer: "Jared Bush", link: "https://1024terabox.com/s/1rYWIyx9wkYsqVugSLX94xA", imdb: "https://www.imdb.com/title/tt16374352/", tmdb: "https://www.themoviedb.org/movie/1084242", tagline: "They're back with a twissst.", desc: "Οι νεοσύλλεκτοι αστυνομικοί Τζούντι Χοπς και Νικ Γουάιλντ βρίσκονται στα ίχνη ενός μεγάλου μυστηρίου όταν ο Γκάρι Ντε Φίντης καταφθάνει στη Ζωούπολη και σπέρνει το χάος στη μητρόπολη. Για να λύσουν την υπόθεση, η Τζούντι και ο Νικ πρέπει να λειτουργήσουν ως μυστικοί πράκτορες σε απροσδόκητα, νέα κατατόπια, ενώ η συνεργασία τους δοκιμάζεται όσο ποτέ ξανά." },
{ id: 385, title: "28 Οκτωβρίου Ώρα 5.30", year: 1971, country: "Greece", genre: "Πολεμική", type: "Movie", quality: "HD", rating: 5.3, actors: "Christos Politis, Vera Krouska, Fernando Sancho, Lakis Komninos, Dimitris Bislanis", director: "Kostas Karagiannis", writer: "Dionysis Tzefronis", link: "https://terabox.com/s/18__jntBOjtDwfvvWer8W8g", imdb: "https://www.imdb.com/title/tt0254110/", tmdb: "https://www.themoviedb.org/movie/381223", tagline: "", desc: "Η κήρυξη του πολέμου βρίσκει τους κατοίκους ενός μικρού μακεδονικού χωριού, της Μικρής Λεύκας, σε γλέντια, αλλά τα παλικάρια σταματούν αμέσως το χορό και ξεκινούν για τον πόλεμο. Με την κατάρρευση του μετώπου, οι Γερμανοί μπαίνουν στο χωριό και ο διοικητής τους μετατρέπει το κρατικό εργοστάσιο ξυλείας σε εργοστάσιο κατασκευής πολεμοφοδίων. Υποχρεώνει τους κατοίκους να δουλεύουν σ' αυτό. Μέσα σε κλίμα βίας και τρομοκρατίας, το πνεύμα της αντίστασης φουντώνει, μέχρι που έρχεται η μέρα της απελευθέρωσης και μια νέα ζωή αρχίζει." },
{ id: 386, title: "Άλλος... για το Εκατομμύριο!", year: 1964, country: "Greece", genre: "Κωμωδία", type: "Movie", quality: "HD", rating: 6.0, actors: "Mimis Fotopoulos, Beata Asimakopoulou, Marika Krevata, Vasilis Avlonitis, Giannis Gionakis", director: "Orestis Laskos", writer: "Nikos Tsiforos, Polyvios Vasileiadis", link: "https://terabox.com/s/1b57T6wLUMYPSYzU9xLPsRw", imdb: "https://www.imdb.com/title/tt0276774/", tmdb: "https://www.themoviedb.org/movie/332702", tagline: "", desc: "Ένας μέχρι βλακείας τίμιος υπάλληλος κρατάει για λογαριασμό του διευθυντή του ένα εκατομμύριο χωρίς αποδείξεις. Τα προβλήματα θα αρχίσουν όταν ο διευθυντής πεθαίνει σε αεροπορικό δυστύχημα και ο τίμιος υπάλληλος πρέπει να γυρίσει το ποσό στους νόμιμους κληρονόμους. Βασισμένο στο θεατρικό έργο των Τσιφόρου - Βασιλειάδη \"Ο τελευταίος τίμιος\"." },
{ id: 387, title: "Ένας Ήρως με Παντούφλες", year: 1958, country: "Greece", genre: "Κωμωδία, Δράμα", type: "Movie", quality: "HD", rating: 7.8, actors: "Vasilis Logothetidis, Ilia Livykou, Nitsa Tsaganea, Sonia Zoidou, Lavrentis Dianellos", director: "Alekos Sakellarios", writer: "Christos Giannakopoulos", link: "https://terabox.com/s/1q7stp154tnMcDpgOfn86Xw", imdb: "https://www.imdb.com/title/tt0232036/", tmdb: "https://www.themoviedb.org/movie/405417", tagline: "", desc: "Ο απόστρατος στρατηγός Λάμπρος Δεκαβάλλας, που ζει φτωχικά πλην όμως έντιμα με τη γυναίκα του Ειρήνη και την κόρη του Πόπη, δέχεται την επίσκεψη του μέλλοντα γαμπρού του, ο οποίος του ανακοινώνει ότι σκοπεύει να ξενιτευτεί στην Αυστραλία, για να βγάλει λεφτά και να παντρευτεί την Πόπη. Την ίδια μέρα, ο Δεκαβάλλας δέχεται και την επίσκεψη του εξαδέλφου του Απόστολου, ο οποίος τον πληροφορεί ότι η πατρίδα, για να τον τιμήσει, αποφάσισε να αναγείρει τον ανδριάντα του, στη μικρή πλατεία μπροστά στο σπίτι του." },
{ id: 388, title: "Ένας ζόρικος δεκανέας", year: 1964, country: "Greece", genre: "Κωμωδία", type: "Movie", quality: "HD", rating: 5.0, actors: "Kostas Hatzihristos, Martha Karagianni, Koulis Stoligas, Nelly Pappa, Kostas Naos", director: "Vassilis Mariolis", writer: "Ilias Lyberopoulos", link: "https://terabox.com/s/1KA0NnYUD1pXe-lgnpstaMQ", imdb: "https://www.imdb.com/title/tt0234414/", tmdb: "https://www.themoviedb.org/movie/645663", tagline: "", desc: "Ο αφελής δεκανέας Θανάσης Πρασινάδας, υπασπιστής του συνταγματάρχη Πέτρου Παυλάρα, είναι ερωτευμένος με τη ζωηρούλα Φρόσω, υπηρέτρια του διοικητή του, την οποία και θέλει να κάνει γυναίκα του. Όταν ο Παυλάρας αποφασίζει να παντρέψει τον γιο του Γιώργο με τη Ρένα, την ανιψιά της μακαρίτισσας γυναίκας του, παρά τις αντιρρήσεις του δικηγόρου του Αλέκου Παπαδόπουλου, η Φρόσω θυμώνει και εξαναγκάζει τον Θανάση να συνδράμει τους δύο νέους για να παντρευτούν αυτούς που θέλουν: ο Γιώργος την τραγουδίστρια Μπέλλα Μαράκη κι η Ρένα τον Ορφέα της." },
{ id: 389, title: "Ένας Ιππότης για τη Βασούλα", year: 1968, country: "Greece", genre: "Μουσική, Κωμωδία", type: "Movie", quality: "HD", rating: 6.0, actors: "Jenny Karezi, Faidon Georgitsis, Dionysis Papagiannopoulos, Giorgos Mihalakopoulos, Maria Foka", director: "Giannis Dalianidis", writer: "Giannis Dalianidis", link: "https://terabox.com/s/1yCb0aaxWuSo9OlxcGL2MTA", imdb: "https://www.imdb.com/title/tt0234415/", tmdb: "https://www.themoviedb.org/movie/307702", tagline: "", desc: "Μια πλούσια ηλικιωμένη χήρα ζει στο αρχοντικό της με συντροφιά το προσωπικό της, από το οποίο ξεχωρίζει η ρομαντική γραμματέας της Βασούλα, η οποία της διαβάζει ιπποτικά μυθιστορήματα. Ένα βράδυ από μια παρεξήγηση νομίζει πως η Βασούλα είναι παντρεμένη και όταν πεθαίνει, αφήνει ένα μεγάλο ποσό στη Βασούλα και τον υποτιθέμενο σύζυγό της. Και η Βασούλα προσπαθεί να πείσει τον νεαρό να την παντρευτεί για να πάρει την κληρονομιά..." },
{ id: 390, title: "Ένας τρελός τρελός αεροπειρατής", year: 1973, country: "Greece", genre: "Κωμωδία", type: "Movie", quality: "HD", rating: 4.5, actors: "Kostas Voutsas, Nikos Rizos, Ketty Papanika, Giannis Vogiatzis, Stavros Xenidis", director: "Kostas Karagiannis", writer: "Asimakis Gialamas, Costas Pretederis", link: "https://terabox.com/s/18Q_XILoBcFE1sgqOAzAqsg", imdb: "https://www.imdb.com/title/tt0234395/", tmdb: "https://www.themoviedb.org/movie/392797", tagline: "Enas trellos, trellos aeropeiratis", desc: "Η αεροπορική εταιρεία στην οποία εργάζονται δύο νεαρές αεροσυνοδοί δεν τους επιτρέπει τον γάμο, αναγκάζοντας αυτές και τους άντρες τους να ζουν όλοι μαζί, σε μια παράξενη συγκατοίκηση." },
{ id: 391, title: "Αλλοίμονο στους Νέους", year: 1961, country: "Greece", genre: "Κωμωδία, Ρομαντική, Φαντασίας", type: "Movie", quality: "HD", rating: 8.1, actors: "Dimitris Horn, Maro Kodou, Smaro Stefanidou, Spyros Mousouris, Andreas Douzos", director: "Alekos Sakellarios", writer: "Christos Giannakopoulos", link: "https://terabox.com/s/1Nc5lPrp1jpiKwdb7Nk747g", imdb: "https://www.imdb.com/title/tt0234412/", tmdb: "https://www.themoviedb.org/movie/409870", tagline: "", desc: "Δύο εύποροι και ηλικιωμένοι φίλοι, περνούν την ώρα τους παίζοντας σκάκι και συζητώντας. Ταυτόχρονα νοσταλγούν μια φτωχή νέα, την όμορφη Ρίτα. Ο Αγησίλαος, αναλογιζόμενος την ανέχειά της, σκέφτεται να της κάνει πρόταση γάμου, ενώ ο Ανδρέας δεν τολμά να το ομολογήσει. Σ' ένα όνειρο εμφανίζεται ο διάβολος και του προτείνει να ανταλλάξει την ψυχή του με τη νιότη. Ο Ανδρέας δέχεται μεν, αλλά συνειδητοποιεί ότι τα νιάτα δεν αρκούν για να κάνουν κάποιον ευτυχισμένο. Ξύπνιος και με ωριμότερη σκέψη, προτιμά να προικίσει τη Ρίτα ώστε να ευτυχήσει με τον αγαπημένο της." },
{ id: 392, title: "Ανθισμένη Αμυγδαλιά", year: 1959, country: "Greece", genre: "Ιστορική, Δράμα", type: "Movie", quality: "HD", rating: 6.3, actors: "Andreas Barkoulis, Kakia Analyti, Nikos Stavridis, Rita Mousouri, Kyveli Theohari", director: "Hristos Apostolou", writer: "Dimitris Giannoukakis", link: "https://terabox.com/s/1nIMiPSIXG-S2AkoPo4mxrw", imdb: "https://www.imdb.com/title/tt0234413/", tmdb: "https://www.themoviedb.org/movie/688164", tagline: "", desc: "Ένας χαρακτηριστικός καφετζής, ο Παναγής, είναι ερωτοχτυπημένος με την ευαίσθητη και φιλάσθενη Μαρίνα η οποία μένει απέναντι από το καφενείο του. Κάθε πρωί αφήνει στο παράθυρό της ένα άνθος, χωρίς όμως να τολμά να της εξομολογηθεί τον έρωτά του. Εκείνη γνωρίζεται με τον νεαρό και γοητευτικό ρομαντικό ποιητή Γεώργιο Δροσίνη ο οποίος συχνάζει στο καφενείο του Παναγή, και τον ερωτεύεται παράφορα. Ωστόσο, η αυστηρή μητέρα της, η Ερατώ, της απαγορεύει και την παραμικρή επαφή μαζί του. Ο Δροσίνης ερωτεύεται με τη σειρά του τη Μαρίνα, ενώ την όμορφη κοπέλα ζητάει σε γάμο ο γιατρός της. Η μητέρα αποδέχεται φυσικά αμέσως αλλά η Μαρίνα αρνείται κατηγορηματικά, όντας αποφασισμένη να περιμένει τον Δροσίνη που έχει μεταβεί στη Γερμανία για σπουδές. Το βράδυ του Μεγάλου Σαββάτου, ο ποιητής επιστρέφει και κάνει Ανάσταση με την αγαπημένη του, ενώ ο Παναγής βρίσκει το δικό του ταίρι στο πρόσωπο της καλύτερης φίλης της Μαρίνας, της Άννας, που από καιρό τώρα ήταν κρυφά ερωτευμένη μαζί του." },
{ id: 393, title: "Αριστοτέλης ο επιπόλαιος", year: 1970, country: "Greece", genre: "Κωμωδία", type: "Movie", quality: "HD", rating: 4.8, actors: "Nikos Stavridis, Mimis Fotopoulos, Katerina Yioulaki, Vana Lekarakou, Sofi Zanninou", director: "Giorgos Petridis", writer: "Napoleon Eleftheriou", link: "https://terabox.com/s/1sIakWTZjklBY_qJJ0QYO1w", imdb: "https://www.imdb.com/title/tt0234416/", tmdb: "https://www.themoviedb.org/movie/608796", tagline: "", desc: "Ένας εργοστασιάρχης ζυμαρικών με δύο αποτυχημένους γάμους, ο Αριστοτέλης Κολοκυθάς, είναι ξετρελαμένος με μια λαϊκή τραγουδίστρια, τη Μιρέλλα, και σκορπά για χάρη της τα λεφτά της επιχείρησής του, παρά τις φιλότιμες προσπάθειες του συνεταίρου του Ορέστη να τον συγκρατήσει και να τον συνετίσει. Όταν η επιχείρηση τελικά χρεοκοπεί, ο ήρωας σκέφτεται να φύγει στο Κογκό και να δουλέψει μαζί με τον δίδυμο αδελφό του, τον Βαγγέλη. Όλα όμως αλλάζουν όταν ο Βαγγέλης έρχεται στην Αθήνα και παίρνει την όλη κατάσταση στα χέρια του." },
{ id: 394, title: "Αχ! Αυτή η Γυναίκα μου", year: 1967, country: "Greece", genre: "Κωμωδία", type: "Movie", quality: "HD", rating: 6.4, actors: "Aliki Vougiouklaki, Dimitris Papamichael, Giannis Michalopoulos, Sapfo Notara, Despoina Stylianopoulou", director: "George Skalenakis", writer: "Nikos Tsiforos, Polyvios Vasileiadis", link: "https://terabox.com/s/1a6HbCSMwd2T5Is18MItu6Q", imdb: "https://www.imdb.com/title/tt0234417/", tmdb: "https://www.themoviedb.org/movie/301495", tagline: "", desc: "Ο Δημήτρης, ένας υπάλληλος, καλεί σε δείπνο το διευθυντή του, Χαρίλαο, ελπίζοντας σε γρήγορη προαγωγή. Ωστόσο η τυχαία συνάντηση του διευθυντή με τη Νίνα, σύζυγο του υπαλλήλου του, και ο τσακωμός τους, αφού αγνοούν ο ένας την ταυτότητα του άλλου, θα έχει τραγελαφικές συνέπειες." },
{ id: 395, title: "Γαμπρός για Κλάματα", year: 1962, country: "Greece", genre: "Κωμωδία", type: "Movie", quality: "HD", rating: 5.2, actors: "Thanasis Vengos, Vasilis Avlonitis, Despoina Stylianopoulou, Liana Orfanou, Nikos Fermas", director: "Kostas Karagiannis", writer: "Kostas Karagiannis", link: "https://terabox.com/s/1hCzB7REdanTITJp_Avx7cA", imdb: "https://www.imdb.com/title/tt0234418/", tmdb: "https://www.themoviedb.org/movie/533287", tagline: "", desc: "Ο Λουκάς, ένας μικροαπατεώνας που βρίσκεται στη φυλακή, προσπαθεί να εκμεταλλευτεί τις γνωριμίες με τους συγκρατούμενούς του, για να πιάσει την καλή όταν αποφυλακιστεί." },
{ id: 396, title: "Γλέντια Λεφτά κι Αγάπη", year: 1955, country: "Greece", genre: "Κωμωδία", type: "Movie", quality: "HD", rating: 6.3, actors: "Vasilis Avlonitis, Smaroula Giouli, Sperantza Vrana, Nikos Rizos, Giorgos Kabanellis", director: "Nikos Tsiforos", writer: "Nikos Tsiforos", link: "https://terabox.com/s/1TK9ivAJRzxTK0ChfV2oFqA", imdb: "https://www.imdb.com/title/tt0234419/", tmdb: "https://www.themoviedb.org/movie/307279", tagline: "", desc: "Μπερδέματα τριών φτωχών νεαρών επαρχιωτών οι οποίοι προσπαθούν να τα \"κουτσοβολέψουν\" στην πρωτεύουσα, σε μια εποχή μεγάλης μιζέριας, αλλά κι ελπίδας. Επικεφαλής της παρέας είναι ο Άγγελος, φοιτητής της νομικής, ο οποίος υποδέχεται τον πλούσιο θείο του Λαυρέντη, προερχόμενο από την Αμαλιάδα, με την κρυφή ελπίδα πως θα αλλάξει η τύχη του. Ο θείος, όμως, είναι πολύ άρρωστος κι ο γιατρός του συνιστά απόλυτη ηρεμία κι ανάπαυση. Η Γιουγιού, θεατρίνα και φιλενάδα του Άγγελου προτείνει το αντίθετο. Έτσι ο Άγγελος, μαζί με τους φουκαράδες συγχωριανούς του Δαμιανό και Σαράντη, αρχίζει να παρασύρει τον θείο σε γλέντια και στην κραιπάλη, με την ελπίδα πως κάποια στιγμή ο άρρωστος θα πεθάνει. Αλλά, η υγεία του θείου, μέρα τη μέρα, πηγαίνει όλο και καλύτερα, ο δε Άγγελος γνωρίζει την όμορφη Μυρτώ, την οποία ερωτεύεται σφόδρα. Αποφασίζει, λοιπόν, να τελειώσει τις σπουδές του και να συνδέσει τη ζωή του μαζί της, ενώ ο Δαμιανός και ο Σαράντης παραμένουν πάντα φουκαράδες, χωρίς παρηγοριά." },
{ id: 397, title: "Δεσποινίς Διευθυντής", year: 1964, country: "Greece", genre: "Κωμωδία", type: "Movie", quality: "HD", rating: 7.7, actors: "Jenny Karezi, Alekos Alexandrakis, Dionysis Papagiannopoulos, Lili Papayanni, Eleni Zafeiriou", director: "Dinos Dimopoulos", writer: "Asimakis Gialamas, Costas Pretederis", link: "https://terabox.com/s/1L9THlm-lRuT12_a87fFu5g", imdb: "https://www.imdb.com/title/tt0234420/", tmdb: "https://www.themoviedb.org/movie/57305", tagline: "", desc: "Η αυστηρή και τυπική διευθύντρια Λίλα Βασιλείου έχει υπό τις διαταγές της όλο το προσωπικό του τεχνικού γραφείου στο οποίο αναλαμβάνει τη διεύθυνση, παράλληλα όμως, ψάχνει να βρει τρόπους γοητείας για να κατακτήσει τον ζωηρό υπομηχανικό Αλέκο Σαμιωτάκη." },
{ id: 398, title: "Δεσποινίς ετών 39...", year: 1954, country: "Greece", genre: "Κωμωδία", type: "Movie", quality: "HD", rating: 7.4, actors: "Vasilis Logothetidis, Smaro Stefanidou, Ilia Livykou, Thanasis Tzeneralis, Stephanos Stratigos", director: "Alekos Sakellarios", writer: "Alekos Sakellarios, Christos Giannakopoulos", link: "https://terabox.com/s/19PUSmGb7K6dc7GDfuMPMfA", imdb: "https://www.imdb.com/title/tt0234421/", tmdb: "https://www.themoviedb.org/movie/484721", tagline: "", desc: "Ο Τηλέμαχος, είναι πολλά χρόνια αρραβωνιασμένος με τη Φωφώ, αλλά σαν καλός αδελφός περιμένει να παντρευτεί πρώτα η μεγαλύτερη αδελφή του Χρυσάνθη. Τα χρόνια όμως περνούν και η Χρυσάνθη δεν λέει να παντρευτεί. Έτσι, ο Τηλέμαχος αναγκάζεται να βάλει αγγελία αναζήτησης γαμπρού σε κάποια εφημερίδα." },
{ id: 399, title: "Διπλοπεννιές", year: 1966, country: "Greece", genre: "Κωμωδία, Μουσική", type: "Movie", quality: "HD", rating: 5.8, actors: "Aliki Vougiouklaki, Dimitris Papamichael, Vasilis Avlonitis, Dionysis Papagiannopoulos, Rika Dialina", director: "George Skalenakis", writer: "Alekos Sakellarios", link: "https://terabox.com/s/1Bnsz4gfPPjBOzZDBOX1Dfg", imdb: "https://www.imdb.com/title/tt0234422/", tmdb: "https://www.themoviedb.org/movie/453081", tagline: "", desc: "Ο Γρηγόρης δουλεύει σκληρά στις οικοδομές για να μπορέσει να κάνει όσο πιο άνετη μπορεί τη ζωή της Μαρίνας, που μόλις παντρεύτηκε. Στις οικοδομές θα τον ανακαλύψουν οι μουσικοί ενός λαϊκού κέντρου που θα τον πάρουν μαζί τους. Για ένα μικρό διάστημα θα δουλέψει και στις δύο δουλειές, αλλά πολύ σύντομα θα αφοσιωθεί μόνο στο τραγούδι. Η Μαρίνα δε βλέπει με καθόλου καλό μάτι τις σχέσεις του Γρηγόρη με τις πελάτισσες του κέντρου και κυρίως με την πλούσια κυρία Ρίκα..." },
{ id: 400, title: "Εκείνο Το Καλοκαίρι", year: 1971, country: "Greece", genre: "Ρομαντική", type: "Movie", quality: "HD", rating: 6.2, actors: "Elena Nathanail, Lakis Komninos, Andreas Filippides, Vasilis Andreopoulos", director: "Vasilis Georgiadis", writer: "", link: "https://terabox.com/s/1VtZ7_lGXL_gsI8EEaW_6Fw", imdb: "https://www.imdb.com/title/tt0234423/", tmdb: "https://www.themoviedb.org/movie/338498", tagline: "", desc: "Ένα ζευγάρι βρίσκεται σε διάσταση επί δύο χρόνια και στα πρόθυρα να πάρει διαζύγιο. Ο Πέτρος (Λάκης Κομνηνός) έρχεται από το Λονδίνο μετά από πρόσκληση της συζύγου του (Έλενα Ναθαναήλ) και η συνάντησή τους θερμαίνει και πάλι τον παλιό έρωτά τους. Ο Πέτρος είναι έτοιμος να ξεκινήσει μια νέα ζωή μαζί της, αλλά η ίδια είναι καταδικασμένη να πεθάνει από καρκίνο. Αυτό το καλοκαίρι θα είναι το τελευταίο και για τους δύο και το μόνο που έχει απομείνει στον Πέτρο είναι να σταθεί στο πλευρό του παιδιού τους. Τέλος παιδί και πατέρας πρέπει να ζήσουν μαζί με την προϋπόθεση να αγαπιούνται για μια ζωή." },
{ id: 401, title: "Ευτυχία", year: 2019, country: "Greece", genre: "Δράμα, Ιστορική", type: "Movie", quality: "HD", rating: 8.0, actors: "Karyofyllia Karabeti, Katia Goulioni, Pigmalion Dadakaridis, Thanos Tokakis, Dina Mihailidou", director: "Angelos Frantzis", writer: "Katerina Bei", link: "https://terabox.com/s/1RNUTE67DWP0_t4g68EwoSA", imdb: "https://www.imdb.com/title/tt10334580/", tmdb: "https://www.themoviedb.org/movie/654387", tagline: "Τη ζωή μου την περπάτησα όπως ήθελα", desc: "Ένα κορίτσι μικροπαντρεμένο ταξιδεύει από το Αϊδίνι στην Ελλάδα με τη μητέρα και τις δύο της κόρες. Στο πλοίο του ξενιτεμού παίρνει απόφαση να μην αφήσει τη ζωή να την προσπεράσει αλλά να τη ζήσει όπως θέλει." },
{ id: 402, title: "Η Αδελφή Μου Θέλει Ξύλο", year: 1966, country: "Greece", genre: "Κωμωδία", type: "Movie", quality: "HD", rating: 5.6, actors: "Giannis Gionakis, Niki Linardou, Dionysis Papagiannopoulos, Nikos Rizos, Vasilis Avlonitis", director: "Kostas Lyhnaras", writer: "Alekos Sakellarios", link: "https://terabox.com/s/1TEpZ2Ov1wtjlkk7AiChezg", imdb: "https://www.imdb.com/title/tt0234425/", tmdb: "https://www.themoviedb.org/movie/487373", tagline: "Μεταφορά του θεατρικού των Γιαννακόπουλου - Σακελλάριου \"Μις Βαγόνη\".", desc: "Ένας υπάλληλος προσπαθεί να αγοράσει ένα διαμερισματάκι για να το δώσει προίκα στη μικρότερη αδελφή του, και ζητάει δάνειο από το αφεντικό του." },
{ id: 403, title: "Η Αρχόντισσα κι ο Αλήτης", year: 1968, country: "Greece", genre: "Κωμωδία, Ρομαντική", type: "Movie", quality: "HD", rating: 5.5, actors: "Aliki Vougiouklaki, Dimitris Papamichael, Dionysis Papagiannopoulos, Floretta Zana, Lavrentis Dianellos", director: "Dinos Dimopoulos", writer: "Lakis Mihailidis", link: "https://1024terabox.com/s/1YGreVaakD_Uw7pF6iya8YA", imdb: "https://www.imdb.com/title/tt0234426/", tmdb: "https://www.themoviedb.org/movie/301494", tagline: "", desc: "Η κόρη ενός πλούσιου Κερκυραίου, η Ρένα, το σκάει από το σπίτι της για να αποφύγει το γάμο με τον ανόητο γιο ενός εφοπλιστή. Στη συνέχεια, μεταμφιέζεται αγόρι και ξεκινάει το δρόμο της με το όνομα Πίπης. Στο δρόμο προς τα Γιάννενα συναντά τον Λευτέρη, ένα φτωχόπαιδο που πηγαίνει να εργαστεί για να μαζέψει χρήματα και να παντρέψει την αδελφή του. Η αρχική συμπάθεια μετατρέπεται σε έρωτα όταν ο Λευτέρης καταλαβαίνει ότι ο Πίπης είναι γυναίκα, αλλά από μια παρεξήγηση, η Ρένα επιστρέφει στο σπίτι της νομίζοντας ότι ο Λευτέρης το μόνο που θέλει από εκείνη είναι τα χρήματα της αμοιβής που προσέφερε ο πατέρας της." },
{ id: 404, title: "Η Βουλευτίνα", year: 1966, country: "Greece", genre: "Κωμωδία", type: "Movie", quality: "HD", rating: 5.0, actors: "Rena Vlahopoulou, Stavros Xenidis, Alekos Tzanetakos, Dimitris Nikolaidis, Nitsa Marouda", director: "Kostas Karagiannis", writer: "Lakis Mihailidis", link: "https://terabox.com/s/1WaQqJoVkSQsotHkKmRubiA", imdb: "https://www.imdb.com/title/tt0234427/", tmdb: "https://www.themoviedb.org/movie/469434", tagline: "", desc: "Η Ρένα Βαρλάμου (Ρένα Βλαχοπούλου), γυναίκα τετραπέρατη και καπάτσα, αναλαμβάνει την προεκλογική εκστρατεία του αρραβωνιαστικού της Περικλή Αράπη (Σταύρος Ξενίδης), ενός ταβερνιάρη που έχει ιδρύσει κόμμα και θέλει σώνει και καλά να γίνει βουλευτής. Προσπαθεί να τον προσεγγίσει στην πραγματικότητα αλλά δεν τα καταφέρνει και, όταν ο Περικλής δεν εκλέγεται, απογοητεύεται η ίδια. Αιτία είναι ο ξαφνικός θάνατος του θείου της Ιάκωβου Μενεξέ, πολιτικού καριέρας, ο οποίος είχε επανεκλεγεί βουλευτής στο νησί τους. Ο Μενεξές την είχε συμπεριλάβει στο ψηφοδέλτιό του, ως επιλαχούσα, και η Ρένα παίρνει τη θέση του, γίνεται η πρώτη γυναίκα βουλευτής και αγωνίζεται ώστε να γίνουν κάποια σημαντικά έργα στον τόπο της." },
{ id: 405, title: "Η Σωφερίνα", year: 1964, country: "Greece", genre: "Κωμωδία", type: "Movie", quality: "HD", rating: 6.2, actors: "Aliki Vougiouklaki, Alekos Alexandrakis, Maro Kodou, Giorgos Panjas, Giorgos Konstantinou", director: "Alekos Sakellarios", writer: "Giorgos Roussos", link: "https://terabox.com/s/1CcF0Y4lN-vK2LGVW_SvtgQ", imdb: "https://www.imdb.com/title/tt0234428/", tmdb: "https://www.themoviedb.org/movie/301490", tagline: "", desc: "Η Μαίρη ζει ευτυχισμένη με τον άντρα της, Νίκο, ως τη μέρα που η στενή της φίλη, Λιλή, της ζητάει να δανειστεί για λίγο το αυτοκίνητό της. Στην πραγματικότητα, η Λιλή, που είναι παντρεμένη με τον ζηλιάρη Μιχαλάκη, έχει ένα παράνομο ραντεβού με το καινούργιο της φλερτ, τον Πάκη. Πηγαίνοντας να τον συναντήσει, παθαίνει ένα ατύχημα. Όταν επιστρέφει το αυτοκίνητο, η Μαίρη διαπιστώνει ότι είναι τρακαρισμένο σε πολλά σημεία. Ωστόσο, προκειμένου να υπερασπιστεί την υπόληψη της φίλης της και για να καλύψει ταυτόχρονα τις συζυγικές της αταξίες, η Μαίρη αναγκάζεται να πει ψέματα στον Νίκο. Το ένα ψέμα, όμως, φέρνει το άλλο και οι συνέπειες είναι απρόβλεπτες..." },
{ id: 406, title: "Η Τύχη μου Τρελλάθηκε", year: 1970, country: "Greece", genre: "Κωμωδία", type: "Movie", quality: "HD", rating: 5.1, actors: "Giannis Gionakis, Sotiris Moustakas, Alekos Tzanetakos, Sasa Kastoura, Eleni Theofilou", director: "Hristos Kyriakopoulos", writer: "Giorgos Lazaridis", link: "https://terabox.com/s/1aW6421RLKzQ4CMnFyEagGQ", imdb: "https://www.imdb.com/title/tt0234429/", tmdb: "https://www.themoviedb.org/movie/387524", tagline: "", desc: "Ένας κλητήρας (Γιάννης Γκιωνάκης) αδυνατεί να παντρευτεί την κοπέλα του (Σάσα Καστούρα), εξαιτίας των οικονομικών του προβλημάτων. Ο αδερφός (Αθηνόδωρος Προύσαλης) της κοπέλας, όμως, τον καταδιώκει απαιτώντας απ' αυτόν να αποκαταστήσει την τιμή της. Τα ίδια προβλήματα αντιμετωπίζει και ο γιος (Αλέκος Τζανετάκος) του αφεντικού του (Περικλής Χριστοφορίδης). Αλλάζουν θέσεις και ρόλους και ο κλητήρας καταφέρνει, μετά από πολλές δυσκολίες και παρεξηγήσεις, να πετύχει μια συμφέρουσα αγοραπωλησία, με την οποία εντυπωσιάζει το αφεντικό του, το οποίο του δίνει προαγωγή, επιτρέποντας επίσης στον γιο του να παντρευτεί τη γυναίκα που αγαπά." },
{ id: 407, title: "Η χαρτοπαίχτρα", year: 1964, country: "Greece", genre: "Κωμωδία", type: "Movie", quality: "HD", rating: 7.3, actors: "Rena Vlahopoulou, Labros Konstadaras, Kostas Voutsas, Lili Papayanni, Hloi Liaskou", director: "Giannis Dalianidis", writer: "Giannis Dalianidis", link: "https://terabox.com/s/1yvW0Amwd1edmO1sdMjXiEg", imdb: "https://www.imdb.com/title/tt0234430/", tmdb: "https://www.themoviedb.org/movie/297336", tagline: "", desc: "Μια παθιασμένη χαρτοπαίχτρα, η Αλέκα, έχει δημιουργήσει πολλά χρέη και αντιμετωπίζει προβλήματα τόσο με την οικογένειά της όσο και με τον αρραβωνιαστικό της κόρης της, τον οποίο θεωρεί μεγάλο γρουσούζη. Ο άντρας της για να την συνεφέρει και να την αναγκάσει να κόψει το ολέθριο πάθος της, φλερτάρει με την καλύτερη φίλη και συμπαίκτριά της." },
{ id: 408, title: "Κάθε εμπόδιο για καλό", year: 1958, country: "Greece", genre: "Κωμωδία", type: "Movie", quality: "HD", rating: 6.4, actors: "Smaroula Giouli, Dinos Iliopoulos, Periklis Hristoforidis, Rallis Angelidis, Thanasis Vengos", director: "Hristos Apostolou", writer: "Hristos Apostolou", link: "https://terabox.com/s/1_OZZQJZEqjQEvUt33P4GEA", imdb: "https://www.imdb.com/title/tt0234431/", tmdb: "https://www.themoviedb.org/movie/266243", tagline: "", desc: "Ο Κώστας, ένας μικρός δικηγόρος αναλαμβάνει να συνοδεύσει τη Σμαρώ, μια πλούσια κληρονόμο που ζει στην επαρχία και θέλει να κατεβεί στην Αθήνα για να πουλήσει την περιουσία της. Ο Κώστας όμως ξεκινάει με καθυστέρηση μιας μέρας, ενώ η Σμαρώ κατεβαίνει μόνη της στην Αθήνα. Τελικά, και μετά από πολλές περιπλανήσεις και παρεξηγήσεις θα συναντηθούν." },
{ id: 409, title: "Κόσμος και Κοσμάκης", year: 1964, country: "Greece", genre: "Κωμωδία", type: "Movie", quality: "HD", rating: 5.5, actors: "Nikos Stavridis, Giannis Gionakis, Beata Asimakopoulou, Stavros Paravas, Takis Miliadis", director: "Orestis Laskos", writer: "Giorgos Lazaridis", link: "https://terabox.com/s/1y8HyUADEZE7IjABXHrIMuw", imdb: "https://www.imdb.com/title/tt0234432/", tmdb: "https://www.themoviedb.org/movie/332712", tagline: "", desc: "Ο απατεωνίσκος Μάκης Καρίνης και η μνηστή του Ντόλα πλευρίζουν ένα νεόπλουτο επιχειρηματία, τον Αντώνη Καρτελή, για να τον μαδήσουν. Ο Καρτελής, όμως, δε θα είναι εύκολο θύμα. Ως άνθρωπος της πιάτσας, μυρίζεται τα σχέδιά τους και, μαζί με την κόρη του, σκαρώνει ένα κόλπο για να τους βάλει στη θέση τους. Όσο για την επιπόλαιη σύζυγο που θέλει για γαμπρό της έναν αριστοκράτη, σύντομα θα αλλάξει γνώμη..." },
{ id: 410, title: "Καπετάν Φάντης Μπαστούνι", year: 1968, country: "Greece", genre: "Κωμωδία", type: "Movie", quality: "HD", rating: 6.3, actors: "Labros Konstadaras, Maro Kodou, Lavrentis Dianellos, Dimitris Nikolaidis, Tasso Kavadia", director: "Alekos Sakellarios", writer: "Alekos Sakellarios", link: "https://terabox.com/s/1TfVKLQ5rxVJUWYN2_cS90g", imdb: "https://www.imdb.com/title/tt0234433/", tmdb: "https://www.themoviedb.org/movie/377117", tagline: "", desc: "Ένας νησιώτης καπετάνιος, ανακαλύπτει μια νέα κοπέλα μέσα στα ψυγεία του καραβιού του και της προσφέρει στέγη στο σπίτι του, αντίθετα με την επιθυμία των υπολοίπων συγγενών του. Όταν κάποια στιγμή, το πλοίο του βυθίζεται, οι συγγενείς του διώχνουν την κοπέλα από το σπίτι και κοιτάνε να του ξεκοκαλίσουν την περιουσία, χωρίς όμως να γνωρίζουν πως ο ίδιος έχει διασωθεί από το ναυάγιο." },
{ id: 411, title: "Κατάσκοπος Νέλλη", year: 1981, country: "Greece", genre: "Δράμα, Μουσική, Ρομαντική", type: "Movie", quality: "HD", rating: 4.3, actors: "Aliki Vougiouklaki, Faidon Georgitsis, Dinos Iliopoulos, Kaiti Lambropoulou, Makis Revmatas", director: "Takis Vougiouklakis", writer: "Nikos Foskolos", link: "https://terabox.com/s/1dNsJv67V4x4j5sVAF05jDQ", imdb: "https://www.imdb.com/title/tt0234434/", tmdb: "https://www.themoviedb.org/movie/365807", tagline: "", desc: "Στο Βερολίνο του 1936 μια ελληνίδα φοιτήτρια, η Νέλλη , εγκαταλείπει τις σπουδές της και με τη συνδρομή του εβραίου Μπίλυ Φόστερ κάνει το ντεμπούτο της ως τραγουδίστρια καμπαρέ. Δεν αργεί να γίνει πασίγνωστη και η φήμη της τραβά την προσοχή ενός συνταγματάρχη των Ες-Ες, του Χένριχ, ο οποίος την πολιορκεί στενά. Με την κήρυξη του πολέμου, η Νέλλη και ο Μπίλυ έρχονται στην Ελλάδα, και με την κατάληψη της χώρας από τους Γερμανούς περνούν στην Αντίσταση. Όταν ορισμένες ενέργειες των αντιστασιακών προδίδονται στους Γερμανούς, κάποιοι υποψιάζονται τη Νέλλη επειδή τραγουδά σε ένα κέντρο όπου συχνάζουν γερμανοί αξιωματικοί, αλλά ο καταδότης είναι ένας νεαρός συγγραφέας, ο Μπράιαν Ρόμπερτ, που ήταν ερωτευμένος με τη Νέλλη όταν βρίσκονταν στο Βερολίνο, ενώ τώρα είναι αξιωματικός των Ες-Ες." },
{ id: 412, title: "Κυριακάτικο Ξύπνημα", year: 1954, country: "Greece", genre: "Ρομαντική, Κωμωδία", type: "Movie", quality: "HD", rating: 7.4, actors: "Ellie Lambeti, Dimitris Horn, Giorgos Pappas, Tasso Kavadia, Margarita Papageorgiou", director: "Mihalis Kakogiannis", writer: "Mihalis Kakogiannis", link: "https://terabox.com/s/1MWhsOSetJnlSsIQbpN5Rsw", imdb: "https://www.imdb.com/title/tt0234435/", tmdb: "https://www.themoviedb.org/movie/199440", tagline: "", desc: "Μια νέα κοπέλα, η Μίνα, πρωί Κυριακής, πηγαίνει για μπάνιο. Αλλά στην παραλία δύο πιτσιρικάδες της κλέβουν την τσάντα, στην οποία υπάρχει ένα λαχείο. Οι πιτσιρικάδες το πουλάνε στον Αλέξη, έναν φτωχό μουσικό. Στην κλήρωση το λαχείο κερδίζει τον πρώτο αριθμό. Η Μίνα (που θα θυμηθεί τι αριθμό είχε το λαχείο) προσπαθεί να διεκδικήσει τα χρήματα, τα οποία όμως θα πάνε στον Αλέξη, ο οποίος είναι κάτοχος του λαχείου. Νιώθει συμπάθεια για τη Μίνα και θέλει να της δώσει το ένα τρίτο από τα κέρδη. Εκείνη δεν δέχεται -θέλει όλο το ποσό. Θέλει να προσφύγει στη Δικαιοσύνη, αλλά ο έρωτας θα την ενώσει με τον Αλέξη." },
{ id: 413, title: "Μερικοί Το Προτιμούν Κρύο...", year: 1963, country: "Greece", genre: "Κωμωδία, Μουσική", type: "Movie", quality: "HD", rating: 6.8, actors: "Dinos Iliopoulos, Zoe Laskari, Rena Vlahopoulou, Martha Karagianni, Vagelis Voulgaridis", director: "Giannis Dalianidis", writer: "Giannis Dalianidis", link: "https://terabox.com/s/13NjsVH4uokU6xdf2G_zklQ", imdb: "https://www.imdb.com/title/tt0234436/", tmdb: "https://www.themoviedb.org/movie/266255", tagline: "Some Like It Cold...", desc: "Ο Λάκης, υπάλληλος σε τράπεζα, ταλαιπωρεί την αρραβωνιαστικιά του διότι οι αρχές του δεν του επιτρέπουν να την παντρευτεί προτού αποκαταστήσει τις τρεις αδελφές του. Οι δύο μικρότερες θα γνωρίσουν δύο νεαρούς και θα τους ερωτευτούν. Η μεγαλύτερη όμως, επειδή αγαπάει κάποιον, απορρίπτει κάθε μνηστήρα που της παρουσιάζουν. Ο Λάκης παίζεται αφόρητα από τους τέσσερις αδελφούς της αγαπημένης του για να οριστεί ο γάμος τους. Στο τέλος, όλοι θα αποκατασταθούν και θα γνωρίσουν την ευτυχία." },
{ id: 414, title: "Μια Γυναίκα Στην Αντίσταση", year: 1970, country: "Greece", genre: "Πολεμική, Δράμα", type: "Movie", quality: "HD", rating: 5.5, actors: "Jenny Karezi, Kostas Kazakos, Angelos Antonopoulos, Alkis Yannakas, Kakia Panagiotou", director: "Dinos Dimopoulos", writer: "", link: "https://terabox.com/s/1_Spv5-00Bx5IqvaTFpBIBg", imdb: "https://www.imdb.com/title/tt0234437/", tmdb: "https://www.themoviedb.org/movie/492346", tagline: "", desc: "Την 27η Οκτωβρίου 1940, η Άννα γιορτάζει με τον αρραβωνιαστικό της Δημήτρη, τους γονείς και συγγενείς στο εξοχικό τους έξω από την Καστοριά. Την επόμενη μέρα, όποτε θα κηρυχτεί και ο πόλεμος, ο Δημήτρης, ο αδελφός της Γιώργος και ο αντισυνταγματάρχης πατέρας της θα βρεθούν στην πρώτη γραμμή. Ο Δημήτρης δεν θα αντέξει μακριά από την Άννα και με το αεροπλάνο του θα πάει να τη δει για λίγες ώρες με συνέπεια ο διοικητής του να τον θέσει υπό κράτηση. Εκείνος θα το σκάσει με το αεροπλάνο του, το οποίο οι Ιταλοί θα καταρρίψουν. Η Άννα μετά από αυτό το πλήγμα και αφού βρει την ψυχική της ηρεμία θα θελήσει να βοηθήσει την αντίσταση. Για να το καταφέρει αυτό θα δημιουργήσει σχέσεις με τον Χανς, διοικητή των γερμανικών στρατευμάτων στην Καστοριά." },
{ id: 415, title: "Μια Τρελή... Τρελή Σαραντάρα", year: 1970, country: "Greece", genre: "Ρομαντική, Κωμωδία", type: "Movie", quality: "HD", rating: 5.9, actors: "Rena Vlahopoulou, Andreas Barkoulis, Giannis Michalopoulos, Melpo Zarokosta, Tasso Kavadia", director: "Giannis Dalianidis", writer: "Alekos Sakellarios", link: "https://terabox.com/s/1fjaLk6hArPjJM0YZ2o9V5g", imdb: "https://www.imdb.com/title/tt0234438/", tmdb: "https://www.themoviedb.org/movie/365786", tagline: "", desc: "Μια σαραντάρα χήρα ερωτεύεται έναν νεαρό μουσικό. Τα αδέλφια της, όμως, την πιέζουν να παντρευτεί έναν πλούσιο αλλά κουφό άντρα. Η σαραντάρα θα προσπαθήσει να κάνει το χατίρι στα αδέλφια της, αλλά με τη βοήθεια μιας φίλης της, θα σκαρφιστούν ένα σχέδιο ώστε να βλέπεται με τον μουσικό κρυφά από τα αδέλφια της." },
