  { id: 79, title: "From", year: 2022, country: "United States", genre: "Μυστηρίου, Δράμα", type: "Series", quality: "HD", rating: 7.8, actors: "Harold Perrineau, Catalina Sandino Moreno, Eion Bailey, David Alpay, Elizabeth Saunders", director: "Jack Bender, Alexandra La Roche, Brad Turner, Jeff Renfroe, Jennifer Liao", writer: "John Griffin, Vivian Lee, Jeff Pinkner, Kristen Layden, Brigitte Hales", link: "https://terabox.com/s/101yydsBWdrK45BxmTdStiA", imdb: "https://www.imdb.com/title/tt12786982/", tmdb: "https://www.themoviedb.org/tv/124364", tagline: "", desc: "Η ιστορία εστιάζει σε μια εφιαλτική πόλη της κεντρικής Αμερικής, που παγιδεύει όποιον εισέρχεται σε αυτήν. Καθώς οι απρόθυμοι κάτοικοι παλεύουν για να διατηρήσουν μια αίσθηση κανονικότητας και να βρουν ένα τρόπο διαφυγής, την ίδια ώρα θα πρέπει να επιβιώσουν από τις απειλές που κρύβονται στο δάσος που περιβάλλει την πόλη, συμπεριλαμβανομένων και των τρομακτικών πλασμάτων που εμφανίζονται όταν δύει ο ήλιος." },
  { id: 80, title: "Hanna", year: 2019, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.6, actors: "Esme Creed-Miles, Mireille Enos, Dermot Mulroney, Joel Kinnaman, Noah Taylor", director: "Ugla Hauksdóttir, Eva Husson, Amy Neil, David Farr, Anders Engström", writer: "David Farr, Paul Waters, Charlotte Hamblin, Ingeborg Topsøe, Laura Lomas", link: "https://terabox.com/s/18BPYo2Bs33nZTcPdsRGIJg", imdb: "https://www.imdb.com/title/tt6932244/", tmdb: "https://www.themoviedb.org/tv/54155", tagline: "", desc: "Η Hanna δεν είναι ένα συνηθισμένο κορίτσι. Μεγαλωμένη από τον πατέρα της, πρώην ύπαλληλο της CIA, στην άγρια φύση, έχει το σθένος, την αντοχή και τα οξυμένα ένστικτα ενός στρατιώτη. Η ανατροφή της και η εκπαίδευσή της είχαν ένα και μόνο σκοπό: να γίνει η καλύτερη δολοφόνος. Έφηβη πλέον, η Hanna είναι έτοιμη να εκτελέσει την αποστολή για την οποία προετοίμαζαν όλα αυτά τα χρόνια. Καθώς ξεκινά την αποστολή της για εκδίκηση, η Hanna αποφεύγει πράκτορες και δολοφόνους, οι οποίοι δίνουν αναφορά γι' αυτήν σε μια ανελέητη ύπαλληλο μυστικών υπηρεσιών. Ενώ πλησιάζει στον στόχο της, η Hanna έρχεται αντιμέτωπη με πανίσχυρους εχθρούς και βρίσκεται μπροστά σε ραγδαίες αποκαλύψεις για τον ίδιο της τον εαυτό." },
  { id: 81, title: "Hawkeye", year: 2021, country: "United States", genre: "Δράμα, Κωμωδία", type: "Series", quality: "HD", rating: 7.5, actors: "Jeremy Renner, Hailee Steinfeld, Tony Dalton, Alaqua Cox, Fra Fee", director: "Rhys Thomas, Bert, Bertie", writer: "Erin Cancino, Katrina Mathewson, Tanner Bean, Heather Quinn, Elisa Lomnitz Climent", link: "https://terabox.com/s/1PdqJL8U7tZYRm54QKEaqQw", imdb: "https://www.imdb.com/title/tt10160804/", tmdb: "https://www.themoviedb.org/tv/88329", tagline: "Αυτές τις γιορτές, τα καλύτερα δώρα έρχονται με φιόγκο.", desc: "Το Disney+ κυκλοφόρησε το πρώτο trailer από το \"Hawkeye\", την limited σειρά comic που εξελίσσεται μετά τα γεγονότα του \"Avengers: Endgame\",Ο πρώην Avenger Clint Barton, έχει μια φαινομενικά εύκολη αποστολή, να επιστρέψει στην οικογένεια του για τον εορτασμό των Χριστουγέννων. Εφικτό? Ίσως με τη βοήθεια της Kate Bishop, μιας 22χρονης τοξοβόλου που ονειρεύεται να γίνει σούπερ ήρωας. Οι δυο τους θα αναγκαστούν να δουλέψουν μαζί, όταν μια παρουσία από το παρελθόν του Barton απειλεί να εκτροχιάσει κάτι περισσότερο από το εορταστικό πνεύμα." },
  { id: 82, title: "Homeland", year: 2011, country: "United States", genre: "Δράμα, Εγκλήματος", type: "Series", quality: "HD", rating: 8.3, actors: "Claire Danes, Mandy Patinkin, Rupert Friend, Damian Lewis, F. Murray Abraham", director: "Lesli Linka Glatter, Michael Cuesta, Daniel Attias, Alex Graves, Keith Gordon", writer: "Alex Gansa, Howard Gordon, Gideon Raff, Chip Johannessen, Patrick Harbinson", link: "https://terabox.com/s/1pmExIdl4x87z2MqUPqD5AQ", imdb: "https://www.imdb.com/title/tt1796960/", tmdb: "https://www.themoviedb.org/tv/1407", tagline: "The nation sees a hero. She sees a threat.", desc: "Ένας Αμερικανός στρατιώτης που θεωρείται ότι σκοτώθηκε στο Ιράκ, επιστρέφει 8 χρόνια μετά την εξαφάνισή του. Αλλά, όταν η χαρά της επιστροφής στην πατρίδα κοπάζει, προκύπτουν υποψίες για το αν ήταν πραγματικά ένας Αμερικανός ήρωας ή μέλος ενός πυρήνα, που σχεδίαζε τρομοκρατική επίθεση." },
  { id: 83, title: "House of Cards", year: 2013, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.6, actors: "Robin Wright, Michael Kelly, Kevin Spacey, Jayne Atkinson, Derek Cecil", director: "James Foley, Robin Wright, John David Coles, Carl Franklin, Tucker Gates", writer: "Beau Willimon, Andrew Davies, Michael Dobbs, Kate Barnow, Keith Huff", link: "https://terabox.com/s/1WnRxRdXrJKTwpUxo6kCvtw", imdb: "https://www.imdb.com/title/tt1856010/", tmdb: "https://www.themoviedb.org/tv/1425", tagline: "Υπάρχουν δύο είδη πόνου.", desc: "Με επίκεντρο την Washington, D.C, το House of Cards είναι η ιστορία του Φράνσις Άντεργουντ, βουλευτή των Δημοκρατικών στην 5η Περιφέρεια της Νότιας Καρολίνας. Μετά την αθέτηση της συμφωνίας από τον Πρόεδρο για τον διορισμό του ως Υπουργός Εξωτερικών, θέτει σε εφαρμογή ένα περίπλοκο σχέδιο για την απόκτηση δύναμης και εξουσίας, με τη βοήθεια της συζύγου του, Κλερ. Η σειρά ασχολείται με θέματα αδίστακτου ρεαλισμού, χειραγώγησης και εξουσίας." },
  { id: 84, title: "Τζακ Ράιαν του Τομ Κλάνσι", year: 2018, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.0, actors: "John Krasinski, Wendell Pierce, Michael Kelly, Abbie Cornish, Betty Gabriel", director: "Jann Turner, Daniel Sackheim, Patricia Riggen, Andrew Bernstein, Lukas Ettlin", writer: "Graham Roland, Carlton Cuse, Aaron Rabin, Amy Berg, Vaun Wilmott", link: "https://terabox.com/s/1YeXoaSTPQxTrlCtf7pocCw", imdb: "https://www.imdb.com/title/tt5057054/", tmdb: "https://www.themoviedb.org/tv/73375", tagline: "", desc: "Η σειρά ακολουθεί τον Ράιαν καθώς αποκαλύπτει ένα πρότυπο στην τρομοκρατική επικοινωνία που τον εκτοξεύει στο κέντρο ενός επικίνδυνου παιχνιδιού με μια νέα φυλή τρομοκρατίας που απειλεί την καταστροφή σε παγκόσμια κλίμακα." },
  { id: 85, title: "Lonesome Dove", year: 1989, country: "United States", genre: "Δράμα, Γουέστερν", type: "Series", quality: "HD", rating: 8.7, actors: "Robert Duvall, Tommy Lee Jones, Diane Lane, Robert Urich, D.B. Sweeney", director: "Simon Wincer", writer: "Larry McMurtry", link: "https://terabox.com/s/1RCJp0U2SUN60YK1xDy51hw", imdb: "https://www.imdb.com/title/tt0096639/", tmdb: "https://www.themoviedb.org/tv/41692", tagline: "The epic film as big as the west.", desc: "Δύο μεσήλικες ραντζέρηδες, ο Γκας και ο Γκούντρουου, κουρασμένοι από μια ζωή σκληρής δουλειάς, έχουν αράξει μόνιμα στο ήσυχο χωριουδάκι Lonesome Dove. Τώρα δεν έχουν άλλες φιλοδοξίες, παρά μόνο ίσως μια ακόμα μεγάλη τελευταία περιπέτεια, για να ξανανιώσουν. Και η ευκαιρία δίνεται, όταν ένας παλιός συνεργάτης τους τους προτείνει να μεταφέρουν τα ζώα τους 2.500 μίλια μακριά, στην παρθένα γη της Μοντάνα και να στήσουν ένα ράντζο εκεί. Η πρόκληση ενθουσιάζει τους δύο καουμπόηδες, που ξεκινούν μια δύσκολη και επικίνδυνη πορεία στην καρδιά της Αμερικανικής Δύσης. Στο δρόμο θα συναντήσουν ληστές, ιερόδουλες, ινδιάνους, δηλητηριασμένα νερά, αμμοθύελλες, απατεώνες και πολλά άλλα…" },
  { id: 86, title: "Λουπέν", year: 2021, country: "France", genre: "Εγκλήματος, Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 7.5, actors: "Omar Sy, Ludivine Sagnier, Soufiane Guerrab, Shirine Boutella, Etan Simon", director: "Ludovic Bernard, Louis Leterrier, Xavier Gens, Hugo Gélin, Daniel Grou", writer: "François Uzan, Tony Saint, Adam Usden, Steve Bailie, Sumerah Srivastav", link: "https://terabox.com/s/13OTbgSqP9RWAJDJ0E-Zj6g", imdb: "https://www.imdb.com/title/tt13467600/", tmdb: "https://www.themoviedb.org/tv/96677", tagline: "", desc: "Από τις περιπέτειες του Αρσέν Λουπέν, ο ευγενής λωποδύτης Ασάν Ντιόπ θέλει να πάρει εκδίκηση για τον πατέρα του για μια αδικία που προκάλεσε μια πλούσια οικογένεια." },
  { id: 87, title: "Monsieur Spade", year: 2024, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 6.9, actors: "Clive Owen, Cara Bossom, Denis Ménochet, Louise Bourgoin, Chiara Mastroianni", director: "Scott Frank", writer: "Scott Frank, Tom Fontana", link: "https://terabox.com/s/1mznQSAy6WsVVIoFm0ZvpXg", imdb: "https://www.imdb.com/title/tt15260440/", tmdb: "https://www.themoviedb.org/tv/209479", tagline: "", desc: "Detective Sam Spade is pulled out of his tranquil retirement in France to investigate a series of brutal murders." },
  { id: 88, title: "Outer Banks", year: 2020, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 7.5, actors: "Chase Stokes, Madelyn Cline, Madison Bailey, Jonathan Daviss, Rudy Pankow", director: "Jonas Pate", writer: "Jonas Pate, Josh Pate, Shannon Burke", link: "https://terabox.com/s/1XrJ-slZZnw7cR9iTtzv5EA", imdb: "https://www.imdb.com/title/tt10293938/", tmdb: "https://www.themoviedb.org/tv/100757", tagline: "Bring it on home.", desc: "Το \"Outer Banks\" είναι μια ιστορία ενηλικίωσης για μια δεμένη παρέα ντόπιων εφήβων(τα \"Ψάρια\") στο παραθαλάσσιο θέρετρο Άουτερ Μπανκς της Βόρειας Καρολίνας. Με το πέρασμα ενός τυφώνα που διακόπτει την ηλεκτροδότηση για όλο το καλοκαίρι, οι επακόλουθες παράνομες ενέργειες αναγκάζουν τους φίλους να πάρουν αποφάσεις που θα αλλάξουν τη ζωή τους. Η αναζήτηση του εξαφανισμένου πατέρα του αρχηγού τους, οι απαγορευμένοι έρωτες, ένα επικίνδυνο κυνήγι θησαυρού και οι κλιμακούμενες συγκρούσεις των Ψαριών και των αντιπάλων τους ανατρέπουν το καλοκαίρι τους και το πλημμυρίζουν με μυστήριο και περιπέτειες που δεν θα ξεχάσουν ποτέ." },
  { id: 89, title: "Outlander", year: 2014, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.4, actors: "Caitríona Balfe, Sam Heughan, Sophie Skelton, Richard Rankin, John Bell", director: "John Dahl, Metin Hüseyin, Jamie Payne, Stephen Woolfenden, Anna Foerster", writer: "Ronald D. Moore, Tyler English-Beckwith, Margot Ye, Toni Graphia, Matthew B. Roberts", link: "https://1024terabox.com/s/1eaYHI64bYNKKzBTImqlKGg", imdb: "https://www.imdb.com/title/tt3006802/", tmdb: "https://www.themoviedb.org/tv/56570", tagline: "Τι θα γινόταν αν το μέλλον σας ήταν το παρελθόν;", desc: "Η σειρά διηγείται την ιστορία της Claire, μιας παντρεμένης νοσοκόμας από το 1945 που μυστηριωδώς στέλνεται στο 1743, όπου κατευθείαν καταλαβαίνει ότι βρίσκεται σε έναν επικίνδυνο άγνωστο κόσμο όπου η ζωή της απειλείται. Όταν αναγκάζεται να παντρευτεί τον Jamie Fraser, έναν θαρραλέο και ρομαντικό νεαρό πολεμιστή, μια παθιασμένη σχέση ξεκινάει που χωρίζει την καρδιά της Claire σε 2 τελείως διαφορετικούς άντρες, και σε 2 διαφορετικές ζωές." },
  { id: 90, title: "Resident Alien", year: 2021, country: "United States", genre: "", type: "Series", quality: "HD", rating: 8.1, actors: "Alice Wetterlund, Alan Tudyk, Sara Tomko, Corey Reynolds, Levi Fiehler", director: "Robert Duncan McNeill, Shannon Kohli, Brennan Shroff, Lea Thompson, Kabir Akhtar", writer: "Emily Eslami, Elias Benavidez, Tazbah Chavez, Chris Sheridan, Nastaran Dibai", link: "https://terabox.com/s/1iS5VZoQF-CxXNENeOELOiw", imdb: "https://www.imdb.com/title/tt10327590/", tmdb: "https://www.themoviedb.org/tv/96580", tagline: "Beam this up.", desc: "Η σειρά ακολουθεί την ιστορία του Harry, ενός εξωγήινου που καταφθάνει στον πλανήτη μας με τη μυστική αποστολή του να είναι η εξολόθρευση του ανθρώπινου είδους. Τα πράγματα όμως αλλάζουν όταν εμπλέκεται στην επίλυση ενός φόνου στην τοπική κοινωνία και συνειδητοποιεί ότι πρέπει να προσαρμοστεί σε αυτόν τον νέο κόσμο. Σύντομα ο Harry θα βρεθεί σε ένα ηθικό δίλημμα για το αν οι άνθρωποι αξίζουν μια ευκαιρία για να σωθούν." },
  { id: 91, title: "Ripley", year: 2024, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.1, actors: "Andrew Scott, Dakota Fanning, Johnny Flynn, Francesca Romana Bergamo, Vittorio Viviani", director: "Steven Zaillian", writer: "Patricia Highsmith, Steven Zaillian", link: "https://terabox.com/s/1re1SBksV1BZlbrHxW9hFLQ", imdb: "https://www.imdb.com/title/tt11053444/", tmdb: "https://www.themoviedb.org/tv/94028", tagline: "Who is Tom Ripley?", desc: "Ένας απατεώνας παρασύρεται σ' έναν κόσμο πλούτου και προνομίων όταν αναλαμβάνει μια αποστολή στην Ιταλία. Για ν' αποκτήσει τη ζωή που θέλει, δημιουργεί έναν ιστό ψεμάτων." },
  { id: 92, title: "Σιλό", year: 2023, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.1, actors: "Rebecca Ferguson, Common, Harriet Walter, Chinaza Uche, Avi Nash", director: "Morten Tyldum, Adam Bernstein, Bert, David Semel, Bertie", writer: "Jessica Blaire, Ingrid Escajeda, Graham Yost, Remi Aubuchon, Fred Golan", link: "https://1024terabox.com/s/1LH5pyhaZnHXDHY9f6DvXBQ", imdb: "https://www.imdb.com/title/tt14688458/", tmdb: "https://www.themoviedb.org/tv/125988", tagline: "Η αλήθεια θα βγει στην επιφάνεια.", desc: "Σε ένα ερειπωμένο και τοξικό μέλλον, χιλιάδες άνθρωποι ζουν σε ένα γιγάντιο σιλό βαθιά κάτω από τη γη. Αφού ο σερίφης του παραβιάζει έναν θεμελιώδη κανόνα και οι κάτοικοι πεθαίνουν μυστηριωδώς, η μηχανικός Τζούλιετ αρχίζει να ανακαλύπτει συγκλονιστικά μυστικά και την αλήθεια για το σιλό." },
  { id: 93, title: "Σταρ Τρεκ: Ντισκάβερι", year: 2017, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.0, actors: "Sonequa Martin-Green, Doug Jones, Mary Wiseman, Anthony Rapp, Wilson Cruz", director: "Olatunde Osunsanmi, Jonathan Frakes, Lee Rose, Douglas Aarniokoski, Christopher J. Byrne", writer: "Michelle Paradise, Brandon Schultz, Gretchen J. Berg, Chris Silvestri, Alex Kurtzman", link: "https://terabox.com/s/1iO8WUIE6984ZDg2VbzFusg", imdb: "https://www.imdb.com/title/tt5171438/", tmdb: "https://www.themoviedb.org/tv/67198", tagline: "Στην άκρη του σύμπαντος αρχίζει η ανακάλυψη.", desc: "Μετά από έναν αιώνα ειρήνης ξεσπά πόλεμος μεταξύ της Ομοσπονδίας και της Αυτοκρατορίας Κλίνγκον. Κεντρικό πρόσωπο στη διαμάχη ένας ξεπεσμένος αξιωματικός του Αστροστόλου." },
  { id: 94, title: "Star Trek: Strange New Worlds", year: 2022, country: "United States", genre: "", type: "Series", quality: "HD", rating: 8.3, actors: "Anson Mount, Ethan Peck, Jess Bush, Christina Chong, Celia Rose Gooding", director: "Dan Liu, Amanda Row, Chris Fisher, Maja Vrvilo, Eduardo Sánchez", writer: "Onitra Johnson, Henry Alonso Myers, Davy Perez, Bill Wolkoff, Dana Horgan", link: "https://terabox.com/s/1BmTeDBhXwYUydep-mj288Q", imdb: "https://www.imdb.com/title/tt12327578/", tmdb: "https://www.themoviedb.org/tv/103516", tagline: "The frontier awaits.", desc: "Η σειρά ακολουθεί το πλήρωμα του USS Enterprise και επικεντρώνεται στον καπετάνιο Christopher Pike, Spock και Number One, καθώς εξερευνούν νέους κόσμους σε όλο το γαλαξία. Το Strange New Worlds είναι τεχνικά και spinoff και prequel, spinoff μιας και δείχνει το πλήρωμα του USS Enterprise μετά την εμφάνισή τους στη δεύτερη σεζόν του Star Trek: Discovery, και prequel του Star Trek: The Original Series (δεδομένου ότι η σειρά είναι διαδραματίζεται περίπου μια δεκαετία πριν ο Κερκ αναλάβει τη θέση του καπετάνιου)." },
  { id: 95, title: "Οι 100", year: 2014, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.5, actors: "Eliza Taylor, Bob Morley, Marie Avgeropoulos, Jarod Joseph, Lindsey Morgan", director: "Dean White, P.J. Pesce, Ed Fraiman, Mairzee Almas, Omar Madha", writer: "Akela Cooper, Jason Rothenberg, Kim Shumway, Wade McIntyre, Aaron Ginsburg", link: "https://terabox.com/s/1ql2CCb3f65pUCg3Vk9XM3w", imdb: "https://www.imdb.com/title/tt2661044/", tmdb: "https://www.themoviedb.org/tv/48866", tagline: "Survival isn't who you are. It's who you become.", desc: "Η σειρά λαμβάνει χώρα 97 χρόνια μετά από ένα πυρηνικό πόλεμο που κατέστρεψε κάθε πολιτισμό και περιγράφει τις περιπέτειες μιας ομάδας από 100 ανήλικους παραβάτες που στάλθηκαν με ένα διαστημόπλοιο πίσω στη γη για να ελέγξουν αν ο πλανήτης είναι κατάλληλος για την επιστροφή των κατοίκων." },
  { id: 96, title: "Σώμα Δίωξης Υπερηρώων", year: 2019, country: "United States", genre: "", type: "Series", quality: "HD", rating: 8.7, actors: "Karl Urban, Jack Quaid, Antony Starr, Erin Moriarty, Jessie T. Usher", director: "Philip Sgriccia, Fred Toye, Karen Gaviola, Nelson Cragg, Sarah Boyd", writer: "Ellie Monahan, Anslem Richardson, Craig Rosenberg, David Reed, Rebecca Sonnenshine", link: "https://terabox.com/s/10fDH7_r5OBS6G7P5_FUwrw", imdb: "https://www.imdb.com/title/tt1190634/", tmdb: "https://www.themoviedb.org/tv/76479", tagline: "Μην συναντήσεις ποτέ τους ήρωές σου.", desc: "Σε έναν κόσμο όπου οι υπερήρωες εκμεταλλεύονται τη σκοτεινή πλευρά της τεράστιας δημοτικότητάς τους και φήμης τους, το ΣΩΜΑ ΔΙΩΞΗΣ ΥΠΕΡΗΡΩΩΝ επικεντρώνεται σε μια σειρά από εκδικητές, γνωστούς ανεπίσημα ως \"Τα παιδιά\", οι οποίοι αποφασίζουν να αντιμετωπίσουν τους διεφθαρμένους υπερήρωες με τίποτε άλλο παρά την αποφασιστικότητά τους και τη διάθεσή τους να πολεμήσουν βρώμικα." },
  { id: 97, title: "The Devil's Hour", year: 2022, country: "United Kingdom", genre: "Μυστηρίου, Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 7.6, actors: "Jessica Raine, Peter Capaldi, Nikesh Patel, Phil Dunster, Benjamin Chivers", director: "Johnny Allan, Shaun James Grant, Isabelle Sieb", writer: "Tom Moran", link: "https://1024terabox.com/s/121geqIsk63lQw8gHBWAFSg", imdb: "https://www.imdb.com/title/tt13304968/", tmdb: "https://www.themoviedb.org/tv/157061", tagline: "Time to face your fears.", desc: "Η Λούσι ξυπνάει κάθε βράδυ στις 3:33π.μ. γνωστή και ως «η ώρα του διαβόλου» και της συμβαίνουν διάφορα ανεξήγητα πράγματα. Τίποτα στη ζωή της δεν βγάζει νόημα για πολύ καιρό. Όμως, οι απαντήσεις βρίσκονται εκεί έξω, κάπου, στο τέλος μιας σειράς άγριων φόνων." },
  { id: 98, title: "Διαστημική Συναμοσία", year: 2015, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 8.5, actors: "Steven Strait, Dominique Tipper, Wes Chatham, Shohreh Aghdashloo, Cas Anvar", director: "Breck Eisner, Jeff Woolnough, Kenneth Fink, Rob Lieberman, David Grossman", writer: "Daniel Abraham, Ty Franck, Hallie Lambert, Georgia Lee, Mark Fergus", link: "https://terabox.com/s/1R-roLqGkA2yI1DTq18qeFw", imdb: "https://www.imdb.com/title/tt3230854/", tmdb: "https://www.themoviedb.org/tv/63639", tagline: "Τα αστέρια είναι καλύτερα χωρίς εμάς.", desc: "Στον 23ο αιώνα σε ένα μέλλον όπου η ανθρωπότητα έχει αποικήσει ολόκληρο το Ηλιακό Σύστημα, ο Μίλερ, ένας ντετέκτιβ από τον αστεροειδή Μπελτ, και ο ιπτάμενος αξιωματικός Τζιμ Χόλντεν με το πλήρωμά του, βρίσκονται να ξετυλίγουν μια συνομωσία που απειλεί την ειρήνη σε όλο το σύστημα καθώς και την επιβίωση ολόκληρης της ανθρωπότητας." },
  { id: 99, title: "The Falcon and the Winter Soldier", year: 2021, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.1, actors: "Anthony Mackie, Sebastian Stan, Wyatt Russell, Erin Kellyman, Daniel Brühl", director: "Kari Skogland", writer: "Malcolm Spellman, Michael Kastelein, Josef Sawyer", link: "https://terabox.com/s/1pIZQmJ-OxYvDilY3Tp7Xew", imdb: "https://www.imdb.com/title/tt9208876/", tmdb: "https://www.themoviedb.org/tv/88396", tagline: "Τιμήστε την ασπίδα.", desc: "Μετά τα γεγονότα του \"Avengers: Endgame\", οι Falcon, Sam Wilson και ο Winter Soldier, ο Bucky Barnes συνεργάζονται σε μια παγκόσμια περιπέτεια που δοκιμάζει τις ικανότητές τους και την υπομονή τους." },
  { id: 100, title: "The Responder", year: 2022, country: "United Kingdom", genre: "Δράμα, Εγκλήματος", type: "Series", quality: "HD", rating: 7.4, actors: "Martin Freeman, Adelayo Adedayo, Emily Fairn, Romi Hyland-Rylands, Josh Finan", director: "Mounia Akl, Tim Mielants, Jeanette Nordahl, Tony Schumacher, Philip Barantini", writer: "Tony Schumacher", link: "https://terabox.com/s/1sxASzp6GLdFOpASdxB6oEg", imdb: "https://www.imdb.com/title/tt15472362/", tmdb: "https://www.themoviedb.org/tv/155346", tagline: "", desc: "Μετά τον θάνατο της μητέρας του, ο Κρις συντετριμμένος ζει μόνος στο βρώμικο διαμέρισμά του. Είναι αποφασισμένος να μην επιστρέψει στις παλιές του συνήθειες και να μην παίρνει, πλέον το νόμο στα χέρια του. Ακολουθεί το γράμμα του νόμου. Όταν ξεσπά πόλεμος συμμοριών ανάμεσα σε δύο από τους μεγαλύτερους εμπόρους ναρκωτικών του Λίβερπουλ, ο Κρις κινδυνεύει να αποκαλυφθούν οι προηγούμενες ατασθαλίες του." },
  { id: 101, title: "Westworld", year: 2016, country: "United States", genre: "Γουέστερν", type: "Series", quality: "HD", rating: 8.5, actors: "Evan Rachel Wood, Thandiwe Newton, Jeffrey Wright, Tessa Thompson, Ed Harris", director: "Richard J. Lewis, Fred Toye, Vincenzo Natali, Jennifer Getzinger, Craig William Macneill", writer: "Jonathan Nolan, Suzanne Wrubel, Denise Thé, Roberto Patino, Dan Dietz", link: "https://terabox.com/s/1ERU_pCqd4c1nSCFYBxIteQ", imdb: "https://www.imdb.com/title/tt0475784/", tmdb: "https://www.themoviedb.org/tv/63247", tagline: "These violent delights have violent ends.", desc: "Το Westworld, είναι ένα θεματικό πάρκο για πλούσιους επισκέπτες. Το πάρκο παρέχει στους πελάτες του τη δυνατότητα να ζήσουν τις φαντασιώσεις τους μέσα από τη χρήση ρομπότ που παρέχουν ότι χρειάζονται. Δύο από τους επισκέπτες επιλέγουν μια περιπέτεια στην Άγρια Δύση. Όμως, ύστερα από μια βλάβη στους υπολογιστές, ανακαλύπτουν ότι καταδιώκονται από ένα – εκτός ελέγχου – ρομπότ που οπλοφορεί..." },
  { id: 102, title: "Yellowjackets", year: 2021, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 7.8, actors: "Melanie Lynskey, Tawny Cypress, Sophie Nélisse, Jasmin Savoy Brown, Sophie Thatcher", director: "Daisy von Scherler Mayer, Benjamin Semanoff, Scott Winant, Eduardo Sánchez, Eva Sørhaug", writer: "Sarah L. Thompson, Liz Phang, Ameni Rozsa, Ashley Lyle, Bart Nickerson", link: "https://terabox.com/s/1lmPLqD-KZB6Ch7XnbELOHw", imdb: "https://www.imdb.com/title/tt11041332/", tmdb: "https://www.themoviedb.org/tv/117488", tagline: "Ακούμε την έρημο και μας ακούει.", desc: "Με ισόποσες δόσεις από έπος επιβίωσης, ιστορία ψυχολογικού τρόμου και δράμα ενηλικίωσης, το 'Yellowjackets' αποτελεί την επική ιστορία των μελών μιας ιδιαίτερα ταλαντούχας ομάδας ποδοσφαίρου του λυκείου, που ατυχώς έγιναν οι επιζώντες ενός αεροπορικού δυστυχήματος, στην απομακρυσμένη άγρια φύση του βορρά. Η σειρά καταγράφει την κάθοδό τους από μια πολύπλοκη αλλά επιτυχημένη ομάδα σε μια άγρια φυλή, ενώ την ίδια ώρα ιχνηλατεί τις ζωές που προσπάθησαν να ξαναφτιάξουν 25 χρόνια μετά, αποδεικνύοντας πως το παρελθόν δεν είναι στα αλήθεια πίσω και αυτό που ξεκίνησε έξω στην άγρια φύση, δεν έχει τελειώσει στα αλήθεια." },
    { id: 103, title: "Luther", year: 2010, country: "United Kingdom", genre: "Εγκλήματος, Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 8.4, actors: "Idris Elba, Michael Smiley, Dermot Crowley, Warren Brown, Ruth Wilson", director: "Sam Miller, Farren Blackburn, Brian Kirk, Stefan Schwartz", writer: "Neil Cross", link: "https://terabox.com/s/1x7KUmWb49ysXDCVDoGF-Sg", imdb: "https://www.imdb.com/title/tt1474684/", tmdb: "https://www.themoviedb.org/tv/1426", tagline: "What if your worst enemy was your own conscience?", desc: "Ο John Luther είναι ένας ντετέκτιβ στο Λονδίνο , αφοσιωμένος στη δουλειά του και παράλληλα με τα σκληρά εγκλήματα που έχει να αντιμετωπίσει, προσπαθεί να φέρει μια κατάσταση εσωτερικής ισορροπίας μεταξύ της κοινής ηθικής και των “δαιμόνων” που τον κυριεύουν. Παρασυρμένος από τα συναισθήματά του δεν θα διστάσει να πάρει τον νόμο στα χέρια του και να τον λυγίσει όταν αφορά ζητήματα ζωής και θανάτου ή και ακόμη όταν οι πράξεις του θα τον βοηθήσουν λύσει τις υποθέσεις του." },
  { id: 104, title: "Πρώτος Στόχος", year: 2025, country: "United Kingdom", genre: "Δράμα", type: "Series", quality: "HD", rating: 6.3, actors: "Leo Woodall, Quintessa Swindell, Sidse Babett Knudsen, Stephen Rea, Fra Fee", director: "Brady Hood", writer: "Stephen Thompson, Selina Lim, Thomas Martin", link: "https://1024terabox.com/s/1Ec6-5ZPYZIxBVoKVqoWXaA", imdb: "https://www.imdb.com/title/tt21811590/", tmdb: "https://www.themoviedb.org/tv/246381", tagline: "A brilliant mind is a dangerous weapon.", desc: "Ένας λαμπρός φοιτητής μαθηματικών είναι στα πρόθυρα μιας μεγάλης ανακάλυψης, όταν ένας σκοτεινός εχθρός προσπαθεί να τον σταματήσει. Παλεύοντας για απαντήσεις και για τη ζωή του, συμμαχεί με μια κυβερνητική πράκτορα για να ξετυλίξει μια επικίνδυνη συνωμοσία." },
  { id: 105, title: "Peaky Blinders", year: 2013, country: "United Kingdom", genre: "Δράμα, Εγκλήματος", type: "Series", quality: "HD", rating: 8.7, actors: "Cillian Murphy, Paul Anderson, Sophie Rundle, Helen McCrory, Finn Cole", director: "Anthony Byrne, Colm McCarthy, David Caffrey, Tim Mielants, Otto Bathurst", writer: "Steven Knight, Stephen Russell, Toby Finlay", link: "https://terabox.com/s/1CMu2fEzYDCVOTHox_bozWA", imdb: "https://www.imdb.com/title/tt2442560/", tmdb: "https://www.themoviedb.org/tv/60574", tagline: "London's for the taking.", desc: "Μια διαβόητη συμμορία στο Μπέρμιγχαμ της Αγγλίας του 1919 έχει για αρχηγό τον άγριο Τόμι Σέλμπι που προχωρά ακάθεκτος χωρίς να υπολογίζει το κόστος." },
  { id: 106, title: "Οι Περιπέτειες του Ηρακλή Πουαρό", year: 1989, country: "United Kingdom", genre: "Εγκλήματος, Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 8.6, actors: "David Suchet, Hugh Fraser, Philip Jackson, Pauline Moran, David Yelland", director: "Andrew Grieve, Edward Bennett, Renny Rye, Brian Farnham, Richard Spence", writer: "Agatha Christie, Anthony Horowitz, Nick Dear, Guy Andrews, David Renwick", link: "https://terabox.com/s/1eVVHhmmVXl9FE3rU_HThtw", imdb: "https://www.imdb.com/title/tt0094525/", tmdb: "https://www.themoviedb.org/tv/790", tagline: "", desc: "Ο Ηρακλής Πουαρό είναι διάσημος Βέλγος συνταξιούχος αστυνομικός, ο οποίος εγκαταστάθηκε μετά τον Α' Παγκόσμιο Πόλεμο στο Λονδίνο και εμπλέκεται σε υποθέσεις δολοφονίας και μυστηρίου. Συνήθως συνοδεύεται από τον φίλο του Κάπτεν Χέιστινγκς, και συνεργάζεται με τον φιλικό του αντίπαλο και επιθεωρητή της Σκότλαντ Γιαρντ, Τζέιμς Τζαπ. Λάτρης της τάξης και της συμμετρίας, εχθρός της σκόνης και των εξωτερικών χώρων, του αρέσει να χρησιμοποιεί τα «μικρά γκρι κύτταρα» του εγκεφάλου για να λύνει περίπλοκα εγκλήματα." },
  { id: 107, title: "Poker Face", year: 2023, country: "United States", genre: "Μυστηρίου, Εγκλήματος", type: "Series", quality: "HD", rating: 7.8, actors: "Natasha Lyonne, Benjamin Bratt, Pedro Hollywood, Simon Helberg, Ron Perlman", director: "Lucky McKee, Natasha Lyonne, Ben Sinclair, Janicza Bravo", writer: "Alice Ju, Nora Zuckerman, Chris Downey, Christine Boylan, Natasha Lyonne", link: "https://terabox.com/s/1TmphRz6x0yaQFt5cyZDe5g", imdb: "https://www.imdb.com/title/tt13207308/", tmdb: "https://www.themoviedb.org/tv/120998", tagline: "Murder mysteries can take detours.", desc: "Το Poker Face είναι μια σειρά ‘μυστηρίου της εβδομάδας’ που ακολουθεί την Charlie, που διαθέτει μια εξωπραγματική ικανότητα που της επιτρέπει να διακρίνει όταν κάποιος λέει ψέματα. Η Charlie κυκλοφορεί στο δρόμο με το αυτοκίνητό της, μια Plymouth Barracuda και σε κάθε στάση συναντά μια νέα ομάδα χαρακτήρων και παράξενα εγκλήματα που θέλει να διαλευκάνει." },
  { id: 108, title: "Pride and Prejudice", year: 1995, country: "United Kingdom", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.8, actors: "Colin Firth, Jennifer Ehle, Susannah Harker, Crispin Bonham-Carter, Benjamin Whitrow", director: "Simon Langton", writer: "Jane Austen, Andrew Davies", link: "https://terabox.com/s/1OlQMVYXZY6AIFxhtYnecYQ", imdb: "https://www.imdb.com/title/tt0112130/", tmdb: "https://www.themoviedb.org/tv/1457", tagline: "The celebrated BBC dramatisation of a classic romance", desc: "H σειρά βασίζεται πάνω στην ομώνυμη νουβέλα της εξαιρετικής συγγραφέως Jane Austen. Η Ελίζαμπεθ είναι μια αποφασιστική αλλά και ευαίσθητη νεαρή κοπέλα η οποία έχει άλλες 4 αδελφές, όλες ανύπαντρες.Με μια μητέρα που η μόνη της σκέψη είναι πως θα τις αποκαταστήσει και έναν πατέρα που την λατρεύει αλλά παράλληλα αυτά δεν είναι ικανός να φροντίσει για το μέλλον τους μετά τον θάνατό του, οπότε και αναγκαστικά ανέχεται την γκρίνια της γυναίκας του. Στον τοπικό χορό η αδελφή της Ελίζαμπεθ γνωρίζεται με τον πλούσιο αλλά και ευπαρουσίαστο συμπαθητικό κύριο Μπίνγκλεϊ και η μητέρα τους ελπίζει ότι ένας τέτοιος γάμος θα έλυνε όλα τους τα προβλήματα.Η ίδια η Ελίζαμπεθ μέσω του κυρίου Μπίνγκλεϊ γνωρίζει τον φίλο του κύριο Ντάρσυ που δείχνει κρύος - αγενής και εγωιστής στα μάτια της. Η φράση της : Θα μπορούσα να συγχωρήσω την ματαιοδοξία του αν δεν είχε πληγώσει την δική μου δείχνει την αρχή ενός έρωτα γεμάτου \"Περηφάνια και Προκατάληψη\"." },
  { id: 109, title: "SAS Rogue Heroes", year: 2022, country: "United Kingdom", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.1, actors: "Alfie Allen, Connor Swindells, Jack O'Connell, Sofia Boutella, Dominic West", director: "Tom Shankland", writer: "Steven Knight", link: "https://terabox.com/s/1W-_KOOUvPxaBfPARCorLHQ", imdb: "https://www.imdb.com/title/tt13962032/", tmdb: "https://www.themoviedb.org/tv/93870", tagline: "Who dares wins.", desc: "Η δραματοποιημένη αφήγηση του σχηματισμού της μεγαλύτερης μονάδας Ειδικών Δυνάμεων στον κόσμο, της SAS, κάτω από εξαιρετικά ιδιαίτερες συνθήκες, στις πιο σκοτεινές μέρες του Β' Παγκοσμίου Πολέμου." },
  { id: 110, title: "Το Πέρασμα", year: 2019, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.2, actors: "Mark-Paul Gosselaar, Saniyya Sidney, Caroline Chikezie, Vincent Piazza, Jamie McShane", director: "Jason Ensler, Jeffrey Nachmanoff, Eduardo Sanchez-Ubanell, Mark Tonderai, Ti West", writer: "Vanessa Gomez, Justin Cronin, Liz Heldens, Joy Blake, Daniel T. Thomsen", link: "https://terabox.com/s/1ETVRfa80LB6Joxrbx6SKfQ", imdb: "https://www.imdb.com/title/tt7502234/", tmdb: "https://www.themoviedb.org/tv/77459", tagline: "Can one girl save humanity?", desc: "Η Σειρά THE PASSAGE επικεντρώνεται στο Project NOAH, ένα μυστικό ερευνητικό κέντρο όπου επιστήμονες πειραματίζονται με έναν επικίνδυνο ιό που θα μπορούσε να οδηγήσει στη θεραπεία όλων των ειδών ασθένειας. Ταυτόχρονα όμως, ο ίδιος ιός θα μπορούσε να αφανίσει το ανθρώπινο είδος. Όταν ένα νεαρό κορίτσι, η Amy Bellafonte επιλέγεται ως το ιδανικό αντικείμενο του πειράματος, για να δοκιμαστεί απέναντι στον ιό, ο ομοσπονδιακός πράκτορας Brad Wolgast είναι εκείνος που καλείται να την παραδώσει στο Project NOAH. Στην πορεία, η σχέση τους θα δοκιμαστεί και ο Brad θα κάνει τα πάντα για να την προστατεύσει.\n\nΟ Brad και η Amy αναγκάζονται να βρεθούν αντιμέτωποι με τους επιστήμονες του Project NOAH, Major Nichole Sykes και Jonas Lear, καθώς και με τον πρώην πράκτορα Clark Richards, τον οποίο έχει εκπαιδεύσει ο Brad. Καθώς όμως οι επιστήμονες του NOAH πλησιάζουν στη θεραπεία που μπορεί να σώσει την ανθρωπότητα, το νέο είδος \"πλασμάτων\" ξεκινά να δοκιμάζει τις δυνάμεις του, φτάνοντας κοντά στην απόδραση που θα μπορούσε να οδηγήσει στην Αποκάλυψη.\n\nΒΑΣΙΣΜΕΝΗ ΣTHN ΟΜΩΝΥΜΗ BEST-SELLER ΤΡΙΛΟΓΙΑ ΒΙΒΛΙΩΝ ΤΟΥ\n\nJUSTIN CRONIN" },
  { id: 111, title: "Ashes to Ashes", year: 2008, country: "United Kingdom", genre: "Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 8.1, actors: "Keeley Hawes, Philip Glenister, Dean Andrews, Marshall Lancaster, Montserrat Lombard", director: "Catherine Morshead, Jonny Campbell, David Drury, Philip John, Ben Bolt", writer: "Matthew Graham, Ashley Pharoah, Mark Greig, Julie Rutterford, Nicole Taylor", link: "https://1024terabox.com/s/1rjCHIGR6fBdKACy1VENl3w", imdb: "https://www.imdb.com/title/tt1038140/", tmdb: "https://www.themoviedb.org/tv/1180", tagline: "", desc: "Crime drama series featuring Life On Mars' DCI Gene Hunt. After being shot in 2008, DI Alex Drake lands in 1981, where she finds herself in familiar company." },
  { id: 112, title: "Σάνι", year: 2024, country: "United States", genre: "Μυστηρίου, Δράμα, Κωμωδία", type: "Series", quality: "HD", rating: 6.5, actors: "Rashida Jones, Hidetoshi Nishijima, Joanna Sotomura (φωνή), Judy Ongg, YOU", director: "Lucy Tcherniak, Dearbhla Walsh, Colin Bucksey, Makoto Nagahisa", writer: "Kimi Howl Lee, Julissa Castillo, Colin O'Sullivan, Katie Robbins, Nancy Won", link: "https://terabox.com/s/1o6iMgrrDMjZvUNNF3-1TUg", imdb: "https://www.imdb.com/title/tt25432390/", tmdb: "https://www.themoviedb.org/tv/157226", tagline: "Εσύ είσαι η πρώτη της ανάμνηση.", desc: "Η ζωή μιας Αμερικανίδας που ζει στο Κιότο της Ιαπωνίας ανατρέπεται όταν ο σύζυγος κι ο γιος της εξαφανίζονται σε ένα μυστηριώδες αεροπορικό ατύχημα. Για παρηγοριά, της δίνουν τη Σάνι, ένα από τα οικιακά ρομπότ που φτιάχνει η εταιρεία ηλεκτρονικών του συζύγου της." },
  { id: 113, title: "Ιατρικές Υποθέσεις", year: 2004, country: "United States", genre: "Δράμα, Μυστηρίου, Κωμωδία", type: "Series", quality: "HD", rating: 8.7, actors: "Hugh Laurie, Robert Sean Leonard, Omar Epps, Jesse Spencer, Lisa Edelstein", director: "Greg Yaitanes, Deran Sarafian, David Straiton, Daniel Attias, Daniel Sackheim", writer: "Pam Davis, Peter Blake, Lawrence Kaplow, David Shore, David Foster", link: "https://terabox.com/s/1UMOrjOoC4QIp5TYVZ9n5tA", imdb: "https://www.imdb.com/title/tt0412142/", tmdb: "https://www.themoviedb.org/tv/1408", tagline: "Η ιδιοφυΐα έχει παρενέργειες.", desc: "Η σειρά εξελίσσεται γύρω από ένα νοσοκομείο και τις καθημερινές ιατρικές περιπέτειες ενός γιατρού – διαγνωστολόγου διάνοια, και του ιατρικού του team. Ο τύπος είναι πανέξυπνος, οξυδερκής, εφευρετικότατος, ετοιμόλογος αλλά και κυνικός, αδίστακτος, τελείως έξω από τα συμβατικά όρια. Ο τρόπος που είναι αφοσιωμένος στη δουλειά του και η μοναδική του ικανότητα είναι τα μοναδικά πράγματα τα οποία των κάνουν να ξεχωρίζει. Ικανότητες συνύπαρξης μηδέν. Παράλληλα αυτά δύσκολα κάποιος του κρατάει κακία." },
  { id: 114, title: "Shōgun", year: 2024, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.6, actors: "Hiroyuki Sanada, Cosmo Jarvis, Anna Sawai, Tadanobu Asano, Takehiro Hira", director: "Fred Toye, Jonathan van Tulleken, Hiromi Kamata, Takeshi Fukunaga, Charlotte Brändström", writer: "Maegan Houang, James Clavell, Rachel Kondo, Justin Marks, Shannon Goss", link: "https://terabox.com/s/1Ie4rZU9QIqyXFua54G1tkw", imdb: "https://www.imdb.com/title/tt2788316/", tmdb: "https://www.themoviedb.org/tv/126308", tagline: "An epic saga of war, passion, and power set in Feudal Japan.", desc: "Στην Ιαπωνία του 1600, ο λόρδος Γιόσι Τoranάγκα παλεύει για τη ζωή του καθώς οι εχθροί του στο Συμβούλιο των Αντιβασιλέων συσπειρώνονται εναντίον του, όταν ένα μυστηριώδες ευρωπαϊκό πλοίο εντοπίζεται εγκαταλελειμμένο σε ένα διπλανό ψαροχώρι." },
  { id: 115, title: "Η μέρα του τσακαλιού", year: 2024, country: "United Kingdom", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 8.1, actors: "Eddie Redmayne, Lashana Lynch, Eleanor Matsuura, Chukwudi Iwuji, Úrsula Corberó", director: "Brian Kirk, Paul Wilmshurst, Anthony Philipson, Anu Menon", writer: "Frederick Forsyth, Ronan Bennett, Shyam Popat, Charles Cumming, Jessica Sinyard", link: "https://1024terabox.com/s/1i3userBBYaj5UonSjJwETQ", imdb: "https://www.imdb.com/title/tt24026136/", tmdb: "https://www.themoviedb.org/tv/222766", tagline: "The hunter. Hunted.", desc: "Ένας επίλεκτος ελεύθερος σκοπευτής, άριστος στις μεταμφιέσεις και άρτια εκπαιδευμένος δολοφόνος, το Τσακάλι, είναι ένας εκτελεστής, που εκτελεί ψυχρά χτυπήματα έναντι αμοιβής. Μετά από μια επίθεση σε έναν υψηλόβαθμο και διαβόητο πολιτικό, στο Τσακάλι προσφέρεται η πιο ριψοκίνδυνη δουλειά του, μια δουλειά που θα μπορούσε να τον πληρώσει αρκετά ώστε να αφήσει οριστικά αυτή τη ζωή. Όμως η δουλειά του έχει τραβήξει την προσοχή της Μπιάγνκας, μιας επίμονης Βρετανίδας αξιωματικού των μυστικών υπηρεσιών ΜΙ6, της οποίας η παγκόσμιας κλάσης πείρα στα πυροβόλα όπλα την καθιστά ιδανική υποψήφια για να τον κυνηγήσει. Αυτό που ακολουθεί είναι ένα συναρπαστικό κυνήγι γάτας και ποντικιού σε όλη την Ευρώπη, καθώς το Τσακάλι προσπαθεί να φέρει εις πέρας τη νέα του αποστολή, ενώ παράλληλα καταδιώκεται από τη Μπιάγνκα…" },
  { id: 116, title: "Κακιά Μαϊμού, του Καρλ Χάιασεν", year: 2024, country: "United States", genre: "Κωμωδία, Εγκλήματος", type: "Series", quality: "HD", rating: 7.4, actors: "Vince Vaughn, L. Scott Caldwell, Rob Delaney, Meredith Hagner, Natalie Martinez", director: "Marcos Siega, Erica Dunton, Colin Bucksey, Liz Friedlander, Sam Jones", writer: "Carl Hiaasen, Matt Tarses, Bill Lawrence, Annie Mebane, Ashley Nicole Black", link: "https://terabox.com/s/1_Hu8EfVdXkoXr2zlpRwN_w", imdb: "https://www.imdb.com/title/tt14227012/", tmdb: "https://www.themoviedb.org/tv/130853", tagline: "Η σκοτεινή πλευρά του παραδείσου.", desc: "Ένας πρώην ντετέκτιβ και νυν επιθεωρητής εστιατορίων στη Νότια Φλόριντα παρασύρεται σε έναν κόσμο απληστίας και διαφθοράς όταν ένας τουρίστας βρίσκει ένα κομμένο χέρι ενώ ψαρεύει. Και ναι, υπάρχει και μια μαϊμού." },

  { id: 119, title: "Πλατωνική Σχέση", year: 2023, country: "United States", genre: "Κωμωδία", type: "Series", quality: "HD", rating: 7.2, actors: "Rose Byrne, Seth Rogen, Luke Macfarlane, Tre Hale, Andrew Lopez", director: "Nicholas Stoller", writer: "Brittany Ann Miller, Francesca Delbanco, Nicholas Stoller", link: "https://terabox.com/s/1fRIVMLB7EowumjjSICFIaQ", imdb: "https://www.imdb.com/title/tt14586020/", tmdb: "https://www.themoviedb.org/tv/112211", tagline: "Old friends reunite for a hilarious new chapter.", desc: "Ο Σεβ Ρόγκεν κι η Ρόουζ Μπερν πρωταγωνιστούν ως ένα πλατωνικό ζευγάρι πρώην κολλητών που πλησιάζουν τη μέση ηλικία κι επανασυνδέονται μετά από μια ρήξη. Καθώς η φιλία τους γίνεται πιο απαιτητική, αποσταθεροποιεί τις ζωές τους με ξεκαρδιστικό τρόπο." },
  { id: 120, title: "Πρόγραμμα Blue Book", year: 2019, country: "United States", genre: "Μυστηρίου, Δράμα", type: "Series", quality: "HD", rating: 7.6, actors: "Aidan Gillen, Michael Malarkey, Laura Mennell, Ksenia Solo, Neal McDonough", director: "Norma Bailey, John Scott, Loni Peristere, Pete Travis, Alex Graves", writer: "Harley Peyton, Sean Jablonski, Linda Burstyn, David O'Leary, Thania St. John", link: "https://terabox.com/s/1iYAFavbox7DfC1_QsDLIZQ", imdb: "https://www.imdb.com/title/tt6682982/", tmdb: "https://www.themoviedb.org/tv/79649", tagline: "Where the conspiracy began.", desc: "Η σειρά Πρόγραμμα Blue Book βασίζεται στις πραγματικές, άκρως απόρρητες έρευνες σχετικά με τα μη αναγνωρισμένα πτητικά αντικείμενα (UFOs) και συναφή φαινόμενα που διεξήγαγε η Πολεμική Αεροπορία των Ηνωμένων Πολιτειών από το 1952 έως το 1969. Συνδυάζει θεωρίες UFO με αυθεντικά ιστορικά γεγονότα από μια από τις πιο μυστηριώδεις εποχές στην ιστορία των Ηνωμένων Πολιτειών. Το δράμα πρόκειται να ακολουθήσει τον Hyneck, ο οποίος προσλαμβάνεται για να διαλύσει τις φήμες για τα UFO. Αλλά καθώς αρχίζει να ανακαλύπτει την αλήθεια, η κυβέρνηση προσπαθεί τότε να τον κρατήσει από το να το αποκαλύψει.." },
  { id: 121, title: "Rabbit Hole", year: 2023, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 7.4, actors: "Kiefer Sutherland, Meta Golding, Enid Graham, Rob Yang, Walt Klink", director: "John Requa, Glenn Ficarra, Batan Silva, Jon Cassar, Gwyneth Horder-Payton", writer: "Glenn Ficarra, John Requa, Hunt Baldwin, Michael J. Ballin, Wendy Riss", link: "https://terabox.com/s/1N0gFJ5eUMGSHRg_kks2JtA", imdb: "https://www.imdb.com/title/tt15573430/", tmdb: "https://www.themoviedb.org/tv/156819", tagline: "Deception is reality.", desc: "Η σειρά ακολουθεί τον John Weir (Sutherland), έναν μέτρο της εξαπάτησης στον κόσμο της εταιρικής κατασκοπείας. Όμως ο Weir θα παγιδευτεί για έναν φόνο που δε διέπραξε, από ισχυρές δυνάμεις, με την ικανότητα να επηρεάζουν και να ελέγχουν πληθυσμούς, τώρα θα πρέπει να χρησιμοποιήσει όλα τα μέσα που έχει στη διάθεσή του..." },

  { id: 123, title: "Raised by Wolves", year: 2020, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.4, actors: "Amanda Collin, Abubakar Salim, Winta McGrath, Niamh Algar, Travis Fimmel", director: "Alex Gabassi, Luke Scott, Ernest R. Dickerson, Sergio Mimica-Gezzan, Ridley Scott", writer: "Aaron Guzikowski, Karen Campbell, Sinead Daly, Donald Joh, Jon Worley", link: "https://terabox.com/s/1mPkMRR0uI2FIBdB-m7n32g", imdb: "https://www.imdb.com/title/tt9170108/", tmdb: "https://www.themoviedb.org/tv/85723", tagline: "Sacrifice for survival.", desc: "Η Γη έχει καταστραφεί και δύο ανδροειδή μεγαλώνουν παιδιά ανθρώπων σε έναν μυστηριώδη πλανήτη. Την ίδια στιγμή, η κοινότητα κλονίζεται από θρησκευτικές διαφορές και τα ανδροειδή συνειδητοποιούν ότι το να προσπαθείς να ελέγξεις τα πιστεύω των ανθρώπων δεν είναι και τόσο εύκολο." },

  { id: 125, title: "Paradise", year: 2025, country: "United States", genre: "Δράμα, Εγκλήματος", type: "Series", quality: "HD", rating: 7.9, actors: "Sterling K. Brown, Julianne Nicholson, Sarah Shahi, Nicole Brydon Bloom, Aliyah Mastin", director: "John Requa, Glenn Ficarra, Hanelle M. Culpepper, Gandja Monteiro", writer: "Dan Fogelman, Stephen Markley, Scott Weinger, Jason Wilborn, Gina Lucita Monreal", link: "https://1024terabox.com/s/1V2TSfebkhYY_SGKbdaI4Vw", imdb: "https://www.imdb.com/title/tt27444225/", tmdb: "https://www.themoviedb.org/tv/245927", tagline: "Read between the lies.", desc: "Η σειρά «Paradise» διαδραματίζεται σε μια ήσυχη κοινότητα όπου κατοικούν μερικές από τις πιο επιφανείς προσωπικότητες του κόσμου. Όμως, αυτή η γαλήνη διαταράσσεται όταν σημειώνεται ένας συγκλονιστικός φόνος και μια κρίσιμη έρευνα ξεκινά." },
  { id: 126, title: "Fallout", year: 2024, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.4, actors: "Ella Purnell, Aaron Moten, Moisés Arias, Walton Goggins, Leslie Uggams", director: "Jonathan Nolan, Clare Kilner, Fred Toye, Daniel Gray Longino, Wayne Che Yip", writer: "Chaz Hawkins, Geneva Robertson-Dworet, Graham Wagner, Carson D. Mell, Karey Dornetto", link: "https://1024terabox.com/s/1AqpKMKZRVYshlmt9TnQiWg", imdb: "https://www.imdb.com/title/tt12637874/", tmdb: "https://www.themoviedb.org/tv/106379", tagline: "The world deserves a better ending.", desc: "Η ιστορία εξελίσσεται σε ένα δυστοπικό μέλλον, ύστερα από έναν παγκόσμιο πυρηνικό πόλεμο το 2077, που ισοπέδωσε τα πάντα στη Γη. Οι άνθρωποι ζουν πλέον σε πυρηνικά καταφύγια, και βγαίνουν στην κατεστραμμένη και ερημωμένη επιφάνεια, μόνο για προμήθειες." },
  { id: 127, title: "Σκοτεινή Ύλη", year: 2024, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.6, actors: "Joel Edgerton, Jennifer Connelly, Alice Braga, Jimmi Simpson, Dayo Okeniyi", director: "Jakob Verbruggen, Alik Sakharov, Logan George, Roxann Dawson, Celine Held", writer: "Blake Crouch, Megan McDonnell, Jacquelyn Ben-Zekry, Ihuoma Ofordire", link: "https://terabox.com/s/1Clik5J4eskknXo3ZW87Xgw", imdb: "https://www.imdb.com/title/tt19226166/", tmdb: "https://www.themoviedb.org/tv/196322", tagline: "Μία ζωή. Άπειρες πιθανότητες.", desc: "Ο Τζέισον Ντέσεν απάγεται σε μια εναλλακτική εκδοχή της ζωής του. Για να επιστρέψει στην αληθινή του οικογένεια, ξεκινά ένα οδυνηρό ταξίδι για να τη σώσει από τον πιο τρομακτικό εχθρό: τον εαυτό του." },
  { id: 128, title: "Bodies", year: 2023, country: "United Kingdom", genre: "Εγκλήματος, Μυστηρίου, Δράμα", type: "Series", quality: "HD", rating: 7.3, actors: "Jacob Fortune-Lloyd, Shira Haas, Amaka Okafor, Kyle Soller, Greta Scacchi", director: "Marco Kreuzpaintner, Haolu Wang", writer: "Paul Tomalin, Danusia Samal", link: "https://terabox.com/s/1ySIFSmskCOhJXMe19DHWpQ", imdb: "https://www.imdb.com/title/tt18259896/", tmdb: "https://www.themoviedb.org/tv/233629", tagline: "KNOW YOU ARE LOVED", desc: "Τέσσερις ντετέκτιβ. Τέσσερις χρονολογίες. Ένα πτώμα. Για να σώσουν τη Μεγάλη Βρετανία, θα πρέπει πρώτα να διαλευκάνουν τον φόνο που άλλαξε τον ρου της ιστορίας." },
  { id: 129, title: "The Handmaid's Tale", year: 2017, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.4, actors: "Elisabeth Moss, Yvonne Strahovski, Ann Dowd, Madeline Brewer, Max Minghella", director: "Mike Barker, Elisabeth Moss, Kari Skogland, Daina Reid, Reed Morano", writer: "Margaret Atwood, Bruce Miller, Nina Fiore, Kira Snyder, Eric Tuchman", link: "https://1024terabox.com/s/19TDEsVjwPxoNcRPR-juquA", imdb: "https://www.imdb.com/title/tt5834204/", tmdb: "https://www.themoviedb.org/tv/69478", tagline: "Blessed be the fruit.", desc: "Σε ένα δυστοπικό μέλλον, μια γυναίκα αναγκάζεται να ζήσει ως παλλακίδα υπό μια φονταμενταλιστική θεοκρατική δικτατορία. Τηλεοπτική προσαρμογή του μυθιστορήματος της Margaret Atwood." },

  { id: 131, title: "Moon Knight", year: 2022, country: "United States", genre: "Μυστηρίου", type: "Series", quality: "HD", rating: 7.3, actors: "Oscar Isaac, Ethan Hawke, May Calamawy, Ann Akinjirin, David Ganly", director: "Mohamed Diab, Aaron Moorhead, Justin Benson", writer: "Peter Cameron, Jeremy Slater, Sabir Pirzada, Matthew Orton, Beau DeMayo", link: "https://terabox.com/s/1GS-cRi5q6jckDGReYV5vZg", imdb: "https://www.imdb.com/title/tt10234724/", tmdb: "https://www.themoviedb.org/tv/92749", tagline: "Αγκάλιασε το χάος.", desc: "Όταν ο Στίβεν Γκραντ, ένας ήσυχος υπάλληλος μαγαζιού δώρων, στοιχειώνεται από συσκοτίσεις και αναμνήσεις μιας άλλης ζωής, ανακαλύπτει πως έχει Διασχιστική διαταραχή ταυτότητας και μοιράζεται το σώμα του με έναν μισθοφόρο ονόματι Μαρκ Σπέκτορ. Ενώ οι εχθροί του Στίβεν/Μαρκ πλησιάζουν, πρέπει να περιηγηθούν στις περίπλοκες ταυτότητές τους, και ταυτόχρονα μέσα σε ένα θανατηφόρο μυστήριο ανάμεσα στους παντοδύναμους Θεούς της Αιγύπτου." },
  { id: 132, title: "ONE PIECE", year: 2023, country: "United States", genre: "", type: "Series", quality: "HD", rating: 8.3, actors: "Iñaki Godoy, Emily Rudd, Mackenyu, Jacob Gibson, Jeff Ward", director: "Tim Southam, Emma Sullivan, Marc Jobst, Josef Kubota Wladyka", writer: "Steven Maeda, Ian Stokes, Tiffany Greshler, Allison Weintraub, Diego Gutierrez", link: "https://terabox.com/s/1X-EOpARrWSkUXV6UEZlwsA", imdb: "https://www.imdb.com/title/tt11737520/", tmdb: "https://www.themoviedb.org/tv/111110", tagline: "Έρχονται οι πειρατές!", desc: "Με το ψάθινο καπέλο του και το ετερόκλητο πλήρωμά του, ο νεαρός πειρατής Μόνκι Ντ. Λούφι αναζητά έναν θησαυρό σε αυτή τη μεταφορά ζωντανής δράσης του δημοφιλούς μάνγκα." },
  { id: 133, title: "Loudermilk", year: 2017, country: "United States", genre: "Κωμωδία, Δράμα", type: "Series", quality: "HD", rating: 7.9, actors: "Ron Livingston, Will Sasso, Anja Savcic, Timothy Webber, Mat Fraser", director: "Peter Farrelly", writer: "Peter Farrelly, Bobby Mort, Yassir Lester", link: "https://terabox.com/s/1KHy6xn-Y1TLJBOrez1iAjg", imdb: "https://www.imdb.com/title/tt5983790/", tmdb: "https://www.themoviedb.org/tv/73200", tagline: "", desc: "Sam Loudermilk is a recovering alcoholic and substance abuse counselor with an extremely bad attitude about, well, everything. He is unapologetically uncensored, and manages to piss off everyone in his life. Although he has his drinking under control, Loudermilk discovers that when your life is a complete mess, getting clean is the easy part." },
    { id: 134, title: "Ο Οίκος των Νίντζα", year: 2024, country: "Japan", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.1, actors: "Kento Kaku, Yosuke Eguchi, Tae Kimura, Kengo Kora, Aju Makita", director: "Dave Boyle, Tomoyuki Takimoto, Yoshiaki Murao", writer: "Kota Oura, Masahiro Yamaura, Kanna Kimura, Dave Boyle", link: "https://terabox.com/s/1spQZ_0V-VC3Bzyc7hSLvtg", imdb: "https://www.imdb.com/title/tt31136050/", tmdb: "https://www.themoviedb.org/tv/210098", tagline: "", desc: "Μια δυσλειτουργική οικογένεια, που προέρχεται από έναν έξοχο οίκο νίντζα, αναλαμβάνει ξανά μετά από χρόνια σκοτεινές αποστολές για να αντιμετωπίσει επερχόμενες απειλές." },
  { id: 135, title: "Ο Πέρσι Τζάκσον και οι Ολύμπιοι", year: 2023, country: "United States", genre: "Δράμα, Οικογενειακή", type: "Series", quality: "HD", rating: 7.0, actors: "Walker Scobell, Leah Sava Jeffries, Aryan Simhadri, Charlie Bushnell, Virginia Kull", director: "Jet Wilkinson, Anders Engström, James Bobin", writer: "Jonathan E. Steinberg, Joe Tracz, Craig Silverstein, Monica Owusu-Breen, Andrew Miller", link: "https://1024terabox.com/s/1gkDeXjWNCjzlLONeI4vXIQ", imdb: "https://www.imdb.com/title/tt12324366/", tmdb: "https://www.themoviedb.org/tv/103540", tagline: "The gods are waiting.", desc: "Ο Πέρσι Τζάκσον αναλαμβάνει μια επικίνδυνη αποστολή. Ξεφεύγοντας από τέρατα και παραπλανώντας θεούς, πρέπει να διασχίσει την Αμερική, για να επιστρέψει στον Δία τον Κεραυνό του και να σταματήσει έναν γενικευμένο πόλεμο. Με τη βοήθεια των συντρόφων του, της Άναμπεθ και του Γκρόβερ, ο Πέρσι θα βρει ταξιδεύοντας τις απαντήσεις που αναζητά: πώς να χωρέσει σε έναν κόσμο που τον κάνει να νιώθει παράταιρος, αλλά και ποιος πραγματικά είναι ο προορισμός του." },
  { id: 136, title: "Strike", year: 2017, country: "United Kingdom", genre: "Εγκλήματος, Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 7.9, actors: "Tom Burke, Holliday Grainger, Kerr Logan, Jack Greenlees, Joseph Quinn", director: "", writer: "J.K. Rowling, Tom Edge, Ben Richards", link: "https://terabox.com/s/1ANgLuHGhFJBXCgRpOv_j2w", imdb: "https://www.imdb.com/title/tt4276618/", tmdb: "https://www.themoviedb.org/tv/72748", tagline: "", desc: "Το άψυχο σώμα ενός νεαρού μοντέλου κείτεται νεκρό σε ένα χιονισμένο πεζοδρόμιο του Λονδίνου, έχοντας πέσει από ένα διαμέρισμα. Πήδηξε μόνη της ή την έσπρωξε κάποιος;\n\nΤο μυστήριο αυτό καλείται να διαλευκάνει ο ντετέκτιβ Κόρμοραν Στράικ στη νέα σειρά μυστηρίου του BBC που έκανε πρεμιέρα την Κυριακή το βράδυ με τίτλο \"Strike: The Cuckoo's Calling\". Η σειρά είναι βασισμένη στο ομώνυμο βιβλίο της Τζ. Κ. Ρόουλινγκ (γνωστής από τα βιβλία της σειράς \"Χάρι Πότερ\"), το οποίο έγραψε με το ανδρικό ψευδώνυμο \"Ρόμπερτ Γκάλμπρεϊθ\"." },
  { id: 137, title: "Σέρλοκ", year: 2010, country: "United Kingdom", genre: "Εγκλήματος, Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 9.0, actors: "Benedict Cumberbatch, Martin Freeman, Una Stubbs, Rupert Graves, Louise Brealey", director: "Paul McGuigan, Nick Hurran, Colm McCarthy, Euros Lyn, Benjamin Caron", writer: "Steven Moffat, Mark Gatiss, Stephen Thompson", link: "https://terabox.com/s/1oMNMb8BQq83UeBb0-1kv7A", imdb: "https://www.imdb.com/title/tt1475582/", tmdb: "https://www.themoviedb.org/tv/19885", tagline: "A new sleuth for the 21st century.", desc: "Στη νέα εκδοχή των αγαπημένων ιστοριών μυστηρίου του Άρθουρ Κόναν Ντόιλ, ο εκκεντρικός ντετέκτιβ περιπλανιέται στους δρόμους του σύγχρονου Λονδίνου αναζητώντας στοιχεία." },
  { id: 138, title: "Shōgun", year: 1980, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.1, actors: "Richard Chamberlain, Toshirō Mifune, Yōko Shimada, John Rhys-Davies, Damien Thomas", director: "Jerry London", writer: "Eric Bercovici, James Clavell", link: "https://terabox.com/s/1Dx15uQMvJYA5roHxA_y1tg", imdb: "https://www.imdb.com/title/tt0080274/", tmdb: "https://www.themoviedb.org/tv/13862", tagline: "A nation of violence, Samurai warriors ... and forbidden love.", desc: "Η σειρά ακολουθεί τις εμπειρίες του Τζον Μπλάκθορν στην Ιαπωνία στις αρχές του 17ου αιώνα. Μετά το ναυάγιο που είχε το πλοίο του Erasmus, κατά μήκος των ακτών της Ιαπωνίας… O Τζον Μπλάκθορν είναι ο άγγελος κυβερνήτης του πρώτου ολλανδικού πλοίου, που καταφέρνει να φτάσει στην Ιαπωνία, κατά λάθος βέβαια, αφού το πλοίο του φτάνει εκεί ουσιαστικά ακυβέρνητο εξαιτίας μιας φοβερής τρικυμίας..." },
  { id: 139, title: "Sugar", year: 2024, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 7.4, actors: "Colin Farrell, Kirby Howell-Baptiste, Amy Ryan, Dennis Boutsikaris, Nate Corddry", director: "Fernando Meirelles, Adam Arkin", writer: "Mark Protosevich, Donald Joh, Sam Catlin, David Rosen", link: "https://terabox.com/s/11tMdHnatDRvoitfPwCBQ8A", imdb: "https://www.imdb.com/title/tt16418872/", tmdb: "https://www.themoviedb.org/tv/203744", tagline: "Κάποιοι άνθρωποι είναι ένα μυστήριο.", desc: "Ένας αινιγματικός ιδιωτικός ερευνητής παλεύει με προσωπικούς δαίμονες καθώς ερευνά την εξαφάνιση της πολυαγαπημένης εγγονής ενός παραγωγού του Χόλιγουντ." },
  { id: 140, title: "Διαχωρισμός", year: 2022, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 8.7, actors: "Adam Scott, Britt Lower, Tramell Tillman, Zach Cherry, Jen Tullock", director: "Aoife McArdle, Ben Stiller, Uta Briesewitz, Sam Donovan, Jessica Lee Gagné", writer: "Anna Ouyang Moench, Helen Leigh, Dan Erickson, Mark Friedman, Megan Ritchie", link: "https://1024terabox.com/s/1NOXTJ4ORVRpaaEPZ7o2sJg", imdb: "https://www.imdb.com/title/tt11280740/", tmdb: "https://www.themoviedb.org/tv/95396", tagline: "Τι να την κάνεις τη ζωή όταν υπάρχει η δουλειά;", desc: "Ο Μαρκ ηγείται μιας ομάδας υπαλλήλων των οποίων οι αναμνήσεις έχουν διαχωριστεί χειρουργικά σε αναμνήσεις δουλειάς και προσωπικής ζωής. Όταν ένας μυστηριώδης συνάδελφος εμφανίζεται εκτός δουλειάς, ξεκινά ένα ταξίδι για να ανακαλύψει την αλήθεια για τις δουλειές τους." },
  { id: 141, title: "Κάτω από τη Γέφυρα", year: 2024, country: "United States", genre: "Δράμα, Εγκλήματος", type: "Series", quality: "HD", rating: 7.2, actors: "Lily Gladstone, Vritika Gupta, Chloe Guidry, Javon Walton, Izzy G.", director: "Kevin Phillips, Quinn Shephard, Catherine Hardwicke, Geeta Patel, Nimisha Mukerji", writer: "Quinn Shephard, Samir Mehta, Stuti Malhotra, Ashley Cardiff, Jihan Crowther", link: "https://terabox.com/s/1lFl1NartKi5-j6tH5Y8bBA", imdb: "https://www.imdb.com/title/tt27238053/", tmdb: "https://www.themoviedb.org/tv/211358", tagline: "", desc: "Η αληθινή ιστορία μιας 14χρονης που πήγε σ' ένα πάρτι με φίλους και δεν ξαναγύρισε σπίτι." },
  { id: 142, title: "Βίκινγκ", year: 2013, country: "Canada", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.5, actors: "Katheryn Winnick, Gustaf Skarsgård, Alexander Ludwig, Georgia Hirst, Peter Franzén", director: "Ciaran Donnelly, Ken Girotti, Jeff Woolnough, Steve Saint Leger, Helen Shaver", writer: "Michael Hirst", link: "https://terabox.com/s/1ZL7pqyN-NYL10UDlf4oeVw", imdb: "https://www.imdb.com/title/tt2306299/", tmdb: "https://www.themoviedb.org/tv/44217", tagline: "", desc: "Η σειρά Βίκινγκς ακολουθεί τις περιπέτειες του Ράγκναρ Λόθμπροκ, του μεγαλύτερου ήρωα της εποχής του. Η σειρά αφηγείται τα έπη της ομάδας του Ράγκναρ και της οικογένειάς του, όπως ο ίδιος ανεβαίνει από ένας απλός γεωργός, για να γίνει τελικά Βασιλιάς των Βίκινγκ. Εκτός του ότι είναι ατρόμητος πολεμιστής, ο Ράγκναρ ενσαρκώνει τις παραδόσεις των Νορβηγών και την αφοσίωσή του στους θεούς. Ο μύθος λέει ότι ήταν άμεσος απόγονος του Όντιν, Θεού του πολέμου." },
  { id: 143, title: "Χρονοπαγίδα", year: 2006, country: "United Kingdom", genre: "Εγκλήματος, Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 8.4, actors: "John Simm, Philip Glenister, Liz White, Dean Andrews, Marshall Lancaster", director: "S.J. Clarkson, Andrew Gunn, John Alexander, John McKay, Richard Clark", writer: "Matthew Graham, Chris Chibnall, Ashley Pharoah, Guy Jenkin, Tony Jordan", link: "https://terabox.com/s/1HeR-hINuf9JwPEjzSmjMTQ", imdb: "https://www.imdb.com/title/tt0478942/", tmdb: "https://www.themoviedb.org/tv/2973", tagline: "Is he mad, in a coma… or has Detective Sam Tyler really travelled back in time?", desc: "Η ζωή του νεαρού αστυνομικού Σαμ Τάιλερ ανατρέπεται εντελώς, όταν το κυνήγητό ενός στυγερού δολοφόνου καταλήγει σε απαγωγή της αγαπημένης του από τον δολοφόνο και σε ένα πολύ σοβαρό τροχαίο ατύχημα για τον ίδιο. Τότε, συμβαίνει κάτι παράδοξο: ο Σαμ, βαριά τραυματισμένος, βρίσκεται ξαφνικά πίσω στο χρόνο, 33 ολόκληρα χρόνια πριν, στο 1973! Είναι αλήθεια ή ψευδαίσθηση; Ονειρεύεται, είναι σε κώμα ή έχει πραγματικά ταξιδέψει στο χρόνο; Ό,τι και να είναι, σύντομα συνεχίζει από εκεί την αναζήτησή του, καθώς βρίσκονται σε εξέλιξη μια σειρά από μυστηριώδεις δολοφονίες, που φαίνεται να συνδέονται με τον δολοφόνο στο σήμερα! Έτσι, ο Σαμ, με τη νέα του αστυνομική ομάδα, λύνει μια σειρά από υποθέσεις, που καθεμιά τον φέρνει και πιο κοντά στον δολοφόνο που κυνηγούσε στο παρόν…" },
  { id: 144, title: "Snowpiercer", year: 2020, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 6.9, actors: "Daveed Diggs, Mickey Sumner, Alison Wright, Iddo Goldberg, Roberto Urbina", director: "Christoph Schrewe, Leslie Hope, James Hawes, Fred Toye, Erica A. Watson", writer: "", link: "https://terabox.com/s/1E3jXJQnQZywl69rwCJcSfw", imdb: "https://www.imdb.com/title/tt6156584/", tmdb: "https://www.themoviedb.org/tv/79680", tagline: "Prepare to brace.", desc: "Η ιστορία λαμβάνει χώρα το 2031, σε μια εποχή όπου ο κόσμος έχει υποστεί μια τεράστια οικολογική καταστροφή ύστερα από ένα αποτυχημένο πείραμα κατά της υπερθέρμανσης του πλανήτη, και έχει πλέον εισέλθει σε μια νέα εποχή των παγετώνων. Οι μοναδικοί επιζώντες, είναι στοιβαγμένοι σε ένα τεράστιο τρένο που κάνει μόνιμα τον γύρο της γης, χωρισμένο σε ταξικές κατηγορίες." },
  { id: 145, title: "Spinning Out", year: 2020, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.6, actors: "Kaya Scodelario, January Jones, Willow Shields, Evan Roderick, Sarah Wright", director: "", writer: "", link: "https://terabox.com/s/1-WX8ZqJKAqt9Ir-Pmyjm5A", imdb: "https://www.imdb.com/title/tt9077350/", tmdb: "https://www.themoviedb.org/tv/83050", tagline: "Σε λεπτό πάγο", desc: "Ύστερα από μια αποτυχημένη αλλά σημαντική εμφάνιση, μια πολλά υποσχόμενη σκέιτερ με οικογενειακά προβλήματα και προσωπικές ανασφάλειες προσπαθεί να σώσει την καριέρα της." },
  { id: 146, title: "Η Θεραπεία Ξέφυγε", year: 2023, country: "United States", genre: "Κωμωδία", type: "Series", quality: "HD", rating: 8.1, actors: "Harrison Ford, Jason Segel, Jessica Williams, Luke Tennie, Michael Urie", director: "Randall Keenan Winston, James Ponsoldt, Zach Braff, Ry Russo-Young, Bill Lawrence", writer: "Brett Goldstein, Neil Goldman, Annie Mebane, Bill Posley, Brian Gallivan", link: "https://terabox.com/s/10OI1k53LqAv-d9YYaOVbmA", imdb: "https://www.imdb.com/title/tt15677150/", tmdb: "https://www.themoviedb.org/tv/136311", tagline: "Ξεπερνάμε τις δυσκολίες παρέα.", desc: "Ο Τζίμι πενθεί για τον χαμό της γυναίκας του, ενώ παράλληλα είναι πατέρας, φίλος και ψυχολόγος. Αποφασίζει να δοκιμάσει μια νέα προσέγγιση με οποιονδήποτε συναναστρέφεται: αφιλτράριστη, ωμή ειλικρίνεια. Μπορεί να βοηθήσει τον εαυτό του βοηθώντας άλλους; Θα τον φέρει αυτό πίσω στο φως;" },
  { id: 147, title: "Νυχτερινός Πράκτορας", year: 2023, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 7.4, actors: "Gabriel Basso, Luciane Buchanan, Fola Evans-Akingbola, Sarah Desjardins, Eve Harlow", director: "Millicent Shelton, Adam Arkin, Guy Ferland, Ana Lily Amirpour, Seth Gordon", writer: "Matthew Quirk, Munis Rashid, Tiffany Shaw Ho, Imogen Browder, Anayat Fakhraie", link: "https://1024terabox.com/s/1sbzYjuA2A6AOOsd-Nhi7Ew", imdb: "https://www.imdb.com/title/tt13943784/", tmdb: "https://www.themoviedb.org/tv/129552", tagline: "Go beyond the call.", desc: "Ένας πράκτορας του FBI και μια ειδική κυβερνοασφάλειας έρχονται κοντά ύστερα από ένα μεσονύκτιο τηλεφώνημα και πρέπει να ξεσκεπάσουν έναν ιστό πολιτικών συνωμοσιών." },
  { id: 148, title: "Μέσα στη Νύχτα", year: 2020, country: "Belgium", genre: "", type: "Series", quality: "HD", rating: 7.0, actors: "Pauline Étienne, Laurent Capelluto, Jan Bijvoet, Mehmet Kurtuluş, Alba Gaïa Bellugi", director: "Inti Calfat, Dirk Verheye", writer: "Jason George", link: "https://terabox.com/s/1jIzpNT-DOSx3DwFLCElZGA", imdb: "https://www.imdb.com/title/tt10906802/", tmdb: "https://www.themoviedb.org/tv/93811", tagline: "Η πιο σκοτεινή ώρα είναι λίγο πριν την αυγή.", desc: "Επιβάτες και πλήρωμα σε μια νυχτερινή πτήση που δέχτηκε αεροπειρατεία βιάζονται να προλάβουν τον ήλιο καθώς ένα μυστηριώδες συμπαντικό γεγονός καταστρέφει τον κόσμο." },
  { id: 149, title: "The English", year: 2022, country: "United Kingdom", genre: "Δράμα, Γουέστερν", type: "Series", quality: "HD", rating: 7.8, actors: "Emily Blunt, Chaske Spencer, Tom Hughes, Steve Wall, Stephen Rea", director: "Hugo Blick", writer: "", link: "https://terabox.com/s/1L_5_tMcwVr4mTWutdKpVzw", imdb: "https://www.imdb.com/title/tt11711278/", tmdb: "https://www.themoviedb.org/tv/99346", tagline: "", desc: "Η ιστορία ακολουθεί την Lady Cornelia Locke, μια εύπορη Αγγλίδα που ζητά τη βοήθεια του Ινδιάνου Pawnee, Eli Whipp για να τη βοηθήσει να εκδικηθεί τον θάνατο του γιου της. Οι δυο τους θα διασχίσουν ένα βίαιο τοπίο, χτισμένο από τα όνειρα και το αίμα, χωρίς να γνωρίζουν πως το παρελθόν τους ενώνει. Μαζί θα αντιμετωπίσουν τη μια πρόκληση μετά την άλλη, καθώς κατευθύνονται στην πόλη Hoxem της πολιτείας του Wyoming." },
  { id: 150, title: "Εφηβεία", year: 2025, country: "United Kingdom", genre: "Δράμα, Εγκλήματος", type: "Series", quality: "HD", rating: 8.2, actors: "Stephen Graham, Owen Cooper, Bidi Iredale, Amélie Pease, Christine Tremarco", director: "Philip Barantini", writer: "Jack Thorne, Stephen Graham", link: "https://1024terabox.com/s/1LeOBlBNa4IvUMES-Q7Pygg", imdb: "https://www.imdb.com/title/tt31806037/", tmdb: "https://www.themoviedb.org/tv/249042", tagline: "A child accused. Everyone left to answer.", desc: "Όταν ένας 13χρονος κατηγορείται για τη δολοφονία μιας συμμαθήτριάς του, η οικογένειά του, η ψυχολόγος και ο ντετέκτιβ της υπόθεσης αναρωτιούνται: τι συνέβη πραγματικά;" },
  { id: 151, title: "The Cleaning Lady", year: 2022, country: "United States", genre: "Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 7.0, actors: "Elodie Yung, Martha Millan, Sean Lew, Faith Bryant, Sebastien LaSalle", director: "Kenneth Biller, Lisa France, Marie Jamora, Milan Cheylov, Steven DePaul", writer: "Miranda Kwok, Denise Hahn, Sophie Hessekiel, Patrick G. Emralino, Melissa Carter", link: "https://1024terabox.com/s/1x7Hkn9ZJZehonGqpguyWkA", imdb: "https://www.imdb.com/title/tt14540834/", tmdb: "https://www.themoviedb.org/tv/125282", tagline: "It's a dirty business.", desc: "Μια γιατρός από την Καμπότζη έρχεται στην Αμερική, αναζητώντας βοήθεια για τον άρρωστο γιο της. Όμως, όταν το σύστημα την απογοητεύει, η γιατρός αρνείται την ήττα και την περιθωριοποίηση. Έτσι, γίνεται καθαρίστρια για το οργανωμένο έγκλημα, χρησιμοποιώντας την εξυπνάδα της για να χαράξει το δικό της μονοπάτι στον κόσμο του εγκλήματος." },
  { id: 152, title: "Ο Δικηγόρος με τη Λίνκολν", year: 2022, country: "United States", genre: "Δράμα, Εγκλήματος", type: "Series", quality: "HD", rating: 7.8, actors: "Manuel Garcia-Rulfo, Becki Newton, Angus Sampson, Jazz Raycole, Yaya DaCosta", director: "Antonio Negret, Ben Hernandez Bray, Alonso Alvarez, David Grossman, Erin Feeley", writer: "Michael Connelly, Ted Humphrey, Dailyn Rodriguez, Gladys Rodriguez, Matthew J. Liberman", link: "https://1024terabox.com/s/1DhYvDq5wKpABk-n4hD1nBQ", imdb: "https://www.imdb.com/title/tt13847816/", tmdb: "https://www.themoviedb.org/tv/116799", tagline: "Justice hurts.", desc: "Ένας ριψοκίνδυνος ιδεαλιστής δικηγόρος έχει για γραφείο το πίσω κάθισμα του αυτοκινήτου του σε αυτή τη σειρά που βασίζεται στα δημοφιλή μυθιστορήματα του Μάικλ Κόνελι." },
  { id: 153, title: "The North Water", year: 2021, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 7.6, actors: "Colin Farrell, Jack O'Connell, Sam Spruell, Simon Rubaudo, Greg Dennis", director: "Andrew Haigh", writer: "Andrew Haigh", link: "https://terabox.com/s/1Tsg7x0-fzNX9Bch5D9KP1g", imdb: "https://www.imdb.com/title/tt11146842/", tmdb: "https://www.themoviedb.org/tv/86941", tagline: "Those who journey here will find only themselves.", desc: "1859. Ο Πάτρικ Σάμνερ κατατάσσεται στο “Volunteer” ως χειρουργός του πλοίου, με την ελπίδα να αφεθεί στην αγριότητα του φαλαινοθηρικού του ταξιδιού στην Αρκτική. Όμως η τραχύτητα της φύσης φέρνει μαζί της κι αυτή των ανθρώπων του πληρώματος και συγκεκριμένα του Ντραξ, ενός κτηνώδης και αψύ καμακιστή.\n\nΌταν ο πραγματικός σκοπός της αποστολής γίνεται σαφής, ξεσπά η αναπόφευκτη σύγκρουση μεταξύ των δύο ανδρών - που τους οδηγεί σε ένα ταξίδι μακριά από την ασφάλεια της στεριάς και του πολιτισμού." },
  { id: 154, title: "Ο Νέος Πάπας", year: 2016, country: "Italy", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.3, actors: "Jude Law, Diane Keaton, Silvio Orlando, Javier Cámara, Scott Shepherd", director: "Paolo Sorrentino", writer: "Paolo Sorrentino, Tony Grisoni, Stefano Rulli, Umberto Contarello", link: "https://terabox.com/s/1j115m9NBbbxHFckQB0ADZw", imdb: "https://www.imdb.com/title/tt3655448/", tmdb: "https://www.themoviedb.org/tv/62699", tagline: "His religion is revolution.", desc: "Το Young Pope αφηγείται τη μυθιστορηματική ιστορία του Πάπα Πίου ΙΓ' ή αλλιώς Λένι Μπελάρντο, του πρώτου Αμερικανού Πάπα. Ο Λένι Μπελάρντο είναι νέος και γοητευτικός και η εκλογή του φαίνεται να είναι αποτέλεσμα της επιτυχημένης επικοινωνιακής πολιτικής του Κολεγίου των Καρδιναλίων. Ωστόσο, στο Βατικανό, εκεί που οι άνθρωποι ορίζουν την εκκλησία, τα φαινόμενα συχνά απατούν. Ο Πίος ΙΓ' αποδεικνύεται πιο μυστηριώδης και αντιφατικός από όλους. Πανέξυπνος και ταυτόχρονα αφελής, οπισθοδρομικός αλλά και πρωτοπόρος, απρόθυμος και μαζί αποφασιστικός, μελαγχολικός και αδίστακτος, αναζητά τον Θεό που μπορεί να προσφέρει στους ανθρώπους και τον εαυτό του." },
  { id: 155, title: "The Artful Dodger", year: 2023, country: "Australia", genre: "Δράμα, Εγκλήματος", type: "Series", quality: "HD", rating: 8.0, actors: "Thomas Brodie-Sangster, David Thewlis, Maia Mitchell, Damon Herriman, Luke Carroll", director: "Jeffrey Walker, Corrie Chen, Gracie Otto", writer: "James McNamara, Andrew Knight, Vivienne Walshe, Dan Knight", link: "https://terabox.com/s/16_09xJchFSteuMDkN7lF5w", imdb: "https://www.imdb.com/title/tt19872642/", tmdb: "https://www.themoviedb.org/tv/202208", tagline: "The Dodger will see you now.", desc: "Μια ιστορία αναγέννησης, προδοσίας, εξιλέωσης και έρωτα, με ανατροπές και πλούσιες δόσεις Όλιβερ Τουίστ. Ο Τζακ Ντόκινς, ή Χέλης, έχει μετατραπεί από σβέλτο πορτοφολά σε επιδέξιο χειρουργό. Διχάζεται ανάμεσα σε έναν ανέφικτο έρωτα και το έγκλημα που ακόμα τον ελκύει. Θα χρειαστεί κάθε δυνατό ελιγμό." },

  { id: 157, title: "The Old Man", year: 2022, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.6, actors: "Jeff Bridges, John Lithgow, Alia Shawkat, Amy Brenneman, Gbenga Akinnagbe", director: "Jet Wilkinson, Uta Briesewitz, Greg Yaitanes, Jon Watts, Steve Boyum", writer: "Jonathan E. Steinberg", link: "https://terabox.com/s/1ZIYx9CcYC611KD-EpQ_QKg", imdb: "https://www.imdb.com/title/tt5645436/", tmdb: "https://www.themoviedb.org/tv/111800", tagline: "Έπρεπε να τον έχουν αφήσει ήσυχο.", desc: "Ο Νταν Τσέις δραπέτευσε από τη CIA δεκαετίες πριν και έκτοτε ζει κρυμμένος. Όταν καταφθάνει ένας δολοφόνος και προσπαθεί να τον βγάλει από τη μέση, ο παλιός πράκτορας μαθαίνει πως για να διασφαλίσει το μέλλον του, πρέπει να συμφιλιωθεί με το παρελθόν του." },

  { id: 159, title: "The Walking Dead: The Ones Who Live", year: 2024, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.8, actors: "Andrew Lincoln, Danai Gurira, Pollyanna McIntosh, Terry O'Quinn, Lesley-Ann Brandt", director: "Bert, Michael Satrazemis, Michael Slovis, Bertie", writer: "Nana Nkweti, Scott M. Gimple, Matthew Negrete, Gabriel Llanas, Danai Gurira", link: "https://terabox.com/s/1xeLT-SMPi71zb9h71yCkEg", imdb: "https://www.imdb.com/title/tt13011094/", tmdb: "https://www.themoviedb.org/tv/206586", tagline: "Ο νέος κόσμος θα χρειαστεί τον Ρικ Γκράιμς.", desc: "Η σειρά παρουσιάζει μια ιστορία αγάπης δυο χαρακτήρων, που άλλαξαν από έναν αλλαγμένο κόσμο. Τους χώρισε η απόσταση. Ο Rick και η Michonne εισέρχονται σε έναν άλλο κόσμο, που χτίστηκε πάνω στον πόλεμο εναντία στους νεκρούς… Που τελικά εξελίχθηκε σε ένα πόλεμο εναντία στους ζωντανούς. Θα μπορέσουν να ξανασμίξουν και να γίνουν πάλι αυτοί που ήταν, σε συνθήκες που δεν έχουν ξανασυναντήσει; Είναι πλέον εχθροί; Εραστές; Θύματα; Είναι ακόμα ζωντανοί ή θα ανακαλύψουν πως και αυτοί είναι ζωντανοί νεκροί;" },
  { id: 160, title: "The Walking Dead: Dead City", year: 2023, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.1, actors: "Lauren Cohan, Jeffrey Dean Morgan, Gaius Charles, Zeljko Ivanek, Mahina Napoleon", director: "Loren Yaconelli, Kevin Dowling, Gandja Monteiro", writer: "Eli Jorné, Keith Staskiewicz, Brenna Kouf", link: "https://terabox.com/s/1ipYE7HidwVzFRv8_8uvv7A", imdb: "https://www.imdb.com/title/tt18546706/", tmdb: "https://www.themoviedb.org/tv/194583", tagline: "Κράτα τους εχθρούς σου κοντά.", desc: "Η Μάγκι και ο Νίγκαν ταξιδεύουν στο μετά-αποκαλυπτικό Μανχάτταν που εδώ και καιρό έχει αποκοπεί από την ενδοχώρα. Η πόλη που καταρρέει είναι γεμάτη με νεκρούς και επιζήσαντες οι οποίοι έχουν φτιάξει έναν κόσμο γεμάτο αναρχία, κινδύνους, ομορφιά και τρόμο." },

  { id: 163, title: "The Wire", year: 2002, country: "United States", genre: "Εγκλήματος, Δράμα", type: "Series", quality: "HD", rating: 9.3, actors: "Dominic West, Lance Reddick, Sonja Sohn, Wendell Pierce, Deirdre Lovejoy", director: "Joe Chappelle, Ernest R. Dickerson, Ed Bianchi, Steve Shill, Clark Johnson", writer: "David Simon, Ed Burns, George Pelecanos, Richard Price, Joy Lusco", link: "https://1024terabox.com/s/1FM2A404WyDVqXH0hoP47-Q", imdb: "https://www.imdb.com/title/tt0306414/", tmdb: "https://www.themoviedb.org/tv/1438", tagline: "Listen carefully.", desc: "Από τη σκοπιά τόσο των ντετέκτιβ της Βαλτιμόρης όσο και των στόχων τους, η σειρά παρουσιάζει ένα σύμπαν στο οποίο ο εθνικός πόλεμος κατά των ναρκωτικών έχει γίνει μια μόνιμη, αυτοσυντηρούμενη διοικητική δομή και οι διακρίσεις μεταξύ του καλού και του κακού συστηματικά εξαφανίζονται." },

  { id: 165, title: "Fringe", year: 2008, country: "United States", genre: "Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 8.4, actors: "Anna Torv, Joshua Jackson, Jasika Nicole, John Noble, Lance Reddick", director: "Joe Chappelle, Brad Anderson, Fred Toye, Jeannot Szwarc, Charles Beeson", writer: "J. H. Wyman, Jeff Pinkner, Akiva Goldsman, Graham Roland, Alison Schapker", link: "https://1024terabox.com/s/1NZD2D4W_uu5LdAF4K4sOig", imdb: "https://www.imdb.com/title/tt1119644/", tmdb: "https://www.themoviedb.org/tv/1705", tagline: "Question the answers.", desc: "Περίεργα φαινόμενα συμβαίνουν σ' όλο τον κόσμο. Μια πράκτορας του FBI συνεργάζεται με έναν τρελό πλην ιδιοφυή επιστήμονα, για τη διερεύνηση αυτών των ανεξήγητων φαινομένων." },

  { id: 167, title: "Andor", year: 2022, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.5, actors: "Diego Luna, Denise Gough, Stellan Skarsgård, Adria Arjona, Genevieve O'Reilly", director: "Ariel Kleiman, Toby Haynes, Susanna White, Alonso Ruizpalacios, Benjamin Caron", writer: "Tony Gilroy, Dan Gilroy, Beau Willimon, Tom Bissell, Stephen Schiff", link: "https://1024terabox.com/s/1j1iCCk9R8MEo-JkY5P1M2A", imdb: "https://www.imdb.com/title/tt9253284/", tmdb: "https://www.themoviedb.org/tv/83867", tagline: "The Rebellion begins.", desc: "Σε μια εποχή γεμάτη κινδύνους, απάτες και ίντριγκες, ο Κάσιαν Άντορ ανακαλύπτει ότι μπορεί να κάνει τη διαφορά στον αγώνα κατά της τυραννικής Γαλαξιακής Αυτοκρατορίας. Ξεκινά μια πορεία που θα τον καταστήσει ήρωα." },
  { id: 168, title: "The Last of Us", year: 2023, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 8.6, actors: "Pedro Pascal, Bella Ramsey, Gabriel Luna, Isabela Merced, Young Mazino", director: "Peter Hoar, Jeremy Webb, Ali Abbasi, Neil Druckmann, Craig Mazin", writer: "Craig Mazin, Neil Druckmann, Halley Wegryn Gross", link: "https://1024terabox.com/s/1xbPLQdGJjYMSFXeASM7kFA", imdb: "https://www.imdb.com/title/tt100088/", tmdb: "https://www.themoviedb.org/tv/100088", tagline: "Όταν είσαι χαμένος στο σκοτάδι, ψάξε για το φως.", desc: "Είκοσι χρόνια μετά την καταστροφή του σύγχρονου πολιτισμού, ο Τζόελ, ένας σκληραγωγημένος επιζών, προσλαμβάνεται για να βγάλει λαθραία την Έλι, ένα 14χρονο κορίτσι, από την καταπιεστική ζώνη καραντίνας. Αυτό που ξεκινά ως μια μικρή δουλειά γίνεται σύντομα ένα βάναυσο, σπαρακτικό ταξίδι, καθώς και οι δύο πρέπει να διασχίσουν τις Ηνωμένες Πολιτείες και να εξαρτώνται ο ένας από τον άλλον για την επιβίωση." },
  { id: 169, title: "Zero Day", year: 2025, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.0, actors: "Robert De Niro, Jesse Plemons, Lizzy Caplan, Connie Britton, Joan Allen", director: "Lesli Linka Glatter", writer: "Noah Oppenheim, Eric Newman, Eli Attie, Roberto Patino, Dee Johnson", link: "https://1024terabox.com/s/1M_BLrc8jLecPz_617Fu7Zw", imdb: "https://www.imdb.com/title/tt20879542/", tmdb: "https://www.themoviedb.org/tv/216082", tagline: "Truth has been weaponized.", desc: "Ένας πρώην Αμερικανός πρόεδρος αναλαμβάνει να βρει την πηγή μιας μοιραίας κυβερνοεπίθεσης και ανακαλύπτει έναν τεράστιο ιστό από ψέματα και συνωμοσίες." },
  { id: 170, title: "White Collar", year: 2009, country: "United States", genre: "Εγκλήματος, Δράμα, Μυστηρίου", type: "Series", quality: "HD", rating: 8.2, actors: "Matt Bomer, Tim DeKay, Willie Garson, Tiffani Thiessen, Sharif Atkins", director: "John T. Kretchmer, Russell Lee Fine, Paul Holahan, Michael Smith, Sanford Bookstaver", writer: "Jeff Eastin, Joe Henderson, Mark Goffman, Alexandra McNally, Channing Powell", link: "https://1024terabox.com/s/1fWJkp4rOKsdLQmSQhqJd7g", imdb: "https://www.imdb.com/title/tt1358522/", tmdb: "https://www.themoviedb.org/tv/21510", tagline: "To solve the hardest crimes, hire the smartest criminal.", desc: "Πρωταγωνιστής της σειράς είναι ο Matt Bomer υποδυόμενος τον απατεώνα Neal Caffrey. Ο Νιλ μετά από ένα κυνήγι τριών ετών πιάνεται και στέλνεται στις φυλακές. Έχοντας ήδη εκτίσει σχεδόν τέσσερα χρόνια, κάνει απόδραση από τις φυλακές υψίστης ασφαλείας για να βρει την κοπέλα του, πιστεύοντας ότι κινδυνεύει. Ο Πίτερ Μπερκ, ο πράκτορας που τον είχε συλλάβει την πρώτη φορά, τον ξαναπιάνει. \n\nΟ Νιλ, όμως, του δίνει στοιχεία για μια άλλη υπόθεση. Τότε είναι που κάνει πρόταση στον Πίτερ να τον βοηθά στις υποθέσεις του ως εθελοντική εργασία. Ο Νιλ αποφυλακίζεται με περιοριστικά μέτρα, και ήδη από την πρώτη μέρα βλέπουμε να κάνει πράξη την εξυπνάδα του και την εφευρετικότητά του. Ενώ δε θα λείψουν και οι δόσεις χιούμορ. OnlineMovieStar" },
  { id: 171, title: "Ο Τροχός του Χρόνου", year: 2021, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.2, actors: "Rosamund Pike, Daniel Henney, Josha Stradowski, Zoë Robins, Madeleine Madden", director: "Ciaran Donnelly, Sanaa Hamri, Thomas Napper, Maja Vrvilo, Marta Cunningham", writer: "Robert Jordan, Celine Song, Dave Hill, Justine Juel Gillmer, Rafe Judkins", link: "https://1024terabox.com/s/1JzGggwPKTg4lAnxKaftQWA", imdb: "https://www.imdb.com/title/tt7462410/", tmdb: "https://www.themoviedb.org/tv/71914", tagline: "Ξεκινήστε το ταξίδι σας...", desc: "Η ζωή πέντε νεαρών χωρικών αλλάζει για πάντα με την άφιξη μιας γυναίκας, που ισχυρίζεται ότι ένας από αυτούς είναι παιδί αρχαίας προφητείας με τη δύναμη να αλλάξει την ισορροπία ανάμεσα στο Φως και το Σκοτάδι για πάντα. Εκείνοι πρέπει ν' αποφασίσουν αν θα εμπιστευτούν στην ξένη – και ο ένας στον άλλον – τη μοίρα του κόσμου προτού ο Σκοτεινός βγει από τη φυλακή του και ξεκινήσει η Τελευταία Μάχη." },
  { id: 172, title: "Η Ακαδημία της Ομπρέλας", year: 2019, country: "United States", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.8, actors: "Aidan Gallagher, Elliot Page, Tom Hopper, Emmy Raver-Lampman, Robert Sheehan", director: "Jeremy Webb, Paco Cabezas, Stephen Surjik, Ellen Kuras, Sylvain White", writer: "Steve Blackman, Lauren Otero, Thomas Page McBee", link: "https://1024terabox.com/s/1uuFkfH_sDU5z4lkv0tjhEg", imdb: "https://www.imdb.com/title/tt1312171/", tmdb: "https://www.themoviedb.org/tv/75006", tagline: "Too many siblings. Not enough timeline.", desc: "Μια δυσλειτουργική οικογένεια υπερηρώων ενώνεται για να λύσει το μυστήριο του θανάτου του πατέρα της οικογένειας, της απειλής της αποκάλυψης και άλλα." },

    { id: 175, title: "The Big Bang Theory", year: 2007, country: "United States", genre: "Κωμωδία", type: "Series", quality: "HD", rating: 8.1, actors: "Johnny Galecki, Jim Parsons, Kaley Cuoco, Simon Helberg, Kunal Nayyar", director: "Anthony Joseph Rich, Mark Cendrowski, Gay Linvill, James Burrows, Joel Murray", writer: "Chuck Lorre, Steven Molaro, Bill Prady, Eric Kaplan, Jim Reynolds", link: "https://1024terabox.com/s/1ynSjP8VsGqk14dq3x8JVqg", imdb: "https://www.imdb.com/title/tt0898266/", tmdb: "https://www.themoviedb.org/tv/1418", tagline: "Το έξυπνο είναι το νέο σέξι.", desc: "Ο Λέοναρντ και ο Σέλντον είναι λαμπροί φυσικοί επιστήμονες, λάτρεις του σύμπαντος και θαυμαστές της μεγαλοσύνης του. Αποτελούν πάντα πρότυπο, χάρισαν στιγμές περηφάνιας στις οικογένειές τους, απέκτησαν γνώσεις, έχουν υψηλό δείκτη νοημοσύνης αλλά δεν έχουν ιδέα τι θα πει «γλυντάω». Αντικοινωνικοί, κλειστοί χαρακτήρες, ανίκανοι να επικοινωνήσουν με τους ανθρώπους και κυρίως με τις γυναίκες. «Χωμένοι» στα βιβλία και τις μελέτες, τους ενδιαφέρει περισσότερο ένα Super Nova εκατομμύρια έτη φωτός μακριά από τη Γη παρά η πραγματική ζωή πάνω σ' αυτήν." },

  { id: 186, title: "El Eternauta: Ο Κοσμοναύτης του Απείρου", year: 2025, country: "Argentina", genre: "Δράμα", type: "Series", quality: "HD", rating: 7.4, actors: "Dante Mastropierro, Ricardo Darín, Carla Peterson, César Troncoso, Andrea Pietra", director: "Bruno Stagnaro", writer: "Bruno Stagnaro, Ariel Staltari, Gabriel Stagnaro", link: "https://1024terabox.com/s/1f1z_tJTvWie4bSsslVkeRw", imdb: "https://www.imdb.com/title/tt28061999/", tmdb: "https://www.themoviedb.org/tv/226362", tagline: "No one survives alone", desc: "Αφού μια καταστροφική τοξική χιονόπτωση εξολοθρεύει εκατομμύρια, ο Χουάν Σάλβο και άλλοι επιζώντες στο Μπουένος Άιρες πρέπει να αντισταθούν σε μια εξωγήινη αόρατη απειλή." },
