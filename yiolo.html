<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YIOIO Ultimate Database 2026</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #e50914;
      --bg: #0a0a0a;
      --card: #141414;
      --text: #ffffff;
      --border: #222;
      --gold: #ffc107;
      --input-bg: #1a1a1a;
      --modal-overlay: rgba(0, 0, 0, 0.95);
    }

    [data-theme="light"] {
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #1a1a1a;
      --border: #ddd;
      --input-bg: #eeeeee;
      --modal-overlay: rgba(255, 255, 255, 0.95);
    }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: 0.3s;
      overflow-x: hidden;
    }

    header {
      padding: 15px 5%;
      background: var(--card);
      position: sticky;
      top: 0;
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .logo {
      color: var(--primary);
      font-weight: 800;
      font-size: 24px;
      letter-spacing: 1px;
    }

    .theme-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 6px 15px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 11px;
      font-weight: bold;
    }

    #movieCount {
      font-size: 11px;
      background: var(--input-bg);
      padding: 5px 12px;
      border-radius: 15px;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .search-section {
      padding: 30px 5% 10px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    #movieSearch {
      width: 100%;
      max-width: 600px;
      padding: 15px 25px;
      border-radius: 30px;
      border: 2px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      outline: none;
      font-size: 16px;
      transition: 0.3s;
    }

    #movieSearch:focus {
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(229, 9, 20, 0.3);
    }

    .filter-group {
      display: flex;
      flex-direction: row;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      margin: 20px 0;
    }

    .filter-group select {
      padding: 10px 20px;
      border-radius: 25px;
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 14px;
      min-width: 150px;
      outline: none;
    }

    .filter-group select:focus {
      border-color: var(--primary);
    }

    .movie-grid {
      display: grid !important;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)) !important;
      gap: 25px;
      padding: 20px 5%;
      width: 100%;
      box-sizing: border-box;
    }

    .movie-card {
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      transition: 0.3s ease;
      cursor: pointer;
      width: 100%;
    }

    .movie-card:hover {
      transform: translateY(-8px);
      border-color: var(--primary);
    }

    .img-container {
      position: relative;
      overflow: hidden;
      aspect-ratio: 2/3;
      background: #1a1a1a;
    }

    .movie-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .quality-tag {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-size: 9px;
      font-weight: bold;
      padding: 3px 6px;
      border-radius: 4px;
      z-index: 11;
      background: #2ecc71;
    }

    .quality-tag.sd-blue {
      background: #007bff;
      color: white;
    }

    .info {
      padding: 15px;
      text-align: center;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .info h3 {
      font-size: 14px;
      margin: 0 0 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
      font-weight: 700;
    }

    .stars {
      color: var(--gold);
      font-size: 16px;
      margin-bottom: 10px;
    }

    .play-btn {
      background: var(--primary);
      color: white;
      text-decoration: none;
      padding: 8px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: bold;
      display: block;
      text-align: center;
    }

    #loadMoreBtn {
      display: block;
      margin: 20px auto 50px;
      padding: 12px 30px;
      font-size: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
    }

    #detailModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--modal-overlay);
      z-index: 4000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
    }

    .modal-box {
      background: var(--card);
      width: 90%;
      max-width: 900px;
      display: flex;
      position: relative;
      border-radius: 15px;
      overflow: hidden;
      animation: slideUp 0.4s ease;
    }

    .modal-poster {
      width: 40%;
      object-fit: cover;
      background: #000;
    }

    .modal-info {
      padding: 35px;
      width: 60%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      text-align: left;
      max-height: 80vh;
    }

    .modal-info h2 {
      margin: 0;
      color: var(--primary);
      font-size: 28px;
    }

    .info-label {
      color: var(--primary);
      font-weight: 800;
      font-size: 11px;
      text-transform: uppercase;
      margin-right: 5px;
    }

    .modal-desc {
      font-size: 14px;
      line-height: 1.6;
      opacity: 0.8;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }

    @keyframes slideUp {
      from {
        transform: translateY(30px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @media (max-width: 750px) {
      .modal-box {
        flex-direction: column;
        height: 100vh;
        max-height: 100vh;
        border-radius: 0;
        width: 100%;
      }
      .modal-poster {
        width: 100%;
        height: 40%;
      }
      .modal-info {
        width: 100%;
        padding: 20px;
        flex-grow: 1;
      }
      .movie-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)) !important;
        gap: 15px;
        padding: 15px;
      }
    }

    #backToTop {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 50px;
      height: 50px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      display: none;
      z-index: 3000;
      transition: 0.3s;
    }

    #backToTop:hover {
      transform: scale(1.1);
    }

    .close-modal {
      position: absolute;
      top: 15px;
      right: 15px;
      background: rgba(229, 9, 20, 0.8);
      color: white;
      border: none;
      border-radius: 50%;
      width: 35px;
      height: 35px;
      cursor: pointer;
      z-index: 10;
      font-weight: bold;
      font-size: 18px;
    }

    .imdb-link {
      display: inline-block;
      background: #f5c518;
      color: #000;
      padding: 5px 12px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 12px;
      font-weight: bold;
      margin-left: 10px;
    }

    .tmdb-link {
      display: inline-block;
      background: #01b4e4;
      color: white;
      padding: 5px 12px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 12px;
      font-weight: bold;
      margin-left: 5px;
    }

    .download-link {
      display: inline-block;
      background: #2ecc71;
      color: white;
      padding: 5px 12px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 12px;
      font-weight: bold;
      margin-left: 5px;
    }

    .download-link:hover {
      background: #27ae60;
    }
  </style>
</head>

    // ==================== ΜΕΤΑΒΛΗΤΕΣ ====================
    let filteredMovies = [];
    let currentPage = 1;
    const itemsPerPage = 20;

    // ==================== ΣΥΝΑΡΤΗΣΕΙΣ ====================
    function toggleTheme() {
      const root = document.documentElement;
      if (root.hasAttribute('data-theme')) {
        root.removeAttribute('data-theme');
      } else {
        root.setAttribute('data-theme', 'light');
      }
    }

    function initFilters() {
      const yearSelect = document.getElementById('yearFilter');
      const countrySelect = document.getElementById('countryFilter');
      const genreSelect = document.getElementById('genreFilter');
      
      const years = [...new Set(moviesData.map(m => m.year))].sort((a, b) => b - a);
      const countries = [...new Set(moviesData.map(m => m.country))].sort();
      const genres = [...new Set(moviesData.flatMap(m => m.genre.split(', ')))].sort();
      
      years.forEach(y => yearSelect.add(new Option(y, y)));
      countries.forEach(c => countrySelect.add(new Option(c, c)));
      genres.forEach(g => genreSelect.add(new Option(g, g)));
    }

    function applyFilters() {
      const searchTerm = document.getElementById('movieSearch').value.toLowerCase();
      const genreValue = document.getElementById('genreFilter').value;
      const yearValue = document.getElementById('yearFilter').value;
      const countryValue = document.getElementById('countryFilter').value;
      const sortValue = document.getElementById('sortSelect').value;
      
      let results = [...moviesData];
      
      if (searchTerm) {
        results = results.filter(m => 
          m.title.toLowerCase().includes(searchTerm) ||
          (m.actors && m.actors.toLowerCase().includes(searchTerm)) ||
          (m.director && m.director.toLowerCase().includes(searchTerm))
        );
      }
      
      if (genreValue !== 'All') {
        results = results.filter(m => m.genre.includes(genreValue));
      }
      
      if (yearValue !== 'All') {
        results = results.filter(m => m.year == yearValue);
      }
      
      if (countryValue !== 'All') {
        results = results.filter(m => m.country === countryValue);
      }
      
      if (sortValue === 'title') {
        results.sort((a, b) => a.title.localeCompare(b.title));
      } else if (sortValue === 'yearDesc') {
        results.sort((a, b) => b.year - a.year);
      } else if (sortValue === 'yearAsc') {
        results.sort((a, b) => a.year - b.year);
      } else if (sortValue === 'ratingDesc') {
        results.sort((a, b) => (b.rating || 0) - (a.rating || 0));
      }
      
      filteredMovies = results;
      currentPage = 1;
      document.getElementById('movieCount').innerText = `Ταινίες: ${filteredMovies.length}`;
      renderMovies();
    }
    
    function renderMovies() {
      const grid = document.getElementById('movieGrid');
      const start = 0;
      const end = currentPage * itemsPerPage;
      const pageItems = filteredMovies.slice(start, end);
      
      if (pageItems.length === 0) {
        grid.innerHTML = '<div style="text-align: center; padding: 50px; width: 100%;">😞 Δεν βρέθηκαν ταινίες</div>';
        document.getElementById('loadMoreBtn').style.display = 'none';
        return;
      }
      
      let html = '';
      for (let m of pageItems) {
        const rating = m.rating || 5;
        const fullStars = Math.floor(rating);
        const halfStar = rating % 1 >= 0.5;
        let starsHtml = '';
        for (let i = 0; i < fullStars; i++) starsHtml += '★';
        if (halfStar) starsHtml += '½';
        for (let i = 0; i < 5 - Math.ceil(rating); i++) starsHtml += '☆';
        
        const qualityClass = m.quality === 'SD' ? 'sd-blue' : '';
        
        html += `
          <div class="movie-card" onclick="openDetails('${m.title.replace(/'/g, "\\'")}')">
            <div class="img-container">
              <div class="quality-tag ${qualityClass}">${m.quality || 'HD'}</div>
              <img src="posters/${m.poster}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x450?text=No+Poster'">
            </div>
            <div class="info">
              <h3>${m.title}</h3>
              <div class="stars">${starsHtml}</div>
              <span class="play-btn">ΠΛΗΡΟΦΟΡΙΕΣ</span>
            </div>
          </div>
        `;
      }
      
      grid.innerHTML = html;
      
      const loadMoreBtn = document.getElementById('loadMoreBtn');
      if (filteredMovies.length > currentPage * itemsPerPage) {
        loadMoreBtn.style.display = 'block';
      } else {
        loadMoreBtn.style.display = 'none';
      }
    }
    
    function loadNextPage() {
      if (filteredMovies.length > currentPage * itemsPerPage) {
        currentPage++;
        renderMovies();
      }
    }
    
    function openDetails(title) {
      const movie = filteredMovies.find(m => m.title === title) || moviesData.find(m => m.title === title);
      if (!movie) return;
      
      document.getElementById('modalTitle').innerText = movie.title;
      document.getElementById('modalImg').src = `posters/${movie.poster}`;
      document.getElementById('modalImg').onerror = function() { this.src = 'https://via.placeholder.com/300x450?text=No+Poster'; };
      
      const rating = movie.rating || 5;
      const fullStars = Math.floor(rating);
      const halfStar = rating % 1 >= 0.5;
      let starsHtml = '';
      for (let i = 0; i < fullStars; i++) starsHtml += '★';
      if (halfStar) starsHtml += '½';
      for (let i = 0; i < 5 - Math.ceil(rating); i++) starsHtml += '☆';
      document.getElementById('modalStars').innerHTML = starsHtml;
      
      document.getElementById('modalMeta').innerHTML = `${movie.year} | ${movie.country} | ${movie.genre} | ${movie.type || 'Series'}`;
      document.getElementById('modalActors').innerText = movie.actors || 'Δεν διατίθεται';
      document.getElementById('modalDirector').innerText = movie.director || 'Δεν διατίθεται';
      document.getElementById('modalWriter').innerText = movie.writer || 'Δεν διατίθεται';
      document.getElementById('modalStudio').innerText = movie.studio || 'Δεν διατίθεται';
      document.getElementById('modalDesc').innerText = movie.desc || 'Δεν υπάρχει περιγραφή';
      
      const imdbLink = document.getElementById('modalImdb');
      if (movie.imdb) {
        imdbLink.href = movie.imdb;
        imdbLink.style.display = 'inline-block';
      } else {
        imdbLink.style.display = 'none';
      }
      
      const tmdbLink = document.getElementById('modalTmdb');
      if (movie.tmdb) {
        tmdbLink.href = movie.tmdb;
        tmdbLink.style.display = 'inline-block';
      } else {
        tmdbLink.style.display = 'none';
      }
      
      const downloadBtn = document.getElementById('modalDownloadBtn');
      if (movie.link && movie.link !== "") {
        downloadBtn.href = movie.link;
        downloadBtn.style.display = 'inline-block';
      } else {
        downloadBtn.style.display = 'none';
      }
      
      document.getElementById('detailModal').style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }
    
    function closeDetails() {
      document.getElementById('detailModal').style.display = 'none';
      document.body.style.overflow = 'auto';
    }
    
    window.onscroll = function() {
      const btn = document.getElementById('backToTop');
      if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) {
        btn.style.display = 'block';
      } else {
        btn.style.display = 'none';
      }
    };
    
    // ==================== ΑΡΧΙΚΟΠΟΙΗΣΗ ====================
    initFilters();
    applyFilters();
    
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeDetails();
    });
    
    document.getElementById('detailModal').addEventListener('click', function(e) {
      if (e.target === this) closeDetails();
    });
  </script>
